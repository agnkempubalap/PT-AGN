<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v75.9 - Systematic Update</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* 1. VARIABEL & TEMA */
        :root{--p:#2563eb;--s:#00C853;--d:#FF1744;--w:#FFD600;--bg:#f1f5f9;--c:#fff;--t:#1e293b;--b:#e2e8f0;--iz:#00B0FF;--al:#37474F}
        body[data-theme="dark"]{--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:8px;transition: 0.3s}
        
        /* 2. LAYOUT DASAR */
        .container{max-width:1450px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;padding:5px}
        .logo-box{display:flex;align-items:center;gap:10px}
        .logo-box img{width:65px;height:65px;border-radius:50%;background:#fff;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .card{background:var(--c);padding:15px;border-radius:15px;margin-bottom:10px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 10px;font-size:10px;color:var(--p);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        /* 3. TOMBOL & INPUT */
        input,button{border-radius:10px;font-size:14px;height:45px;border:1px solid var(--b);background:var(--c);color:var(--t);width:100%;box-sizing:border-box;outline:none}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        /* 4. TABEL REKAP */
        .table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--b);background:var(--c);max-height:500px}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 4px;text-align:center;min-width:45px}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:115px !important;text-align:left !important;padding-left:10px !important;border-right:3px solid var(--p) !important;font-weight:800}
        
        /* 5. STATUS CELL */
        .s-cell{border-radius:6px;width:40px;height:38px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:11px}
        .s-v{background:var(--s);color:#fff}
        .s-late{background:var(--w);color:#000}
        .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff}
        .s-a{background:var(--al);color:#fff}
        .s-l{background:#AA00FF;color:#fff}
        .jam-text{font-size:8px;font-weight:600;display:block;margin-top:2px}

        /* 6. PEMBATAS REKAP AKHIR */
        .rekap-akhir{background:#1e293b !important; color:#ffffff !important; font-weight:800; border-left: 2px solid #000 !important;}
        .th-rekap{background:#0f172a !important; color:#fff !important}

        /* 7. ATURAN CETAK (PDF) */
        @media print {
            body { background: white !important; color: black !important; }
            header, .card:not(.table-card), .no-print { display: none !important; }
            .container { max-width: 100% !important; margin: 0 !important; }
            .card.table-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .table-wrap { overflow: visible !important; max-height: none !important; }
            .table-web { width: 100% !important; font-size: 8pt !important; border: 1px solid #000 !important; }
            .nama-fixed { position: static !important; background: white !important; border: 1px solid #000 !important; color: black !important; }
            .rekap-akhir { background: #eee !important; color: black !important; border: 1px solid #000 !important; }
            @page { size: landscape; margin: 5mm; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <!-- HEADER & TEMA -->
        <header>
            <div class="logo-box">
                <input type="file" id="fileLogo" accept="image/*" style="display:none" onchange="loadLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=2563eb&color=fff" onclick="document.getElementById('fileLogo').click()">
                <div><h2 style="margin:0;font-size:1.1rem">PT AGN</h2><span style="font-size:9px;color:var(--p);font-weight:800">SYSTEM v75.9</span></div>
            </div>
            <button onclick="toggleT()" id="tBtn" style="width:110px;font-size:11px;background:var(--c)">🌙 Dark Mode</button>
        </header>

        <!-- PENGELOLA KARYAWAN -->
        <div class="card">
            <div style="display:flex;gap:8px">
                <input list="lk" id="iNama" placeholder="Pilih Nama...">
                <datalist id="lk"></datalist>
                <button class="btn" style="background:var(--s);width:55px" onclick="tKaryawan()">➕</button>
                <button class="btn" style="background:var(--d);width:55px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <!-- RESET & LIBUR (Sesuai Permintaan) -->
        <div class="card">
            <h3>🧹 Reset & Libur</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
                <input type="date" id="tglReset">
                <button class="btn" style="background:var(--al);font-size:11px" onclick="resetPerKaryawan()">HAPUS PER HARI</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <button class="btn" style="background:var(--p)" onclick="sLib(true)">SET LIBUR</button>
                <button class="btn" style="background:var(--d)" onclick="sLib(false)">BATAL LIBUR</button>
            </div>
        </div>

        <!-- TOMBOL ABSEN UTAMA -->
        <div class="card">
            <h3>⚡ Presensi</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <button class="btn" style="background:var(--s);height:55px;font-size:16px" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn" style="background:var(--d);height:55px;font-size:16px" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn" style="background:var(--iz);margin-top:10px" onclick="pAbsen('Izin')">📝 IZIN / NOTE</button>
        </div>

        <!-- TABEL REKAP -->
        <div class="card table-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px" class="no-print">
                <input type="month" id="fB" style="width:130px" onchange="rRekap()">
                <div style="display:flex;gap:5px">
                    <button class="btn" style="background:#1d6f42;width:90px;font-size:10px" onclick="doExcel()">📂 EXCEL</button>
                    <button class="btn" style="background:#b91c1c;width:90px;font-size:10px" onclick="window.print()">📜 PDF</button>
                </div>
            </div>
            <div class="table-wrap" id="scrollContainer">
                <table class="table-web"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        /* --- KELOMPOK 1: CONFIG & DATABASE --- */
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={};
        const TGL_MULAI_SISTEM = "2026-03-21";

        /* --- KELOMPOK 2: FUNGSI TAMPILAN (THEME & LOGO) --- */
        function toggleT(){ 
            let b=document.body; 
            let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt); 
            document.getElementById('tBtn').innerText=nt==='dark'?'☀️ Light Mode':'🌙 Dark Mode';
        }
        function loadLogo(event) {
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('mainLogo').src = reader.result; localStorage.setItem('agn_logo_local', reader.result); };
            reader.readAsDataURL(event.target.files[0]);
        }

        /* --- KELOMPOK 3: FUNGSI CORE (ABSEN & DATA) --- */
        window.onload=()=>{
            let savedLogo = localStorage.getItem('agn_logo_local'); if(savedLogo) document.getElementById('mainLogo').src = savedLogo;
            document.getElementById('fB').value=new Date().toISOString().slice(0,7);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function uDl(){document.getElementById('lk').innerHTML=Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');}
        function tKaryawan(){let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value="";});}}
        function hKaryawan(){let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove();}

        function pAbsen(ty){
            let n=document.getElementById('iNama'), now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n.value) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n.value}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{n.value="";});
        }

        /* --- KELOMPOK 4: RESET & LIBUR --- */
        function resetPerKaryawan(){
            let n=document.getElementById('iNama'), t=document.getElementById('tglReset'); 
            if(!n.value || !t.value) return alert("Pilih Nama & Tanggal!");
            if(confirm('Hapus data '+n.value+' tgl '+t.value+'?')) db.ref(`absensi/${t.value}/${n.value}`).remove();
        }
        function sLib(st){
            let m=document.getElementById('tglReset'); if(!m.value) return alert("Pilih Tanggal!");
            db.ref(`hari_libur/${m.value}`).set(st?true:null);
        }

        /* --- KELOMPOK 5: REKAP & EXPORT --- */
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0];
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th>${i}</th>`;
            h+=`<th class="th-rekap">H</th><th class="th-rekap">I</th><th class="th-rekap">A</th><th class="th-rekap">L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isOff=(d.getDay()===0 || hl[t]);
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isOff) { sW="L"; clW="s-l"; cL++; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW=data.Masuk.waktu;
                        }
                    } else if(isOff){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    row+=`<td><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td class="rekap-akhir">${cH}</td><td class="rekap-akhir">${cI}</td><td class="rekap-akhir">${cA}</td><td class="rekap-akhir">${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        function doExcel(){
            const f=document.getElementById('fB').value;
            let table = document.querySelector(".table-web").outerHTML;
            let blob = new Blob([table], {type: "application/vnd.ms-excel"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN_${f}.xls`; a.click();
        }
    </script>
</body>
</html>
