<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Management v36.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #1e40af; --primary-dark: #1e3a8a; 
            --success: #10b981; --danger: #ef4444; 
            --warning: #f59e0b; --dark: #1e293b; 
            --bg: #f8fafc; --gray: #94a3b8; 
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background: var(--bg); color: var(--dark); 
            padding: env(safe-area-inset-top) 15px 30px 15px; 
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 0; margin-bottom: 5px;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { height: 45px; width: auto; border-radius: 6px; }
        .logo-box h2 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--primary-dark); letter-spacing: -0.3px; }

        .card { 
            background: white; padding: 18px; border-radius: 14px; 
            margin-bottom: 12px; border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow);
        }
        h3 { 
            margin: 0 0 12px 0; font-size: 0.75rem; color: var(--gray); 
            text-transform: uppercase; font-weight: 700; letter-spacing: 0.8px;
            display: flex; align-items: center; gap: 8px;
        }

        input, select, button, textarea { border-radius: 10px; font-size: 14px; transition: all 0.2s; }
        input, select { 
            width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; 
            background: #fff; height: 45px; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1); }
        
        .btn { 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 600; cursor: pointer; border: none; gap: 6px;
            color: white; active: transform: scale(0.97);
        }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        .btn-gray { background: var(--gray); }

        .management-row { display: grid; grid-template-columns: 1fr 50px 50px; gap: 8px; margin-bottom: 10px; }
        .libur-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

        .export-container { position: relative; }
        .export-menu { 
            display: none; position: absolute; right: 0; top: 48px; 
            background: white; border: 1px solid #eee; border-radius: 10px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); z-index: 100; min-width: 160px;
        }
        .export-menu button { width: 100%; text-align: left; background: none; padding: 10px 12px; border: none; border-bottom: 1px solid #f1f5f9; cursor: pointer; }

        .table-wrap { overflow: auto; border-radius: 12px; border: 1px solid #e2e8f0; background: white; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1100px; }
        th, td { border-bottom: 1px solid #f1f5f9; padding: 10px 4px; text-align: center; }
        th { background: #f8fafc; color: var(--gray); font-weight: 600; text-transform: uppercase; font-size: 9px; position: sticky; top: 0; z-index: 5; }
        
        .nama-fixed { 
            position: sticky; left: 0; background: white !important; 
            font-weight: 600; text-align: left; width: 130px; 
            z-index: 4; border-right: 2px solid #e2e8f0; padding-left: 12px;
        }
        
        .status-cell { border-radius: 5px; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; margin: auto; }
        .status-v { background-color: #22c55e !important; color: white !important; font-weight: 700; } 
        .status-t { background-color: #eab308 !important; color: white !important; font-weight: 700; } 
        .status-i { background-color: #06b6d4 !important; color: white !important; font-weight: 700; } 
        .status-off { background-color: #fee2e2 !important; color: #b91c1c !important; } 
        .status-lbr { background-color: #e2e8f0 !important; color: #475569 !important; font-style: italic; } 

        #kop-surat { display: none; align-items: center; justify-content: center; border-bottom: 3px double #333; padding-bottom: 15px; margin-bottom: 25px; gap: 20px; }
        #kop-surat img { height: 90px; width: auto; }

        @media print { 
            .no-print { display: none !important; } 
            #kop-surat { display: flex !important; } 
            .table-wrap { border: none; box-shadow: none; overflow: visible; }
            @page { size: landscape; margin: 1cm; } 
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="no-print">
            <div class="logo-box">
                <img src="https://i.ibb.co/C5fRByW/AGN-Logo.jpg" alt="Logo">
                <div>
                    <h2>PT ATHA GHANIA NUGRAHA</h2>
                    <span style="font-size: 10px; color: var(--gray); font-weight: 600;">PRESENSI SYSTEM v36.0</span>
                </div>
            </div>
        </header>

        <div id="kop-surat">
            <img src="https://i.ibb.co/C5fRByW/AGN-Logo.jpg" alt="Logo AGN">
            <div class="text-kop">
                <h1 style="margin:0; font-size: 26px;">PT ATHA GHANIA NUGRAHA</h1>
                <p style="margin:5px 0; font-size: 16px; letter-spacing: 1px;">LAPORAN REKAPITULASI PRESENSI KARYAWAN</p>
            </div>
        </div>

        <div class="card no-print">
            <h3>👤 Manajemen Karyawan</h3>
            <div class="management-row">
                <input list="listKaryawan" id="inputPilihNama" placeholder="Ketik nama baru / pilih nama...">
                <datalist id="listKaryawan"></datalist>
                <button class="btn btn-success" onclick="tambahKaryawan()">➕</button>
                <button class="btn" style="background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca;" onclick="hapusKaryawan()">🗑️</button>
            </div>
            
            <h3>🗓️ Atur Libur Masal</h3>
            <div class="libur-group">
                <input type="date" id="tglMulaiLibur">
                <input type="date" id="tglSelesaiLibur">
            </div>
            <div style="display: flex; gap:5px;">
                <button class="btn btn-primary btn-gray" style="flex:1;" onclick="setRentangLibur(true)">SET LIBUR</button>
                <button class="btn btn-primary" style="background:#eee; color:#333; border:1px solid #ccc; flex:1;" onclick="setRentangLibur(false)">HAPUS JADWAL</button>
            </div>
        </div>

        <div class="card no-print">
            <h3>⚡ Presensi Harian</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn btn-success" style="height: 55px; font-size: 16px;" onclick="prosesAbsen('Masuk')">MASUK</button>
                <button class="btn btn-danger" style="height: 55px; font-size: 16px;" onclick="prosesAbsen('Pulang')">PULANG</button>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-top: 8px;">
                <button class="btn btn-warning" style="height: 48px;" onclick="prosesAbsen('Izin')">📝 IZIN / SAKIT</button>
                <button class="btn btn-primary btn-gray" style="height: 48px;" onclick="resetAbsen()">♻️ RESET</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;" class="no-print">
                <h3>📊 Laporan Bulanan</h3>
                <input type="month" id="filterBulan" style="margin:0; width: 160px;" onchange="renderRekap()">
                <div class="export-container">
                    <button class="btn btn-primary" style="width:125px; background:#475569; height: 45px;" onclick="toggleExport()">EXPORT ▾</button>
                    <div id="exportMenu" class="export-menu">
                        <button onclick="exportToExcel()">📊 Format Excel</button>
                        <button onclick="siapkanCetak()">📄 Format PDF</button>
                    </div>
                </div>
            </div>

            <div class="table-wrap">
                <table id="tabelUtama">
                    <thead><tr id="theadRekap"></tr></thead>
                    <tbody id="tbodyRekap"></tbody>
                </table>
            </div>

            <div class="no-print" style="margin-top:20px">
                <h3>📝 Catatan Admin</h3>
                <textarea id="catatanAdmin" style="width:100%; height:70px; padding:12px; border:1px solid #cbd5e1; border-radius:10px;" placeholder="Tulis catatan di sini..."></textarea>
            </div>

            <div id="print-note" style="display:none; margin-top:20px; font-size:12px;">
                <strong>Keterangan Khusus Admin:</strong>
                <p id="noteContent" style="white-space: pre-wrap; border: 1px solid #ccc; padding: 12px; border-radius: 8px; margin-top: 5px;"></p>
                <div style="margin-top: 30px; text-align: right;">
                    <p>Dicetak pada: <span id="tglCetak"></span></p>
                    <br><br><br><br>
                    <p><strong>( ____________________ )</strong></p>
                    <p>Admin PT. AGN</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "810494462386",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let masterKaryawan = {}, absensiData = {}, hariLibur = {};

        window.onload = () => {
            const s = new Date();
            document.getElementById('filterBulan').value = `${s.getFullYear()}-${String(s.getMonth() + 1).padStart(2, '0')}`;
            db.ref('master_karyawan').on('value', snap => { masterKaryawan = snap.val() || {}; updateDatalist(); renderRekap(); });
            db.ref('absensi').on('value', snap => { absensiData = snap.val() || {}; renderRekap(); });
            db.ref('hari_libur').on('value', snap => { hariLibur = snap.val() || {}; renderRekap(); });
        };

        function updateDatalist() {
            const dl = document.getElementById('listKaryawan');
            let opt = '';
            Object.values(masterKaryawan).sort().forEach(nama => { opt += `<option value="${nama}">`; });
            dl.innerHTML = opt;
        }

        function tambahKaryawan() {
            const n = document.getElementById('inputPilihNama');
            const namaBaru = n.value.trim();
            if(!namaBaru) return alert("Ketik nama baru!");
            const ada = Object.values(masterKaryawan).some(v => v.toLowerCase() === namaBaru.toLowerCase());
            if(ada) return alert("Nama sudah ada!");
            db.ref('master_karyawan').push(namaBaru).then(() => { n.value = ""; });
        }

        function hapusKaryawan() {
            const n = document.getElementById('inputPilihNama');
            const namaCari = n.value.trim();
            const idHapus = Object.keys(masterKaryawan).find(key => masterKaryawan[key] === namaCari);
            if(!idHapus) return alert("Pilih nama di daftar!");
            if(confirm(`Hapus permanen ${namaCari}?`)) {
                db.ref(`master_karyawan/${idHapus}`).remove().then(() => n.value = ""; });
        }

        function setRentangLibur(isSet) {
            const m = document.getElementById('tglMulaiLibur').value, s = document.getElementById('tglSelesaiLibur').value;
            if(!m || !s) return alert("Pilih Rentang Tanggal!");
            let u = {}; let curr = new Date(m), end = new Date(s);
            while(curr <= end) { u[curr.toISOString().split('T')[0]] = isSet ? true : null; curr.setDate(curr.getDate()+1); }
            db.ref('hari_libur').update(u).then(()=> alert("Jadwal Libur Diperbarui"));
        }

        function resetAbsen() {
            const nama = document.getElementById('inputPilihNama').value;
            const tgl = new Date().toISOString().split('T')[0];
            if(!nama) return alert("Pilih nama!");
            if(confirm(`Reset absen ${nama} hari ini?`)) db.ref(`absensi/${tgl}/${nama}`).remove();
        }

        function prosesAbsen(tipe) {
            const nama = document.getElementById('inputPilihNama').value;
            if(!nama) return alert("Pilih/Ketik Nama!");
            const s = new Date();
            const tgl = s.toISOString().split('T')[0];
            const jam = s.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            let status = (tipe==='Masuk' && (s.getHours()>9 || (s.getHours()===9 && s.getMinutes()>0))) ? "Terlambat" : "Hadir";
            if(tipe === 'Izin') {
                const area = document.getElementById('catatanAdmin');
                const tglIndo = s.toLocaleDateString('id-ID', {day:'numeric', month:'short'});
                if(!area.value.includes(nama + " Izin (" + tglIndo)) area.value += `- ${nama} Izin (${tglIndo})\n`;
            }
            db.ref(`absensi/${tgl}/${nama}/${tipe}`).set({ waktu: jam, status: status });
        }

        function toggleExport() {
            const m = document.getElementById('exportMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function renderRekap() {
            const f = document.getElementById('filterBulan').value;
            const [y, m] = f.split('-');
            const totalH = new Date(y, m, 0).getDate();
            let h = `<th class="nama-fixed">Karyawan</th>`;
            for(let i=1; i<=totalH; i++) h += `<th>${i}</th>`;
            h += `<th style="color:var(--success)">H</th><th style="color:var(--warning)">T</th><th style="color:var(--primary)">I</th>`;
            document.getElementById('theadRekap').innerHTML = h;

            let b = "";
            Object.values(masterKaryawan).sort().forEach(nama => {
                let cH=0, cT=0, cI=0;
                let r = `<td class="nama-fixed">${nama}</td>`;
                for(let i=1; i<=totalH; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2,'0')}`, dObj = new Date(tgl);
                    let sim = "-", cls = "";
                    if(dObj.getDay()===0) { sim = "OFF"; cls = "status-off"; }
                    else if(hariLibur[tgl]) { sim = "LBR"; cls = "status-lbr"; }
                    if(absensiData[tgl] && absensiData[tgl][nama]) {
                        const d = absensiData[tgl][nama];
                        if(d.Izin) { sim="I"; cls="status-i"; cI++; }
                        else if(d.Masuk) {
                            if(d.Masuk.status==="Terlambat") { sim="T"; cls="status-t"; cT++; }
                            else { sim="V"; cls="status-v"; cH++; }
                        }
                    }
                    r += `<td><div class="status-cell ${cls}">${sim}</div></td>`;
                }
                b += `<tr>${r}<td><strong>${cH}</strong></td><td><strong>${cT}</strong></td><td><strong>${cI}</strong></td></tr>`;
            });
            document.getElementById('tbodyRekap').innerHTML = b;
        }

        function siapkanCetak() {
            document.getElementById('noteContent').innerText = document.getElementById('catatanAdmin').value || "-";
            document.getElementById('tglCetak').innerText = new Date().toLocaleString('id-ID');
            toggleExport();
            setTimeout(() => { window.print(); }, 500);
        }

        function exportToExcel() {
            const t = document.getElementById("tabelUtama");
            const wb = XLSX.utils.table_to_book(t);
            XLSX.writeFile(wb, `Laporan_Absensi_AGN_${document.getElementById('filterBulan').value}.xlsx`);
            toggleExport();
        }
    </script>
</body>
</html>
