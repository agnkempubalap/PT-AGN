<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi PT-AGN</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: sans-serif;
  background: linear-gradient(to bottom,#6fa8dc,#cfe2f3);
  margin:0;
  padding:10px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:#fff;
}
.masuk{background:#27ae60;}
.pulang{background:#f39c12;}
.reset{background:#e74c3c;}
.export{background:#2980b9;}
</style>
</head>

<body>

<div class="card">
<h2>📋 Absensi PT-AGN</h2>

<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button class="masuk" onclick="absenMasuk()">Absen Masuk</button>
<button class="pulang" onclick="absenPulang()">Absen Pulang</button>
<button class="reset" onclick="resetHari()">Reset Hari Ini</button>

<button class="export" onclick="exportExcel()">Export Excel</button>
<button class="export" onclick="exportPDF()">Export PDF</button>

<input type="file" onchange="restoreData(event)">
<button class="export" onclick="backupData()">Backup Data</button>

</div>

<div class="card">
<h3>Filter</h3>
<input type="month" id="filterBulan" onchange="render()">
<input type="text" id="search" placeholder="Cari nama..." onkeyup="render()">
</div>

<div class="card">
<h3>Dashboard</h3>
<div id="total"></div>
<div id="hadir"></div>
<div id="telat"></div>
</div>

<div class="card">
<h3>Grafik</h3>
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

<script>

// 🔥 FIREBASE CONFIG (SUDAH DIISI)
const firebaseConfig = {
  apiKey: "AIzaSyA...",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let absensiData = {};

// 🔴 REALTIME
db.collection("absensi").onSnapshot(snap=>{
  absensiData = {};
  snap.forEach(doc=>{
    absensiData[doc.id]=doc.data();
  });
  render();
});

// ⏰ UTIL
function now(){
  let d=new Date();
  return {
    tanggal:d.toISOString().slice(0,10),
    jam:d.toTimeString().slice(0,8)
  }
}

// 🟢 ABSEN MASUK
function absenMasuk(){
  let nama=document.getElementById("nama").value;
  let t=now();
  let id=nama+"_"+t.tanggal;

  if(absensiData[id]?.masuk){
    alert("Sudah absen masuk!");
    return;
  }

  db.collection("absensi").doc(id).set({
    nama,
    tanggal:t.tanggal,
    masuk:t.jam,
    pulang:"",
    status:"Hadir"
  });
}

// 🟡 ABSEN PULANG
function absenPulang(){
  let nama=document.getElementById("nama").value;
  let t=now();
  let id=nama+"_"+t.tanggal;

  if(!absensiData[id]){
    alert("Belum absen masuk!");
    return;
  }

  db.collection("absensi").doc(id).update({
    pulang:t.jam
  });
}

// 🔴 RESET
function resetHari(){
  let today=now().tanggal;
  Object.keys(absensiData).forEach(id=>{
    if(absensiData[id].tanggal===today){
      db.collection("absensi").doc(id).delete();
    }
  });
}

// 🔵 RENDER
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  let filter=document.getElementById("filterBulan").value;
  let search=document.getElementById("search").value.toLowerCase();

  let total=0, hadir=0, telat=0;

  let grafik={};

  Object.values(absensiData).forEach(d=>{

    if(filter && !d.tanggal.startsWith(filter)) return;
    if(search && !d.nama.toLowerCase().includes(search)) return;

    total++;
    if(d.status==="Hadir") hadir++;

    grafik[d.tanggal]=(grafik[d.tanggal]||0)+1;

    list.innerHTML+=`
    <div class="card">
    <b>${d.nama}</b><br>
    ${d.tanggal}<br>
    Masuk: ${d.masuk || "-"}<br>
    Pulang: ${d.pulang || "-"}<br>
    Status: ${d.status}
    </div>
    `;
  });

  document.getElementById("total").innerText="Total: "+total;
  document.getElementById("hadir").innerText="Hadir: "+hadir;
  document.getElementById("telat").innerText="Telat: "+telat;

  drawChart(grafik);
}

// 📊 CHART
let chart;
function drawChart(data){
  let ctx=document.getElementById("chart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(data),
      datasets:[{
        label:"Hadir",
        data:Object.values(data)
      }]
    }
  });
}

// 📁 EXCEL
function exportExcel(){
  let data=Object.values(absensiData);

  let wsData=[
    ["LAPORAN ABSENSI PT-AGN"],
    [],
    ["No","Nama","Tanggal","Masuk","Pulang","Status"]
  ];

  data.forEach((d,i)=>{
    wsData.push([
      i+1,d.nama,d.tanggal,d.masuk,d.pulang,d.status
    ]);
  });

  let ws=XLSX.utils.aoa_to_sheet(wsData);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");

  XLSX.writeFile(wb,"Absensi.xlsx");
}

// 📄 PDF SUPER PRO
function exportPDF(){
  const {jsPDF}=window.jspdf;
  let doc=new jsPDF();

  let data=Object.values(absensiData);

  doc.setFontSize(16);
  doc.text("LAPORAN ABSENSI PT-AGN",14,15);

  let table=data.map((d,i)=>[
    i+1,d.nama,d.tanggal,d.masuk,d.pulang,d.status
  ]);

  doc.autoTable({
    startY:25,
    head:[["No","Nama","Tanggal","Masuk","Pulang","Status"]],
    body:table
  });

  doc.text("HRD Manager",140,doc.lastAutoTable.finalY+30);

  doc.save("absensi.pdf");
}

// 💾 BACKUP
function backupData(){
  let data=JSON.stringify(absensiData);
  let blob=new Blob([data],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

// 🔄 RESTORE
function restoreData(e){
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(){
    let data=JSON.parse(reader.result);
    Object.keys(data).forEach(id=>{
      db.collection("absensi").doc(id).set(data[id]);
    });
  };

  reader.readAsText(file);
}

</script>

</body>
</html>
