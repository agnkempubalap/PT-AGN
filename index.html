        <style>
    /* 1. VARIABLE & RESET */
    :root { 
        --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; 
        --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; 
    }
    
    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        margin:0; padding:0; 
        font-family: 'Plus Jakarta Sans', sans-serif; 
    }

    body { 
        background: var(--bg); 
        color: var(--t); 
        font-size: 13px; 
        padding-bottom: 30px; 
    }

    /* 2. NAVIGATION */
    .nav { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        position: fixed; 
        top: 0; width: 100%; 
        z-index: 1000; 
        background: var(--p); 
        padding: 6px; gap: 4px; 
    }

    .nav-btn { 
        padding: 12px 2px; 
        border: none; 
        background: transparent; 
        color: rgba(255,255,255,0.6); 
        font-weight: 700; 
        font-size: 10px; 
        border-radius: 8px; 
        cursor: pointer; 
    }

    .nav-btn.active { 
        background: white; 
        color: var(--p); 
    }

    /* 3. LAYOUT & CARDS */
    .container { 
        width: 100%; 
        max-width: 950px; 
        margin: 65px auto 0; 
        padding: 0 12px; 
    }

    .tab-content { display: none; } 
    .tab-content.active { display: block; }

    .card { 
        background: var(--c); 
        padding: 15px; 
        border-radius: 16px; 
        margin-bottom: 12px; 
        border: 1px solid var(--b); 
    }

    /* 4. HEADERS (JUDUL KIRI - TANGGAL KANAN) */
    h3 { 
        margin-bottom: 12px; 
        font-size: 13px; 
        color: var(--p); 
        border-left: 4px solid var(--p); 
        padding-left: 10px; 
        font-weight: 800;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    /* Styling khusus input di dalam h3 */
    h3 input[type="date"], h3 input[type="month"] {
        width: auto;
        min-width: 110px;
        height: 30px;
        padding: 0 8px;
        font-size: 11px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid var(--b);
        outline: none;
        font-weight: 600;
    }

    /* 5. FORM ELEMENTS */
    .flex-row { 
        display: flex; 
        flex-wrap: nowrap; /* Tombol tetap sejajar kesamping */
        gap: 8px; 
        margin-bottom: 10px; 
        width: 100%;
    }

    input, select { 
        width: 100%; 
        height: 40px; 
        background: #f8fafc; 
        border: 1px solid var(--b); 
        border-radius: 10px; 
        padding: 0 10px; 
        font-size: 13px; 
        outline: none; 
    }

    .btn { 
        border: none; 
        border-radius: 10px; 
        padding: 12px; 
        font-weight: 800; 
        cursor: pointer; 
        color: white; 
        font-size: 11px; 
        text-align: center; 
        margin-bottom: 5px; 
        flex: 1; /* Membuat lebar tombol sama rata dalam flex-row */
        min-width: 0; /* Mencegah overflow pada tombol kecil */
    }

    /* 6. TABLE AREA */
    .table-area { 
        width: 100%; 
        overflow-x: auto; 
        border: 1px solid var(--b); 
        border-radius: 12px; 
        background: white; 
        margin-bottom: 10px; 
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        white-space: nowrap; 
    }

    th, td { 
        padding: 8px; 
        border: 1px solid #f1f5f9; 
        text-align: center; 
        font-size: 10px; 
        vertical-align: middle; 
    }

    th { 
        background: #f8fafc; 
        color: #64748b; 
        font-weight: 700;
    }

    .sticky-col { 
        position: sticky; 
        left: 0; 
        background: white !important; 
        font-weight: 800; 
        z-index: 5; 
        border-right: 2px solid #eee; 
    }

    /* 7. BADGES & DOTS */
    .badge { 
        width: 24px; height: 24px; 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-weight: 800; 
        color: white; 
        margin: auto; 
        font-size: 10px; 
        position: relative; 
        cursor: pointer; 
    }

    .dot { 
        position: absolute; 
        bottom: 2px; right: 2px; 
        width: 6px; height: 6px; 
        background: white; 
        border-radius: 50%; 
        border: 1px solid rgba(0,0,0,0.1); 
    }

    /* 8. MODAL SYSTEM */
    .modal { 
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(0,0,0,0.8); 
        z-index: 2000; 
        align-items: center; 
        justify-content: center; 
        padding: 15px; 
    }

    .modal-box { 
        background: white; 
        width: 100%; 
        max-width: 600px; 
        border-radius: 15px; 
        padding: 15px; 
        max-height: 85vh; 
        overflow-y: auto; 
    }

    /* 9. UTILITY CLASSES */
    .check-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 8px; 
        margin-bottom: 10px; 
    }

    .check-item { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        background: #f8fafc; 
        padding: 10px; 
        border-radius: 10px; 
        border: 1px solid #eee; 
        cursor: pointer; 
    }

    /* Khusus Teks Ringkasan Gaji */
    #tab-gaji b { color: #fef3c7; }
</style>


</head>

  <script>
        // ==========================================
        // 1. KONEKTIVITAS (FIREBASE INIT)
        // ==========================================
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); 
        const db = firebase.database();
        let D = {}; 
        const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000, "pasang pangkalan":500000, "pasang agen":700000 };

        window.onload = () => {
    // 1. SET TANGGAL HARI INI KE SEMUA INPUT
    const t = new Date().toISOString().split('T')[0];
    const blnIni = t.slice(0, 7); 
    
    const idsHarian = ['absTgl', 'stTgl', 'akTgl', 'filterTglAk'];
    idsHarian.forEach(id => { 
        const el = document.getElementById(id);
        if(el) el.value = t;
    });

    const idsBulan = ['fM', 'fStok', 'fGaji'];
    idsBulan.forEach(id => { 
        const el = document.getElementById(id);
        if(el) el.value = blnIni; 
    });

    // 2. LISTENER FIREBASE
    db.ref('/').on('value', snapshot => { 
        window.D = snapshot.val() || {}; 
        D = window.D; 

        if(typeof updateSemuaDropdownKaryawan === 'function') updateSemuaDropdownKaryawan();
        if(typeof initUI === 'function') initUI(); 
        
        autoRender(); 
        // Paksa render absen agar tabel muncul di awal
        if(typeof renderAll === 'function') renderAll();
    });
};




        // ==========================================
        // 2. GLOBAL UTILITIES (NAV, MODAL, EXPORT)
        // ==========================================
        function autoRender() { 
    // Pengaman: Jika data Firebase (D) belum masuk, jangan jalan dulu
    if (!window.D || Object.keys(window.D).length === 0) return; 

    // Panggil fungsi render utama satu per satu
    if (typeof renderStok === 'function') renderStok(); 
    if (typeof renderGaji === 'function') renderGaji(); 
    if (typeof renderCheckKaryawan === 'function') renderCheckKaryawan();
    if (typeof renderAbs === 'function') renderAbs(); // PENTING: Agar kalender/tabel absen muncul
    if (typeof renderLogHarian === 'function') renderLogHarian();
}

function tab(id) { 
    // 1. Sembunyikan semua tab & matikan semua tombol nav
    document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));

    // 2. Tampilkan tab yang dipilih & nyalakan tombolnya
    const targetTab = document.getElementById('tab-' + id);
    const targetBtn = document.getElementById('nav-' + id);
    
    if (targetTab) targetTab.classList.add('active'); 
    if (targetBtn) targetBtn.classList.add('active'); 
    
    // 3. Update data di tab tersebut
    autoRender(); 
}

       
        function initUI() {
    const listK = document.getElementById('listK'), selK = document.getElementById('selK');
    const listB = document.getElementById('listB'), stBrg = document.getElementById('stBrg');
    
    // 1. RENDER MASTER KARYAWAN (Versi Anti-Gagal)
function updateSemuaDropdownKaryawan() {
    // 1. Pastikan data dari Firebase sudah masuk ke variabel D
    if (!window.D || !D.master_karyawan) {
        console.warn("Data master_karyawan belum tersedia di variabel D.");
        return;
    }

    const K = Object.entries(D.master_karyawan);
    // Sortir A-Z supaya rapi
    const sortedK = [...K].sort((a, b) => a[1].localeCompare(b[1]));

    // --- A. REKAP AKTIVITAS (ID: filterNamaAk) ---
    const filterNama = document.getElementById('filterNamaAk');
    if (filterNama) {
        const simpanPilihan = filterNama.value;
        let htmlRekap = '<option value="" style="color:#94a3b8">Global (Semua)</option>';
        htmlRekap += sortedK.map(k => `<option value="${k[1]}" style="color:#1e293b">${k[1]}</option>`).join('');
        
        filterNama.innerHTML = htmlRekap;
        filterNama.value = simpanPilihan; // Kembalikan ke pilihan user semula
        filterNama.style.color = filterNama.value === "" ? "#94a3b8" : "#1e293b";
    }

    // --- B. ABSENSI & GAJI (ID: selKaryawan atau selK) ---
    // Kita cek dua ID sekaligus buat jaga-jaga kalau Bos ganti nama ID
    const elAbsen = document.getElementById('selKaryawan') || document.getElementById('selK');
    if (elAbsen) {
        elAbsen.innerHTML = '<option value="" disabled selected>Pilih Karyawan...</option>' + 
            sortedK.map(k => `<option value="${k[1]}">${k[1]}</option>`).join('');
    }

    // --- C. DAFTAR DI MENU SETTING (ID: listKaryawan) ---
    const elListK = document.getElementById('listKaryawan') || document.getElementById('listK');
    if (elListK) {
        elListK.innerHTML = sortedK.map(k => `
            <span style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:8px; font-size:11px; display:inline-block; margin:2px;">
                ${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red; cursor:pointer; margin-left:5px;">×</b>
            </span>`).join('');
    }

    // --- D. CHECKBOX INPUT AKTIVITAS (ID: akKaryawan) ---
    // Penting: Agar saat Bos tambah karyawan baru, daftar checkbox langsung muncul
    if (typeof renderCheckKaryawan === 'function') {
        renderCheckKaryawan();
    }
}

// --- LISTENER FIREBASE (Pastikan ditaruh di bagian awal/global script) ---
db.ref('master_karyawan').on('value', snapshot => {
    try {
        if (!window.D) window.D = {};
        const data = snapshot.val();
        
        if (data) {
            D.master_karyawan = data;
            // Jalankan update semua tampilan
            updateSemuaDropdownKaryawan();
            
            // Jalankan render tabel jika ada
            if (typeof renderLogHarian === 'function') renderLogHarian();
        }
    } catch (err) {
        console.error("Error saat update master karyawan:", err);
    }
});


    // 2. RENDER MASTER BARANG (Untuk Tab Stok)
    if (D.master_barang) {
        const B = Object.entries(D.master_barang);
        if (listB) {
            listB.innerHTML = B.map(b => `
                <span style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:8px; font-size:11px">
                    ${b[1]} <b onclick="removeItem('master_barang','${b[0]}')" style="color:red; cursor:pointer">×</b>
                </span>`).join('');
        }
        // Mengisi dropdown pilihan barang di form input stok
        if (stBrg) {
            stBrg.innerHTML = B.map(b => `<option value="${b[1]}">${b[1]}</option>`).join('');
        }
    }

    // 3. PEMICU OTOMATIS (SINKRONISASI FORM STOK)
    // Menjalankan pengecekan Liter/Kg berdasarkan barang pertama yang muncul
    if (typeof toggleSatuan === "function") {
        toggleSatuan();
    }

    // Menjalankan pengecekan tampil/sembunyi kolom detail (Kotor/QC) saat startup
    // Agar jika defaultnya "Masuk", kolom detail langsung terlihat rapi
    if (typeof toggleAksi === "function") {
        toggleAksi();
    }
}

        function openMod(t,h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
        function closeMod() { document.getElementById('modalUni').style.display='none'; }

        function removeItem(p,k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove().then(()=>closeMod()); }

        if (dataHariIni.j === "Alpa") {
            return alert("Gagal! Status karyawan ALPA, tidak bisa input PULANG.");

        if (dataHariIni.j === "Izin") {

// 1. FUNGSI SIMPAN STOK (saveSt)
function saveSt() {
    const t = document.getElementById('stTgl').value;
    const b = document.getElementById('stBrg').value;
    const qRaw = document.getElementById('stQty').value;
    const q = parseFloat(qRaw); 
    const aksiUtama = document.getElementById('stAksi').value;
    
    if(!t || !b || !q) return alert("Tanggal, Barang, atau Jumlah belum diisi!");

    // Ambil nilai akhir (Jika 'Jual', ambil dari stSubAksi)
    const akFinal = (aksiUtama === "Jual") 
                    ? document.getElementById('stSubAksi').value 
                    : aksiUtama;

    const isCair = b.toLowerCase().includes('minyak') || b.toLowerCase().includes('cair');

    // --- VALIDASI STOK KOTOR UNTUK REKONDISI ---
    if (aksiUtama === "Rekondisi") {
        let stokKotorTersedia = 0;
        if (D && D.stok_logs) {
            Object.values(D.stok_logs).forEach(l => {
                if (l.b === b) {
                    if (l.ak === "Masuk" && l.kon === "Bekas") stokKotorTersedia += l.q;
                    if (l.ak === "Rekondisi") stokKotorTersedia -= l.q;
                }
            });
        }
        if (q > stokKotorTersedia) {
            return alert(`❌ Gagal! Stok kotor ${b} tidak cukup.\nSisa stok kotor: ${stokKotorTersedia} unit.`);
        }
    }
    
    // Logika Status Otomatis & Detail
    let konFinal, qcFinal;
    if (isCair) {
        konFinal = "Baru";
        qcFinal = "Accepted";
    } else {
        konFinal = document.getElementById('stKon').value;
        qcFinal = document.getElementById('stQC').value;
    }

    const satFinal = isCair ? document.getElementById('stSatuan').value : 'Unit';

    db.ref('stok_logs').push({ 
        t, b, q, kon: konFinal, qc: qcFinal, ak: akFinal, sat: satFinal 
    }).then(() => {
        // Logika Pencairan Upah Jerigen
        if(akFinal.includes("Jual") && b.toLowerCase().includes("jerigen")) {
            let sisaJual = q;
            let logs = Object.entries(D.aktivitas || {})
                .filter(x => x[1].j.toLowerCase().includes(b.toLowerCase()) && !x[1].isCair)
                .sort((a,b) => a[1].t.localeCompare(b[1].t));
            
            logs.forEach(log => {
                if(sisaJual <= 0) return;
                let qtyReady = log[1].q;
                if(qtyReady <= sisaJual) { 
                    db.ref(`aktivitas/${log[0]}`).update({ isCair: true, tglCair: t }); 
                    sisaJual -= qtyReady; 
                }
            });
        }
        
        // --- RESET FORM ---
        document.getElementById('stQty').value = ""; 
        document.getElementById('stAksi').value = "Masuk"; 
        toggleSatuan(); 
        
        alert("✅ Berhasil! Stok telah diperbarui."); 
        if(typeof renderStok === 'function') renderStok(); 
    });
}

// 2. FUNGSI LAPORAN STOK (renderStok)
function renderStok() {
    const filterBulan = document.getElementById('fStok').value;
    const target = document.getElementById('tbStok');
    if(!target || !D) return; 

    // Mengambil data barang sebagai Entries agar kita punya KEY/ID Firebase-nya
    const B_entries = D.master_barang ? Object.entries(D.master_barang) : [];
    let h = "";
    const BJ = 0.9; 

    if (B_entries.length === 0) {
        target.innerHTML = "<tr><td colspan='12' style='padding:20px; color:#94a3b8;'>Data Barang Belum Ada</td></tr>";
        return;
    }

    B_entries.forEach(entry => {
        const key = entry[0]; // ID barang di firebase
        const dataBrg = entry[1];
        
        // Mendukung format lama (string) atau baru (object {n: nama, m: min})
        const b = dataBrg.n || dataBrg; 
        const limitMin = dataBrg.m || 0; // Default 0 jika belum diset

        let s = { ak:0, ab:0, ik:0, ib:0, rej:0, rk:0, jm:0, ju:0 };
        const isCair = b.toLowerCase().includes('minyak') || b.toLowerCase().includes('cair');

        if (D.stok_logs) {
            Object.values(D.stok_logs).forEach(l => {
                if(l.b !== b) return;
                let tglLog = l.t ? l.t.slice(0,7) : "";
                if(tglLog < filterBulan) { 
                    if(l.ak === "Masuk") (l.kon === "Bekas") ? s.ak += l.q : s.ab += l.q; 
                    else if(l.ak === "Rekondisi") { s.ak -= l.q; s.ab += l.q; } 
                    else if(l.ak.includes("Jual")) s.ab -= l.q; 
                }
                else if(tglLog === filterBulan) { 
                    if(l.ak === "Masuk") (l.kon === "Bekas") ? s.ik += l.q : s.ib += l.q; 
                    else if(l.ak === "Rekondisi") s.rk += l.q; 
                    else if(l.ak === "Jual Mitra") s.jm += l.q; 
                    else if(l.ak === "Jual Umum") s.ju += l.q; 
                    if(l.qc === "Reject") s.rej += l.q; 
                }
            });
        }

        let ktr = Math.max(0, (s.ak + s.ik) - s.rk);
        let rdy = (s.ab + s.ib + s.rk) - (s.jm + s.ju);
        let totalStok = ktr + rdy;

        // --- LOGIKA PERINGATAN STOK MINIMUM ---
        const isKritis = totalStok <= limitMin;
        const rowBg = isKritis ? "background:#fee2e2;" : "background:#fff;"; // Merah muda jika kritis
        const warningIcon = isKritis ? "<span style='color:#ef4444;'>⚠️</span> " : "";

        const tampil = (val, forceStrip = false, isTotalCol = false) => {
            if (forceStrip) return `<span style="color:#e2e8f0;">-</span>`;
            const v = val || 0;
            if (!isCair) {
                return `<div style="font-weight:700; font-size:11px;">${v}</div>`;
            } else {
                let kg = (v * BJ).toFixed(1);
                return `<div style="font-size:10px;"><b>${v}</b><br><small>${kg}kg</small></div>`;
            }
        };

        h += `<tr style="${rowBg} border-bottom: 1px solid #f1f5f9;">
            <td class="sticky-col" 
                onclick="editLimit('${key}', '${b}', ${limitMin})"
                style="font-weight:700; color:#334155; font-size:11px; cursor:pointer; text-decoration:underline; background:inherit; padding:10px 8px;">
                ${warningIcon}${b} <br>
                <small style="font-weight:400; color:#64748b;">Min: ${limitMin}</small>
            </td>
            <td style="text-align:center;">${tampil(s.ak, isCair)}</td>
            <td style="text-align:center;">${tampil(s.ab)}</td>
            <td style="text-align:center;">${tampil(s.ik, isCair)}</td>
            <td style="text-align:center;">${tampil(s.ib)}</td>
            <td style="text-align:center; color:#e11d48;">${tampil(s.rej, isCair)}</td>
            <td style="text-align:center;">${tampil(s.rk, isCair)}</td>
            <td style="text-align:center;">${tampil(s.jm)}</td>
            <td style="text-align:center;">${tampil(s.ju)}</td>
            <td style="text-align:center; font-weight:bold; color:#92400e;">${tampil(ktr, isCair)}</td>
            <td style="text-align:center; font-weight:bold; color:#166534;">${tampil(rdy)}</td>
            <td style="text-align:center; background:#2563eb; color:#fff !important; font-weight:900;">
                ${tampil(totalStok, false, true)}
            </td>
        </tr>`;
    }); 
    target.innerHTML = h;
}

// 2. FUNGSI BATAS MINIMUM
function editLimit(key, nama, limitSekarang) {
    const baru = prompt(`Atur Batas Minimum Stok untuk ${nama}:`, limitSekarang);
    if (baru === null || baru === "") return;

    const angkaBaru = parseInt(baru);
    if (isNaN(angkaBaru)) return alert("Masukkan angka yang valid!");

    // Pastikan database master_barang menyimpan objek, bukan string
    db.ref('master_barang/' + key).update({
        n: nama,
        m: angkaBaru
    }).then(() => {
        alert("✅ Batas minimum " + nama + " diubah ke " + angkaBaru);
        // Laporan akan otomatis terupdate jika firebase .on('value') aktif
    });
}

        // ==========================================
function saveAk() {
    // Mengambil tanggal dari input yang ada di dalam h3
    const tgl = document.getElementById('akTgl').value;
    const kat = document.getElementById('akKat').value;
    const j = document.getElementById('akJenis').value; 
    const qRaw = document.getElementById('akQty').value;
    const q = parseInt(qRaw) || 0; 
    const p = Array.from(document.querySelectorAll('.chk-k:checked')).map(c => c.value);

    // 1. Validasi
    if (!tgl) return alert("Pilih Tanggal!");
    if (!kat || !j) return alert("Pilih Kategori & Detail Aktivitas!");
    if (p.length === 0) return alert("Pilih minimal 1 Karyawan!");

    // 2. Cek Stok Mentah (Sesuai permintaan: Barang tidak ada = Aktivitas Gagal)
    const butuhStok = ["Rekondisi Kempu", "Rekondisi Jerigen 18L", "Rekondisi Jerigen 5L"];
    if (butuhStok.includes(j)) {
        let stokMentah = 0;
        if (j === "Rekondisi Kempu") stokMentah = D.stok?.kempu_mentah || 0;
        else if (j === "Rekondisi Jerigen 18L") stokMentah = D.stok?.jeri18_mentah || 0;
        else if (j === "Rekondisi Jerigen 5L") stokMentah = D.stok?.jeri5_mentah || 0;

        if (stokMentah <= 0) return alert(`Gagal! Stok Barang Mentah Kosong (0).`);
        if (q > 0 && q > stokMentah) return alert(`Gagal! Stok tidak cukup (Sisa: ${stokMentah})`);
    }

    // 3. Cek Absensi
    let belumAbsen = p.filter(k => !D.absensi?.[tgl]?.[k] || !['Hadir','Telat','Lembur'].includes(D.absensi[tgl][k].j));
    if (belumAbsen.length > 0) return alert("Karyawan belum absen: " + belumAbsen.join(", "));

    // 4. Kirim ke Firebase
    db.ref('aktivitas').push({ 
        t: tgl, 
        j: j, 
        q: q, 
        p: p, 
        isCair: !j.toLowerCase().includes("jerigen"),
        waktu: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
    }).then(() => {
        // Reset Form
        document.getElementById('akQty').value = ""; 
        document.getElementById('akKat').value = ""; 
        document.getElementById('akJenis').innerHTML = '<option value="" disabled selected hidden>Pilih Detail...</option>';
        document.querySelectorAll('.chk-k').forEach(c => c.checked = false); 
        
        alert(`✅ Berhasil! Aktivitas '${j}' tercatat.`);
        renderLogHarian(); // Update tabel di bawah
    });
}



      
// 2. RENDER AKTIVITAS 
function renderLogHarian() {
    const namaPilihan = document.getElementById('filterNamaAk')?.value || "";
    const tglPilihan = document.getElementById('filterTglAk')?.value;
    const tbody = document.getElementById('listLogAktivitas');
    const statsArea = document.getElementById('statsAktivitas');
    const selectKaryawan = document.getElementById('filterNamaAk');
    
    if (!tbody) return;

    // --- 1. LOGIKA PENGISIAN DROPDOWN (DIPERBAIKI) ---
    // Kita isi dropdown setiap kali fungsi dipanggil jika data Master sudah ada
    if (selectKaryawan && window.D && D.master_karyawan) {
        const listK = Object.values(D.master_karyawan).sort();
        // Hanya isi jika jumlah option masih 1 (artinya cuma ada 'Global')
        if (selectKaryawan.options.length <= 1) {
            listK.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                selectKaryawan.appendChild(opt);
            });
        }
    }

    db.ref('aktivitas').on('value', snapshot => {
        const data = snapshot.val();
        if (!data) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Data Kosong</td></tr>';
            if(statsArea) statsArea.innerHTML = '';
            return;
        }

        const allItems = Object.keys(data).map(key => ({ id: key, ...data[key] }));
        const bulanIni = tglPilihan ? tglPilihan.slice(0, 7) : "";

        // --- 2. LOGIKA FILTER & RINGKASAN ---
        let items = [];
        let totalQty = 0;
        let judulStats = "";

        if (namaPilihan === "") { 
            // MODE GLOBAL: Lihat per Hari
            items = allItems.filter(item => item.t === tglPilihan).reverse();
            totalQty = items.reduce((sum, i) => sum + (parseInt(i.q) || 0), 0);
            judulStats = `Gudang Hari Ini (${tglPilihan.split('-').reverse().join('/')})`;
        } else {
            // MODE KARYAWAN: Rekap Bulanan
            items = allItems.filter(item => item.t && item.t.startsWith(bulanIni) && item.p.includes(namaPilihan))
                             .sort((a,b) => b.t.localeCompare(a.t));
            totalQty = items.reduce((sum, i) => sum + (parseInt(i.q) || 0), 0);
            judulStats = `Rekap ${namaPilihan} (Bulan ${bulanIni})`;
        }

        // --- 3. DASHBOARD RINGKASAN ---
        if (statsArea) {
            statsArea.innerHTML = `
                <div style="background:linear-gradient(to right, #f8fafc, #eff6ff); padding:12px; border-radius:10px; border:1px solid #dbeafe; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div>
                        <div style="font-size:10px; color:#64748b; font-weight:bold; text-transform:uppercase;">${judulStats}</div>
                        <div style="font-size:18px; font-weight:800; color:#1e40af;">${totalQty} <span style="font-size:12px; font-weight:normal;">Qty</span></div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:10px; color:#64748b;">Aktivitas</div>
                        <div style="font-size:14px; font-weight:700; color:#1e40af;">${items.length}x</div>
                    </div>
                </div>
            `;
        }

        // --- 4. RENDER TABEL ---
        if (items.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:#94a3b8;">Tidak ada data ${namaPilihan || 'Global'}</td></tr>`;
            return;
        }

        tbody.innerHTML = items.map(item => {
            const tglIndo = item.t ? item.t.split('-').reverse().slice(0,2).join('/') : '--/--';
            const qtyTampil = item.q === 0 ? '<b style="color:#f59e0b">PROS</b>' : `<b>${item.q}</b>`;
            const infoUtama = namaPilihan === "" ? (item.waktu || '--:--') : tglIndo;

            // Buat daftar nama jadi link yang bisa diklik untuk filter cepat
            const daftarNama = item.p.map(n => 
                `<span onclick="filterCepat('${n}')" style="color:#3b82f6; cursor:pointer;">${n}</span>`
            ).join(", ");

            return `
                <tr style="border-bottom: 1px solid #f8fafc;">
                    <td style="padding: 10px 5px; color: #94a3b8; font-family: monospace; font-size:10px;">${infoUtama}</td>
                    <td style="padding: 10px 5px; color: #1e293b;">
                        <div style="font-weight:600;">${item.j}</div>
                        <div style="font-size:9px; color:#94a3b8;">${namaPilihan === "" ? daftarNama : "Bersama: " + item.p.join(", ")}</div>
                    </td>
                    <td style="padding: 10px 5px; text-align: center;">${qtyTampil}</td>
                    <td style="padding: 10px 5px; text-align: center;">
                        <span onclick="hapusAk('${item.id}', '${item.j}')" 
                              style="color:#ef4444; font-size:20px; cursor:pointer; font-weight:bold;">×</span>
                    </td>
                </tr>
            `;
        }).join('');
    });
}

// FUNGSI BARU: Klik nama di tabel langsung filter bulanan orang itu
function filterCepat(nama) {
    const sel = document.getElementById('filterNamaAk');
    if(sel) {
        sel.value = nama;
        renderLogHarian();
    }
}



function renderCheckKaryawan() {
    const tgl = document.getElementById('akTgl').value;
    if(!tgl) return;
    const K = Object.values(D.master_karyawan || {});
    
    document.getElementById('akKaryawan').innerHTML = K.map(k => {
        const a = D.absensi?.[tgl]?.[k];
        const sudahAbsen = a && ['Hadir', 'Telat', 'Lembur'].includes(a.j);
        
        return `<label class="check-item" style="display:flex; align-items:center; gap:10px; padding:8px; border-bottom:1px solid #f1f5f9; ${sudahAbsen ? '' : 'opacity:0.3; background:#f8fafc'}">

}

function updateSubAktivitas() {

    const sub = document.getElementById('akJenis');
    
    const pilihan = {
        "Rekondisi": ["Rekondisi Kempu", "Rekondisi Jerigen 18L", "Rekondisi Jerigen 5L"],

function hapusAk(id, nama) {
    if (confirm(`Hapus aktivitas: ${nama}?`)) {
        db.ref('aktivitas/' + id).remove()
            .then(() => {
                // Berhasil. Tabel otomatis update karena pakai .on('value')
            })
            .catch(e => alert("Gagal hapus: " + e.message));
    }
}

function genRekapKerja() {
    const tglPilihan = document.getElementById('filterTglAk').value; // Contoh: 2026-04-05
    if (!tglPilihan) return alert("Pilih tanggal atau bulan terlebih dahulu!");

    const bulanTujuan = tglPilihan.slice(0, 7); // Mengambil "2026-04"
    const namaBulan = new Date(tglPilihan).toLocaleString('id-ID', { month: 'long', year: 'numeric' });

    db.ref('aktivitas').once('value', snapshot => {
        const data = snapshot.val();
        if (!data) return alert("Tidak ada data untuk bulan ini.");

        // Filter data yang tahun & bulannya sama
        const items = Object.values(data).filter(item => item.t && item.t.startsWith(bulanTujuan));

        if (items.length === 0) return alert("Data aktivitas bulan ini kosong.");

        // LOGIKA PDF (Menggunakan jsPDF atau library yang Anda pakai)
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(16);
        doc.text(`LAPORAN AKTIVITAS: ${namaBulan}`, 14, 20);
        doc.setFontSize(10);
        doc.text(`Brand: Kempu Balap`, 14, 28);

        // Header Tabel PDF
        const headers = [["Tanggal", "Jam", "Karyawan", "Pekerjaan", "Qty"]];
        const rows = items.sort((a,b) => a.t.localeCompare(b.t)).map(item => [
            item.t.split('-').reverse().join('/'),
            item.waktu || '-',
            item.p.join(", "),
            item.j,
            item.q
        ]);

        doc.autoTable({
            head: headers,
            body: rows,
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [30, 41, 59] } // Warna biru tua sesuai tema app
        });

        doc.save(`Laporan_Kerja_${bulanTujuan}.pdf`);
    });
}

function renderGaji() {
    const fM = document.getElementById('fGaji').value; 
    const target = document.getElementById('tbGaji');
    if (!target || !window.D) return;

    const T = D.tarif || DEF_TARIF;
    const K = D.master_karyawan ? Object.values(D.master_karyawan) : [];
    
    let html = "";
    K.forEach(k => {
        let brCair = 0, tHadir = 0;
        
        // Hitung Kehadiran dari database absen
        if (D.absensi) {
            Object.keys(D.absensi).forEach(tgl => {
                if (tgl.startsWith(fM) && D.absensi[tgl][k]) {
                    const status = D.absensi[tgl][k].j;
                    if (['Hadir', 'Telat', 'Lembur'].includes(status)) tHadir++;
                }
            });
        }

        // Hitung Borongan yang sudah Cair
        if (D.aktivitas) {
            Object.values(D.aktivitas).forEach(a => {
                if (a.t?.startsWith(fM) && a.p?.includes(k) && a.isCair) {
                    let upah = (T[a.j] || 0) * (a.q || 0) / (a.j.includes("pasang") ? 1 : a.p.length);
                    brCair += upah;
                }
            });
        }

        let total = brCair; // Bos bisa tambah kasbon/bonus di sini nanti
        html += `<tr>
            <td class="sticky-col">${k}</td>
            <td>${tHadir} Hari</td>
            <td>Rp ${Math.round(brCair).toLocaleString()}</td>
            <td style="font-weight:800; color:var(--p)">Rp ${Math.round(total).toLocaleString()}</td>
        </tr>`;
    });
    
    target.innerHTML = html || "<tr><td colspan='4'>Data tidak ditemukan</td></tr>";
}


        function genSlip(n) {

            Object.values(D.kasbon_bonus||{}).forEach(kb=>{if(kb.n===n&&kb.t===fM) kb.tipe==="Bonus"?bo+=kb.rp:ka+=kb.rp;});

        }
