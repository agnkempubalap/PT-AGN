<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0;padding:15px}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;color:#fff}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}
</style>
</head>

<body>

<div id="loginBox" class="card">
<h3>Login Admin</h3>
<input type="password" id="pinInput" placeholder="PIN">
<button class="blue" onclick="loginPIN()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Masuk</button>
<button class="orange" onclick="absenPulang()">Pulang</button>
<button class="blue" onclick="izin()">Izin</button>
<button class="red" onclick="resetHari()">Reset</button>

<input id="waGlobal" placeholder="WA Global">
<button onclick="kirimWA()">WA Global</button>

<textarea id="waMap" placeholder="Agung=628xxx"></textarea>
<button onclick="kirimWAper()">WA Per Orang</button>

</div>

<div id="list"></div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<div class="card">
<select id="pilihKaryawan"></select>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// PIN
let PIN="1234";
function loginPIN(){
 if(pinInput.value===PIN){
   loginBox.style.display="none";
   app.style.display="block";
 }
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  databaseURL: "https://pt-agn-default-rtdb.firebaseio.com",
  projectId: "pt-agn"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let data=[];

db.ref("absensi").on("value",snap=>{
 data=snap.val()||[];
 render();
});

function save(){ db.ref("absensi").set(data); }

function now(){
 let d=new Date();
 return {tgl:d.toISOString().split('T')[0],jam:d.toTimeString().split(' ')[0],bulan:d.getMonth()+1}
}

// ABSEN
function absenMasuk(){
 let t=now(),n=nama.value;
 if(data.find(x=>x.nama==n&&x.tgl==t.tgl))return;
 data.push({nama:n,tgl:t.tgl,status:t.jam>"09:00:00"?"Telat":"Hadir",bulan:t.bulan});
 save();
}

function absenPulang(){
 let t=now();
 let d=data.find(x=>x.nama==nama.value&&x.tgl==t.tgl);
 if(d)d.pulang=t.jam;
 save();
}

function izin(){
 let t=now();
 data.push({nama:nama.value,tgl:t.tgl,status:"Izin",bulan:t.bulan});
 save();
}

function resetHari(){
 let t=now().tgl;
 data=data.filter(x=>x.tgl!=t);
 save();
}

// AUTO ALPA
setInterval(()=>{
 let t=now();
 if(t.jam>="16:00:00"){
  let names=[...new Set(data.map(x=>x.nama))];
  names.forEach(n=>{
    if(!data.find(x=>x.nama==n&&x.tgl==t.tgl)){
      data.push({nama:n,tgl:t.tgl,status:"Alpa",bulan:t.bulan});
    }
  });
  save();
 }
},60000);

// RANKING AI
function rank(){
 let r={};
 data.forEach(x=>{
  if(!r[x.nama])r[x.nama]={score:0};
  if(x.status=="Hadir")r[x.nama].score+=3;
  if(x.status=="Telat")r[x.nama].score+=1;
  if(x.status=="Alpa")r[x.nama].score-=3;
 });
 return Object.entries(r).map(([n,v])=>({n,...v})).sort((a,b)=>b.score-a.score);
}

// WA
function kirimWA(){
 let txt="Absensi\n";
 data.forEach(d=>txt+=`${d.nama} ${d.status}\n`);
 window.open(`https://wa.me/${waGlobal.value}?text=${encodeURIComponent(txt)}`);
}

function kirimWAper(){
 let map=waMap.value.split("\n");
 map.forEach(m=>{
   let [nama,no]=m.split("=");
   let d=data.filter(x=>x.nama==nama);
   let txt=`Laporan ${nama}\n`;
   d.forEach(x=>txt+=`${x.tgl} ${x.status}\n`);
   window.open(`https://wa.me/${no}?text=${encodeURIComponent(txt)}`);
 });
}

// CHART
let chart;
function renderChart(n){
 let d=data.filter(x=>x.nama==n);
 let h=d.filter(x=>x.status=="Hadir").length;
 let t=d.filter(x=>x.status=="Telat").length;
 let a=d.filter(x=>x.status=="Alpa").length;

 if(chart)chart.destroy();
 chart=new Chart(chartCanvas,{
  type:'bar',
  data:{labels:["Hadir","Telat","Alpa"],datasets:[{data:[h,t,a]}]}
 });
}

// RENDER
function render(){
 list.innerHTML=data.map(x=>`<div>${x.nama} ${x.status}</div>`).join("");

 let r=rank();
 ranking.innerHTML=r.map((x,i)=>`#${i+1} ${x.n} (${x.score})`).join("<br>");

 let unik=[...new Set(data.map(x=>x.nama))];
 pilihKaryawan.innerHTML=unik.map(n=>`<option>${n}</option>`);

 renderChart(pilihKaryawan.value);
 pilihKaryawan.onchange=()=>renderChart(pilihKaryawan.value);
}

</script>
</body>
</html>
