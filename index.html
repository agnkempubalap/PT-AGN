<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.6 - STOCK EXPORT READY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:12px; border:1px solid var(--b); padding:10px 15px; display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--t)}

        .tabs{display:flex; gap:10px; margin-bottom:15px}
        .tab-btn{flex:1; padding:15px; border-radius:12px; background:var(--c); color:var(--t); border:1px solid var(--b); cursor:pointer; font-weight:800; transition:0.3s}
        .tab-btn.active{background:var(--p); border-color:var(--p); color:#fff}
        .hidden {display:none !important}

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 1px;text-align:center;min-width:35px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .today-col{background: rgba(37, 99, 235, 0.15) !important;}
        .rekap-akhir{background:var(--bg) !important; color:var(--t) !important; font-weight:800; min-width:30px !important}
        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-l{background:#AA00FF;color:#fff} .s-mng{background:#64748b;color:#fff}
        .jam-text{font-size:7px;font-weight:600;display:block;margin-top:2px;max-width:33px}

        /* PRINT STYLE */
        @media print {
            header, .no-print, .tabs, .dark-card, button[onclick*="hpsStok"] { display: none !important; }
            .container { max-width: 100% !important; margin: 0 !important; }
            .table-wrap { overflow: visible !important; border: none !important; }
            .table-web { transform: scale(0.8); transform-origin: top left; color: #000 !important; }
            .table-web th, .table-web td { border: 1px solid #333 !important; }
            .nama-fixed { background: #eee !important; color: #000 !important; }
            body { background: #fff !important; }
            .card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .hidden { display: block !important; }
            #page-absen, #page-stok { page-break-after: always; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v78.6</span></div>
            </div>
            <div class="dark-card no-print" onclick="toggleT()">
                <span id="tIco">☀️</span> <span style="font-size:12px;font-weight:600" id="tTxt">Light Mode</span>
            </div>
        </header>

        <div class="tabs no-print">
            <button id="tabAbsen" class="tab-btn active" onclick="switchTab('absen')">📅 ABSENSI</button>
            <button id="tabStok" class="tab-btn" onclick="switchTab('stok')">📦 STOK BARANG</button>
        </div>

        <!-- PAGE ABSENSI -->
        <div id="page-absen">
            <div class="card no-print">
                <h3>👥 DATA KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>🧹 KONTROL DATA</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; align-items:end">
                    <div><label>Tgl Reset:</label><input type="date" id="resetTgl"></div>
                    <button class="btn" style="background:var(--d)" onclick="resetAbsen()">RESET ABSEN</button>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:12px">
                    <div><label>Dari:</label><input type="date" id="tglAwal"></div>
                    <div><label>Sampai:</label><input type="date" id="tglAkhir"></div>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px">
                    <button class="btn" style="background:var(--p)" onclick="sLib(true)">SET LIBUR</button>
                    <button class="btn" style="background:var(--d)" onclick="sLib(false)">HAPUS LIBUR</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PRESENSI</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                    <button class="btn" style="background:var(--s);height:60px;font-size:18px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px;font-size:18px" onclick="pAbsen('Pulang')">PULANG</button>
                </div>
                <button class="btn" style="background:var(--iz);height:50px;font-size:16px" onclick="pAbsen('Izin')">📝 IZIN / KETERANGAN</button>
            </div>

            <div class="card">
                <div class="export-group no-print" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:15px">
                    <div><label>Bulan:</label><input type="month" id="fB" onchange="rRekap()"></div>
                    <div style="display:flex; gap:8px">
                        <button class="btn" style="background:#1d6f42; width:80px; height:40px; font-size:11px" onclick="doExcel('rekapTable','Absensi')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:80px; height:40px; font-size:11px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap" id="scrollArea">
                    <table class="table-web" id="rekapTable">
                        <thead id="thWeb"></thead><tbody id="tbWeb"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PAGE STOK -->
        <div id="page-stok" class="hidden">
            <div class="card no-print">
                <h3>🛠️ MASTER BARANG</h3>
                <div style="display:flex; gap:10px">
                    <input type="text" id="masterBrgBaru" placeholder="Nama Barang Baru...">
                    <button class="btn" style="background:var(--s); width:60px; font-size:24px" onclick="tambahMasterBarang()">+</button>
                    <button class="btn" style="background:var(--d); width:60px" onclick="hapusMasterBarang()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>📦 UPDATE STOK</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="skBrg"></select>
                    <input type="date" id="skTgl">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="skJns">
                        <option value="awal_ready">Awal Ready</option><option value="awal_kotor">Awal Kotor</option>
                        <option value="masuk_kotor">Masuk Kotor</option><option value="masuk_bersih">Masuk Bersih</option>
                        <option value="rekon">Selesai Rekondisi</option><option value="jual_u">Jual Umum</option><option value="jual_a">Jual Agen</option>
                    </select>
                    <input type="number" id="skQty" placeholder="Jumlah">
                </div>
                <button class="btn" style="background:var(--p)" onclick="saveStok()">SIMPAN DATA STOK</button>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <h3>📦 TOTAL STOK GUDANG</h3>
                    <div class="no-print" style="display:flex; gap:8px">
                        <button class="btn" style="background:#1d6f42; width:80px; height:40px; font-size:11px" onclick="doExcel('stokTable','Stok_Gudang')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:80px; height:40px; font-size:11px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="stokTable">
                        <thead id="thStok"></thead><tbody id="tbStok"></tbody>
                    </table>
                </div>
            </div>

            <div class="card no-print">
                <h3>📋 LOG RIWAYAT HARIAN</h3>
                <div class="table-wrap"><table class="table-web"><thead><tr><th>Tgl</th><th>Barang</th><th>Jenis</th><th>Qty</th><th>QC</th><th>Aksi</th></tr></thead><tbody id="tbLog"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, stData={}, mb={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const now = new Date();
            document.getElementById('fB').value = now.toISOString().slice(0,7);
            document.getElementById('skTgl').value = now.toISOString().split('T')[0];
            const t = localStorage.getItem('agnTheme') || 'dark';
            document.body.setAttribute('data-theme', t); updateThemeUI(t);

            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
            db.ref('stok_barang').on('value',s=>{stData=s.val()||{}; renderStok();});
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; renderDropdownBarang(); renderStok();});

            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
        };

        function switchTab(t){
            document.getElementById('page-absen').classList.toggle('hidden', t!=='absen');
            document.getElementById('page-stok').classList.toggle('hidden', t!=='stok');
            document.getElementById('tabAbsen').classList.toggle('active', t==='absen');
            document.getElementById('tabStok').classList.toggle('active', t==='stok');
            if(t==='absen') setTimeout(autoScroll, 500);
        }

        // --- MASTER BARANG ---
        function tambahMasterBarang(){
            let n = document.getElementById('masterBrgBaru').value;
            if(n) db.ref('master_barang').push(n).then(()=>document.getElementById('masterBrgBaru').value="");
        }
        function hapusMasterBarang(){
            let n = document.getElementById('skBrg').value;
            let id = Object.keys(mb).find(k=>mb[k]===n);
            if(id && confirm(`Hapus ${n}?`)) db.ref(`master_barang/${id}`).remove();
        }
        function renderDropdownBarang(){
            let list = Object.values(mb).sort();
            document.getElementById('skBrg').innerHTML = list.map(b=>`<option value="${b}">${b}</option>`).join('');
        }

        // --- UTILS ---
        function toggleT(){ let nt=document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme',nt); localStorage.setItem('agnTheme',nt); updateThemeUI(nt); }
        function updateThemeUI(t){ document.getElementById('tIco').innerText=t==='dark'?'☀️':'🌙'; document.getElementById('tTxt').innerText=t==='dark'?'Light Mode':'Dark Mode'; }
        function cLogo(e){ const r=new FileReader(); r.onload=()=>{document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result);}; r.readAsDataURL(e.target.files[0]); }
        function doExcel(id, nama){ 
            const blob=new Blob([document.getElementById(id).outerHTML],{type:"application/vnd.ms-excel"}); 
            const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`${nama}_${new Date().toLocaleDateString()}.xls`; a.click(); 
        }

        // --- ABSENSI ---
        function uDl(){ document.getElementById('lk').innerHTML = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function tKaryawan(){ let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>n.value=""); }
        function hKaryawan(){ let n=document.getElementById('iNama').value, id=Object.keys(mk).find(k=>mk[k]===n); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove(); }
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), st="Hadir";
            if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(!nt)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>alert("Berhasil!"));
        }
        function resetAbsen(){ let n=document.getElementById('iNama').value, tgl=document.getElementById('resetTgl').value; if(n && tgl && confirm('Reset?')) db.ref(`absensi/${tgl}/${n}`).remove(); }
        function sLib(st){
            let d1=document.getElementById('tglAwal').value, d2=document.getElementById('tglAkhir').value;
            if(!d1) return; let s=new Date(d1), e=d2?new Date(d2):new Date(d1);
            while(s<=e){ db.ref(`hari_libur/${s.toISOString().split('T')[0]}`).set(st?true:null); s.setDate(s.getDate()+1); }
        }
        function autoScroll(){
            const tgl = new Date().getDate();
            const target = document.getElementById(`tgl-${tgl}`), area = document.getElementById('scrollArea');
            if(target && area){ area.scrollTo({left: target.offsetLeft - (area.offsetWidth/2) + (target.offsetWidth/2), behavior:'smooth'}); }
        }
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), tglSkrg=new Date().getDate(), todayF=new Date().toISOString().split('T')[0];
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}" class="${i===tglSkrg?'today-col':''}">${i}</th>`;
            h+=`<th class="th-rekap">H</th><th class="th-rekap">I</th><th class="th-rekap">A</th><th class="th-rekap">L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b="";
            Object.values(mk).sort().forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null, isM=(new Date(t).getDay()===0), isL=hl[t];
                    let s="-", c="", in="";
                    if(data){
                        if(data.Izin){s="I"; c="s-i"; cI++; in=data.Izin.note||"";}
                        else if(data.Masuk){ if(isM||isL){s="L"; c="s-l"; cL++;} else {s="H"; c=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++;} in=data.Masuk.waktu+(data.Pulang?`|${data.Pulang.waktu}`:"");}
                    } else if(isM){s="MNG"; c="s-mng";} else if(isL){s="OFF"; c="s-off";} else if(t<todayF && t>=TGL_MULAI_SISTEM){s="A"; c="s-a"; cA++;}
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${c}">${s}<span class="jam-text">${in}</span></div></td>`;
                }
                b+=`<tr>${row}<td class="rekap-akhir">${cH}</td><td class="rekap-akhir">${cI}</td><td class="rekap-akhir">${cA}</td><td class="rekap-akhir">${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b; setTimeout(autoScroll, 600);
        }

        // --- STOK LOGIC ---
        function saveStok(){
            const b=document.getElementById('skBrg').value, t=document.getElementById('skTgl').value, j=document.getElementById('skJns').value, q=parseInt(document.getElementById('skQty').value), qc="Accepted";
            if(!b || !t || isNaN(q)) return alert("Isi jumlah!");
            db.ref(`stok_barang/${t}`).push({barang:b, jenis:j, qty:q, qc:qc}).then(()=>{alert("Stok diupdate!"); document.getElementById('skQty').value="";});
        }
        function renderStok(){
            let log="", items=Object.values(mb).sort(), sum={};
            items.forEach(i=>sum[i]={awal_ready:0,awal_kotor:0,masuk_kotor:0,masuk_bersih:0,rekon:0,jual_u:0,jual_a:0});
            Object.keys(stData).sort().reverse().forEach(t=>{
                Object.keys(stData[t]).forEach(id=>{
                    const e=stData[t][id];
                    log+=`<tr><td>${t}</td><td>${e.barang}</td><td>${e.jenis}</td><td>${e.qty}</td><td>${e.qc}</td><td><button onclick="hpsStok('${t}','${id}')" style="background:var(--d); border:none; color:#fff; border-radius:5px; padding:2px 8px">X</button></td></tr>`;
                    if(sum[e.barang]) sum[e.barang][e.jenis]+=e.qty;
                });
            });
            let thS=`<tr style="background:var(--p)"><th class="nama-fixed">Barang</th><th>Ready</th><th>Kotor</th><th>+Ktr</th><th>+Brsh</th><th>Rekon</th><th style="background:var(--d)">Sisa Ktr</th><th>Jual U</th><th>Jual A</th><th style="background:var(--s)">Sisa Rdy</th><th style="background:var(--iz)">Total</th></tr>`;
            let tbS="";
            items.forEach(i=>{
                const s=sum[i], sk=(s.awal_kotor+s.masuk_kotor)-s.rekon, sr=(s.awal_ready+s.masuk_bersih+s.rekon)-(s.jual_u+s.jual_a);
                tbS+=`<tr><td class="nama-fixed">${i}</td><td>${s.awal_ready}</td><td>${s.awal_kotor}</td><td>${s.masuk_kotor}</td><td>${s.masuk_bersih}</td><td>${s.rekon}</td><td style="color:var(--w)">${sk}</td><td>${s.jual_u}</td><td>${s.jual_a}</td><td style="color:var(--s)">${sr}</td><td class="rekap-akhir">${sk+sr}</td></tr>`;
            });
            document.getElementById('thStok').innerHTML=thS; document.getElementById('tbStok').innerHTML=tbS; document.getElementById('tbLog').innerHTML=log;
        }
        function hpsStok(t,id){ if(confirm('Hapus?')) db.ref(`stok_barang/${t}/${id}`).remove(); }
    </script>
</body>
</html>
