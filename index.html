<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v82.0 - GUDANG SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: 0.3s}
        .container{max-width:1600px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:60px;height:60px;border-radius:50%;border:2px solid var(--p);object-fit:cover;background:#000;cursor:pointer}
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 15px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; background: var(--c); color: var(--t); border: 1px solid var(--b); cursor: pointer; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .t-btn.active { background: var(--p); border-color: var(--p); color: #fff; }
        .hidden { display: none !important; }
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 10px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        input,button,select{border-radius:12px;font-size:14px;height:48px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 12px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 4px;text-align:center;min-width:35px}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:120px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .today-col { background: rgba(37, 99, 235, 0.15) !important; }
        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-l{background:#AA00FF;color:#fff} .s-mng{background:#64748b;color:#fff}
        .log-box { margin-top: 10px; max-height: 200px; overflow-y: auto; background: var(--bg); border-radius: 12px; border: 1px solid var(--b); }
        .log-row { display: flex; justify-content: space-between; align-items:center; padding: 10px; border-bottom: 1px solid var(--b); font-size: 11px; }
        @media print { .no-print { display: none !important; } .table-web { transform: scale(0.6); transform-origin: top left; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:1.1rem">PT AGN GUDANG</h2><span style="font-size:9px;color:var(--p);font-weight:800">VERSION 82.0 PRO</span></div>
            </div>
            <button onclick="toggleT()" style="width:45px; height:45px; background:var(--c); border:1px solid var(--b); border-radius:50%; cursor:pointer">🌓</button>
        </header>

        <div class="tabs-nav no-print">
            <button id="btnAbsen" class="t-btn active" onclick="goTab('absen')">📅 ABSENSI</button>
            <button id="btnStok" class="t-btn" onclick="goTab('stok')">📦 STOK GUDANG</button>
        </div>

        <!-- PAGE ABSENSI -->
        <div id="page-absen">
            <div class="card no-print">
                <h3>👥 MANAJEMEN KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Cari Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PRESENSI</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                    <button class="btn" style="background:var(--s);height:55px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:55px" onclick="pAbsen('Pulang')">PULANG</button>
                </div>
                <button class="btn" style="background:var(--iz);height:45px" onclick="pAbsen('Izin')">📝 IZIN / KETERANGAN</button>
            </div>

            <div class="card">
                <div class="no-print" style="display:flex; justify-content:space-between; margin-bottom:15px; gap:10px">
                    <input type="month" id="fB" style="width:150px" onchange="rRekap()">
                    <div style="display:flex; gap:5px">
                        <button class="btn" style="background:#1d6f42; width:80px; font-size:10px" onclick="doExcel('rekapTable')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:80px; font-size:10px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap"><table class="table-web" id="rekapTable"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table></div>
            </div>
        </div>

        <!-- PAGE STOK -->
        <div id="page-stok" class="hidden">
            <div class="card no-print">
                <h3>📦 BARANG</h3>
                <div style="display:flex; gap:8px">
                    <input type="text" id="mBrg" placeholder="Nama Barang...">
                    <button class="btn" style="background:var(--s); width:60px" onclick="tBrg()">+</button>
                    <button class="btn" style="background:var(--d); width:60px" onclick="hBrg()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="sBrg"><option value="">Pilih Barang...</option></select>
                    <input type="date" id="sTgl" onchange="renderLog()">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px">
                    <div style="border:1px solid var(--b); padding:8px; border-radius:12px">
                        <h4 style="font-size:9px; margin:0 0 5px">1. QC</h4>
                        <select id="qcK" style="height:35px; font-size:11px"><option value="baru">Baru</option><option value="bekas">Bekas</option></select>
                        <select id="qcS" style="height:35px; font-size:11px; margin:5px 0"><option value="acc">ACC</option><option value="amd">AMD</option><option value="rej">REJ</option></select>
                        <input type="number" id="qQC" placeholder="Qty" style="height:35px">
                        <button class="btn" style="background:var(--p); height:35px; margin-top:5px" onclick="saveF('qc')">OK</button>
                    </div>
                    <div style="border:1px solid var(--b); padding:8px; border-radius:12px">
                        <h4 style="font-size:9px; margin:0 0 5px">2. REKON</h4>
                        <input type="number" id="qRek" placeholder="Qty" style="height:35px">
                        <button class="btn" style="background:var(--iz); height:35px; margin-top:45px" onclick="saveF('rekon')">OK</button>
                    </div>
                    <div style="border:1px solid var(--b); padding:8px; border-radius:12px">
                        <h4 style="font-size:9px; margin:0 0 5px">3. JUAL</h4>
                        <select id="jnsJ" style="height:35px; font-size:11px"><option value="umum">Umum</option><option value="agen">Agen</option></select>
                        <input type="number" id="qJual" placeholder="Qty" style="height:35px; margin:5px 0">
                        <button class="btn" style="background:var(--s); height:35px" onclick="saveF('jual')">OK</button>
                    </div>
                </div>
            </div>

            <div class="card no-print">
                <h3>🕒 LOG TRANSAKSI (KLIK UNTUK HAPUS)</h3>
                <div id="flowLog" class="log-box"></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <h3>📊 LAPORAN STOK</h3>
                    <div style="display:flex; gap:5px">
                        <button class="btn" style="background:#1d6f42; width:70px; height:30px; font-size:9px" onclick="doExcel('stokTable')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:70px; height:30px; font-size:9px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="stokTable">
                        <thead>
                            <tr style="background:var(--b)">
                                <th rowspan="2" class="nama-fixed">Barang</th>
                                <th colspan="2">AWAL</th><th colspan="3">QC GATE</th><th colspan="2">INVENTORY</th><th style="background:var(--iz)">PROSES</th><th colspan="2">SALES</th><th colspan="3" style="background:var(--s)">AKHIR</th>
                            </tr>
                            <tr style="background:var(--b)">
                                <th>Ktr</th><th>Rdy</th><th>ACC</th><th>AMD</th><th>REJ</th><th>Baru</th><th>Bekas</th><th>Rekon</th><th>Umm</th><th>Agn</th><th>KTR</th><th>RDY</th><th>TOT</th>
                            </tr>
                        </thead>
                        <tbody id="tbStok"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, mb={}, sd={};

        window.onload=()=>{
            const d = new Date();
            document.getElementById('fB').value=d.toISOString().slice(0,7);
            document.getElementById('sTgl').value = d.toISOString().slice(0,10);
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; uBrg(); rStok();});
            db.ref('stok_flow').on('value',s=>{sd=s.val()||{}; rStok(); renderLog();});
            goTab(localStorage.getItem('agnTab') || 'absen');
        };

        function toggleT(){ let b=document.body; b.setAttribute('data-theme', b.getAttribute('data-theme')==='dark'?'light':'dark'); }
        function cLogo(e){ const r=new FileReader(); r.onload=()=>{ document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result); }; r.readAsDataURL(e.target.files[0]); }
        function goTab(t){
            localStorage.setItem('agnTab', t);
            document.getElementById('page-absen').classList.toggle('hidden', t!=='absen');
            document.getElementById('page-stok').classList.toggle('hidden', t!=='stok');
            document.getElementById('btnAbsen').classList.toggle('active', t==='absen');
            document.getElementById('btnStok').classList.toggle('active', t==='stok');
        }

        // ABSENSI
        function uDl(){ document.getElementById('lk').innerHTML = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function tKaryawan(){ let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>n.value=""); }
        function hKaryawan(){ let n=document.getElementById('iNama').value, id=Object.keys(mk).find(k=>mk[k]===n); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove(); }
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, now=new Date(); if(!n) return alert("Pilih Nama!");
            let tgl=now.toISOString().slice(0,10), jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan Izin:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt});
        }
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), tglSkrg = new Date().getDate();
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th class="${i===tglSkrg?'today-col':''}">${i}</th>`;
            h+=`<th>H</th><th>I</th><th>A</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b=""; Object.values(mk).sort().forEach(n=>{
                let cH=0, cI=0, cA=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; infoW=data.Izin.note; }
                        else if(data.Masuk){ sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; infoW=data.Masuk.waktu; }
                    }
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${clW}">${sW}</div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cI}</td><td>${cA}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        // STOK
        function uBrg(){ document.getElementById('sBrg').innerHTML = '<option value="">Pilih Barang...</option>' + Object.values(mb).sort().map(b=>`<option value="${b}">${b}</option>`).join(''); }
        function tBrg(){ let n=document.getElementById('mBrg'); if(n.value) db.ref('master_barang').push(n.value).then(()=>n.value=""); }
        function hBrg(){ let b=document.getElementById('sBrg').value; let id=Object.keys(mb).find(k=>mb[k]===b); if(id && confirm('Hapus Barang?')) db.ref(`master_barang/${id}`).remove(); }
        
        function saveF(step){
            const brg=document.getElementById('sBrg').value, tgl=document.getElementById('sTgl').value;
            if(!brg||!tgl) return alert("Pilih Barang & Tgl!");
            let data = { barang:brg, type:step, ts:Date.now() };
            if(step==='qc'){ data.kond=document.getElementById('qcK').value; data.stat=document.getElementById('qcS').value; data.qty=parseInt(document.getElementById('qQC').value); }
            else if(step==='rekon'){ data.qty=parseInt(document.getElementById('qRek').value); }
            else if(step==='jual'){ data.jns=document.getElementById('jnsJ').value; data.qty=parseInt(document.getElementById('qJual').value); }
            if(!data.qty || data.qty<=0) return alert("Isi jumlah!");
            db.ref(`stok_flow/${tgl}`).push(data);
        }

        function rStok(){
            const items = Object.values(mb).sort(); let rk = {};
            items.forEach(i=>rk[i]={ak:0, ar:0, qacc:0, qamd:0, qrej:0, mbru:0, mbks:0, rkn:0, ju:0, ja:0});
            Object.keys(sd).forEach(t=>{ 
                Object.values(sd[t]).forEach(e=>{
                    const r=rk[e.barang]; if(!r)return;
                    if(e.type==='qc'){ r[`q${e.stat}`]+=e.qty; if(e.stat!=='rej'){ if(e.kond==='baru')r.mbru+=e.qty; else r.mbks+=e.qty; } }
                    else if(e.type==='rekon') r.rkn+=e.qty; 
                    else if(e.type==='jual') r[e.jns==='umum'?'ju':'ja']+=e.qty;
                });
            });
            let h=""; items.forEach(i=>{
                const d=rk[i]; const sk = (d.ak + d.mbks) - d.rkn; const sr = (d.ar + d.mbru + d.rkn) - (d.ju + d.ja);
                h+=`<tr><td class="nama-fixed">${i}</td><td>0</td><td>0</td><td>${d.qacc}</td><td>${d.qamd}</td><td>${d.qrej}</td><td>${d.mbru}</td><td>${d.mbks}</td><td>${d.rkn}</td><td>${d.ju}</td><td>${d.ja}</td><td style="color:var(--iz)">${sk}</td><td style="color:var(--w)">${sr}</td><td style="font-weight:900">${sk+sr}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML=h;
        }

        function renderLog(){ 
            const t=document.getElementById('sTgl').value, d=sd[t]||{}; let h="";
            Object.keys(d).reverse().forEach(id=>{ 
                const e=d[id]; h+=`<div class="log-row"><span><b>${e.barang}</b>: ${e.type.toUpperCase()} (${e.qty})</span><button style="background:var(--d); border:none; color:#fff; padding:5px 10px; border-radius:8px; font-size:10px" onclick="hFlow('${t}','${id}')">HAPUS</button></div>`; 
            });
            document.getElementById('flowLog').innerHTML=h || '<p style="text-align:center; font-size:11px; color:var(--b)">Tidak ada transaksi hari ini</p>';
        }
        function hFlow(t,id){ if(confirm('Hapus transaksi ini?')) db.ref(`stok_flow/${t}/${id}`).remove(); }
        function doExcel(id){ const blob = new Blob([document.getElementById(id).outerHTML],{type:'application/vnd.ms-excel'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='REPORT.xls'; a.click(); }
    </script>
</body>
</html>
