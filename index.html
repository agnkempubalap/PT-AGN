<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.8 - SOFT SLIM ORIGINAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#10b981;--d:#f43f5e;--w:#fbbf24;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#8b5cf6;--al:#475569}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:60px;height:60px;border-radius:12px;background:#000;border:2px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:10px; border:1px solid var(--b); padding:8px 12px; display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--t)}

        .card{background:var(--c);padding:15px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 12px;font-size:10px;color:var(--w);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        /* UKURAN INPUT & TOMBOL DIPERKECIL (Slim) */
        input,button,select{border-radius:10px;font-size:13px;height:38px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none;padding:0 12px}
        
        /* WARNA TOMBOL DIBUAT SOFT (Tidak Mencolok) */
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff; transition: 0.2s; opacity: 0.9}
        .btn:hover{opacity: 1}
        
        .btn-masuk{background:#3b82f6 !important; height:45px !important; font-size:16px !important} /* Masuk Pulang dikecilkan dikit dari 60px */
        .btn-pulang{background:#ef4444 !important; height:45px !important; font-size:16px !important}
        .btn-izin{background:#8b5cf6 !important; height:38px !important; font-size:14px !important}
        .btn-save{background:#10b981 !important}
        .btn-del{background:#f43f5e !important}

        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 1px;text-align:center;min-width:35px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .today-col{background: rgba(37, 99, 235, 0.1) !important;}
        
        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto}
        .s-v{background:rgba(16,185,129,0.2);color:#10b981;border:1px solid #10b981} 
        .s-late{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid #fbbf24} 
        .s-i{background:rgba(139,92,246,0.2);color:#8b5cf6;border:1px solid #8b5cf6}
        .s-off{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid #ef4444} 
        .s-a{background:rgba(71,85,105,0.2);color:#94a3b8;border:1px solid #475569} 
        .s-l{background:rgba(168,85,247,0.2);color:#a855f7;border:1px solid #a855f7}
        .s-mng{color:#4b5563; opacity:0.4; font-weight:400}
        .jam-text{font-size:7px;font-weight:600;display:block;margin-top:2px}

        @media print { .no-print { display: none !important; } .table-web { transform: scale(0.7); transform-origin: top left; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://i.ibb.co/mF9fR7z/agn-logo.png" onclick="document.getElementById('inpLogo').click()" onerror="this.src='https://ui-avatars.com/api/?name=AGN&background=000&color=fff'">
                <div><h2 style="margin:0;font-size:1.1rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v78.8 SOFT SLIM</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()">
                <span id="tIco">☀️</span> <span style="font-size:12px;font-weight:600" id="tTxt">Light Mode</span>
            </div>
        </header>

        <!-- STRUKTUR CARD KEMBALI SEPERTI AWAL -->
        <div class="card no-print">
            <h3>👥 DATA KARYAWAN</h3>
            <div style="display:flex;gap:10px">
                <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                <datalist id="lk"></datalist>
                <button class="btn btn-save" style="width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                <button class="btn btn-del" style="width:60px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <div class="card no-print">
            <h3>🧹 KONTROL DATA</h3>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px; align-items:end">
                <div><label style="font-size:10px">Tgl Reset:</label><input type="date" id="resetTgl"></div>
                <button class="btn btn-del" onclick="resetAbsen()">RESET DATA</button>
            </div>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px">
                <button class="btn btn-masuk" style="height:38px !important; font-size:12px !important" onclick="sLib(true)">SET LIBUR</button>
                <button class="btn btn-del" style="height:38px !important; font-size:12px !important" onclick="sLib(false)">HAPUS LIBUR</button>
            </div>
        </div>

        <div class="card no-print">
            <h3>⚡ PRESENSI</h3>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                <button class="btn btn-masuk" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn btn-pulang" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn btn-izin" onclick="pAbsen('Izin')">📝 IZIN / KETERANGAN</button>
        </div>

        <div class="card table-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px" class="no-print">
                <input type="month" id="fB" style="width:140px" onchange="rRekap()">
                <div style="display:flex; gap:6px">
                    <button class="btn btn-save" style="width:80px; height:32px; font-size:11px" onclick="doExcel()">EXCEL</button>
                    <button class="btn btn-del" style="width:80px; height:32px; font-size:11px" onclick="window.print()">PDF</button>
                </div>
            </div>
            
            <div class="table-wrap" id="scrollArea">
                <table class="table-web" id="rekapTable">
                    <thead id="thWeb"></thead>
                    <tbody id="tbWeb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function toggleT(){ 
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt); document.getElementById('tIco').innerText=nt==='dark'?'☀️':'🌙';
        }

        function cLogo(e){const r=new FileReader(); r.onload=()=>{document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result);}; r.readAsDataURL(e.target.files[0]);}
        function uDl(){let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); document.getElementById('lk').innerHTML=opt;}
        function tKaryawan(){let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value="";});}}
        function hKaryawan(){let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");}

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), st="Hadir";
            if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{alert(`Sukses!`);});
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tgl=document.getElementById('resetTgl').value;
            if(!n.value || !tgl) return alert("Pilih Nama & Tgl!");
            if(confirm('Hapus data?')) db.ref(`absensi/${tgl}/${n.value}`).remove();
        }

        function sLib(st){
            let tgl = prompt("Masukkan Tanggal (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
            if(tgl) db.ref(`hari_libur/${tgl}`).set(st?true:null);
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}" class="${i===tglSkrg?'today-col':''}">${i}</th>`;
            h+=`<th>H</th><th>L</th><th>I</th><th>A</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cL=0, cI=0, cA=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isMin = (d.getDay()===0), isLib = hl[t];
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isMin || isLib) { sW="L"; clW="s-l"; cL++; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu;
                        }
                    } 
                    else if(isMin){ sW="M"; clW="s-mng"; }
                    else if(isLib){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cL}</td><td>${cI}</td><td>${cA}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        function doExcel(){
            const table = document.getElementById("rekapTable").outerHTML;
            const blob = new Blob([table], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN_${document.getElementById('fB').value}.xls`; a.click();
        }
    </script>
</body>
</html>
