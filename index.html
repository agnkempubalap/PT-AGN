<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v83.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: 0.3s}
        .container{max-width:1450px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:65px;height:65px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover}
        .tab-menu{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px}
        .tab-btn{height:55px; border-radius:15px; border:1px solid var(--b); background:var(--c); color:var(--t); font-weight:800; cursor:pointer}
        .tab-btn.active{background:var(--p); color:#fff; border:none; box-shadow:0 4px 15px rgba(37,99,235,0.3)}
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 10px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        input,button,select{border-radius:12px;font-size:14px;height:50px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;padding:0 10px;outline:none}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 2px;text-align:center;min-width:35px}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:100px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .s-cell{border-radius:6px;width:33px;height:33px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin:0 auto}
        .s-v{background:var(--s)} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz)} .s-off{background:var(--d)} .s-a{background:var(--al)} .s-mng{background:#64748b}
        .page-content{display:none} .page-content.active{display:block}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-box">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff">
                <div><h2 style="margin:0;font-size:1.1rem">PT AGN</h2><span style="font-size:9px;color:var(--p);font-weight:800">ULTRA SYNC v83.1</span></div>
            </div>
        </header>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchP('absen', this)">📋 ABSENSI</button>
            <button class="tab-btn" onclick="switchP('stok', this)">📦 STOK</button>
        </div>

        <!-- PAGE ABSENSI -->
        <div id="p-absen" class="page-content active">
            <div class="card">
                <h3>👥 NAMA KARYAWAN</h3>
                <div style="display:flex;gap:8px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:55px" onclick="tKar()">+</button>
                </div>
            </div>
            <div class="card">
                <h3>⚡ PRESENSI HARI INI</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
                    <button class="btn" style="background:var(--s);height:60px" onclick="pAbs('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px" onclick="pAbs('Pulang')">PULANG</button>
                </div>
                <button class="btn" style="background:var(--iz)" onclick="pAbs('Izin')">📝 IZIN / KETERANGAN</button>
            </div>
            <div class="card">
                <h3>📅 REKAP BULANAN</h3>
                <input type="month" id="fB" style="width:100%;margin-bottom:10px" onchange="rRek()">
                <div class="table-wrap"><table class="table-web"><thead id="thW"></thead><tbody id="tbW"></tbody></table></div>
            </div>
        </div>

        <!-- PAGE STOK -->
        <div id="p-stok" class="page-content">
            <div class="card">
                <h3>📊 RINGKASAN STOK</h3>
                <div class="table-wrap">
                    <table class="table-web">
                        <thead>
                            <tr style="background:var(--bg)">
                                <th class="nama-fixed">ITEM</th>
                                <th>AWL-K</th><th>AWL-R</th><th>M-KTR</th><th>REKON</th><th>J-UM</th><th>J-AG</th><th style="color:var(--s)">RDY</th>
                            </tr>
                        </thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h3>⚡ INPUT TRANSAKSI</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px">
                    <select id="sB">
                        <option value="Kempu">Kempu</option>
                        <option value="Derigen 18L">Derigen 18L</option>
                        <option value="Derigen 5L">Derigen 5L</option>
                        <option value="Botol 1L">Botol 1L</option>
                        <option value="Botol 500ML">Botol 500ML</option>
                        <option value="Mesin Minyak">Mesin Minyak</option>
                    </select>
                    <input type="date" id="sT">
                </div>
                <div style="display:grid; grid-template-columns: 1.2fr 0.6fr 1fr; gap:8px">
                    <select id="sK">
                        <option value="m_ktr">Masuk (Kotor)</option>
                        <option value="rekon">Selesai Rekon</option>
                        <option value="j_u">Jual Umum</option>
                        <option value="j_a">Jual Agen</option>
                    </select>
                    <input type="number" id="sQ" placeholder="Qty">
                    <button class="btn" style="background:var(--s)" onclick="svS()">SIMPAN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, mb={}, st={};

        window.onload=()=>{
            document.getElementById('fB').value=new Date().toISOString().slice(0,7);
            document.getElementById('sT').value=new Date().toISOString().split('T')[0];
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRek();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRek();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRek();});
            db.ref('master_barang_v6').on('value',s=>{mb=s.val()||{}; bS();});
            db.ref('stok_v6').on('value',s=>{st=s.val()||{}; bS();});
        };

        function switchP(p, el){
            document.querySelectorAll('.page-content, .tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active'); el.classList.add('active');
        }

        // --- FUNGSI ABSENSI ---
        function uDl(){ document.getElementById('lk').innerHTML=Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function tKar(){ let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>n.value=""); }
        function pAbs(ty){
            let n=document.getElementById('iNama').value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), st=(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0)))?"Terlambat":"Hadir";
            if(ty==='Izin'){ let nt=prompt("Alasan:"); if(!nt)return; st="Izin"; db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}); }
            else{ db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st}); }
            alert("Berhasil!");
        }

        function rRek(){
            let f=document.getElementById('fB').value; if(!f) return;
            let [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), rowH=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) rowH+=`<th>${i}</th>`;
            document.getElementById('thW').innerHTML=rowH+`<th>H</th><th>I</th><th>A</th></tr>`;
            let b=""; Object.values(mk).sort().forEach(n=>{
                let cH=0, cI=0, cA=0, r=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=ad[t]?ad[t][n]:null, s="-", c="";
                    if(d){ if(d.Izin){s="I";c="s-i";cI++;} else if(d.Masuk){s="H";c=(d.Masuk.status==="Terlambat")?"s-late":"s-v";cH++;}}
                    else if(t < new Date().toISOString().split('T')[0]){s="A";c="s-a";cA++;}
                    r+=`<td><div class="s-cell ${c}">${s}</div></td>`;
                }
                b+=`<tr>${r}<td>${cH}</td><td>${cI}</td><td>${cA}</td></tr>`;
            }); document.getElementById('tbW').innerHTML=b;
        }

        // --- FUNGSI STOK ---
        function svS(){
            let b=document.getElementById('sB').value, t=document.getElementById('sT').value, k=document.getElementById('sK').value, q=parseInt(document.getElementById('sQ').value);
            if(q) db.ref(`stok_v6/${t.slice(0,7)}/${b}/${k}`).transaction(c=>(c||0)+q).then(()=>alert("Saved!"));
        }

        function bS(){
            let f=document.getElementById('sT').value.slice(0,7), h="";
            // List Barang dari Excel Mas[span_3](start_span)[span_3](end_span)
            const listB = ["Kempu", "Derigen 18L", "Derigen 5L", "Botol 1L", "Botol 500ML", "Mesin Minyak"];
            listB.forEach(b=>{
                let d=(st[f]&&st[f][b])?st[f][b]:{}, awk=(mb[b]?mb[b].awal_ktr:0), awr=(mb[b]?mb[b].awal_rdy:0);
                // Menghitung Sisa Ready: Awal + Rekon - Jual[span_4](start_span)[span_4](end_span)
                let sr = awr + (d.rekon||0) - (d.j_u||0) - (d.j_a||0);
                h+=`<tr><td class="nama-fixed">${b}</td><td>${awk}</td><td>${awr}</td><td>${d.m_ktr||0}</td><td>${d.rekon||0}</td><td>${d.j_u||0}</td><td>${d.j_a||0}</td><td style="color:var(--s);font-weight:800">${sr}</td></tr>`;
            }); document.getElementById('tbS').innerHTML=h;
        }
    </script>
</body>
</html>
