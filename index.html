<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Karyawan</title>

<!-- Style -->
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
}

select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

button {
  color: white;
  font-weight: bold;
}

.btn-masuk { background: #27ae60; }
.btn-pulang { background: #f39c12; }
.btn-reset { background: #e74c3c; }
.btn-export { background: #2980b9; }

.badge {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  color: white;
}

.hadir { background: green; }
.telat { background: red; }

.item {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
}
</style>
</head>

<body>

<div class="container">

  <!-- ABSEN -->
  <div class="card">
    <h2>📋 Absensi Karyawan</h2>

    <select id="nama">
      <option>Agung</option>
      <option>Hasan</option>
      <option>Hatta</option>
      <option>Nur</option>
    </select>

    <button class="btn-masuk" onclick="absenMasuk()">Absen Masuk</button>
    <button class="btn-pulang" onclick="absenPulang()">Absen Pulang</button>
    <button class="btn-reset" onclick="resetHariIni()">Reset Hari Ini</button>
    <button class="btn-export" onclick="exportExcel()">Export Excel</button>
  </div>

  <!-- HARI INI -->
  <div class="card">
    <h2>📅 Hari Ini</h2>
    <div id="hariIni">Loading...</div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hari = new Date().toISOString().split("T")[0];

// ================== ABSEN MASUK ==================
window.absenMasuk = async () => {
  const nama = document.getElementById("nama").value;
  const jam = new Date().toLocaleTimeString();

  const status = jam > "08:00:00" ? "Telat" : "Hadir";

  await addDoc(collection(db, "absensi"), {
    nama,
    tanggal: hari,
    jamMasuk: jam,
    statusMasuk: status
  });

  loadData();
};

// ================== ABSEN PULANG ==================
window.absenPulang = async () => {
  const nama = document.getElementById("nama").value;

  const q = query(collection(db, "absensi"),
    where("nama", "==", nama),
    where("tanggal", "==", hari)
  );

  const snap = await getDocs(q);

  snap.forEach(async (d) => {
    await addDoc(collection(db, "absensi"), {
      ...d.data(),
      jamPulang: new Date().toLocaleTimeString()
    });
    await deleteDoc(doc(db, "absensi", d.id));
  });

  loadData();
};

// ================== LOAD DATA ==================
async function loadData() {
  const q = query(collection(db, "absensi"),
    where("tanggal", "==", hari)
  );

  const snap = await getDocs(q);

  let html = "";

  snap.forEach(d => {
    const data = d.data();

    html += `
      <div class="item">
        <b>${data.nama}</b><br>
        Masuk: ${data.jamMasuk || "-"}<br>
        Pulang: ${data.jamPulang || "-"}<br>
        Status: 
        <span class="badge ${data.statusMasuk === 'Telat' ? 'telat' : 'hadir'}">
          ${data.statusMasuk || '-'}
        </span>
      </div>
    `;
  });

  document.getElementById("hariIni").innerHTML = html || "Belum ada data";
}

loadData();

// ================== RESET ==================
window.resetHariIni = async () => {
  const q = query(collection(db, "absensi"),
    where("tanggal", "==", hari)
  );

  const snap = await getDocs(q);

  snap.forEach(async d => {
    await deleteDoc(doc(db, "absensi", d.id));
  });

  loadData();
};

// ================== EXPORT EXCEL ==================
window.exportExcel = async () => {
  const snap = await getDocs(collection(db, "absensi"));

  let table = `
    <table border="1">
      <tr>
        <th>Nama</th>
        <th>Tanggal</th>
        <th>Jam Masuk</th>
        <th>Jam Pulang</th>
        <th>Status</th>
      </tr>
  `;

  snap.forEach(d => {
    const data = d.data();
    table += `
      <tr>
        <td>${data.nama}</td>
        <td>${data.tanggal}</td>
        <td>${data.jamMasuk || "-"}</td>
        <td>${data.jamPulang || "-"}</td>
        <td>${data.statusMasuk || "-"}</td>
      </tr>
    `;
  });

  table += "</table>";

  const blob = new Blob([table], { type: "application/vnd.ms-excel" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "absensi.xls";
  a.click();
};

</script>

</body>
</html>
