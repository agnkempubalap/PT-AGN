<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kempu Balap OMNI V100</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#dc2626; --bg:#f8fafc; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; --al:#64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 13px; }
        
        /* Navigasi Biru Putih */
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; position: sticky; top: 0; z-index: 1000; background: var(--p); padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-btn { padding: 12px 2px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 9px; text-transform: uppercase; }
        .nav-btn.active { background: white; color: var(--p); border-color: white; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: var(--c); padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--b); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px; font-size: 12px; color: var(--p); text-transform: uppercase; border-left: 4px solid var(--p); padding-left: 10px; }

        /* Input Modern */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--al); margin-bottom: 5px; }
        input, select { width: 100%; height: 50px; background: #f1f5f9; border: 1px solid var(--b); border-radius: 15px; padding: 0 15px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        
        .btn { border: none; border-radius: 15px; padding: 15px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.97); }

        /* Responsive Table (No Horizontal Scroll) */
        .scroll-x { overflow-x: auto; border-radius: 15px; border: 1px solid var(--b); background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f1f5f9; color: var(--al); font-size: 10px; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--b); text-align: center; font-weight: 600; font-size: 12px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; border-right: 2px solid var(--b); min-width: 100px; color: var(--p); }

        /* Badges */
        .badge { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 8px; font-weight: 800; color: white; }
        .bg-h { background: var(--s); } .bg-m { background: var(--d); } .bg-i { background: #8b5cf6; }
        .bg-off { background: #94a3b8; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 30px; z-index: 2000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); font-weight: 700; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="toast">✅ Berhasil!</div>

    <div class="nav-grid">
        <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
        <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
        <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
        <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
    </div>

    <div class="container">
        
        <div id="tab-absen" class="tab-content">
            <div class="card">
                <h3>👥 Data Master Karyawan</h3>
                <input type="text" id="inK" placeholder="Nama Karyawan Baru...">
                <button class="btn" style="background:var(--p); margin-top:10px" onclick="addM('master_karyawan', 'inK')">TAMBAH KARYAWAN</button>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:15px"></div>
            </div>
            <div class="card">
                <h3>⚡ Absen Harian</h3>
                <div class="form-group"><label>Pilih Karyawan</label><select id="selK"></select></div>
                <div class="form-group"><label>Tanggal</label><input type="date" id="absTgl"></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <button class="btn" style="background:var(--s)" onclick="saveAbs('Hadir')">HADIR</button>
                    <button class="btn" style="background:var(--d)" onclick="saveAbs('Alpa')">ALPA</button>
                </div>
                <button class="btn" style="background:#8b5cf6" onclick="saveAbs('Izin')">IZIN / LIBUR</button>
            </div>
            <div class="card">
                <h3>📅 Rekap Kalender</h3>
                <input type="month" id="fM" onchange="renderAll()">
                <div class="scroll-x">
                    <table><thead id="thA"></thead><tbody id="tbA"></tbody></table>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <input type="text" id="inB" placeholder="Jenis Barang...">
                <button class="btn" style="background:var(--p); margin-top:10px" onclick="addM('master_barang', 'inB')">TAMBAH BARANG</button>
            </div>
            <div class="card">
                <h3>🔄 Input Stok & QC</h3>
                <select id="stBrg" style="margin-bottom:10px"></select>
                <select id="stQC" style="margin-bottom:10px">
                    <option value="Accepted">Accepted ✅</option>
                    <option value="Minor">Accepted Minor ⚠️</option>
                    <option value="Reject">Reject ❌</option>
                </select>
                <input type="number" id="stQty" placeholder="Jumlah Qty">
                <button class="btn" style="background:var(--p); margin-top:10px" onclick="saveSt()">SIMPAN STOK</button>
            </div>
            <div class="card">
                <h3>📊 Tabel Flow Stok</h3>
                <div class="scroll-x">
                    <table id="tblStok">
                        <thead><tr><th>BARANG</th><th>AWAL</th><th>MASUK</th><th>REKO</th><th>JUAL</th><th>TOTAL</th></tr></thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content hidden">
            <div class="card">
                <h3>🛠️ Input Aktivitas Tim</h3>
                <select id="akKaryawan" style="margin-bottom:10px"></select>
                <select id="akTipe" style="margin-bottom:10px">
                    <option value="Rekondisi Kempu">Rekondisi Kempu (Borongan)</option>
                    <option value="Rekondisi Jerigen 18L">Rekondisi Jerigen 18L</option>
                    <option value="Muat Barang">Muat (50 Kempu)</option>
                    <option value="Bongkar Barang">Bongkar (50 Kempu)</option>
                    <option value="Kirim Minyak Jauh">Kirim Minyak Jauh</option>
                </select>
                <input type="number" id="akQty" placeholder="Jumlah (Pcs/Set)">
                <button class="btn" style="background:var(--s); margin-top:10px" onclick="saveAk()">SIMPAN AKTIVITAS</button>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content hidden">
            <div class="card">
                <h3>💰 Rekap Gaji (Tgl 1)</h3>
                <div id="listGaji"></div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let DATA = {};
        const RATES = { "Rekondisi Kempu": 100000, "Rekondisi Jerigen 18L": 2000, "Muat Barang": 600000, "Bongkar Barang": 600000, "Kirim Minyak Jauh": 250000 };

        window.onload = () => {
            const now = new Date();
            document.getElementById('absTgl').value = now.toISOString().split('T')[0];
            document.getElementById('fM').value = now.toISOString().slice(0, 7);
            
            db.ref('/').on('value', s => {
                DATA = s.val() || {};
                renderAll();
            });
        };

        function notify(m) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
        }

        function tab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function addM(p, id) {
            const v = document.getElementById(id).value;
            if(v) db.ref(p).push(v).then(() => { document.getElementById(id).value=""; notify("Data Ditambahkan!"); });
        }

        function saveAbs(s) {
            const n = document.getElementById('selK').value, t = document.getElementById('absTgl').value;
            if(!n) return alert("Pilih Karyawan!");
            db.ref(`absensi/${t}/${n}`).set({ s, jam: new Date().toLocaleTimeString('id-ID') }).then(() => notify("Absen Berhasil!"));
        }

        function saveSt() {
            const b = document.getElementById('stBrg').value, q = parseInt(document.getElementById('stQty').value);
            const qc = document.getElementById('stQC').value, tgl = document.getElementById('absTgl').value;
            if(!b || !q) return;
            db.ref('stok').push({ b, q, qc, tgl }).then(() => { document.getElementById('stQty').value=""; notify("Stok Disimpan!"); });
        }

        function saveAk() {
            const n = document.getElementById('akKaryawan').value, t = document.getElementById('akTipe').value;
            const q = parseInt(document.getElementById('akQty').value) || 1, tgl = document.getElementById('absTgl').value;
            db.ref('aktivitas').push({ n, t, q, tgl }).then(() => { document.getElementById('akQty').value=""; notify("Aktivitas Berhasil!"); });
        }

        function renderAll() {
            const kArr = Object.entries(DATA.master_karyawan || {});
            const bArr = Object.entries(DATA.master_barang || {});
            const fM = document.getElementById('fM').value;

            // Update UI Lists
            document.getElementById('listK').innerHTML = kArr.map(([id, n]) => `<div style="background:#e2e8f0; padding:6px 12px; border-radius:20px; font-size:11px; font-weight:700">${n} <span onclick="db.ref('master_karyawan/${id}').remove()" style="color:var(--d);margin-left:5px">×</span></div>`).join('');
            document.getElementById('selK').innerHTML = kArr.map(([id, n]) => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('akKaryawan').innerHTML = kArr.map(([id, n]) => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('stBrg').innerHTML = bArr.map(([id, n]) => `<option value="${n}">${n}</option>`).join('');

            renderAbsen(fM, kArr);
            renderStok(fM, bArr);
            renderGaji(fM, kArr);
        }

        function renderAbsen(fM, kArr) {
            const [y, m] = fM.split('-'), last = new Date(y, m, 0).getDate();
            let th = `<tr><th class="sticky-col">NAMA</th>`, tb = "";
            for (let i = 1; i <= last; i++) th += `<th>${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;

            kArr.forEach(([id, name]) => {
                let row = `<td class="sticky-col"><b>${name}</b></td>`;
                for (let i = 1; i <= last; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2, '0')}`;
                    const d = (DATA.absensi && DATA.absensi[tgl]) ? DATA.absensi[tgl][name] : null;
                    const isSun = new Date(tgl).getDay() === 0;
                    let txt = "-", cls = "";
                    if (isSun) { txt = "M"; cls = "bg-m"; }
                    if (d) { txt = d.s[0]; cls = d.s==='Hadir'?'bg-h':(d.s==='Izin'?'bg-i':'bg-m'); }
                    row += `<td><div class="badge ${cls}">${txt}</div></td>`;
                }
                tb += `<tr>${row}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
        }

        function renderStok(fM, bArr) {
            let html = "";
            bArr.forEach(([id, bn]) => {
                let awal = 0, masuk = 0, reko = 0, jual = 0;
                Object.values(DATA.stok || {}).forEach(s => {
                    if (s.b !== bn) return;
                    if (s.tgl < fM + "-01") awal += s.q; // Logika Saldo Awal Otomatis
                    else if (s.tgl.startsWith(fM)) masuk += s.q;
                });
                html += `<tr><td>${bn}</td><td>${awal}</td><td>${masuk}</td><td>${reko}</td><td>${jual}</td><td>${awal+masuk-jual}</td></tr>`;
            });
            document.getElementById('tbS').innerHTML = html;
        }

        function renderGaji(fM, kArr) {
            let html = "";
            kArr.forEach(([id, name]) => {
                let total = 0;
                Object.values(DATA.aktivitas || {}).forEach(ak => {
                    if (ak.n === name && ak.tgl.startsWith(fM)) total += (RATES[ak.t] || 0) * ak.q;
                });
                html += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid var(--b)">
                    <div><b>${name}</b><br><small>${fM}</small></div>
                    <div style="text-align:right"><b style="color:var(--s)">Rp ${total.toLocaleString()}</b></div>
                </div>`;
            });
            document.getElementById('listGaji').innerHTML = html;
        }
    </script>
</body>
</html>
