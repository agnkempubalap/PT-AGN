<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi PT AGN</title>

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  margin:0;
}

.container {
  padding:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-top:10px;
}

h2 { margin:0 0 10px; }

select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  background:#4CAF50;
  color:white;
  font-weight:bold;
  border:none;
}

.list-item {
  background:#f5f7ff;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.rekap {
  background:#4CAF50;
  color:white;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>📋 Absensi Karyawan</h2>

<div class="card">

<h3>Absensi Hari Ini</h3>

<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hatta</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="btnAbsen">Hadir</button>

<h3>List Hari Ini</h3>
<div id="list">Loading...</div>

<h3>Rekap Bulanan</h3>
<div id="rekap">Loading...</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// CONFIG KAMU (SUDAH BENAR)
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// FORMAT TANGGAL
function getTanggal(){
  let d = new Date();
  return d.getFullYear() + "-" +
    (d.getMonth()+1).toString().padStart(2,'0') + "-" +
    d.getDate().toString().padStart(2,'0');
}


// 🔥 ABSEN SUPER ANTI DOUBLE
document.getElementById("btnAbsen").onclick = async function(){

  const btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let tanggal = getTanggal();
  let id = nama + "_" + tanggal;

  try {

    const ref = doc(db, "absensi", id);
    const snap = await getDoc(ref);

    if(snap.exists()){
      alert("❌ Sudah absen hari ini");
      btn.disabled = false;
      btn.innerText = "Hadir";
      return;
    }

    await setDoc(ref, {
      nama: nama,
      status: "Hadir",
      tanggal: tanggal,
      waktu: Date.now()
    });

    alert("✅ Absen berhasil");

  } catch(e){
    alert("Error: " + e.message);
  }

  btn.disabled = false;
  btn.innerText = "Hadir";
};


// 📋 REALTIME LIST
function loadList(){

  const list = document.getElementById("list");
  let tanggal = getTanggal();

  const q = query(
    collection(db, "absensi"),
    where("tanggal", "==", tanggal)
  );

  onSnapshot(q, (snap)=>{

    list.innerHTML = "";

    if(snap.empty){
      list.innerHTML = "Belum ada absen";
      return;
    }

    snap.forEach(doc=>{
      const d = doc.data();

      list.innerHTML += `
        <div class="list-item">
          <span>${d.nama}</span>
          <span>${d.status}</span>
        </div>
      `;
    });

  });
}


// 📊 REKAP BULANAN
function loadRekap(){

  const el = document.getElementById("rekap");

  const q = collection(db, "absensi");

  onSnapshot(q, (snap)=>{

    let data = {};
    let now = new Date();
    let prefix = now.getFullYear() + "-" + (now.getMonth()+1).toString().padStart(2,'0');

    snap.forEach(doc=>{
      const d = doc.data();

      if(d.tanggal && d.tanggal.startsWith(prefix)){
        if(!data[d.nama]) data[d.nama]=0;
        data[d.nama]++;
      }
    });

    el.innerHTML = "";

    if(Object.keys(data).length === 0){
      el.innerHTML = "Belum ada data";
      return;
    }

    for(let n in data){
      el.innerHTML += `
        <div class="rekap">
          <span>${n}</span>
          <span>${data[n]} hari</span>
        </div>
      `;
    }

  });
}


// LOAD AWAL
loadList();
loadRekap();

</script>

</body>
</html>
