<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP OMNI V550</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#dc2626; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 12px; }
        
        /* Navigasi Fixed */
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); position: sticky; top: 0; z-index: 1000; background: var(--p); padding: 5px; gap: 4px; }
        .nav-btn { padding: 12px 0; background: rgba(255,255,255,0.1); border: none; color: white; font-weight: 800; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }

        .container { padding: 10px; padding-bottom: 80px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin: 0 0 10px; font-size: 11px; color: var(--p); text-transform: uppercase; border-left: 4px solid var(--p); padding-left: 8px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 8px; padding: 0 10px; font-size: 13px; }
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 800; cursor: pointer; width: 100%; color: white; font-size: 10px; }

        /* Tabel & Scroll */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--b); background: white; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 8px; border: 1px solid var(--b); text-align: center; font-size: 10px; }
        th { background: #f8fafc; position: sticky; top: 0; z-index: 5; }
        .sticky-col { position: sticky; left: 0; background: white !important; z-index: 10; font-weight: 800; border-right: 2px solid var(--b); width: 100px; text-align: left; }

        /* Status Badges */
        .badge { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 40px; border-radius: 6px; font-weight: 800; color: white; position: relative; }
        .bg-h { background: var(--s); } .bg-i { background: #8b5cf6; } .bg-a { background: #000; } 
        .bg-l { background: #f59e0b; } .bg-t { background: #f43f5e; } .bg-m { background: #ef4444; } 
        .bg-off { background: #94a3b8; } .bg-none { background: #f1f5f9; color: #cbd5e1; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="toast">✅ Berhasil!</div>

    <div class="nav-grid">
        <button id="btn-absen" class="nav-btn active" onclick="switchTab('absen')">ABSEN</button>
        <button id="btn-stok" class="nav-btn" onclick="switchTab('stok')">STOK</button>
        <button id="btn-aktivitas" class="nav-btn" onclick="switchTab('aktivitas')">AKTIV</button>
        <button id="btn-gaji" class="nav-btn" onclick="switchTab('gaji')">GAJI</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Data Karyawan</h3>
                <div class="grid-2"><input type="text" id="inK" placeholder="Nama..."><button class="btn" style="background:var(--p)" onclick="addM('master_karyawan', 'inK')">+</button></div>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Presensi</h3>
                <div class="grid-2"><input type="date" id="absTgl"><select id="selK"></select></div>
                <div class="grid-2">
                    <button class="btn" style="background:var(--s)" onclick="saveAbs('Hadir')">MASUK</button>
                    <button class="btn" style="background:#8b5cf6" onclick="saveAbs('Izin')">IZIN</button>
                </div>
                <button class="btn" style="background:var(--t)" onclick="saveAbs('Pulang')">PULANG (JAM 16:00)</button>
            </div>
            <div class="card">
                <h3>📊 Kalender <input type="month" id="fM" onchange="renderAll()"></h3>
                <div class="table-wrap"><table id="tblAbsen"><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <div class="grid-2"><input type="text" id="inB" placeholder="Barang..."><button class="btn" style="background:var(--p)" onclick="addM('master_barang', 'inB')">+</button></div>
                <div id="listB" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📥 Transaksi QC</h3>
                <div class="grid-2"><select id="stBrg"></select><input type="number" id="stQty" placeholder="Qty"></div>
                <div class="grid-2">
                    <select id="stQC"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select>
                    <select id="stMode"><option value="masuk">Masuk</option><option value="rekondisi">Rekondisi</option><option value="jual">Jual</option></select>
                </div>
                <button class="btn" style="background:var(--s)" onclick="saveStok()">SIMPAN</button>
            </div>
            <div class="card">
                <h3>📊 Stok Recap</h3>
                <div class="table-wrap"><table><thead><tr><th>BARANG</th><th>KOTOR</th><th>READY</th><th>TOTAL</th></tr></thead><tbody id="tbStok"></tbody></table></div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content"><div class="card"><h3>🛠️ Aktivitas</h3><p>Fitur diaktifkan setelah Tab Absen & Stok Berjalan Lancar.</p></div></div>
        <div id="tab-gaji" class="tab-content"><div class="card"><h3>💰 Gaji</h3><p>Fitur diaktifkan setelah Tab Absen & Stok Berjalan Lancar.</p></div></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let DATA = {};

        window.onload = () => {
            const now = new Date();
            document.getElementById('absTgl').value = now.toISOString().split('T')[0];
            document.getElementById('fM').value = now.toISOString().slice(0, 7);
            
            // Listen Data Sekali Saja (Biar Gak Crash)
            db.ref('/').on('value', s => {
                DATA = s.val() || {};
                renderAll();
            });
        };

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        function showT(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        function addM(path, id) {
            const v = document.getElementById(id).value;
            if(v) db.ref(path).push(v).then(() => { document.getElementById(id).value=""; showT("Ditambah!"); });
        }

        function saveAbs(st) {
            const n = document.getElementById('selK').value, t = document.getElementById('absTgl').value;
            db.ref(`absensi/${t}/${n}`).update({ s: st, in: new Date().getHours() + ":00" }).then(() => showT("Absen OK!"));
        }

        function saveStok() {
            const b = document.getElementById('stBrg').value, q = parseInt(document.getElementById('stQty').value), m = document.getElementById('stMode').value;
            if(b && q) db.ref('stok_logs').push({ b, q, m, tgl: document.getElementById('absTgl').value }).then(() => { document.getElementById('stQty').value=""; showT("Stok OK!"); });
        }

        function renderAll() {
            const kArr = Object.entries(DATA.master_karyawan || {}), bArr = Object.entries(DATA.master_barang || {});
            const fM = document.getElementById('fM').value, [y, m] = fM.split('-'), last = new Date(y, m, 0).getDate();

            // Render Master & Dropdown
            document.getElementById('listK').innerHTML = kArr.map(k => `<span style="background:#eee;padding:2px 8px;border-radius:10px;margin:2px">${k[1]} <b onclick="db.ref('master_karyawan/${k[0]}').remove()">×</b></span>`).join('');
            document.getElementById('selK').innerHTML = kArr.map(k => `<option value="${k[1]}">${k[1]}</option>`).join('');
            document.getElementById('stBrg').innerHTML = bArr.map(b => `<option value="${b[1]}">${b[1]}</option>`).join('');

            // Kalender Absen
            let th = `<tr><th class="sticky-col">NAMA</th>`;
            for(let i=1; i<=last; i++) th += `<th>${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;

            let tbA = "";
            kArr.forEach(k => {
                let row = `<td class="sticky-col">${k[1]}</td>`;
                for(let i=1; i<=last; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2,'0')}`, d = DATA.absensi?.[tgl]?.[k[1]], isSun = new Date(tgl).getDay()===0;
                    let cls = d ? `bg-${d.s.toLowerCase()[0]}` : (isSun ? 'bg-m' : 'bg-none');
                    row += `<td><div class="badge ${cls}">${d ? d.s[0] : (isSun?'M':'-')}</div></td>`;
                }
                tbA += `<tr>${row}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tbA;

            // Stok Recap
            let stH = "";
            bArr.forEach(b => {
                let ktr=0, rdy=0;
                Object.values(DATA.stok_logs || {}).forEach(l => {
                    if(l.b === b[1]) {
                        if(l.m==='masuk') ktr += l.q;
                        if(l.m==='rekondisi') { ktr -= l.q; rdy += l.q; }
                        if(l.m==='jual') rdy -= l.q;
                    }
                });
                stH += `<tr><td>${b[1]}</td><td>${ktr}</td><td>${rdy}</td><td>${ktr+rdy}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = stH;
        }
    </script>
</body>
</html>
