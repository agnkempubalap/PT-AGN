<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Warehouse System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f4f4f4; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-absen { background: #28a745; }
        h2 { color: #333; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h2>📦 PT-AGN: Absensi & Aktivitas</h2>

    <!-- FORM ABSENSI -->
    <div class="card">
        <h3>1. Absen Harian</h3>
        <input type="text" id="namaKaryawan" placeholder="Nama Karyawan">
        <button class="btn-absen" onclick="absen('Masuk')">Absen Masuk</button>
        <button style="background:#dc3545" onclick="absen('Pulang')">Absen Pulang</button>
    </div>

    <!-- FORM AKTIVITAS -->
    <div class="card">
        <h3>2. Laporan Aktivitas</h3>
        <textarea id="detailAktivitas" rows="3" style="width:100%" placeholder="Contoh: Bongkar 20 kempu, pengiriman ke Solo"></textarea>
        <button onclick="simpanAktivitas()">Kirim Laporan</button>
    </div>

    <div id="notif" style="text-align:center; color: green; font-weight:bold;"></div>

    <script>
        // MASUKKAN CONFIG FIREBASE ANDA DI SINI
        const firebaseConfig = {
            apiKey: "PASTE_DI_SINI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.firebaseio.com",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FUNGSI ABSEN
        function absen(tipe) {
            const nama = document.getElementById('namaKaryawan').value;
            const tanggal = new Date().toISOString().split('T')[0];
            const waktu = new Date().toLocaleTimeString();

            if(!nama) return alert("Isi nama dulu!");

            db.ref('absensi/' + tanggal + '/' + nama).update({
                [tipe]: waktu
            }).then(() => {
                showNotif("Absen " + tipe + " Berhasil!");
            });
        }

        // FUNGSI AKTIVITAS
        function simpanAktivitas() {
            const nama = document.getElementById('namaKaryawan').value;
            const detail = document.getElementById('detailAktivitas').value;
            const tanggal = new Date().toISOString().split('T')[0];
            const waktu = new Date().toLocaleTimeString();

            if(!nama || !detail) return alert("Nama dan aktivitas harus diisi!");

            db.ref('aktivitas/' + tanggal).push({
                nama: nama,
                pekerjaan: detail,
                jam: waktu
            }).then(() => {
                showNotif("Aktivitas tersimpan!");
                document.getElementById('detailAktivitas').value = "";
            });
        }

        function showNotif(msg) {
            document.getElementById('notif').innerText = msg;
            setTimeout(() => { document.getElementById('notif').innerText = ""; }, 3000);
        }
    </script>
</body>
</html>
