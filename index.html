<div class="card">
    <h3>📊 Laporan Stok Detail</h3>
    <div class="table-area">
        <table id="tblStok">
            <thead id="thStok">
                <tr>
                    <th class="sticky-col" rowspan="2">BARANG</th>
                    <th colspan="2" style="background:#f1f5f9">STOK AWAL</th>
                    <th colspan="2" style="background:#e0f2fe">MASUK (IN)</th>
                    <th rowspan="2" style="background:#fee2e2">REJECT</th>
                    <th rowspan="2" style="background:#fef9c3">REKON</th>
                    <th colspan="2" style="background:#ffedd5">PENJUALAN</th>
                    <th colspan="3" style="background:#dcfce7">SALDO AKHIR</th>
                </tr>
                <tr>
                    <th>KTR</th><th>BRU</th>
                    <th>KTR</th><th>BRU</th>
                    <th>MITRA</th><th>UMUM</th>
                    <th>S.KTR</th><th>S.RDY</th><th>TOTAL</th>
                </tr>
            </thead>
            <tbody id="tbStok"></tbody>
        </table>
    </div>
    <button class="btn" style="background:#64748b; margin-top:15px; width:100%" onclick="showLogs('stok_logs')">⚙️ EDIT / HAPUS LOG STOK</button>
</div>

<script>
    // ... (Fungsi Firebase & UI lainnya tetap sama seperti sebelumnya) ...

    function renderSt() {
        const B_arr = Object.values(D.master_barang || {});
        const fM = document.getElementById('fM').value; // Bulan yang dipilih (Contoh: 2026-03)
        
        let html = "";
        
        B_arr.forEach(b => {
            // Inisialisasi Penampung Data
            let s = { 
                awKtr: 0, awBru: 0, // Stok Awal (Saldo bulan lalu)
                inKtr: 0, inBru: 0, // Masuk bulan ini
                rej: 0, rkn: 0,     // Reject & Rekondisi
                jlM: 0, jlU: 0      // Jual Mitra & Umum
            };

            Object.values(D.stok_logs || {}).forEach(l => {
                if (l.b !== b) return;
                
                let bulanLog = l.t?.slice(0, 7);
                
                if (bulanLog < fM) {
                    // HITUNG SALDO AWAL (Logika akumulasi dari awal waktu sampai sebelum bulan ini)
                    if (l.ak === "Masuk") {
                        if (l.kon === "Bekas") s.awKtr += l.q; else s.awBru += l.q;
                    } else if (l.ak === "Rekondisi") {
                        s.awKtr -= l.q; s.awBru += l.q; // Pindah dari kotor ke baru
                    } else if (l.ak.includes("Jual")) {
                        s.awBru -= l.q;
                    }
                } else if (bulanLog === fM) {
                    // HITUNG AKTIVITAS BULAN INI
                    if (l.ak === "Masuk") {
                        if (l.kon === "Bekas") s.inKtr += l.q; else s.inBru += l.q;
                        if (l.qc === "Reject") s.rej += l.q;
                    } else if (l.ak === "Rekondisi") {
                        s.rkn += l.q;
                    } else if (l.ak === "Jual Mitra") {
                        s.jlM += l.q;
                    } else if (l.ak === "Jual Umum") {
                        s.jlU += l.q;
                    }
                }
            });

            // LOGIKA SALDO AKHIR
            let sisaKtr = (s.awKtr + s.inKtr) - s.rkn;
            let sisaRdy = (s.awBru + s.inBru + s.rkn) - (s.jlM + s.jlU);
            let totStok = sisaKtr + sisaRdy;

            html += `
                <tr>
                    <td class="sticky-col">${b}</td>
                    <td>${s.awKtr}</td>
                    <td>${s.awBru}</td>
                    <td style="color:blue">${s.inKtr}</td>
                    <td style="color:blue">${s.inBru}</td>
                    <td style="color:red">${s.rej}</td>
                    <td style="color:orange">${s.rkn}</td>
                    <td>${s.jlM}</td>
                    <td>${s.jlU}</td>
                    <td style="font-weight:800">${sisaKtr}</td>
                    <td style="font-weight:800; color:green">${sisaRdy}</td>
                    <td style="font-weight:800; background:#f8fafc">${totStok}</td>
                </tr>
            `;
        });
        
        document.getElementById('tbStok').innerHTML = html || "<tr><td colspan='12'>Belum ada data barang</td></tr>";
    }

    // Pastikan fungsi render() memanggil renderSt()
    function render() {
        // ... (Logika render Absen tetap) ...
        renderSt();
    }
</script>
