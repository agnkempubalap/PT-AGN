<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;padding-bottom:80px}
.page{display:none;padding:10px}
.active{display:block}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;color:#fff}
.green{background:#22c55e}
.orange{background:#f59e0b}
.red{background:#ef4444}
.blue{background:#3b82f6}
input,select{width:100%;padding:10px;margin:5px 0}

/* NAV */
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
.nav button{flex:1;background:none;color:#333}

/* KALENDER */
.kalender{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
.hari{padding:8px;border-radius:8px;background:#e5e7eb;cursor:pointer;font-size:12px}
.hadir{background:#22c55e;color:#fff}
.izin{background:#f59e0b;color:#fff}
.alfa{background:#ef4444;color:#fff}
.telat{background:#3b82f6;color:#fff}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3>📊 Dashboard</h3>
Total Karyawan: <b id="dkaryawan"></b><br>
Hadir: <b id="dhadir"></b><br>
Alfa: <b id="dalfa"></b><br>
Aktivitas: <b id="daktif"></b>
</div>

<div class="card">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>
</div>

<!-- ABSEN -->
<div id="absen" class="page">

<div class="card">
<select id="nama"></select>
<input id="namaBaru" placeholder="Tambah karyawan">
<button class="blue" onclick="tambah()">Tambah</button>
<button class="red" onclick="hapus()">Hapus</button>
</div>

<div class="card">
<button class="green" onclick="masuk()">Masuk</button>
<button class="orange" onclick="izin()">Izin</button>
<button class="red" onclick="resetHari()">Reset Hari</button>
</div>

<div id="list"></div>

<div class="card">
<h3>📅 Kalender</h3>
<input type="month" id="bulan" onchange="renderKalender()">
<div id="kalender"></div>
</div>

<div class="card">
<div id="detailTanggal">Klik tanggal</div>
</div>

</div>

<!-- AKTIVITAS -->
<div id="aktivitas" class="page">

<div class="card">
<select id="aktifitas">
<option>Rekondisi Kempu</option>
<option>Rekondisi 18L</option>
<option>Rekondisi 5L</option>
<option>Muat/Bongkar</option>
<option>Pangkalan</option>
<option>Kirim Minyak</option>
</select>

<div id="cek"></div>

<button class="blue" onclick="simpanAkt()">Simpan Aktivitas</button>
</div>

<div class="card">
<select id="filterNama" onchange="renderAktivitas()"></select>
<input type="date" id="filterTgl" onchange="renderAktivitas()">
<button class="red" onclick="resetFilter()">Reset</button>
</div>

<div id="listAktivitas"></div>
</div>

<!-- STOK -->
<div id="stok" class="page">
<div class="card">
<input id="barang" placeholder="Barang">
<input id="jumlah" type="number">
<button class="green" onclick="stokMasuk()">Masuk</button>
<button class="red" onclick="stokKeluar()">Keluar</button>
</div>
<div id="listStok"></div>
</div>

<!-- GAJI -->
<div id="gaji" class="page">
<div id="listGaji"></div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="go('home')">Home</button>
<button onclick="go('absen')">Absen</button>
<button onclick="go('aktivitas')">Aktivitas</button>
<button onclick="go('stok')">Stok</button>
<button onclick="go('gaji')">Gaji</button>
</div>

<script>

// NAV
function go(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// DATA
let karyawan=JSON.parse(localStorage.getItem("karyawan"))||["Agung","Alda"];
let absen=JSON.parse(localStorage.getItem("absen"))||[];
let aktivitas=JSON.parse(localStorage.getItem("aktivitas"))||[];
let stok=JSON.parse(localStorage.getItem("stok"))||{};

const nama=document.getElementById("nama");

// LOAD
function loadNama(){
 nama.innerHTML=karyawan.map(n=>`<option value="${n}">${n}</option>`).join("");

 cek.innerHTML=karyawan.map(n=>`
 <label><input type="checkbox" value="${n}"> ${n}</label><br>
 `).join("");

 filterNama.innerHTML='<option value="">Semua</option>'+
 karyawan.map(n=>`<option value="${n}">${n}</option>`).join("");
}

// SAVE
function save(){
 localStorage.setItem("karyawan",JSON.stringify(karyawan));
 localStorage.setItem("absen",JSON.stringify(absen));
 localStorage.setItem("aktivitas",JSON.stringify(aktivitas));
 localStorage.setItem("stok",JSON.stringify(stok));
 render();
}

// TAMBAH
function tambah(){
 let n=namaBaru.value;
 if(!n)return alert("Isi nama");
 if(karyawan.includes(n))return alert("Sudah ada");
 karyawan.push(n);
 namaBaru.value="";
 alert("Berhasil tambah");
 save();loadNama();
}

// HAPUS
function hapus(){
 let n=nama.value;
 if(confirm("Hapus?")){
  karyawan=karyawan.filter(x=>x!=n);
  alert("Dihapus");
  save();loadNama();
 }
}

// TIME
function now(){
 let d=new Date();
 return {tgl:d.toISOString().split('T')[0],jam:d.toTimeString().split(' ')[0]};
}

// ABSEN
function masuk(){
 let t=now();
 absen.push({nama:nama.value,tgl:t.tgl,status:t.jam>"09:00:00"?"Telat":"Hadir"});
 save();
}
function izin(){
 let t=now();
 absen.push({nama:nama.value,tgl:t.tgl,status:"Izin"});
 save();
}

// RESET
function resetHari(){
 let t=now().tgl;
 absen=absen.filter(x=>x.tgl!=t);
 aktivitas=aktivitas.filter(x=>x.tgl!=t);
 alert("Reset selesai");
 save();
}

// AUTO ALFA
function alfa(){
 let t=now();
 if(t.jam<"16:00:00")return;
 karyawan.forEach(n=>{
  if(!absen.find(x=>x.nama==n && x.tgl==t.tgl)){
   absen.push({nama:n,tgl:t.tgl,status:"Alfa"});
  }
 });
}

// AKTIVITAS
function simpanAkt(){
 let t=now();
 let akt=aktifitas.value;
 let orang=[...document.querySelectorAll("#cek input:checked")].map(x=>x.value);

 if(orang.length==0)return alert("Pilih karyawan");

 orang.forEach(n=>{
  aktivitas.push({nama:n,tgl:t.tgl,akt,jam:t.jam});
 });

 document.querySelectorAll("#cek input").forEach(x=>x.checked=false);

 alert("Aktivitas disimpan");
 save();
}

// FILTER
function renderAktivitas(){
 let fN=filterNama.value;
 let fT=filterTgl.value;

 let data=aktivitas;
 if(fN)data=data.filter(x=>x.nama==fN);
 if(fT)data=data.filter(x=>x.tgl==fT);

 listAktivitas.innerHTML=data.length?
 data.map(x=>`<div class="card">${x.nama} - ${x.akt}<br>${x.tgl} ${x.jam}</div>`).join("")
 : "<div class='card'>Tidak ada data</div>";
}

function resetFilter(){
 filterNama.value="";
 filterTgl.value="";
 renderAktivitas();
}

// STOK
function stokMasuk(){
 stok[barang.value]=(stok[barang.value]||0)+Number(jumlah.value);
 save();
}
function stokKeluar(){
 stok[barang.value]=(stok[barang.value]||0)-Number(jumlah.value);
 save();
}

// KALENDER
function renderKalender(){
 let val=bulan.value;
 if(!val)return;
 let [y,m]=val.split("-");
 let first=new Date(y,m-1,1).getDay();
 let last=new Date(y,m,0).getDate();

 let html='<div class="kalender">';
 for(let i=0;i<first;i++)html+="<div></div>";

 for(let d=1;d<=last;d++){
  let t=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  let data=absen.filter(x=>x.tgl==t);

  let cls="hari";
  if(data.some(x=>x.status=="Alfa"))cls+=" alfa";
  else if(data.some(x=>x.status=="Izin"))cls+=" izin";
  else if(data.some(x=>x.status=="Telat"))cls+=" telat";
  else if(data.some(x=>x.status=="Hadir"))cls+=" hadir";

  html+=`<div class="${cls}" onclick="detailTgl('${t}')">${d}</div>`;
 }

 html+="</div>";
 kalender.innerHTML=html;
}

// DETAIL
function detailTgl(t){
 let a=absen.filter(x=>x.tgl==t);
 let b=aktivitas.filter(x=>x.tgl==t);

 detailTanggal.innerHTML=`
 <b>${t}</b><br><br>
 <b>Absensi:</b><br>
 ${a.map(x=>x.nama+"-"+x.status).join("<br>")||"Kosong"}
 <br><br>
 <b>Aktivitas:</b><br>
 ${b.map(x=>x.nama+"-"+x.akt).join("<br>")||"Kosong"}
 `;
}

// RENDER
function render(){

 alfa();

 let t=now().tgl;

 dkaryawan.innerText=karyawan.length;
 dhadir.innerText=absen.filter(x=>x.tgl==t && x.status=="Hadir").length;
 dalfa.innerText=absen.filter(x=>x.tgl==t && x.status=="Alfa").length;
 daktif.innerText=aktivitas.filter(x=>x.tgl==t).length;

 list.innerHTML=absen.map(x=>`<div class="card">${x.nama}-${x.status}-${x.tgl}</div>`).join("");

 renderAktivitas();

 listStok.innerHTML=Object.keys(stok).map(k=>`<div class="card">${k}:${stok[k]}</div>`).join("");

 listGaji.innerHTML=karyawan.map(n=>{
 let h=absen.filter(x=>x.nama==n && x.status=="Hadir").length;
 let a=absen.filter(x=>x.nama==n && x.status=="Alfa").length;
 let act=aktivitas.filter(x=>x.nama==n).length;
 let score=(h*2)+(act)-(a*2);
 return `<div class="card">${n}<br>Score:${score}<br>Akt:${act}</div>`;
 }).join("");

 let rank=karyawan.map(n=>{
 let h=absen.filter(x=>x.nama==n && x.status=="Hadir").length;
 let a=absen.filter(x=>x.nama==n && x.status=="Alfa").length;
 let act=aktivitas.filter(x=>x.nama==n).length;
 return {n,score:(h*2)+(act)-(a*2)};
 }).sort((a,b)=>b.score-a.score);

 ranking.innerHTML=rank.map((r,i)=>`#${i+1} ${r.n} (${r.score})`).join("<br>");

 renderKalender();
}

// INIT
loadNama();
render();
bulan.value=new Date().toISOString().slice(0,7);

</script>

</body>
</html>
