<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP ERP - V201 COMPLETE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#10b981; --d:#ef4444; --bg:#0f172a; --c:#1e293b; --t:#f8fafc; --b:#334155; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 11px; padding: 5px; overflow-x: hidden; }
        
        /* Navigasi */
        .nav { display: flex; gap: 4px; position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 5px 0; }
        .nav button { flex: 1; padding: 12px 2px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 8px; font-weight: 800; font-size: 9px; cursor: pointer; }
        .nav button.active { background: var(--p); border-color: var(--p); }

        /* Container & Card */
        .card { background: var(--c); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--b); width: 100%; }
        h3 { margin: 0 0 10px 0; font-size: 12px; color: var(--p); border-bottom: 1px solid var(--b); padding-bottom: 5px; }
        
        /* Form Layout */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        .full-row { grid-column: span 2; }
        input, select, textarea { width: 100%; height: 38px; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; font-size: 11px; }
        button.main { height: 40px; background: var(--p); border: none; color: white; font-weight: 800; border-radius: 8px; width: 100%; cursor: pointer; }
        
        /* Tabel Adaptif (No Scroll Horizontal Page) */
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--b); padding: 8px; font-size: 9px; position: sticky; top: 0; }
        td { border: 0.1px solid var(--b); padding: 6px; text-align: center; }
        
        /* Kalender Stylings */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--b); border: 1px solid var(--b); }
        .cal-day { background: var(--c); min-height: 50px; padding: 4px; font-size: 9px; position: relative; }
        .cal-header { background: var(--b); text-align: center; font-weight: 800; padding: 5px; }
        .ind { display: inline-flex; width: 14px; height: 14px; align-items: center; justify-content: center; border-radius: 3px; font-size: 8px; font-weight: 800; margin: 1px; color: white; }
        .ind-h { background: var(--s); } .ind-i { background: #f59e0b; } .ind-a { background: var(--d); } 
        .ind-t { background: #ec4899; } .ind-m { background: #000; } .ind-off { background: #64748b; }
        
        /* Toast & Hidden */
        #toast { visibility: hidden; min-width: 200px; background: var(--s); color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 800; }
        #toast.show { visibility: visible; }
        .hidden { display: none !important; }
        .chip { display: inline-flex; align-items: center; background: var(--b); padding: 4px 8px; border-radius: 15px; margin: 2px; font-size: 9px; }
    </style>
</head>
<body>

<div id="toast">Berhasil!</div>

<div class="nav">
    <button class="active" onclick="tab('abs', this)">ABSEN</button>
    <button onclick="tab('stk', this)">STOK/QC</button>
    <button onclick="tab('act', this)">AKTIVITAS</button>
    <button onclick="tab('pay', this)">GAJI</button>
</div>

<div class="container">
    
    <div id="tab-abs" class="tab-content">
        <div class="card">
            <h3>MASTER KARYAWAN & LIBUR</h3>
            <div class="form-row">
                <input type="text" id="mKar" placeholder="Nama Karyawan">
                <button class="main" style="background:var(--s)" onclick="addM('karyawan', 'mKar')">+</button>
            </div>
            <div id="listKaryawan" style="margin-bottom:10px"></div>
            <div class="form-row">
                <input type="date" id="offStart">
                <input type="date" id="offEnd">
                <button class="main" style="background:var(--d); grid-column: span 2" onclick="setLibur()">Set Hari Libur</button>
            </div>
        </div>

        <div class="card">
            <h3>INPUT ABSENSI (09:00 - 16:00)</h3>
            <div class="form-row">
                <select id="selK"></select>
                <input type="date" id="absTgl">
                <select id="absSt" onchange="toggleIjin()">
                    <option value="Hadir">Masuk</option>
                    <option value="Ijin">Ijin</option>
                    <option value="Pulang">Pulang</option>
                </select>
                <input type="text" id="absKet" class="hidden" placeholder="Alasan ijin...">
            </div>
            <button class="main" onclick="saveAbsen()">SIMPAN ABSEN</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <input type="month" id="fM" onchange="renderAll()">
                <div style="display:flex; gap:3px">
                    <button onclick="exportXLS('absTable')" style="font-size:8px">XLS</button>
                    <button onclick="exportPDF('absTable')" style="font-size:8px">PDF</button>
                </div>
            </div>
            <div class="table-wrap">
                <div id="calendar" class="cal-grid"></div>
            </div>
        </div>
    </div>

    <div id="tab-stk" class="tab-content hidden">
        <div class="card">
            <h3>INPUT STOK & QC</h3>
            <div class="form-row">
                <input type="text" id="sBrg" placeholder="Nama Barang">
                <input type="number" id="sQty" placeholder="Jumlah">
                <select id="sKondisi"><option value="Baru">Baru</option><option value="Bekas">Bekas</option></select>
                <select id="sQC"><option value="Accepted">Accepted</option><option value="Minor">Minor Damage</option><option value="Reject">Reject</option></select>
            </div>
            <button class="main" onclick="saveStok()">SIMPAN STOK</button>
        </div>

        <div class="card">
            <h3>REKAP STOK BULANAN</h3>
            <div class="table-wrap">
                <table id="stkTable">
                    <thead><tr><th>Barang</th><th>Aw Ktr</th><th>Aw Rdy</th><th>In Ktr</th><th>In Rdy</th><th>Reko</th><th>Jual</th><th>Ready</th></tr></thead>
                    <tbody id="tbStok"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-act" class="tab-content hidden">
        <div class="card">
            <h3>AKTIVITAS HARIAN</h3>
            <div class="form-row">
                <select id="actK"></select>
                <input type="date" id="actTgl">
                <select id="actT" class="full-row">
                    <option value="Rekondisi Kempu">Rekondisi Kempu</option>
                    <option value="Rekondisi Jerigen 18L">Rekondisi Jerigen 18L</option>
                    <option value="Bongkar Barang">Bongkar Barang (50 unit)</option>
                    <option value="Muat Barang">Muat Barang (50 unit)</option>
                    <option value="Pasang Pangkalan">Pasang Pangkalan</option>
                    <option value="Kirim Minyak">Kirim Minyak</option>
                </select>
                <input type="number" id="actQty" placeholder="Qty">
                <input type="text" id="actTim" placeholder="Tim (Andi, Budi)">
            </div>
            <button class="main" onclick="saveAct()">SIMPAN AKTIVITAS</button>
        </div>

        <div class="card">
            <h3>BELANJA & NOTA</h3>
            <div class="form-row">
                <input type="text" id="belItem" placeholder="Barang Belanja">
                <input type="number" id="belHrg" placeholder="Harga">
                <input type="file" id="belFile" accept="image/*" capture="camera" class="full-row">
            </div>
            <button class="main" style="background:var(--s)" onclick="saveBelanja()">UPLOAD NOTA</button>
        </div>
    </div>

    <div id="tab-pay" class="tab-content hidden">
        <div class="card">
            <h3>SLIP GAJI BULANAN</h3>
            <select id="payK" onchange="renderSlip()"></select>
            <div id="slipArea" style="background:#fff; color:#000; padding:15px; margin-top:10px; border-radius:8px; font-family:monospace">
                <h2 style="text-align:center; margin:0">KEMPU BALAP</h2>
                <hr>
                <div id="slipData">Pilih karyawan...</div>
            </div>
            <button class="main" style="margin-top:10px" onclick="printSlip()">CETAK PDF</button>
        </div>
    </div>

</div>

<script>
    const cfg = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(cfg); const db = firebase.database();

    let mk={}, ad={}, sl={}, la={}, bl={}, off={};
    const pr = { "Rekondisi Kempu": 100000, "Jerigen 18L": 2000, "Jerigen 5L": 2000, "Muat": 600000, "Bongkar": 600000, "Pasang": 500000, "Minyak": 250000 };

    window.onload = () => {
        const now = new Date().toISOString().split('T')[0];
        ['absTgl','actTgl'].forEach(id => document.getElementById(id).value = now);
        document.getElementById('fM').value = now.slice(0, 7);

        db.ref('karyawan').on('value', s => { mk=s.val()||{}; updateK(); renderAll(); });
        db.ref('absensi').on('value', s => { ad=s.val()||{}; renderAll(); });
        db.ref('stok_log').on('value', s => { sl=s.val()||{}; renderAll(); });
        db.ref('log_aktivitas').on('value', s => { la=s.val()||{}; renderAll(); });
        db.ref('libur').on('value', s => { off=s.val()||{}; renderAll(); });
        db.ref('belanja').on('value', s => { bl=s.val()||{}; });
    };

    function notify(m) { const x=document.getElementById("toast"); x.innerText=m; x.className="show"; setTimeout(()=>x.className="", 2500); }
    function tab(t, b) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('.nav button').forEach(n=>n.classList.remove('active')); b.classList.add('active'); }

    function addM(p, id) { const v=document.getElementById(id).value; if(v){ db.ref(p).push(v); document.getElementById(id).value=""; notify("Ditambah!"); }}
    function toggleIjin() { document.getElementById('absKet').classList.toggle('hidden', document.getElementById('absSt').value !== 'Ijin'); }

    function updateK() {
        const u = Object.entries(mk);
        const opt = u.map(v=>`<option value="${v[1]}">${v[1]}</option>`).join('');
        ['selK','actK','payK'].forEach(id => document.getElementById(id).innerHTML = opt);
        document.getElementById('listKaryawan').innerHTML = u.map(v=>`<div class="chip">${v[1]} <span onclick="db.ref('karyawan/${v[0]}').remove()">×</span></div>`).join('');
    }

    function saveAbsen() {
        const t=document.getElementById('absTgl').value, n=document.getElementById('selK').value, s=document.getElementById('absSt').value, k=document.getElementById('absKet').value;
        const jam = new Date().getHours();
        let st = s;
        if(s==='Hadir' && jam >= 9) st = 'T'; // Telat
        db.ref(`absensi/${t}/${n}`).set({ st:st, ket:k, jam:new Date().toLocaleTimeString() });
        notify("Absen Berhasil");
    }

    function renderCalendar() {
        const fM=document.getElementById('fM').value, [y,m]=fM.split('-'), last=new Date(y,m,0).getDate(), today=new Date().toISOString().split('T')[0];
        const cal = document.getElementById('calendar'); cal.innerHTML = "";
        ["Min","Sen","Sel","Rab","Kam","Jum","Sab"].forEach(d=>cal.innerHTML+=`<div class="cal-header">${d}</div>`);
        
        const first = new Date(y, m-1, 1).getDay();
        for(let i=0; i<first; i++) cal.innerHTML += `<div class="cal-day"></div>`;

        for(let i=1; i<=last; i++){
            const tg = `${y}-${m}-${String(i).padStart(2,'0')}`, isSun = new Date(tg).getDay()===0;
            let inds = "";
            if(isSun) inds += `<span class="ind ind-m">M</span>`;
            if(off[tg]) inds += `<span class="ind ind-off">Off</span>`;
            
            if(ad[tg]){
                Object.values(ad[tg]).forEach(d=>{
                    const c = d.st==='Hadir'?'ind-h':(d.st==='T'?'ind-t':(d.st==='Ijin'?'ind-i':'ind-a'));
                    inds += `<span class="ind ${c}">${d.st[0]}</span>`;
                });
            }
            // Alpa Otomatis Logic (Simulasi jam 4 sore)
            if(tg < today && !ad[tg] && !isSun && !off[tg]) inds += `<span class="ind ind-a">A</span>`;

            cal.innerHTML += `<div class="cal-day"><b>${i}</b><br>${inds}</div>`;
        }
    }

    function saveStok() {
        const b=document.getElementById('sBrg').value, q=parseInt(document.getElementById('sQty').value), k=document.getElementById('sKondisi').value, qc=document.getElementById('sQC').value;
        if(!b || !q) return alert("Isi Data!");
        db.ref('stok_log').push({ tgl:document.getElementById('absTgl').value, brg:b, qty:q, kondisi:k, qc:qc });
        notify("Stok Tersimpan");
        ['sBrg','sQty'].forEach(id => document.getElementById(id).value="");
    }

    function renderStok() {
        const fM=document.getElementById('fM').value, brgs=[...new Set(Object.values(sl).map(x=>x.brg))];
        let h=""; brgs.forEach(bn=>{
            let r={ak:0, ab:0, ik:0, ib:0, re:0, ju:0};
            Object.values(sl).forEach(d=>{
                if(d.brg!==bn) return;
                if(d.qc==='Reject') return;
                if(d.tgl.startsWith(fM)){
                    if(d.kondisi==='Bekas') r.ik+=d.qty; else r.ib+=d.qty;
                }
            });
            h+=`<tr><td>${bn}</td><td>${r.ak}</td><td>${r.ab}</td><td>${r.ik}</td><td>${r.ib}</td><td>0</td><td>0</td><td>${r.ik+r.ib}</td></tr>`;
        });
        document.getElementById('tbStok').innerHTML=h;
    }

    function saveAct() {
        const t=document.getElementById('actTgl').value, n=document.getElementById('actK').value, a=document.getElementById('actT').value, q=parseInt(document.getElementById('actQty').value), tim=document.getElementById('actTim').value;
        let upah=0;
        if(tim){
            const tL=tim.split(',').length;
            if(a.includes('Bongkar')) upah=600000/tL; else if(a.includes('Muat')) upah=600000/tL;
            tim.split(',').forEach(p=> db.ref('log_aktivitas').push({ tgl:t, nama:p.trim(), act:a, qty:q, gaji:upah }));
        } else {
            upah = a.includes('Kempu')?100000*q:(a.includes('Jerigen')?2000*q:500000);
            db.ref('log_aktivitas').push({ tgl:t, nama:n, act:a, qty:q, gaji:upah });
        }
        notify("Aktivitas Berhasil!");
    }

    function renderSlip() {
        const fM=document.getElementById('fM').value, n=document.getElementById('payK').value;
        let h=`<b>Nama: ${n}</b><br>Bulan: ${fM}<br><hr>`, tot=0;
        Object.values(la).forEach(l=>{
            if(l.nama===n && l.tgl.startsWith(fM)){
                h+=`[${l.tgl}] ${l.act} (${l.qty}): Rp ${l.gaji.toLocaleString()}<br>`;
                tot+=l.gaji;
            }
        });
        h+=`<hr><b>TOTAL GAJI: Rp ${tot.toLocaleString()}</b>`;
        document.getElementById('slipData').innerHTML=h;
    }

    function setLibur() {
        const s=new Date(document.getElementById('offStart').value), e=new Date(document.getElementById('offEnd').value);
        for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
            db.ref('libur/'+d.toISOString().split('T')[0]).set(true);
        }
        notify("Hari Libur Diset!");
    }

    function renderAll() { renderCalendar(); renderStok(); renderSlip(); }
    function exportXLS(id){ XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), "Laporan.xlsx"); }
</script>
</body>
</html>
