<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Pro</title>

<style>
body { font-family:Arial; background:#eef3ff; padding:15px; }

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
}

button { border:none; color:white; font-weight:bold; }

#masuk { background:#4CAF50; }
#pulang { background:#ff9800; }

.item {
  background:#f5f7ff;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
}

.telat { color:red; }
.tepat { color:green; }
.cepat { color:orange; }

h2 { margin-bottom:5px; }
</style>
</head>

<body>

<h2>📋 Absensi Karyawan</h2>

<div class="card">

<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hatta</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="masuk">Absen Masuk</button>
<button id="pulang">Absen Pulang</button>

</div>

<div class="card">
<h3>📅 Hari Ini</h3>
<div id="list">Memuat...</div>
</div>

<div class="card">
<h3>📊 Rekap Bulan Ini</h3>
<div id="rekap">Memuat...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// FORMAT
function today(){
  let d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function bulan(){
  let d = new Date();
  return d.getMonth()+1;
}

function jam(){
  return new Date().toLocaleTimeString("id-ID");
}


// HITUNG TELAT MENIT
function hitungTelat(){
  let now = new Date();
  let batas = new Date();
  batas.setHours(9,0,0);

  if(now <= batas) return 0;

  let diff = (now - batas) / 60000;
  return Math.floor(diff);
}


// STATUS MASUK
function statusMasuk(){
  return hitungTelat() > 0 ? "Telat" : "Tepat Waktu";
}


// STATUS PULANG
function statusPulang(){
  let now = new Date();
  let batas = new Date();
  batas.setHours(16,0,0);

  return now < batas ? "Pulang Cepat" : "Normal";
}


// MASUK
document.getElementById("masuk").onclick = async function(){

  let btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let id = nama + "_" + today();

  try{

    let ref = doc(db,"absensi",id);
    let snap = await getDoc(ref);

    if(snap.exists()){
      alert("Sudah absen masuk");
      btn.disabled=false;
      btn.innerText="Absen Masuk";
      return;
    }

    await setDoc(ref,{
      nama,
      tanggal:today(),
      bulan:bulan(),
      jamMasuk:jam(),
      statusMasuk:statusMasuk(),
      telatMenit:hitungTelat()
    });

    alert("Masuk berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Masuk";
};


// PULANG
document.getElementById("pulang").onclick = async function(){

  let btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let id = nama + "_" + today();

  try{

    let ref = doc(db,"absensi",id);
    let snap = await getDoc(ref);

    if(!snap.exists()){
      alert("Belum absen masuk");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    let data = snap.data();

    if(data.jamPulang){
      alert("Sudah absen pulang");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    await updateDoc(ref,{
      jamPulang: jam(),
      statusPulang: statusPulang()
    });

    alert("Pulang berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Pulang";
};


// LOAD DATA
async function loadData(){

  let list = document.getElementById("list");
  let rekap = document.getElementById("rekap");

  list.innerHTML = "Memuat...";
  rekap.innerHTML = "Memuat...";

  let snap = await getDocs(collection(db,"absensi"));

  list.innerHTML = "";
  let dataRekap = {};

  let tgl = today();
  let bln = bulan();

  snap.forEach(doc=>{

    let d = doc.data();

    // LIST HARI INI
    if(d.tanggal === tgl){
      list.innerHTML += `
        <div class="item">
          <b>${d.nama}</b><br>
          Masuk: ${d.jamMasuk}<br>
          Status: <span class="${d.statusMasuk=='Telat'?'telat':'tepat'}">${d.statusMasuk}</span><br>
          Telat: ${d.telatMenit} menit<br>
          Pulang: ${d.jamPulang || "-"}<br>
          Status Pulang: ${d.statusPulang || "-"}
        </div>
      `;
    }

    // REKAP BULAN
    if(d.bulan === bln){

      if(!dataRekap[d.nama]){
        dataRekap[d.nama] = {
          hadir:0,
          telat:0
        };
      }

      dataRekap[d.nama].hadir++;

      if(d.telatMenit > 0){
        dataRekap[d.nama].telat += d.telatMenit;
      }
    }

  });

  if(list.innerHTML === ""){
    list.innerHTML = "Belum ada data";
  }

  // TAMPILKAN REKAP
  rekap.innerHTML = "";

  for(let nama in dataRekap){
    let d = dataRekap[nama];

    rekap.innerHTML += `
      <div class="item">
        <b>${nama}</b><br>
        Hadir: ${d.hadir} hari<br>
        Total Telat: ${d.telat} menit
      </div>
    `;
  }

}

loadData();

</script>

</body>
</html>
