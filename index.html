<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0;padding:15px}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:12px;border:none;border-radius:10px;margin:5px 0;color:#fff;font-weight:bold}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}
input,select{width:100%;padding:10px;border-radius:8px;margin:5px 0}
.flex{display:flex;gap:10px}
.box{flex:1;padding:10px;border-radius:10px;color:#fff;text-align:center}
.b1{background:#3498db}.b2{background:#2ecc71}.b3{background:#f1c40f}

#toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#2c3e50;color:#fff;padding:14px 25px;border-radius:12px;
opacity:0;transition:.3s;box-shadow:0 5px 15px rgba(0,0,0,0.3);
font-weight:bold;
}
.show{opacity:1}
</style>
</head>

<body>

<div id="toast"></div>

<div class="card">
<h3>📋 Absensi PT-AGN</h3>

<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<h4>Filter</h4>
<select id="bulan"></select>
<input type="text" id="search" placeholder="Cari nama...">
</div>

<div class="card">
<h4>Dashboard</h4>
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div>

<div class="card">
<h4>Grafik Harian</h4>
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("absensi")) || [];
const namaSelect = document.getElementById("nama");

// 🔥 BULAN REAL TIME
const bulanSelect = document.getElementById("bulan");
const namaBulan = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

namaBulan.forEach((b,i)=>{
  bulanSelect.innerHTML += `<option value="${i+1}">${b}</option>`;
});

// auto pilih bulan sekarang
bulanSelect.value = new Date().getMonth()+1;

bulanSelect.onchange = render;
document.getElementById("search").oninput = render;

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function now(){
  let d=new Date();
  return {
    tanggal:d.toISOString().split('T')[0],
    jam:d.toTimeString().split(' ')[0],
    bulan:d.getMonth()+1
  }
}

function save(){
  localStorage.setItem("absensi", JSON.stringify(data));
  render();
}

function isTelat(jam){
  return jam > "08:00:00";
}

function absenMasuk(){
  let n = namaSelect.value;
  let t = now();

  let cek = data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(cek){toast("⚠️ Sudah absen masuk");return}

  let status = isTelat(t.jam) ? "Telat" : "Hadir";

  data.push({
    nama:n,
    tanggal:t.tanggal,
    masuk:t.jam,
    pulang:"-",
    status:status,
    bulan:t.bulan
  });

  toast(status=="Telat" ? "⏰ Kamu telat!" : "✅ Absen masuk berhasil");
  save();
}

function absenPulang(){
  let n = namaSelect.value;
  let t = now();

  let d = data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(!d){toast("❌ Belum absen masuk");return}
  if(d.pulang!="-"){toast("⚠️ Sudah absen pulang");return}

  d.pulang = t.jam;
  toast("🏁 Absen pulang berhasil");
  save();
}

function resetHari(){
  let today = now().tanggal;
  data = data.filter(x=>x.tanggal!=today);
  toast("🔄 Data hari ini direset");
  save();
}

function render(){
  let bulan = bulanSelect.value;
  let search = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(x=>x.bulan==bulan && x.nama.toLowerCase().includes(search));

  // tampil semua nama
  const semuaNama = ["Agung","Alda","Nur","Hasan","Hatta"];
  let tampil = [];

  semuaNama.forEach(nama=>{
    let found = filtered.find(x=>x.nama==nama);
    if(found){
      tampil.push(found);
    }else{
      tampil.push({
        nama:nama,
        tanggal:"-",
        masuk:"-",
        pulang:"-",
        status:"Belum"
      });
    }
  });

  document.getElementById("list").innerHTML = tampil.map(x=>`
  <div class="card">
  <b>${x.nama}</b><br>
  ${x.tanggal}<br>
  Masuk: ${x.masuk}<br>
  Pulang: ${x.pulang}<br>
  <span style="background:${
    x.status=='Telat'?'#e74c3c':
    x.status=='Hadir'?'#2ecc71':'#95a5a6'
  };color:#fff;padding:3px 8px;border-radius:5px">
  ${x.status}
  </span>
  </div>`).join("");

  let hadir = filtered.filter(x=>x.status=="Hadir").length;
  let telat = filtered.filter(x=>x.status=="Telat").length;

  document.getElementById("total").innerText = filtered.length;
  document.getElementById("hadir").innerText = hadir;
  document.getElementById("telat").innerText = telat;

  // grafik
  let group = {};
  filtered.forEach(x=>{
    if(!group[x.tanggal]){
      group[x.tanggal] = {hadir:0,telat:0};
    }
    if(x.status=="Hadir") group[x.tanggal].hadir++;
    if(x.status=="Telat") group[x.tanggal].telat++;
  });

  chart.data.labels = Object.keys(group);
  chart.data.datasets = [
    {
      label:'Hadir',
      data:Object.values(group).map(v=>v.hadir),
      backgroundColor:'#2ecc71'
    },
    {
      label:'Telat',
      data:Object.values(group).map(v=>v.telat),
      backgroundColor:'#e74c3c'
    }
  ];

  chart.update();
}

const ctx = document.getElementById('chart');
const chart = new Chart(ctx,{
  type:'bar',
  data:{labels:[],datasets:[]}
});

// export excel (filtered)
function exportExcel(){
  let bulan = bulanSelect.value;
  let filtered = data.filter(x=>x.bulan==bulan);

  let ws = XLSX.utils.json_to_sheet(filtered);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Absensi");

  XLSX.writeFile(wb, "absensi.xlsx");
  toast("📊 Export Excel berhasil");
}

// export pdf (rapi)
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("Laporan Absensi PT-AGN",10,10);

  let bulan = bulanSelect.value;
  let filtered = data.filter(x=>x.bulan==bulan);

  let y = 20;
  filtered.forEach((d,i)=>{
    doc.text(`${i+1}. ${d.nama}`,10,y);
    doc.text(`Tanggal: ${d.tanggal}`,10,y+5);
    doc.text(`Masuk: ${d.masuk} | Pulang: ${d.pulang}`,10,y+10);
    doc.text(`Status: ${d.status}`,10,y+15);
    y += 20;
  });

  doc.save("absensi.pdf");
  toast("📄 Export PDF berhasil");
}

render();
</script>

</body>
</html>
