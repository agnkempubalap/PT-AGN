<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v79.1 - FINAL INTEGRATED</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- CSS LOCKED PT-AGN --- */
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .tabs{display:flex; gap:10px; margin-bottom:15px}
        .tab-btn{flex:1; padding:15px; border-radius:12px; background:var(--c); color:var(--t); border:1px solid var(--b); cursor:pointer; font-weight:800; transition:0.3s}
        .tab-btn.active{background:var(--p); border-color:var(--p); color:#fff}
        .hidden {display:none}
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 1px;text-align:center;min-width:35px}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .has-data{background: rgba(0, 200, 83, 0.4) !important; border: 3px solid var(--s) !important;}
        @media print { .no-print { display: none !important; } .table-web { transform: scale(0.7); transform-origin: top left; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v79.1 FINAL</span></div>
            </div>
            <button class="btn no-print" style="width:auto; padding:0 15px; background:var(--b)" onclick="toggleT()">🌓 Tema</button>
        </header>

        <div class="tabs no-print">
            <button class="tab-btn active" onclick="openTab('absensi')">📅 ABSENSI</button>
            <button class="tab-btn" onclick="openTab('stok')">📦 STOK BARANG</button>
        </div>

        <!-- PAGE ABSENSI -->
        <div id="page-absensi" class="tab-content">
            <div class="card no-print">
                <h3>👥 DATA KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>
            <div class="card no-print">
                <h3>⚡ PRESENSI</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr 1fr; gap:12px">
                    <button class="btn" style="background:var(--s);height:60px;font-size:18px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px;font-size:18px" onclick="pAbsen('Pulang')">PULANG</button>
                    <button class="btn" style="background:var(--iz);height:60px;font-size:16px" onclick="pAbsen('Izin')">📝 IZIN</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px" class="no-print">
                    <input type="month" id="fB" onchange="rRekap()" style="width:180px">
                    <button class="btn" style="background:var(--p); width:120px" onclick="window.print()">📄 PDF</button>
                </div>
                <div class="table-wrap">
                    <table class="table-web"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table>
                </div>
            </div>
        </div>

        <!-- PAGE STOK BARANG -->
        <div id="page-stok" class="tab-content hidden">
            <div class="card no-print">
                <h3>📦 MANAJEMEN MASTER BARANG</h3>
                <div style="display:flex;gap:10px">
                    <input list="lb" id="iBarang" placeholder="Tambah/Cari Nama Barang...">
                    <datalist id="lb"></datalist>
                    <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tBarang()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hBarang()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>➕ INPUT STOK & QC</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="sBarangSelect"></select>
                    <input type="date" id="sTgl" onchange="checkDataIndikator()">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:10px">
                    <input type="number" id="sQty" placeholder="Jumlah Qty">
                    <select id="sJenis">
                        <option value="stok_awal_ready">Stok Awal (Ready)</option>
                        <option value="stok_awal_kotor">Stok Awal (Kotor)</option>
                        <option value="masuk_kotor">Masuk Kotor</option>
                        <option value="masuk_bersih">Masuk Bersih</option>
                        <option value="selesai_rekondisi">Rekondisi</option>
                        <option value="terjual_umum">Jual Umum</option>
                        <option value="terjual_agen">Jual Agen</option>
                    </select>
                    <select id="sQC"><option>Accepted</option><option>Minor</option><option>Reject</option></select>
                </div>
                <button class="btn" style="background:var(--s); height:50px" onclick="updateStok()">SIMPAN & UPDATE</button>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px" class="no-print">
                    <h3>📊 LAPORAN STOK TERPADU</h3>
                    <div style="display:flex; gap:10px">
                        <button class="btn" style="background:#1d6f42; width:100px; height:40px; font-size:12px" onclick="doExcelStok()">EXCEL</button>
                        <button class="btn" style="background:var(--d); width:100px; height:40px; font-size:12px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="stokTable">
                        <thead>
                            <tr style="background:var(--p)">
                                <th class="nama-fixed">Barang</th>
                                <th>Awal Ready</th><th>Awal Kotor</th><th>Masuk Kotor</th><th>Masuk Bersih</th><th>Rekondisi</th>
                                <th style="color:var(--w)">Sisa Kotor</th><th>Jual Umum</th><th>Jual Agen</th>
                                <th style="color:var(--s)">Sisa Ready</th><th style="background:var(--iz)">TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="tbStok"></tbody>
                    </table>
                </div>
            </div>

            <div class="card no-print">
                <h3>📜 RIWAYAT INPUT (HARI INI)</h3>
                <div class="table-wrap">
                    <table class="table-web"><thead><tr><th>Barang</th><th>Jenis</th><th>Qty</th><th>Aksi</th></tr></thead>
                    <tbody id="tbHistory"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, mb={}, ad={}, stData={}; 

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            document.getElementById('sTgl').value = new Date().toISOString().split('T')[0];
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; uDlB(); rStok();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('stok_barang').on('value',s=>{stData=s.val()||{}; rStok(); checkDataIndikator(); rHistory();});
        };

        function openTab(t){
            document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById('page-'+t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function toggleT(){
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark';
            b.setAttribute('data-theme',nt);
        }

        // --- MASTER DATA ---
        function uDl(){ document.getElementById('lk').innerHTML = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function tKaryawan(){ let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value); n.value="";}}
        function hKaryawan(){ let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove();}

        function uDlB(){ 
            let items = Object.values(mb).sort();
            document.getElementById('lb').innerHTML = items.map(n=>`<option value="${n}">`).join('');
            document.getElementById('sBarangSelect').innerHTML = items.map(n=>`<option value="${n}">${n}</option>`).join('');
        }
        function tBarang(){ let n=document.getElementById('iBarang'); if(n.value){db.ref('master_barang').push(n.value); n.value="";}}
        function hBarang(){ let n=document.getElementById('iBarang'); let id=Object.keys(mb).find(k=>mb[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_barang/${id}`).remove();}

        // --- ABSENSI (KEMBALI KE ASLI) ---
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, tgl=new Date().toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let note = ty === 'Izin' ? prompt("Keterangan Izin:") : "";
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:ty==='Masuk'?(new Date().getHours()>9?'Terlambat':'Hadir'):ty, note:note});
        }
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate();
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th>${i}</th>`;
            h+=`<th>H</th><th>I</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b="";
            Object.values(mk).sort().forEach(n=>{
                let cH=0, cI=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null;
                    let txt="-", cl="";
                    if(data){
                        if(data.Izin){txt="I"; cl="s-i"; cI++;}
                        else if(data.Masuk){txt="H"; cl=data.Masuk.status==='Terlambat'?'s-late':'s-v'; cH++;}
                    }
                    row+=`<td><div class="s-cell ${cl}">${txt}</div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cI}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        // --- STOK LOGIC (UPDATE v79.1) ---
        function updateStok(){
            const b=document.getElementById('sBarangSelect').value, t=document.getElementById('sTgl').value;
            const q=parseInt(document.getElementById('sQty').value), j=document.getElementById('sJenis').value;
            if(!q || !t) return alert("Isi Qty & Tanggal!");
            db.ref(`stok_barang/${b}/${t}`).push({jenis:j, qty:q, ts: new Date().getTime()});
            document.getElementById('sQty').value="";
            alert("Berhasil!");
        }

        function checkDataIndikator(){
            const tgl = document.getElementById('sTgl').value;
            const inputTgl = document.getElementById('sTgl');
            let found = false;
            Object.values(stData).forEach(brg => { if(brg[tgl]) found = true; });
            if(found) inputTgl.classList.add('has-data');
            else inputTgl.classList.remove('has-data');
            rHistory();
        }

        function rStok(){
            let b = "";
            Object.values(mb).sort().forEach(name => {
                let v={stok_awal_ready:0,stok_awal_kotor:0,masuk_kotor:0,masuk_bersih:0,selesai_rekondisi:0,terjual_umum:0,terjual_agen:0};
                if(stData[name]){
                    Object.values(stData[name]).forEach(days => {
                        Object.values(days).forEach(r => { if(v[r.jenis]!==undefined) v[r.jenis]+=r.qty; });
                    });
                }
                let sKotor = (v.stok_awal_kotor + v.masuk_kotor) - v.selesai_rekondisi;
                let sReady = (v.stok_awal_ready + v.masuk_bersih + v.selesai_rekondisi) - (v.terjual_umum + v.terjual_agen);
                b += `<tr><td class="nama-fixed" style="background:var(--c) !important">${name}</td><td>${v.stok_awal_ready}</td><td>${v.stok_awal_kotor}</td><td>${v.masuk_kotor}</td><td>${v.masuk_bersih}</td><td>${v.selesai_rekondisi}</td><td style="color:var(--w)">${sKotor}</td><td>${v.terjual_umum}</td><td>${v.terjual_agen}</td><td style="color:var(--s)">${sReady}</td><td style="font-weight:900; background:rgba(245,158,11,0.1)">${sKotor+sReady}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = b;
        }

        function rHistory(){
            let h = "", tgl = document.getElementById('sTgl').value;
            Object.keys(stData).forEach(brgName => {
                if(stData[brgName][tgl]){
                    Object.keys(stData[brgName][tgl]).forEach(key => {
                        let r = stData[brgName][tgl][key];
                        h += `<tr><td>${brgName}</td><td>${r.jenis}</td><td>${r.qty}</td><td><button onclick="hapusStok('${brgName}','${tgl}','${key}')" style="height:30px; background:var(--d); border:none; color:#fff; border-radius:5px; cursor:pointer">Hapus</button></td></tr>`;
                    });
                }
            });
            document.getElementById('tbHistory').innerHTML = h;
        }

        function hapusStok(b, t, k){ if(confirm('Hapus data ini?')) db.ref(`stok_barang/${b}/${t}/${k}`).remove(); }

        function doExcelStok(){
            let table = document.getElementById("stokTable").outerHTML;
            let blob = new Blob([table], {type: "application/vnd.ms-excel"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a"); a.href = url; a.download = `STOK_AGN.xls`; a.click();
        }
    </script>
</body>
</html>
