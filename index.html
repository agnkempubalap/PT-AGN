<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v77.8 - INTEGRATED SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#10b981;--d:#f43f5e;--w:#facc15;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#475569}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition:0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .logo-box{display:flex;align-items:center;gap:10px}
        .logo-box img{width:45px;height:45px;border-radius:10px;background:#000;border:2px solid var(--p);object-fit:cover}

        /* NAV TAB SYSTEM */
        .nav-tabs{display:flex;gap:5px;margin-bottom:15px;background:var(--c);padding:5px;border-radius:12px;border:1px solid var(--b)}
        .nav-btn{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;color:var(--t);font-weight:700;font-size:11px;cursor:pointer;transition:0.2s}
        .nav-btn.active{background:var(--p);color:#fff}

        .card{background:var(--c);padding:15px;border-radius:15px;margin-bottom:12px;border:1px solid var(--b);display:none}
        .card.active{display:block}
        h3{margin:0 0 12px;font-size:10px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}

        input,button,select{border-radius:10px;font-size:13px;height:38px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none;padding:0 10px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .btn-slim{height:32px; font-size:11px}

        .table-wrap{overflow-x:auto; border-radius:10px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 4px;text-align:center}
        th{background:var(--bg); color:var(--p)}
        
        .nama-fixed{position:sticky;left:0;background:var(--c);z-index:5;min-width:100px;text-align:left!important;font-weight:700;border-right:2px solid var(--p)!important}
        .stok-utama th{font-size:9px; white-space:nowrap}
        
        .badge{padding:2px 6px; border-radius:4px; font-size:9px; font-weight:800}
        .bg-s{background:rgba(16,185,129,0.2);color:#10b981}
        .bg-d{background:rgba(244,63,94,0.2);color:#f43f5e}

        @media print{.no-print{display:none!important}}
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff">
                <div><h2 style="margin:0;font-size:1rem">PT AGN</h2><span style="font-size:9px;color:var(--p);font-weight:800">V77.8 INTEGRATED</span></div>
            </div>
            <button onclick="toggleT()" style="width:auto; height:30px; font-size:10px; background:var(--c)">🌙 Mode</button>
        </header>

        <nav class="nav-tabs no-print">
            <button class="nav-btn active" onclick="openTab(event, 'tab-absen')">📋 ABSENSI</button>
            <button class="nav-btn" onclick="openTab(event, 'tab-stok')">📦 STOK BARANG</button>
        </nav>

        <!-- TAB ABSEN (SAMA PERSIS DENGAN v77.6) -->
        <div id="tab-absen" class="card active" style="padding:0; background:transparent; border:none">
            <div class="card active">
                <h3>👥 DATA KARYAWAN</h3>
                <div style="display:flex;gap:8px">
                    <input list="lk" id="iNama" placeholder="Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:50px" onclick="tKaryawan()">+</button>
                </div>
            </div>
            <div class="card active">
                <h3>⚡ PRESENSI</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
                    <button class="btn" style="background:var(--p);height:45px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:45px" onclick="pAbsen('Pulang')">PULANG</button>
                </div>
                <button class="btn" style="background:var(--iz)" onclick="pAbsen('Izin')">📝 IZIN</button>
            </div>
            <div class="card active">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                    <input type="month" id="fB" style="width:140px" onchange="rRekap()">
                    <button class="btn btn-slim" style="background:var(--s);width:80px" onclick="doExcelAbsen()">EXCEL</button>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="rekapTable">
                        <thead id="thWeb"></thead><tbody id="tbWeb"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- TAB STOK BARANG (NEW PAGE) -->
        <div id="tab-stok" class="card">
            <div class="card active" style="border:none; padding:0">
                <h3>📊 RINGKASAN STOK</h3>
                <div class="table-wrap">
                    <table class="table-web stok-utama">
                        <thead>
                            <tr>
                                <th class="nama-fixed">Barang</th>
                                <th>Awal Kotor</th><th>Awal Ready</th>
                                <th>Masuk</th><th>Rekon</th>
                                <th>Terjual</th><th>Sisa Kotor</th>
                                <th>Sisa Ready</th><th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="bodyStok">
                            <!-- Data otomatis dihitung -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px" class="no-print">
                <div class="card active">
                    <h3>📥 BARANG MASUK</h3>
                    <select id="sBarangMasuk" style="margin-bottom:8px"></select>
                    <input type="number" id="qMasuk" placeholder="Jumlah" style="margin-bottom:8px">
                    <button class="btn btn-slim" style="background:var(--p)" onclick="addLog('masuk')">SIMPAN</button>
                </div>
                <div class="card active">
                    <h3>🛠️ SELESAI REKON</h3>
                    <select id="sBarangRekon" style="margin-bottom:8px"></select>
                    <input type="number" id="qRekon" placeholder="Jumlah" style="margin-bottom:8px">
                    <button class="btn btn-slim" style="background:var(--s)" onclick="addLog('rekon')">SIMPAN</button>
                </div>
            </div>

            <div class="card active no-print">
                <h3>🛒 PENJUALAN</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px">
                    <select id="sBarangJual"></select>
                    <select id="sTipeJual"><option value="Umum">Umum</option><option value="Agen">Agen</option></select>
                    <input type="number" id="qJual" placeholder="Qty">
                </div>
                <button class="btn btn-slim" style="background:var(--iz); margin-top:8px" onclick="addLog('jual')">INPUT PENJUALAN</button>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        
        // Data Awal dari Excel Mas
        const masterBarang = {
            "Kempu": { kotor: 2, ready: 26 },
            "Derigen 18L": { kotor: 0, ready: 169 },
            "Derigen 5L": { kotor: 0, ready: 137 },
            "Botol 1L": { kotor: 0, ready: 0 },
            "Botol 500ML": { kotor: 0, ready: 0 },
            "Mesin Minyak": { kotor: 0, ready: 2 }
        };

        let mk={}, ad={}, logs={};

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            initSelect();
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('stok_logs').on('value',s=>{logs=s.val()||{}; updateStokView();});
        };

        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("card");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("nav-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function initSelect() {
            let h = Object.keys(masterBarang).map(b=>`<option value="${b}">${b}</option>`).join('');
            document.getElementById('sBarangMasuk').innerHTML=h;
            document.getElementById('sBarangRekon').innerHTML=h;
            document.getElementById('sBarangJual').innerHTML=h;
        }

        function addLog(type) {
            let b, q, t = new Date().toISOString().split('T')[0];
            if(type==='masuk') { b=document.getElementById('sBarangMasuk').value; q=document.getElementById('qMasuk').value; }
            if(type==='rekon') { b=document.getElementById('sBarangRekon').value; q=document.getElementById('qRekon').value; }
            if(type==='jual') { b=document.getElementById('sBarangJual').value; q=document.getElementById('qJual').value; }
            
            if(!q || q <= 0) return alert("Jumlah tidak valid!");
            db.ref(`stok_logs/${t}`).push({ tipe: type, barang: b, qty: parseInt(q), jualKe: document.getElementById('sTipeJual').value });
            alert("Data Stok Disimpan!");
        }

        function updateStokView() {
            let h = "";
            Object.keys(masterBarang).forEach(b => {
                let m = 0, r = 0, j = 0;
                Object.values(logs).forEach(day => {
                    Object.values(day).forEach(l => {
                        if(l.barang === b) {
                            if(l.tipe === 'masuk') m += l.qty;
                            if(l.tipe === 'rekon') r += l.qty;
                            if(l.tipe === 'jual') j += l.qty;
                        }
                    });
                });

                let init = masterBarang[b];
                let sKotor = init.kotor + m - r;
                let sReady = init.ready + r - j;
                let total = sKotor + sReady;

                h += `<tr>
                    <td class="nama-fixed">${b}</td>
                    <td>${init.kotor}</td><td>${init.ready}</td>
                    <td><span class="badge bg-s">${m}</span></td>
                    <td><span class="badge bg-s">${r}</span></td>
                    <td><span class="badge bg-d">${j}</span></td>
                    <td style="font-weight:800">${sKotor}</td>
                    <td style="font-weight:800">${sReady}</td>
                    <td style="background:var(--bg); font-weight:900; color:var(--w)">${total}</td>
                </tr>`;
            });
            document.getElementById('bodyStok').innerHTML = h;
        }

        // --- FUNGSI ABSEN TETAP SAMA (DIPERINGKAS) ---
        function toggleT(){let b=document.body; b.setAttribute('data-theme', b.getAttribute('data-theme')==='dark'?'light':'dark');}
        function uDl(){document.getElementById('lk').innerHTML=Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');}
        function tKaryawan(){let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>n.value="");}
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, tgl=new Date().toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:(ty==='Masuk'&&new Date().getHours()>=9?'Terlambat':'Hadir')});
            alert("Absen Berhasil!");
        }
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), kList=Object.values(mk).sort();
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th>${i}</th>`;
            h+=`</tr>`; document.getElementById('thWeb').innerHTML=h;
            let b=""; kList.forEach(n=>{
                let row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null;
                    row+=`<td>${data?(data.Masuk?'H':(data.Izin?'I':'-')):'-'}</td>`;
                }
                b+=`<tr>${row}</tr>`;
            }); document.getElementById('tbWeb').innerHTML=b;
        }
    </script>
</body>
</html>
