<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v77.6 - STOK INTEGRATED</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:12px; border:1px solid var(--b); padding:10px 15px; display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--t)}

        /* TAB SYSTEM STOK BARANG */
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; background: var(--c); color: var(--t); border: 1px solid var(--b); cursor: pointer; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .t-btn.active { background: var(--p); border-color: var(--p); color: #fff; }
        .hidden { display: none !important; }

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        .export-group { display: flex; justify-content: flex-end; align-items: flex-end; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-ex { width: 100px; height: 45px; font-size: 11px; border-radius: 10px; padding:0!important; }

        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 1px;text-align:center;min-width:35px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .today-col{background: rgba(37, 99, 235, 0.15) !important;}
        .rekap-akhir{background:var(--bg) !important; color:var(--t) !important; font-weight:800; min-width:30px !important}
        .th-rekap{background:var(--bg) !important; color:var(--iz) !important; font-weight:800}

        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto; -webkit-print-color-adjust: exact; print-color-adjust: exact;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-l{background:#AA00FF;color:#fff} .s-mng{background:#64748b;color:#fff}
        
        /* FIX JAM NGELEWATIN KOTAK DI SINI MAS */
        .jam-text{font-size:7px;font-weight:600;display:block;margin-top:2px;max-width:33px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}

        /* STOK LOG STYLES */
        .log-box { margin-top: 10px; max-height: 200px; overflow-y: auto; }
        .log-row { display: flex; justify-content: space-between; align-items:center; padding: 10px; border-bottom: 1px solid var(--b); font-size: 12px; }
        .del-btn { background: var(--d); color: #fff; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* PRINT CONFIG: ULTIMATE COLOR-FIT */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            html, body { background: #fff !important; color: #1e293b !important; }
            header, .no-print, .export-group, .dark-card, .tabs-nav { display: none !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .card { border: none !important; padding: 0 !important; background: transparent !important; }
            .table-wrap { overflow: visible !important; border: none !important; }
            
            .table-web { 
                width: 100% !important; 
                transform: scale(0.7); /* PAKSA MENGECIL AGAR MUAT */
                transform-origin: top left; 
                border-collapse: collapse !important;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
                border: 1px solid #000 !important;
            }
            .table-web th { background-color: #2563eb !important; color: #ffffff !important; padding: 8px 1px !important; border: 1px solid #000 !important; }
            .table-web td { border: 1px solid #94a3b8 !important; color: #334155 !important; padding: 4px 1px !important; }
            
            /* Warna Status tetap muncul di print */
            .s-v { background-color: #00C853 !important; color: white !important; }
            .s-late { background-color: #FFD600 !important; color: black !important; }
            .s-i { background-color: #f59e0b !important; color: white !important; }
            .s-off { background-color: #ef4444 !important; color: white !important; }
            .s-a { background-color: #37474F !important; color: white !important; }
            .s-mng { background-color: #64748b !important; color: white !important; }
            .s-l { background-color: #AA00FF !important; color: white !important; }
            
            .nama-fixed { position: static !important; background: #f8fafc !important; color: #1e293b !important; font-weight: bold !important; text-align: left !important; border-right: 1px solid #000 !important; }
            .th-rekap { background-color: #f1f5f9 !important; color: #2563eb !important; }
            .rekap-akhir { background-color: #f8fafc !important; color: #1e293b !important; }
            .jam-text { color: #1e293b !important; font-size: 6px !important; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v77.6 COLOR-FIT</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()">
                <span id="tIco">☀️</span> <span style="font-size:12px;font-weight:600" id="tTxt">Light Mode</span>
            </div>
        </header>

        <!-- MENU TABS -->
        <div class="tabs-nav no-print">
            <button id="btnAbsen" class="t-btn active" onclick="goTab('absen')">📅 ABSENSI KARYAWAN</button>
            <button id="btnStok" class="t-btn" onclick="goTab('stok')">📦 STOK BARANG GUDANG</button>
        </div>

        <!-- ==================== HALAMAN ABSEN (KODE ASLI MAS 100%) ==================== -->
        <div id="page-absen">
            <div class="card no-print">
                <h3>👥 DATA KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>🧹 KONTROL DATA</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; align-items:end">
                    <div><label>Tanggal Reset:</label><input type="date" id="resetTgl"></div>
                    <button class="btn" style="background:var(--d)" onclick="resetAbsen()">RESET ABSEN</button>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:12px">
                    <div><label>Dari:</label><input type="date" id="tglAwal"></div>
                    <div><label>Sampai:</label><input type="date" id="tglAkhir"></div>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px">
                    <button class="btn" style="background:var(--p)" onclick="sLib(true)">SET LIBUR</button>
                    <button class="btn" style="background:var(--d)" onclick="sLib(false)">HAPUS LIBUR</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PRESENSI</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                    <button class="btn" style="background:var(--s);height:60px;font-size:18px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px;font-size:18px" onclick="pAbsen('Pulang')">PULANG</button>
                </div>
                <button class="btn" style="background:var(--iz);height:50px;font-size:16px" onclick="pAbsen('Izin')">📝 IZIN / KETERANGAN</button>
            </div>

            <div class="card table-card">
                <div class="export-group no-print">
                    <div style="flex-grow:1">
                        <label>Pilih Bulan:</label>
                        <input type="month" id="fB" style="width:160px; height:45px" onchange="rRekap()">
                    </div>
                    <button class="btn btn-ex" style="background:#1d6f42" onclick="doExcel()">📥 EXCEL</button>
                    <button class="btn btn-ex" style="background:#b91c1c" onclick="window.print()">📄 PDF</button>
                </div>
                
                <div class="table-wrap" id="scrollArea">
                    <table class="table-web" id="rekapTable">
                        <thead id="thWeb"></thead>
                        <tbody id="tbWeb"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ==================== HALAMAN STOK (FITUR BARU) ==================== -->
        <div id="page-stok" class="hidden">
            <div class="card no-print">
                <h3>🛠️ TAMBAH BARANG BARU</h3>
                <div style="display:flex;gap:10px">
                    <input type="text" id="mBrg" placeholder="Ketik Nama Barang...">
                    <button class="btn" style="background:var(--s);width:80px" onclick="tBrg()">TAMBAH</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>📦 INPUT AKTIVITAS STOK</h3>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="sBrg"><option value="">Pilih Barang...</option></select>
                    <input type="date" id="sTgl" onchange="renderLog()">
                </div>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr auto; gap:10px">
                    <select id="sJns">
                        <option value="awal_ready">Awal Ready</option>
                        <option value="awal_kotor">Awal Kotor</option>
                        <option value="masuk_kotor">Masuk Kotor</option>
                        <option value="masuk_bersih">Masuk Bersih</option>
                        <option value="rekon">Rekon</option>
                        <option value="jual_u">Jual Umum</option>
                        <option value="jual_a">Jual Agen</option>
                    </select>
                    <input type="number" id="sQty" placeholder="Jumlah / Qty">
                    <button class="btn" style="background:var(--p); width:80px" onclick="vStok()">SAVE</button>
                </div>
            </div>

            <div class="card">
                <div class="export-group no-print">
                    <h3 style="flex-grow:1; margin:0">📊 REKAP GUDANG KESELURUHAN</h3>
                    <button class="btn btn-ex" style="background:#1d6f42" onclick="doExcelStok()">📥 EXCEL STOK</button>
                    <button class="btn btn-ex" style="background:#b91c1c" onclick="window.print()">📄 PDF STOK</button>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="stTable">
                        <thead id="thSt"></thead>
                        <tbody id="tbSt"></tbody>
                    </table>
                </div>
            </div>

            <div class="card no-print">
                <h3>🗑️ LOG INPUT STOK (BERDASARKAN TANGGAL DI ATAS)</h3>
                <div id="stokLog" class="log-box"></div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";
        
        // Variabel Tambahan Untuk Stok
        let mb={}, sd={};

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            const today = new Date().toISOString().split('T')[0];
            
            document.getElementById('fB').value=m;
            document.getElementById('sTgl').value = today; // Set Default Tanggal Stok

            // Tab Memory
            const lastTab = localStorage.getItem('agnTab') || 'absen';
            goTab(lastTab);

            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            const savedTheme = localStorage.getItem('agnTheme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
            
            // Database Karyawan & Absen
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});

            // Database Stok
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; uBrg(); rStok();});
            db.ref('stok_barang').on('value',s=>{sd=s.val()||{}; rStok(); renderLog();});
        };

        // --- SISTEM TABS ---
        function goTab(t){
            localStorage.setItem('agnTab', t);
            document.getElementById('page-absen').classList.toggle('hidden', t!=='absen');
            document.getElementById('page-stok').classList.toggle('hidden', t!=='stok');
            document.getElementById('btnAbsen').classList.toggle('active', t==='absen');
            document.getElementById('btnStok').classList.toggle('active', t==='stok');
        }

        // --- FUNGSI ASLI ABSENSI (TIDAK ADA YANG DIRUBAH) ---
        function toggleT(){ 
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt); localStorage.setItem('agnTheme', nt); updateThemeUI(nt);
        }

        function updateThemeUI(t){
            document.getElementById('tIco').innerText=t==='dark'?'☀️':'🌙';
            document.getElementById('tTxt').innerText=t==='dark'?'Light Mode':'Dark Mode';
        }

        function cLogo(e){
            const r=new FileReader(); r.onload=()=>{
                document.getElementById('mainLogo').src=r.result;
                localStorage.setItem('agnLogo',r.result);
            }; r.readAsDataURL(e.target.files[0]);
        }

        function uDl(){
            let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');
            document.getElementById('lk').innerHTML=opt;
        }

        function tKaryawan(){
            let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value=""; alert("Ditambah!");});}
        }

        function hKaryawan(){
            let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); 
            if(id && confirm('Hapus Karyawan?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");
        }

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan Izin:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{alert(`${ty} Sukses!`); inp.value="";});
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tgl=document.getElementById('resetTgl');
            if(!n.value || !tgl.value) return alert("Pilih Nama & Tanggal!");
            if(confirm(`Reset data ${n.value}?`)){db.ref(`absensi/${tgl.value}/${n.value}`).remove().then(()=>{alert("Direset!"); tgl.value=""; n.value="";});}
        }

        function sLib(st){
            let d1=document.getElementById('tglAwal'), d2=document.getElementById('tglAkhir');
            if(!d1.value) return alert("Isi tanggal!");
            let start = new Date(d1.value); let end = d2.value ? new Date(d2.value) : new Date(d1.value);
            while(start <= end){
                db.ref(`hari_libur/${start.toISOString().split('T')[0]}`).set(st?true:null);
                start.setDate(start.getDate() + 1);
            }
            alert(st?"Set Libur!":"Hapus Libur!"); d1.value=""; d2.value="";
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}" class="${i===tglSkrg?'today-col':''}">${i}</th>`;
            h+=`<th class="th-rekap">H</th><th class="th-rekap">I</th><th class="th-rekap">A</th><th class="th-rekap">L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t);
                    let isMinggu = (d.getDay()===0), isSetLibur = hl[t];
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; infoW = data.Izin.note || "Izin"; }
                        else if(data.Masuk){ 
                            if(isMinggu || isSetLibur) { sW="L"; clW="s-l"; cL++; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu + (data.Pulang ? ` | ${data.Pulang.waktu}` : "");
                        }
                    } 
                    else if(isMinggu){ sW="MNG"; clW="s-mng"; }
                    else if(isSetLibur){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td class="rekap-akhir">${cH}</td><td class="rekap-akhir">${cI}</td><td class="rekap-akhir">${cA}</td><td class="rekap-akhir">${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
            setTimeout(() => {
                const scrollArea = document.getElementById('scrollArea');
                const target = document.getElementById(`tgl-${tglSkrg}`);
                if(target && scrollArea) {
                    const offset = target.offsetLeft - (scrollArea.offsetWidth / 2) + (target.offsetWidth / 2);
                    scrollArea.scrollTo({ left: offset, behavior: 'smooth' });
                }
            }, 600);
        }

        function doExcel(){
            const f=document.getElementById('fB').value;
            const table = document.getElementById("rekapTable").outerHTML;
            const template = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                <head><style>table { border-collapse:collapse; } th { background-color: #2563eb; color: #ffffff; border:1px solid black; } td { border:1px solid black; text-align:center; font-family: Arial; font-size: 10pt; }</style></head>
                <body>${table}</body></html>`;
            const blob = new Blob([template], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN_${f}.xls`; a.click();
        }

        // ==================== FUNGSI STOK BARANG ====================
        
        function uBrg(){
            let opt = '<option value="">Pilih Barang...</option>';
            opt += Object.values(mb).sort().map(b=>`<option value="${b}">${b}</option>`).join('');
            document.getElementById('sBrg').innerHTML = opt;
        }

        function tBrg(){
            let n=document.getElementById('mBrg'); 
            if(n.value) db.ref('master_barang').push(n.value).then(()=>{ n.value=""; alert("Barang ditambahkan!"); });
        }

        function vStok(){
            const b = document.getElementById('sBrg').value;
            const t = document.getElementById('sTgl').value;
            const j = document.getElementById('sJns').value;
            const jName = document.getElementById('sJns').options[document.getElementById('sJns').selectedIndex].text;
            const q = parseInt(document.getElementById('sQty').value);

            if(!b || isNaN(q)) return alert("Lengkapi pilihan barang dan jumlah/qty!");
            
            db.ref(`stok_barang/${t}`).push({
                barang: b, 
                jenis: j,
                jenis_nama: jName, 
                qty: q
            }).then(() => {
                document.getElementById('sQty').value="";
                alert("Stok berhasil diinput!");
            });
        }

        function rStok(){
            let items = Object.values(mb).sort();
            let res = {};
            
            // Siapkan wadah 0
            items.forEach(i => {
                res[i] = { awal_ready:0, awal_kotor:0, masuk_kotor:0, masuk_bersih:0, rekon:0, jual_u:0, jual_a:0 };
            });

            // Kalkulasi
            Object.keys(sd).forEach(tgl => {
                Object.values(sd[tgl]).forEach(entry => {
                    if(res[entry.barang] && res[entry.barang][entry.jenis] !== undefined) {
                        res[entry.barang][entry.jenis] += entry.qty;
                    }
                });
            });

            // Bikin Header Tabel
            let h = `<tr>
                <th class="nama-fixed" style="background:var(--p)">Nama Barang</th>
                <th>Awal Rdy</th>
                <th>Awal Ktr</th>
                <th>+Kotor</th>
                <th>+Bersih</th>
                <th>Rekon</th>
                <th>Jual Um</th>
                <th>Jual Ag</th>
                <th style="background:var(--s)">TOT READY</th>
                <th style="background:var(--iz)">TOT KOTOR</th>
            </tr>`;
            
            // Bikin Isi Tabel
            let b = "";
            items.forEach(i => {
                const s = res[i];
                // Rumus sesuai request:
                // Ready = Awal Ready + Masuk Bersih + Rekon - Jual Umum - Jual Agen
                const totReady = (s.awal_ready + s.masuk_bersih + s.rekon) - (s.jual_u + s.jual_a);
                // Kotor = Awal Kotor + Masuk Kotor - Rekon
                const totKotor = (s.awal_kotor + s.masuk_kotor) - s.rekon;

                b += `<tr>
                    <td class="nama-fixed">${i}</td>
                    <td>${s.awal_ready}</td>
                    <td>${s.awal_kotor}</td>
                    <td>${s.masuk_kotor}</td>
                    <td>${s.masuk_bersih}</td>
                    <td>${s.rekon}</td>
                    <td>${s.jual_u}</td>
                    <td>${s.jual_a}</td>
                    <td style="font-weight:bold; color:var(--s)">${totReady}</td>
                    <td style="font-weight:bold; color:var(--iz)">${totKotor}</td>
                </tr>`;
            });

            document.getElementById('thSt').innerHTML = h;
            document.getElementById('tbSt').innerHTML = b;
        }

        function renderLog(){
            const t = document.getElementById('sTgl').value;
            const logArea = document.getElementById('stokLog');
            const data = sd[t] || {};
            
            if(Object.keys(data).length === 0){
                logArea.innerHTML = `<div style="padding:10px; color:var(--b)">Belum ada inputan di tanggal ini...</div>`;
                return;
            }

            let html = "";
            // Reverse biar yg terbaru di atas
            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                html += `
                <div class="log-row">
                    <span><b>${item.barang}</b> - ${item.jenis_nama} : ${item.qty} pcs</span>
                    <button class="del-btn" onclick="hapusStok('${t}', '${id}')">HAPUS</button>
                </div>`;
            });
            logArea.innerHTML = html;
        }

        function hapusStok(tgl, id){
            if(confirm('Yakin mau hapus inputan ini?')) {
                db.ref(`stok_barang/${tgl}/${id}`).remove();
            }
        }

        function doExcelStok(){
            const table = document.getElementById("stTable").outerHTML;
            const template = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                <head><style>table { border-collapse:collapse; } th { background-color: #2563eb; color: #ffffff; border:1px solid black; } td { border:1px solid black; text-align:center; font-family: Arial; font-size: 10pt; }</style></head>
                <body>${table}</body></html>`;
            const blob = new Blob([template], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `REKAP_STOK_AGN.xls`; a.click();
        }
    </script>
</body>
</html>
