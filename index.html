<!DOCTYPE html>
<html>
<head>
  <title>Absensi PT-AGN</title>

  <!-- Firebase VERSI STABIL -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(to bottom, #dbeafe, #93c5fd);
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }

    .green { background: #16a34a; }
    .orange { background: #f59e0b; }
    .red { background: #ef4444; }
    .blue { background: #3b82f6; }

    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 10px;
      color: white;
      background: green;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>📋 Absensi PT-AGN</h3>

  <select id="nama">
    <option>Agung</option>
    <option>Alda</option>
    <option>Nur</option>
  </select>

  <button class="green" onclick="absenMasuk()">Absen Masuk</button>
  <button class="orange" onclick="absenPulang()">Absen Pulang</button>
  <button class="red" onclick="resetHari()">Reset Hari Ini</button>
  <button class="blue" onclick="exportExcel()">Export Excel</button>
  <button class="blue" onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
  <h3>Filter</h3>
  <input type="text" id="search" placeholder="Cari nama..." oninput="render()">
</div>

<div class="card">
  <h3>Dashboard</h3>
  Total: <span id="total">0</span> |
  Hadir: <span id="hadir">0</span>
</div>

<div class="card">
  <h3>Grafik</h3>
  <canvas id="chart"></canvas>
</div>

<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDummyKEY",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];

function getTanggal() {
  return new Date().toISOString().split('T')[0];
}

function getJam() {
  return new Date().toLocaleTimeString();
}

function absenMasuk() {
  let nama = document.getElementById("nama").value;
  let tanggal = getTanggal();

  db.collection("absensi")
    .where("nama","==",nama)
    .where("tanggal","==",tanggal)
    .get()
    .then(res=>{
      if(!res.empty){
        alert("Sudah absen masuk!");
        return;
      }

      db.collection("absensi").add({
        nama,
        tanggal,
        masuk: getJam(),
        pulang: "",
        status: "Hadir"
      });
    });
}

function absenPulang(){
  let nama = document.getElementById("nama").value;
  let tanggal = getTanggal();

  db.collection("absensi")
    .where("nama","==",nama)
    .where("tanggal","==",tanggal)
    .get()
    .then(res=>{
      res.forEach(doc=>{
        db.collection("absensi").doc(doc.id).update({
          pulang: getJam()
        });
      });
    });
}

function resetHari(){
  let tgl = getTanggal();

  db.collection("absensi")
    .where("tanggal","==",tgl)
    .get()
    .then(res=>{
      res.forEach(doc=>{
        db.collection("absensi").doc(doc.id).delete();
      });
    });
}

function render(){
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  let total=0, hadir=0;

  data.forEach(d=>{
    if(!d.nama.toLowerCase().includes(search)) return;

    total++;
    if(d.status==="Hadir") hadir++;

    list.innerHTML += `
      <div class="card">
        <b>${d.nama}</b><br>
        ${d.tanggal}<br>
        Masuk: ${d.masuk}<br>
        Pulang: ${d.pulang || "-"}<br>
        <span class="status">${d.status}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("hadir").innerText = hadir;

  renderChart();
}

function renderChart(){
  let ctx = document.getElementById("chart");

  let hadir = data.length;

  new Chart(ctx,{
    type:'bar',
    data:{
      labels:["Hadir"],
      datasets:[{
        label:"Absensi",
        data:[hadir]
      }]
    }
  });
}

function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Absensi");
  XLSX.writeFile(wb, "absensi.xlsx");
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("Laporan Absensi PT-AGN", 10, 10);

  let y=20;

  data.forEach((d,i)=>{
    doc.text(`${i+1}. ${d.nama} - ${d.tanggal}`,10,y);
    y+=7;
  });

  doc.save("absensi.pdf");
}

db.collection("absensi").onSnapshot(snapshot=>{
  data=[];
  snapshot.forEach(doc=>{
    data.push(doc.data());
  });
  render();
});
</script>

</body>
</html>
