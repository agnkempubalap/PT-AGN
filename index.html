<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:linear-gradient(135deg,#dbeafe,#bfdbfe);
}

/* NAV */
.nav{
  display:flex;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:10;
}
.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  font-weight:600;
}
.nav .active{
  color:#2563eb;
  border-bottom:3px solid #2563eb;
}

/* PAGE */
.page{display:none;padding:10px;}
.page.active{display:block;}

/* CARD */
.card{
  background:#fff;
  margin:10px 0;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}

.green{background:#22c55e}
.orange{background:#f59e0b}
.red{background:#ef4444}
.blue{background:#3b82f6}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* DASHBOARD */
.flex{display:flex;gap:10px}
.box{
  flex:1;
  padding:12px;
  border-radius:12px;
  color:#fff;
  text-align:center;
  font-weight:bold;
}
.b1{background:#3b82f6}
.b2{background:#22c55e}
.b3{background:#f59e0b}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('home',this)" class="active">Home</button>
<button onclick="showPage('absen',this)">Absensi</button>
<button onclick="showPage('stok',this)">Stok</button>
<button onclick="showPage('aktivitas',this)">Aktivitas</button>
<button onclick="showPage('gaji',this)">Gaji</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h3>🏠 Halaman Utama</h3>
Sistem siap digunakan
</div>
</div>

<!-- ABSENSI -->
<div id="absen" class="page">

<div class="card">
<h3>📋 Absensi</h3>

<select id="nama"></select>

<button class="green" onclick="masuk()">Masuk</button>
<button class="orange" onclick="pulang()">Pulang</button>
<button class="red" onclick="resetHari()">Reset Hari</button>

</div>

<div class="card">
<h4>Filter</h4>
<select id="bulan"></select>
<input id="search" placeholder="Cari nama">
</div>

<div class="card">
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

</div>

<!-- STOK -->
<div id="stok" class="page">
<div class="card">📦 Stok Gudang (siap dikembangkan)</div>
</div>

<!-- AKTIVITAS -->
<div id="aktivitas" class="page">
<div class="card">🧑‍💼 Aktivitas Harian (siap dikembangkan)</div>
</div>

<!-- GAJI -->
<div id="gaji" class="page">
<div class="card">💰 Gaji (siap dikembangkan)</div>
</div>

<script>

// NAV
function showPage(id,btn){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');

 document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
 if(btn) btn.classList.add('active');
}

// DATA
let data = JSON.parse(localStorage.getItem("absensi")) || [];
let karyawan = JSON.parse(localStorage.getItem("karyawan")) || ["Agung","Alda","Nur","Budi","Siti"];

const nama = document.getElementById("nama");
nama.innerHTML = karyawan.map(n=>`<option>${n}</option>`);

// FILTER
const bulan = document.getElementById("bulan");
for(let i=1;i<=12;i++){
 bulan.innerHTML += `<option value="${i}">Bulan ${i}</option>`;
}
bulan.value = new Date().getMonth()+1;

document.getElementById("search").oninput = render;
bulan.onchange = render;

// TIME
function now(){
 let d=new Date();
 return {
  tanggal:d.toISOString().split('T')[0],
  jam:d.toTimeString().split(' ')[0]
 };
}

// SAVE
function save(){
 localStorage.setItem("absensi", JSON.stringify(data));
 render();
}

// ABSEN
function masuk(){
 let t=now();
 let n=nama.value;

 if(data.find(x=>x.nama==n && x.tanggal==t.tanggal)) return;

 let status = t.jam>"09:00:00" ? "Telat" : "Hadir";

 data.push({
  nama:n,
  tanggal:t.tanggal,
  masuk:t.jam,
  pulang:"-",
  status:status
 });

 save();
}

function pulang(){
 let t=now();
 let d=data.find(x=>x.nama==nama.value && x.tanggal==t.tanggal);
 if(d) d.pulang = t.jam;
 save();
}

function resetHari(){
 let today = now().tanggal;
 data = data.filter(x=>x.tanggal!=today);
 save();
}

// CHART
let chart = new Chart(document.getElementById("chart"),{
 type:'bar',
 data:{labels:[],datasets:[{label:'Absensi',data:[]}]}
});

// RENDER
function render(){

 let m = bulan.value;
 let s = document.getElementById("search").value.toLowerCase();

 let filtered = data.filter(x=>{
  let cocokBulan = new Date(x.tanggal).getMonth()+1 == m;
  let cocokNama = x.nama.toLowerCase().includes(s);
  return cocokBulan && cocokNama;
 });

 document.getElementById("list").innerHTML = filtered.map(x=>`
 <div class="card">
 <b>${x.nama}</b><br>
 ${x.tanggal}<br>
 Masuk: ${x.masuk}<br>
 Pulang: ${x.pulang}<br>
 <span style="color:${x.status=='Telat'?'red':'green'}">${x.status}</span>
 </div>
 `).join("");

 total.innerText = filtered.length;
 hadir.innerText = filtered.filter(x=>x.status=="Hadir").length;
 telat.innerText = filtered.filter(x=>x.status=="Telat").length;

 let group={};
 filtered.forEach(x=>{
  if(!group[x.tanggal]) group[x.tanggal]=0;
  group[x.tanggal]++;
 });

 chart.data.labels = Object.keys(group);
 chart.data.datasets[0].data = Object.values(group);
 chart.update();
}

// INIT
render();

</script>

</body>
</html>
