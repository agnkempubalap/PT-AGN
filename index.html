<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0;padding:15px}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;color:#fff}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#333;color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s}
.show{opacity:1}

.success{animation:pop .4s}
@keyframes pop{0%{transform:scale(.8)}100%{transform:scale(1)}}
</style>
</head>

<body>

<div id="toast"></div>

<div id="loginBox" class="card">
<h3>Login Admin</h3>
<input type="password" id="pinInput" placeholder="PIN">
<button class="blue" onclick="loginPIN()">Login</button>
<button class="orange" onclick="gantiPIN()">Ganti PIN</button>
</div>

<div id="app" style="display:none">

<div class="card">
<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Masuk</button>
<button class="orange" onclick="absenPulang()">Pulang</button>
<button class="blue" onclick="izin()">Izin</button>
<button class="red" onclick="resetHari()">Reset</button>
<button class="red" onclick="logout()">Logout</button>

<input id="waGlobal" placeholder="WA Global">
<button onclick="kirimWA()">WA Global</button>

<textarea id="waMap" placeholder="Agung=628xxx"></textarea>
<button onclick="kirimWAper()">WA Per Orang</button>

</div>

<div id="list"></div>

<div class="card">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>

<div class="card">
<select id="pilihKaryawan"></select>
<canvas id="chart"></canvas>
</div>

</div>

<script>

// ===== PIN =====
let PIN = localStorage.getItem("PIN") || "1234";

// ===== SESSION =====
let SESSION_TIMEOUT = 10 * 60 * 1000;
let sessionTimer;

// ===== TOAST =====
function showToast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.classList.add("show");
 setTimeout(()=>t.classList.remove("show"),2000);
}

// ===== SOUND =====
function playSound(type){
 let ctx=new (window.AudioContext||window.webkitAudioContext)();
 let osc=ctx.createOscillator();
 osc.type="sine";
 osc.frequency.value=(type=="success")?800:200;
 osc.connect(ctx.destination);
 osc.start();
 setTimeout(()=>osc.stop(),150);
}

// ===== VIBRATE =====
function vibrate(type){
 if(navigator.vibrate){
  navigator.vibrate(type=="success"?[100,50,100]:[300]);
 }
}

// ===== SESSION =====
function resetSession(){
 clearTimeout(sessionTimer);
 sessionTimer=setTimeout(logoutAuto,SESSION_TIMEOUT);
}

function logoutAuto(){
 localStorage.removeItem("login");
 showToast("⏳ Session habis");
 playSound("error");
 vibrate("error");
 setTimeout(()=>location.reload(),1500);
}

// ===== LOGIN =====
function loginPIN(){
 if(pinInput.value===PIN){
  localStorage.setItem("login","true");
  loginBox.style.display="none";
  app.style.display="block";
  app.classList.add("success");

  showToast("✅ Login berhasil");
  playSound("success");
  vibrate("success");

  resetSession();
 }else{
  showToast("❌ PIN salah");
  playSound("error");
  vibrate("error");
 }
}

// AUTO LOGIN
if(localStorage.getItem("login")==="true"){
 loginBox.style.display="none";
 app.style.display="block";
 resetSession();
}

// DETEKSI AKTIVITAS
["click","touchstart","keypress"].forEach(evt=>{
 document.addEventListener(evt, resetSession);
});

// ===== LOGOUT =====
function logout(){
 localStorage.removeItem("login");
 location.reload();
}

// ===== GANTI PIN =====
function gantiPIN(){
 let lama=prompt("PIN lama:");
 if(lama!==PIN){
  showToast("❌ PIN salah");
  return;
 }
 let baru=prompt("PIN baru:");
 if(!baru || baru.length<4){
  showToast("⚠️ Min 4 digit");
  return;
 }
 PIN=baru;
 localStorage.setItem("PIN",baru);
 showToast("✅ PIN diganti");
}

// ===== FIREBASE =====
const firebaseConfig={
 apiKey:"AIzaSyAu67MAhW8xdmciPi3xOKwdy-uP4u9tXI",
 authDomain:"pt-agn.firebaseapp.com",
 databaseURL:"https://pt-agn-default-rtdb.firebaseio.com",
 projectId:"pt-agn"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let data=[];

db.ref("absensi").on("value",snap=>{
 data=snap.val()||[];
 render();
});

function save(){ db.ref("absensi").set(data); }

function now(){
 let d=new Date();
 return {tgl:d.toISOString().split('T')[0],jam:d.toTimeString().split(' ')[0],bulan:d.getMonth()+1}
}

// ===== ABSEN =====
function absenMasuk(){
 let t=now(),n=nama.value;
 if(data.find(x=>x.nama==n&&x.tgl==t.tgl)){
  showToast("Sudah absen");
  return;
 }
 data.push({nama:n,tgl:t.tgl,status:t.jam>"09:00:00"?"Telat":"Hadir",bulan:t.bulan});
 save();
 showToast("Masuk ✔");
}

function absenPulang(){
 let t=now();
 let d=data.find(x=>x.nama==nama.value&&x.tgl==t.tgl);
 if(d)d.pulang=t.jam;
 save();
 showToast("Pulang ✔");
}

function izin(){
 let t=now();
 data.push({nama:nama.value,tgl:t.tgl,status:"Izin",bulan:t.bulan});
 save();
 showToast("Izin ✔");
}

function resetHari(){
 let t=now().tgl;
 data=data.filter(x=>x.tgl!=t);
 save();
 showToast("Reset ✔");
}

// ===== AUTO ALPA =====
setInterval(()=>{
 let t=now();
 if(t.jam>="16:00:00"){
  let names=[...new Set(data.map(x=>x.nama))];
  names.forEach(n=>{
    if(!data.find(x=>x.nama==n&&x.tgl==t.tgl)){
      data.push({nama:n,tgl:t.tgl,status:"Alpa",bulan:t.bulan});
    }
  });
  save();
 }
},60000);

// ===== RANKING =====
function rank(){
 let r={};
 data.forEach(x=>{
  if(!r[x.nama])r[x.nama]={score:0};
  if(x.status=="Hadir")r[x.nama].score+=3;
  if(x.status=="Telat")r[x.nama].score+=1;
  if(x.status=="Alpa")r[x.nama].score-=3;
 });
 return Object.entries(r).map(([n,v])=>({n,...v})).sort((a,b)=>b.score-a.score);
}

// ===== CHART =====
let chart;
function renderChart(n){
 let d=data.filter(x=>x.nama==n);
 let h=d.filter(x=>x.status=="Hadir").length;
 let t=d.filter(x=>x.status=="Telat").length;
 let a=d.filter(x=>x.status=="Alpa").length;

 if(chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'bar',
  data:{labels:["Hadir","Telat","Alpa"],datasets:[{data:[h,t,a]}]}
 });
}

// ===== RENDER =====
function render(){
 list.innerHTML=data.map(x=>`<div>${x.nama} ${x.status}</div>`).join("");

 let r=rank();
 ranking.innerHTML=r.map((x,i)=>`#${i+1} ${x.n} (${x.score})`).join("<br>");

 let unik=[...new Set(data.map(x=>x.nama))];
 pilihKaryawan.innerHTML=unik.map(n=>`<option>${n}</option>`);

 renderChart(pilihKaryawan.value);
 pilihKaryawan.onchange=()=>renderChart(pilihKaryawan.value);
}

// ===== WA =====
function kirimWA(){
 let txt="Absensi\n";
 data.forEach(d=>txt+=`${d.nama} ${d.status}\n`);
 window.open(`https://wa.me/${waGlobal.value}?text=${encodeURIComponent(txt)}`);
}

function kirimWAper(){
 let map=waMap.value.split("\n");
 map.forEach(m=>{
   let [nama,no]=m.split("=");
   let d=data.filter(x=>x.nama==nama);
   let txt=`${nama}\n`;
   d.forEach(x=>txt+=`${x.tgl} ${x.status}\n`);
   window.open(`https://wa.me/${no}?text=${encodeURIComponent(txt)}`);
 });
}

// ===== EXPORT =====
function exportExcel(){
 let ws=XLSX.utils.json_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Absensi");
 XLSX.writeFile(wb,"absensi.xlsx");
}

async function exportPDF(){
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();
 doc.text("Absensi",10,10);
 data.forEach((d,i)=>doc.text(`${d.nama} ${d.status}`,10,20+i*10));
 doc.save("absensi.pdf");
}

</script>
</body>
</html>
