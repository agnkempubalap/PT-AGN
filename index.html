<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Management v38.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #1e40af; --primary-dark: #1e3a8a; 
            --success: #10b981; --danger: #ef4444; 
            --warning: #f59e0b; --dark: #1e293b; 
            --bg: #f8fafc; --gray: #94a3b8; 
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; background: var(--bg); color: var(--dark); 
            padding: 10px 15px 30px 15px; 
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* HEADER FIX */
        header {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 0; margin-bottom: 5px;
        }
        .logo-box img { height: 55px; width: auto; border-radius: 6px; object-fit: contain; }
        .logo-box h2 { margin: 0; font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); line-height: 1.2; }
        .logo-box span { font-size: 10px; color: var(--gray); font-weight: 600; display: block; margin-top: 2px; }

        /* CARD STYLE */
        .card { 
            background: white; padding: 20px; border-radius: 16px; 
            margin-bottom: 15px; border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow);
        }
        h3 { 
            margin: 0 0 15px 0; font-size: 0.75rem; color: var(--gray); 
            text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 8px;
        }

        /* INPUTS & BUTTONS */
        input, select, button, textarea { border-radius: 12px; font-size: 14px; transition: all 0.2s; outline: none; }
        input, select { 
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; 
            background: #fff; height: 50px; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); }
        
        .btn { 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; cursor: pointer; border: none; gap: 8px; color: white;
        }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        .btn-gray { background: #e2e8f0; color: #64748b; }

        /* MANAGEMENT ROW FIX */
        .management-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .management-row input { flex: 1; height: 50px; }
        .btn-sq { width: 55px; height: 50px; border-radius: 12px; flex-shrink: 0; }

        .libur-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

        /* TABLE UI */
        .table-wrap { overflow: auto; border-radius: 12px; border: 1px solid #e2e8f0; background: white; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1100px; }
        th, td { border-bottom: 1px solid #f1f5f9; padding: 12px 6px; text-align: center; }
        th { background: #f8fafc; color: var(--gray); font-weight: 700; position: sticky; top: 0; z-index: 5; }
        .nama-fixed { 
            position: sticky; left: 0; background: white !important; 
            font-weight: 700; text-align: left; width: 140px; 
            z-index: 4; border-right: 2px solid #f1f5f9; padding-left: 15px; 
        }
        
        .status-cell { border-radius: 6px; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; margin: auto; }
        .status-v { background: #22c55e; color: white; font-weight: bold; } 
        .status-t { background: #eab308; color: white; font-weight: bold; } 
        .status-i { background: #06b6d4; color: white; font-weight: bold; } 
        .status-off { background: #fee2e2; color: #ef4444; font-size: 9px; } 
        .status-lbr { background: #f1f5f9; color: #94a3b8; font-style: italic; font-size: 9px; }

        #kop-surat { display: none; align-items: center; justify-content: center; border-bottom: 4px solid #000; padding-bottom: 15px; margin-bottom: 25px; gap: 20px; }
        #kop-surat img { height: 100px; }

        @media print { 
            .no-print { display: none !important; } 
            #kop-surat { display: flex !important; } 
            @page { size: landscape; margin: 1cm; } 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- APP HEADER -->
        <header class="no-print">
            <div class="logo-box" style="display:flex; align-items:center; gap:15px;">
                <!-- LINK LOGO STABIL -->
                <img src="https://i.ibb.co.com/m50YkM4v/AGN-Logo.jpg" alt="Logo PT AGN">
                <div>
                    <h2>PT ATHA GHANIA NUGRAHA</h2>
                    <span>PRESENSI SYSTEM v38.0</span>
                </div>
            </div>
        </header>

        <!-- PRINT HEADER (PDF) -->
        <div id="kop-surat">
            <img src="https://i.ibb.co.com/m50YkM4v/AGN-Logo.jpg" alt="Logo">
            <div style="text-align: left;">
                <h1 style="margin:0; font-size: 28px;">PT ATHA GHANIA NUGRAHA</h1>
                <p style="margin:5px 0; font-size: 16px;">Laporan Rekapitulasi Presensi Karyawan</p>
            </div>
        </div>

        <!-- MANAJEMEN KARYAWAN -->
        <div class="card no-print">
            <h3>👤 Manajemen Karyawan</h3>
            <div class="management-row">
                <input list="listKaryawan" id="inputPilihNama" placeholder="Ketik nama baru / pilih nama...">
                <datalist id="listKaryawan"></datalist>
                <button class="btn btn-success btn-sq" onclick="tambahKaryawan()">➕</button>
                <button class="btn btn-sq" style="background: #fee2e2; color: #ef4444;" onclick="hapusKaryawan()">🗑️</button>
            </div>
            
            <h3>🗓️ Atur Libur Masal</h3>
            <div class="libur-group">
                <input type="date" id="tglMulaiLibur">
                <input type="date" id="tglSelesaiLibur">
            </div>
            <div style="display: flex; gap:10px;">
                <button class="btn btn-gray" style="flex:1; height:45px;" onclick="setRentangLibur(true)">SET LIBUR</button>
                <button class="btn" style="flex:1; border:1px solid #e2e8f0; color:#64748b;" onclick="setRentangLibur(false)">HAPUS JADWAL</button>
            </div>
        </div>

        <!-- PRESENSI BUTTONS -->
        <div class="card no-print">
            <h3>⚡ Presensi Cepat</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn btn-success" style="height: 60px; font-size: 18px;" onclick="prosesAbsen('Masuk')">MASUK</button>
                <button class="btn btn-danger" style="height: 60px; font-size: 18px;" onclick="prosesAbsen('Pulang')">PULANG</button>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 12px;">
                <button class="btn btn-warning" style="height: 50px;" onclick="prosesAbsen('Izin')">📝 IZIN / SAKIT</button>
                <button class="btn btn-gray" style="height: 50px;" onclick="resetAbsen()">♻️ RESET</button>
            </div>
        </div>

        <!-- REKAPITULASI -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;" class="no-print">
                <input type="month" id="filterBulan" style="width: 170px;" onchange="renderRekap()">
                <div style="display: flex; gap: 5px;">
                    <button class="btn btn-primary" style="background:var(--dark); height: 50px; padding: 0 15px;" onclick="exportToExcel()">📊 EXCEL</button>
                    <button class="btn btn-primary" style="background:var(--primary); height: 50px; padding: 0 15px;" onclick="siapkanCetak()">📄 PDF</button>
                </div>
            </div>

            <div class="table-wrap">
                <table id="tabelUtama">
                    <thead><tr id="theadRekap"></tr></thead>
                    <tbody id="tbodyRekap"></tbody>
                </table>
            </div>

            <div class="no-print">
                <h3>📝 Catatan Admin</h3>
                <textarea id="catatanAdmin" style="width:100%; height:80px; padding:15px; border:1.5px solid #e2e8f0; border-radius:12px;" placeholder="Contoh: Budi izin sakit..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "810494462386",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let masterKaryawan = {}, absensiData = {}, hariLibur = {};

        window.onload = () => {
            const s = new Date();
            document.getElementById('filterBulan').value = `${s.getFullYear()}-${String(s.getMonth() + 1).padStart(2, '0')}`;
            db.ref('master_karyawan').on('value', snap => { masterKaryawan = snap.val() || {}; updateDatalist(); renderRekap(); });
            db.ref('absensi').on('value', snap => { absensiData = snap.val() || {}; renderRekap(); });
            db.ref('hari_libur').on('value', snap => { hariLibur = snap.val() || {}; renderRekap(); });
        };

        function updateDatalist() {
            const dl = document.getElementById('listKaryawan');
            let opt = '';
            Object.values(masterKaryawan).sort().forEach(nama => { opt += `<option value="${nama}">`; });
            dl.innerHTML = opt;
        }

        function tambahKaryawan() {
            const n = document.getElementById('inputPilihNama');
            const namaBaru = n.value.trim();
            if(!namaBaru) return alert("Ketik nama!");
            db.ref('master_karyawan').push(namaBaru).then(() => { n.value = ""; });
        }

        function hapusKaryawan() {
            const n = document.getElementById('inputPilihNama');
            const namaCari = n.value.trim();
            const idHapus = Object.keys(masterKaryawan).find(key => masterKaryawan[key] === namaCari);
            if(!idHapus) return alert("Pilih nama!");
            if(confirm(`Hapus ${namaCari}?`)) db.ref(`master_karyawan/${idHapus}`).remove().then(() => n.value = "");
        }

        function setRentangLibur(isSet) {
            const m = document.getElementById('tglMulaiLibur').value, s = document.getElementById('tglSelesaiLibur').value;
            if(!m || !s) return alert("Pilih tanggal!");
            let u = {}; let curr = new Date(m), end = new Date(s);
            while(curr <= end) { u[curr.toISOString().split('T')[0]] = isSet ? true : null; curr.setDate(curr.getDate()+1); }
            db.ref('hari_libur').update(u);
        }

        function prosesAbsen(tipe) {
            const nama = document.getElementById('inputPilihNama').value;
            if(!nama) return alert("Pilih nama!");
            const s = new Date();
            const tgl = s.toISOString().split('T')[0];
            const jam = s.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            let status = (tipe==='Masuk' && (s.getHours()>9 || (s.getHours()===9 && s.getMinutes()>0))) ? "Terlambat" : "Hadir";
            db.ref(`absensi/${tgl}/${nama}/${tipe}`).set({ waktu: jam, status: status });
        }

        function renderRekap() {
            const f = document.getElementById('filterBulan').value;
            const [y, m] = f.split('-');
            const totalH = new Date(y, m, 0).getDate();
            let h = `<th class="nama-fixed">Nama</th>`;
            for(let i=1; i<=totalH; i++) h += `<th>${i}</th>`;
            h += `<th>H</th><th>T</th><th>I</th>`;
            document.getElementById('theadRekap').innerHTML = h;

            let b = "";
            Object.values(masterKaryawan).sort().forEach(nama => {
                let cH=0, cT=0, cI=0;
                let r = `<td class="nama-fixed">${nama}</td>`;
                for(let i=1; i<=totalH; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2,'0')}`, dObj = new Date(tgl);
                    let sim = "-", cls = "";
                    if(dObj.getDay()===0) { sim = "OFF"; cls = "status-off"; }
                    else if(hariLibur[tgl]) { sim = "LBR"; cls = "status-lbr"; }
                    if(absensiData[tgl] && absensiData[tgl][nama]) {
                        const d = absensiData[tgl][nama];
                        if(d.Izin) { sim="I"; cls="status-i"; cI++; }
                        else if(d.Masuk) {
                            if(d.Masuk.status==="Terlambat") { sim="T"; cls="status-t"; cT++; }
                            else { sim="V"; cls="status-v"; cH++; }
                        }
                    }
                    r += `<td><div class="status-cell ${cls}">${sim}</div></td>`;
                }
                b += `<tr>${r}<td>${cH}</td><td>${cT}</td><td>${cI}</td></tr>`;
            });
            document.getElementById('tbodyRekap').innerHTML = b;
        }

        function siapkanCetak() { window.print(); }
        function exportToExcel() {
            const t = document.getElementById("tabelUtama");
            const wb = XLSX.utils.table_to_book(t);
            XLSX.writeFile(wb, `Absensi_AGN_${document.getElementById('filterBulan').value}.xlsx`);
        }
        function resetAbsen() {
            const n = document.getElementById('inputPilihNama').value;
            if(!n) return;
            const t = new Date().toISOString().split('T')[0];
            if(confirm(`Reset ${n} hari ini?`)) db.ref(`absensi/${t}/${n}`).remove();
        }
    </script>
</body>
</html>
