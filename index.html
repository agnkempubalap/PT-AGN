<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<!-- LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);
  margin:0;
  padding:15px
}
.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1)
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin:5px 0;
  color:#fff;
  font-weight:bold
}
.green{background:#2ecc71}
.orange{background:#f39c12}
.red{background:#e74c3c}
.blue{background:#3498db}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  margin:5px 0
}

.flex{display:flex;gap:10px}
.box{
  flex:1;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-align:center
}
.b1{background:#3498db}
.b2{background:#2ecc71}
.b3{background:#f1c40f}

#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:.3s
}
.show{opacity:1}
</style>
</head>

<body>

<div id="toast"></div>

<!-- =================== ABSEN =================== -->
<div class="card">
<h3>📋 Absensi PT-AGN</h3>

<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>

</div>

<!-- =================== FILTER =================== -->
<div class="card">
<h4>Filter</h4>
<select id="bulan"></select>
<input type="text" id="search" placeholder="Cari nama...">
</div>

<!-- =================== DASHBOARD =================== -->
<div class="card">
<h4>Dashboard</h4>
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div>

<!-- =================== GRAFIK =================== -->
<div class="card">
<h4>Grafik Harian</h4>
<canvas id="chart"></canvas>
</div>

<!-- =================== LIST =================== -->
<div id="list"></div>

<!-- =================== REKAP =================== -->
<div class="card">
<h4>Rekap Per Orang (Bulan Ini)</h4>
<div id="rekap"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("absensi")) || [];

const namaSelect = document.getElementById("nama");
const bulanSelect = document.getElementById("bulan");

const bulanNama = ["Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"];

// AUTO BULAN REAL TIME
bulanNama.forEach((b,i)=>{
  bulanSelect.innerHTML += `<option value="${i+1}">${b}</option>`;
});
bulanSelect.value = new Date().getMonth()+1;

bulanSelect.onchange = render;
document.getElementById("search").oninput = render;

// ================= TOAST =================
function toast(msg,type="info"){
  const t = document.getElementById("toast");
  t.innerText = msg;

  let color="#333";
  if(type=="success") color="#2ecc71";
  if(type=="error") color="#e74c3c";
  if(type=="warning") color="#f39c12";

  t.style.background=color;
  t.classList.add("show");

  setTimeout(()=>t.classList.remove("show"),2500);
}

// ================= TIME =================
function now(){
  let d=new Date();
  return {
    tanggal:d.toISOString().split('T')[0],
    jam:d.toTimeString().split(' ')[0]
  }
}

function save(){
  localStorage.setItem("absensi", JSON.stringify(data));
  render();
}

function isTelat(jam){
  return jam > "08:00:00";
}

// ================= ABSEN =================
function absenMasuk(){
  let n=namaSelect.value;
  let t=now();

  let cek=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(cek){toast("Sudah absen masuk","warning");return}

  let status=isTelat(t.jam)?"Telat":"Hadir";

  data.push({
    nama:n,
    tanggal:t.tanggal,
    masuk:t.jam,
    pulang:"-",
    status:status,
    bulan:new Date().getMonth()+1
  });

  toast("Absen masuk berhasil","success");
  save();
}

function absenPulang(){
  let n=namaSelect.value;
  let t=now();

  let d=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(!d){toast("Belum absen masuk","error");return}
  if(d.pulang!="-"){toast("Sudah absen pulang","warning");return}

  d.pulang=t.jam;
  toast("Absen pulang berhasil","success");
  save();
}

function resetHari(){
  let today=now().tanggal;
  data=data.filter(x=>x.tanggal!=today);
  toast("Data hari ini direset","warning");
  save();
}

// ================= RENDER =================
function render(){
  let bulan=bulanSelect.value;
  let search=document.getElementById("search").value.toLowerCase();

  let filtered=data.filter(x=>x.bulan==bulan && x.nama.toLowerCase().includes(search));

  document.getElementById("list").innerHTML=filtered.map(x=>`
  <div class="card">
  <b>${x.nama}</b><br>
  ${x.tanggal}<br>
  Masuk: ${x.masuk}<br>
  Pulang: ${x.pulang}<br>
  <span style="background:${x.status=='Telat'?'#e74c3c':'#2ecc71'};color:#fff;padding:3px 8px;border-radius:5px">${x.status}</span>
  </div>`).join("");

  let hadir=filtered.filter(x=>x.status=="Hadir").length;
  let telat=filtered.filter(x=>x.status=="Telat").length;

  document.getElementById("total").innerText=filtered.length;
  document.getElementById("hadir").innerText=hadir;
  document.getElementById("telat").innerText=telat;

  // grafik
  let group={};
  filtered.forEach(x=>{
    if(!group[x.tanggal]) group[x.tanggal]={hadir:0,telat:0};
    if(x.status=="Hadir") group[x.tanggal].hadir++;
    if(x.status=="Telat") group[x.tanggal].telat++;
  });

  chart.data.labels=Object.keys(group);
  chart.data.datasets[0].data=Object.values(group).map(x=>x.hadir);
  chart.data.datasets[1].data=Object.values(group).map(x=>x.telat);
  chart.update();

  document.getElementById("rekap").innerHTML=detailPerOrang();
}

// ================= CHART =================
const chart=new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:[],
datasets:[
{label:'Hadir',data:[]},
{label:'Telat',data:[]}
]
}
});

// ================= EXPORT EXCEL =================
function exportExcel(){
  let bulan=new Date().getMonth()+1;
  let filtered=data.filter(x=>x.bulan==bulan);

  let excelData=filtered.map((x,i)=>({
    No:i+1,
    Nama:x.nama,
    Tanggal:x.tanggal,
    Masuk:x.masuk,
    Pulang:x.pulang,
    Status:x.status
  }));

  let ws=XLSX.utils.json_to_sheet(excelData);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");

  XLSX.writeFile(wb,`Absensi_Bulan_${bulan}.xlsx`);

  toast("Export Excel berhasil","success");
}

// ================= EXPORT PDF =================
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  let bulan=new Date().getMonth()+1;
  let filtered=data.filter(x=>x.bulan==bulan);

  doc.text(`Laporan Absensi Bulan ${bulan}`,10,10);

  let rows=filtered.map((x,i)=>[
    i+1,x.nama,x.tanggal,x.masuk,x.pulang,x.status
  ]);

  doc.autoTable({
    head:[["No","Nama","Tanggal","Masuk","Pulang","Status"]],
    body:rows,
    startY:20
  });

  doc.save("absensi.pdf");

  toast("Export PDF berhasil","success");
}

// ================= REKAP =================
function detailPerOrang(){
  let bulan=new Date().getMonth()+1;
  let group={};

  data.filter(x=>x.bulan==bulan).forEach(x=>{
    if(!group[x.nama]) group[x.nama]={hadir:0,telat:0};
    if(x.status=="Hadir") group[x.nama].hadir++;
    if(x.status=="Telat") group[x.nama].telat++;
  });

  return Object.keys(group).map(n=>`
    <div class="card">
      <b>${n}</b><br>
      Hadir: ${group[n].hadir}<br>
      Telat: ${group[n].telat}
    </div>
  `).join("");
}

render();
</script>
</body>
</html>
