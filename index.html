<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V760 - OPTIMIZED</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f8fafc; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 40px; padding: 0 12px; }
        .tab-content { display: none; } 
        .tab-content.active { display: block; }
        .card { background: var(--c); padding: 16px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--b); }
        h3 { margin-bottom: 14px; font-size: 14px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 42px; background: #f1f5f9; border: 1px solid var(--b); border-radius: 10px; padding: 0 12px; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; width: 100%; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 10px 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 9px; cursor: pointer; position: relative; }
        .badge.has-out::after { content: ''; position: absolute; bottom: 1px; right: 1px; width: 5px; height: 5px; background: #fff; border-radius: 50%; }
        .bg-h { background: var(--s); } .bg-i { background: var(--w); } .bg-a { background: var(--d); } 
        .bg-m { background: #64748b; } .bg-off { background: #0f172a; } .bg-t { background: #f97316; } .bg-none { background: #f1f5f9; color: #ccc; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:20px" onclick="closeMod()">TUTUP</button></div></div>

    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master Karyawan</h3>
                <div class="flex-row"><input type="text" id="inK" placeholder="Nama..."><button class="btn" style="background:var(--p); width:80px" onclick="addItem('master_karyawan', 'inK')">ADD</button></div>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absen <input type="date" id="absTgl" style="width:120px; height:30px"></h3>
                <div class="flex-row">
                    <select id="selK"></select>
                    <select id="absJenis" onchange="document.getElementById('rowIzin').style.display=(this.value=='Izin'?'block':'none')">
                        <option value="Hadir">Masuk</option>
                        <option value="Izin">Izin/Sakit</option>
                        <option value="Pulang">Pulang</option>
                    </select>
                </div>
                <div id="rowIzin" style="display:none; margin-bottom:10px;"><input type="text" id="absKet" placeholder="Alasan Izin..."></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN DATA</button>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" onchange="renderAll()" style="width:120px; height:30px"></h3>
                <div class="table-area"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <div class="flex-row" style="margin-top:10px">
                    <button class="btn" style="background:var(--w)" onclick="openLiburMod()">⚙️ LIBUR</button>
                    <button class="btn" style="background:var(--s)" onclick="expEx('tbA','Absen')">EXCEL</button>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <div class="flex-row"><input type="text" id="inB" placeholder="Barang..."><button class="btn" style="background:var(--p); width:80px" onclick="addItem('master_barang', 'inB')">ADD</button></div>
                <div id="listB" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
            </div>
            <div class="card">
                <h3>📥 Logistik & Stok</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row"><input type="number" id="stQty" placeholder="Qty"><select id="stAksi"><option value="Masuk">Bongkar (Masuk)</option><option value="Rekondisi">Selesai Rekon</option><option value="Jual Mitra">Jual Mitra</option><option value="Jual Umum">Jual Umum</option></select></div>
                <button class="btn" style="background:var(--w)" onclick="saveSt()">UPDATE STOK</button>
            </div>
            <div class="table-area"><table><thead id="thStok"><tr><th class="sticky-col">BARANG</th><th>KTR AWL</th><th>RDY AWL</th><th>IN KTR</th><th>IN RDY</th><th>REKON</th><th>MITRA</th><th>UMUM</th><th>AKH KTR</th><th style="color:green">AKH RDY</th></tr></thead><tbody id="tbStok"></tbody></table></div>
        </div>

        <div id="tab-aktivitas" class="tab-content">
            <div class="card"><h3>🛠️ Input Kerja</h3>
                <div class="flex-row"><input type="date" id="akTgl"><select id="akJenis"><option value="Rekondisi Kempu">Rekondisi Kempu</option><option value="muat barang">Muat Barang</option><option value="bongkar barang">Bongkar Barang</option><option value="kirim minyak">Kirim Minyak</option></select></div>
                <div id="akKaryawan" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:10px"></div>
                <input type="number" id="akQty" placeholder="Jumlah (Pcs/Rit)" style="margin-bottom:10px">
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white"><h3>💰 Gaji <input type="month" id="fUang" onchange="renderGaji()" style="width:110px"></h3><b id="gajiTotal">Rp 0</b></div>
            <div id="areaRekapAll" class="table-area"></div>
        </div>
    </div>

    <script>
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); const db = firebase.database();
        let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000 };

        window.onload = () => {
            const t = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl'].forEach(id => document.getElementById(id).value = t);
            ['fM','fUang'].forEach(id => document.getElementById(id).value = t.slice(0, 7));
            db.ref('/').on('value', s => { D = s.val() || {}; initUI(); renderAll(); });
        };

        function tab(id) {
            document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id==='gaji') renderGaji();
        }

        function openMod(t, h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
        function closeMod() { document.getElementById('modalUni').style.display='none'; }

        function initUI() {
            const K = Object.values(D.master_karyawan || {}), B = Object.values(D.master_barang || {});
            document.getElementById('listK').innerHTML = Object.entries(D.master_karyawan || {}).map(k=>`<span style="background:#fff; border:1px solid #ddd; padding:2px 6px; border-radius:5px; font-size:10px">${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red">×</b></span>`).join('');
            document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k}">${k}</option>`).join('');
            document.getElementById('akKaryawan').innerHTML = K.map(k=>`<label style="font-size:11px"><input type="checkbox" class="chk-k" value="${k}"> ${k}</label>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b}">${b}</option>`).join('');
        }

        function saveAbs() {
            const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value, ket=document.getElementById('absKet').value;
            const jam = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.',':');
            if(j === "Pulang") db.ref(`absensi/${t}/${n}`).update({ jamOut: jam });
            else db.ref(`absensi/${t}/${n}`).set({ j: (j==="Hadir" && parseInt(jam.replace(':',''))>930) ? "Terlambat" : j, jam, ket: ket||"" });
        }

        function renderAll() {
            const K_arr = Object.values(D.master_karyawan || {}), fM = document.getElementById('fM').value, [Y, M] = fM.split('-'), lastD = new Date(Y, M, 0).getDate();
            let th = `<tr><th class="sticky-col">NAMA</th>`;
            for(let i=1; i<=lastD; i++) th += `<th>${i}</th>`;
            th += `</tr>`; document.getElementById('thA').innerHTML = th;
            let tb = "";
            K_arr.forEach(k => {
                let r = `<td class="sticky-col">${k}</td>`;
                for(let i=1; i<=lastD; i++) {
                    let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, isSun = new Date(d).getDay()===0, isLib = D.libur?.[d], a = D.absensi?.[d]?.[k], txt="-", cls="bg-none";
                    if(isLib) { txt="OFF"; cls="bg-off"; } else if(isSun) { txt="M"; cls="bg-m"; }
                    if(a) {
                        if(a.j==="Hadir") { txt="H"; cls="bg-h"; }
                        else if(a.j==="Terlambat") { txt="T"; cls="bg-t"; }
                        else if(a.j==="Izin") { txt="I"; cls="bg-i"; }
                        let hasOut = a.jamOut ? "has-out" : "";
                        r += `<td><div class="badge ${cls} ${hasOut}" onclick="cellMod('${d}','${k}')">${txt}</div></td>`;
                    } else r += `<td><div class="badge ${cls}" onclick="cellMod('${d}','${k}')">${txt}</div></td>`;
                }
                tb += `<tr>${r}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
            renderStok();
        }

        function cellMod(d, k) {
            let a = D.absensi?.[d]?.[k];
            if(!a) return;
            openMod(`Detail ${k} (${d})`, `Status: ${a.j}<br>Masuk: ${a.jam||'-'}<br>Pulang: ${a.jamOut||'-'}<br>Ket: ${a.ket||'-'}<br><br><button class='btn' style='background:red' onclick="removeItem('absensi/${d}','${k}')">HAPUS</button>`);
        }

        function renderStok() {
            const B_arr = Object.values(D.master_barang || {}), fM = document.getElementById('fM').value;
            let h = "";
            B_arr.forEach(b => {
                let s = { ak:0, ab:0, ik:0, ib:0, rk:0, jm:0, ju:0 };
                Object.values(D.stok_logs || {}).forEach(l => {
                    if(l.b !== b) return;
                    if(l.t?.slice(0,7) < fM) {
                        if(l.ak==="Masuk") s.ak+=l.q; 
                        else if(l.ak==="Rekondisi") { s.ak-=l.q; s.ab+=l.q; }
                        else if(l.ak.includes("Jual")) s.ab-=l.q;
                    } else if(l.t?.slice(0,7) === fM) {
                        if(l.ak==="Masuk") s.ik+=l.q;
                        else if(l.ak==="Rekondisi") s.rk+=l.q;
                        else if(l.ak==="Jual Mitra") s.jm+=l.q;
                        else if(l.ak==="Jual Umum") s.ju+=l.q;
                    }
                });
                h += `<tr><td class="sticky-col">${b}</td><td>${s.ak}</td><td>${s.ab}</td><td>${s.ik}</td><td>0</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td>${(s.ak+s.ik)-s.rk}</td><td style="color:green">${(s.ab+s.rk)-(s.jm+s.ju)}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = h;
        }

        function saveSt() { const t=document.getElementById('stTgl').value, b=document.getElementById('stBrg').value, q=parseInt(document.getElementById('stQty').value), ak=document.getElementById('stAksi').value; if(q) db.ref('stok_logs').push({ t, b, q, ak }); }
        function saveAk() {
            const t=document.getElementById('akTgl').value, j=document.getElementById('akJenis').value, q=parseInt(document.getElementById('akQty').value), p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value);
            if(q && p.length) db.ref('aktivitas').push({ t, j, q, p });
        }

        function renderGaji() {
            const fM = document.getElementById('fUang').value, T = D.tarif||DEF_TARIF, K = Object.values(D.master_karyawan||{});
            let totGaji = 0;
            let h = `<table><tr><th class="sticky-col">KARYAWAN</th><th>BORONGAN</th><th>BONUS</th><th>TOTAL</th></tr>`;
            K.forEach(k => {
                let brg = 0;
                Object.values(D.aktivitas||{}).forEach(a => { if(a.t?.slice(0,7) === fM && a.p.includes(k)) brg += (T[a.j] * a.q / a.p.length); });
                h += `<tr><td class="sticky-col">${k}</td><td>${Math.round(brg).toLocaleString()}</td><td>0</td><td>Rp ${Math.round(brg).toLocaleString()}</td></tr>`;
                totGaji += brg;
            });
            document.getElementById('gajiTotal').innerText = "Rp " + Math.round(totGaji).toLocaleString();
            document.getElementById('areaRekapAll').innerHTML = h + `</table>`;
        }

        function openLiburMod() {
            let list = Object.entries(D.libur || {}).sort((a,b) => b[0].localeCompare(a[0]));
            let h = `<div style="display:flex; gap:10px; flex-wrap:wrap">
                <div style="flex:1; min-width:150px">
                    <label>DARI:</label><input type="date" id="lStart"><br><label>SAMPAI:</label><input type="date" id="lEnd">
                    <button class="btn" style="background:var(--p); margin-top:10px" onclick="saveMultiLibur()">TAMBAH</button>
                </div>
                <div style="flex:1; min-width:150px; max-height:150px; overflow-y:auto; border:1px solid #ddd; padding:5px">
                    ${list.map(x=>`<div style="font-size:10px; border-bottom:1px solid #eee; padding:3px">${x[0]} <b style="color:red" onclick="removeItem('libur','${x[0]}')">×</b></div>`).join('')}
                </div>
            </div>`;
            openMod("Kelola Libur", h);
        }

        function saveMultiLibur() {
            const s=document.getElementById('lStart').value, e=document.getElementById('lEnd').value;
            if(!s || !e) return;
            let curr = new Date(s), last = new Date(e), up = {};
            while(curr <= last) { up[curr.toISOString().split('T')[0]] = "OFF"; curr.setDate(curr.getDate()+1); }
            db.ref('libur').update(up).then(()=>openLiburMod());
        }

        function addItem(p, id) { const v=document.getElementById(id).value; if(v){ db.ref(p).push(v); document.getElementById(id).value=""; } }
        function removeItem(p, k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove(); }
        function expEx(tid, n) { let wb = XLSX.utils.table_to_book(document.getElementById(tid)); XLSX.writeFile(wb, `${n}.xlsx`); }
    </script>
</body>
</html>
