<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v84.0 - PREMIUM SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:12px; border:1px solid var(--b); padding:10px 15px; display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--t)}

        .tabs-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .t-btn { flex: 1; padding: 15px; border-radius: 12px; background: var(--c); color: var(--t); border: 1px solid var(--b); cursor: pointer; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .t-btn.active { background: var(--p); border-color: var(--p); color: #fff; }
        .hidden { display: none !important; }

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 1px;text-align:center;min-width:35px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .brd-heavy{border-right: 3px solid var(--p) !important; border-left: 3px solid var(--p) !important;}
        
        .s-cell{border-radius:6px;width:35px;height:35px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:10px;margin: 0 auto;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-l{background:#AA00FF;color:#fff} .s-mng{background:#64748b;color:#fff}
        .jam-text{font-size:7px;font-weight:600;display:block;margin-top:2px;max-width:33px; overflow:hidden;}

        .log-box { margin-top: 10px; max-height: 200px; overflow-y: auto; background: var(--bg); border-radius: 12px; }
        .log-row { display: flex; justify-content: space-between; align-items:center; padding: 10px; border-bottom: 1px solid var(--b); font-size: 11px; }
        .del-btn { background: var(--d); color: #fff; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 10px; }

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            header, .no-print, .tabs-nav { display: none !important; }
            .table-web { transform: scale(0.65); transform-origin: top left; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v84.0 PREMIUM</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()"><span id="tIco">☀️</span></div>
        </header>

        <div class="tabs-nav no-print">
            <button id="btnAbsen" class="t-btn active" onclick="goTab('absen')">📅 ABSENSI</button>
            <button id="btnStok" class="t-btn" onclick="goTab('stok')">📦 STOK GUDANG</button>
        </div>

        <div id="page-absen">
            <div class="card no-print">
                <h3>👥 KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PRESENSI & LEMBUR</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                    <button class="btn" style="background:var(--s);height:60px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px" onclick="pAbsen('Pulang')">PULANG</button>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px">
                    <button class="btn" style="background:var(--iz);height:50px" onclick="pAbsen('Izin')">📝 IZIN</button>
                    <button class="btn" style="background:#AA00FF;height:50px" onclick="pAbsen('Lembur')">🔥 LEMBUR</button>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                    <input type="month" id="fB" style="width:160px" onchange="rRekap()">
                    <div style="display:flex; gap:5px">
                        <button class="btn" style="background:#1d6f42; width:80px; font-size:10px" onclick="doExcel('rekapTable')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:80px; font-size:10px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap"><table class="table-web" id="rekapTable"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table></div>
            </div>
        </div>

        <div id="page-stok" class="hidden">
            <div class="card no-print">
                <h3>📦 BARANG</h3>
                <div style="display:flex; gap:8px">
                    <input type="text" id="mBrg" placeholder="Nama Barang Baru...">
                    <button class="btn" style="background:var(--s); width:60px" onclick="tBrg()">+</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>📥 INPUT AKTIVITAS</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="sBrg"><option value="">Pilih Barang...</option></select>
                    <input type="date" id="sTgl" onchange="renderLog()">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px">
                    <div style="border:1px solid var(--b); padding:10px; border-radius:12px">
                        <h4>1. QC MASUK</h4>
                        <select id="qcK" style="height:35px; margin-bottom:5px"><option value="baru">Baru</option><option value="bekas">Bekas</option></select>
                        <select id="qcS" style="height:35px; margin-bottom:5px"><option value="acc">ACC</option><option value="rej">REJ</option></select>
                        <input type="number" id="qQC" placeholder="Qty" style="height:35px">
                        <button class="btn" style="background:var(--p); height:35px; margin-top:5px" onclick="saveF('qc')">OK</button>
                    </div>
                    <div style="border:1px solid var(--b); padding:10px; border-radius:12px">
                        <h4>2. REKONDISI</h4>
                        <input type="number" id="qRek" placeholder="Qty" style="height:35px">
                        <button class="btn" style="background:var(--iz); height:35px; margin-top:45px" onclick="saveF('rekon')">OK</button>
                    </div>
                    <div style="border:1px solid var(--b); padding:10px; border-radius:12px">
                        <h4>3. PENJUALAN</h4>
                        <select id="jnsJ" style="height:35px; margin-bottom:5px"><option value="umum">Umum</option><option value="agen">Agen</option></select>
                        <input type="number" id="qJual" placeholder="Qty" style="height:35px">
                        <button class="btn" style="background:var(--s); height:35px; margin-top:5px" onclick="saveF('jual')">OK</button>
                    </div>
                </div>
            </div>

            <div class="card no-print">
                <h3>🕒 LOG HARIAN</h3>
                <div id="flowLog" class="log-box"></div>
            </div>

            <div class="card">
                <div class="table-wrap">
                    <table class="table-web" id="stokTable">
                        <thead>
                            <tr style="background:var(--b)">
                                <th rowspan="2" class="nama-fixed">Barang</th>
                                <th colspan="2" class="brd-heavy">SALDO AWAL</th><th colspan="3">QC GATE</th><th colspan="2">INVENTORY</th><th style="background:var(--iz)">PROSES</th><th colspan="2">SALES</th><th colspan="3" style="background:var(--s)">SALDO AKHIR</th>
                            </tr>
                            <tr style="background:var(--b)">
                                <th class="brd-heavy">Awal Kotor</th><th class="brd-heavy">Awal Ready</th><th>ACC</th><th>AMD</th><th>REJ</th><th>Baru</th><th>Bekas</th><th>Rekon</th><th>Umum</th><th>Agen</th><th>KOTOR</th><th>READY</th><th>TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="tbStok"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, mb={}, sd={}; const TGL_SISTEM = "2026-03-21";

        window.onload=()=>{
            const d = new Date();
            document.getElementById('fB').value=d.toISOString().slice(0,7);
            document.getElementById('sTgl').value = d.toISOString().slice(0,10);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; uBrg(); rStok();});
            db.ref('stok_flow').on('value',s=>{sd=s.val()||{}; rStok(); renderLog();});
            goTab(localStorage.getItem('agnTab') || 'absen');
        };

        function goTab(t){ localStorage.setItem('agnTab', t); document.getElementById('page-absen').classList.toggle('hidden', t!=='absen'); document.getElementById('page-stok').classList.toggle('hidden', t!=='stok'); }
        function toggleT(){ let b=document.body; b.setAttribute('data-theme', b.getAttribute('data-theme')==='dark'?'light':'dark'); }
        function cLogo(e){ const r=new FileReader(); r.onload=()=>{ document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result); }; r.readAsDataURL(e.target.files[0]); }

        // ABSENSI
        function uDl(){ document.getElementById('lk').innerHTML = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function tKaryawan(){ let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>{ alert("Karyawan Ditambah!"); n.value=""; }); }
        function hKaryawan(){ let n=document.getElementById('iNama').value, id=Object.keys(mk).find(k=>mk[k]===n); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove().then(()=>document.getElementById('iNama').value=""); }
        
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, now=new Date(); if(!n) return alert("Pilih Nama!");
            let tgl=now.toISOString().slice(0,10), jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(!nt)return; st="Izin";}
            if(ty==='Lembur') st="Lembur";
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{
                alert(`${ty} Berhasil!`); document.getElementById('iNama').value=""; rRekap();
            });
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), tglSkrg=new Date().getDate(), todayFull=new Date().toISOString().split('T')[0];
            let h=`<tr><th class="nama-fixed">Nama</th>`; for(let i=1;i<=last;i++) h+=`<th class="${i===tglSkrg?'today-col':''}">${i}</th>`; h+=`<th>H</th><th>I</th><th>A</th><th>L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b=""; Object.values(mk).sort().forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Lembur) { sW="L"; clW="s-l"; cL++; infoW="Lembur"; }
                        else if(data.Izin) { sW="I"; clW="s-i"; cI++; infoW=data.Izin.note; }
                        else if(data.Masuk) { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; infoW=data.Masuk.waktu; }
                    } else if(t < todayFull && t >= TGL_SISTEM && !hl[t] && new Date(t).getDay()!==0) { sW="A"; clW="s-a"; cA++; }
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW||""}</span></div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cI}</td><td>${cA}</td><td>${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        // STOK
        function uBrg(){ document.getElementById('sBrg').innerHTML = '<option value="">Pilih Barang...</option>' + Object.values(mb).sort().map(b=>`<option value="${b}">${b}</option>`).join(''); }
        function tBrg(){ let n=document.getElementById('mBrg'); if(n.value) db.ref('master_barang').push(n.value).then(()=>{ alert("Barang Ditambah!"); n.value=""; }); }
        
        function saveF(step){
            const brg=document.getElementById('sBrg').value, tgl=document.getElementById('sTgl').value;
            if(!brg||!tgl) return alert("Lengkapi Data!");
            let data = { barang:brg, type:step, ts:Date.now() };
            if(step==='qc'){ data.kond=document.getElementById('qcK').value; data.stat=document.getElementById('qcS').value; data.qty=parseInt(document.getElementById('qQC').value); }
            else if(step==='rekon'){ data.qty=parseInt(document.getElementById('qRek').value); }
            else if(step==='jual'){ data.jns=document.getElementById('jnsJ').value; data.qty=parseInt(document.getElementById('qJual').value); }
            if(!data.qty || data.qty<=0) return alert("Isi Jumlah!");
            db.ref(`stok_flow/${tgl}`).push(data).then(()=>{
                alert("Data Stok Disimpan!");
                ["qQC","qRek","qJual"].forEach(id=>document.getElementById(id).value="");
            });
        }

        function rStok(){
            const items = Object.values(mb).sort(); let rk = {};
            items.forEach(i=>rk[i]={ak:0, ar:0, qacc:0, qamd:0, qrej:0, mbru:0, mbks:0, rkn:0, ju:0, ja:0});
            Object
