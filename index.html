<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v83.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px}
        .container{max-width:1450px;margin:0 auto}
        .tab-menu{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px}
        .tab-btn{height:55px; border-radius:15px; border:1px solid var(--b); background:var(--c); color:var(--t); font-weight:800; cursor:pointer}
        .tab-btn.active{background:var(--p); color:#fff; border:none}
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        input,button,select{border-radius:12px;font-size:14px;height:50px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;padding:0 10px;outline:none}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 4px;text-align:center}
        .nama-fixed{position:sticky;left:0;background-color:var(--c);z-index:10;min-width:100px;text-align:left;padding-left:10px;font-weight:700; border-right: 2px solid var(--p)}
        .page-content{display:none} .page-content.active{display:block}
    </style>
</head>
<body>
    <div class="container">
        <div class="tab-menu">
            <button class="tab-btn" onclick="switchP('absen', this)">📋 ABSENSI</button>
            <button class="tab-btn active" onclick="switchP('stok', this)">📦 STOK</button>
        </div>

        <!-- PAGE STOK -->
        <div id="p-stok" class="page-content active">
            <div class="card">
                <h3>📊 RINGKASAN STOK (Berdasarkan Data Excel)</h3>
                <div class="table-wrap">
                    <table class="table-web">
                        <thead>
                            <tr style="background:var(--bg)">
                                <th class="nama-fixed">ITEM</th>
                                <th title="Stok Awal Kotor">AWL-K</th>
                                <th title="Stok Awal Ready">AWL-R</th>
                                <th title="Masuk Kotor">M-KTR</th>
                                <th title="Selesai Rekondisi">REKON</th>
                                <th title="Jual Umum">J-UM</th>
                                <th title="Jual Agen">J-AG</th>
                                <th style="color:var(--s)">SISA-R</th>
                                <th style="color:var(--w)">TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3>⚡ INPUT TRANSAKSI & MASTER</h3>
                <!-- Gabungan Input Master (Stok Awal) dan Transaksi Harian -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:10px">
                    <input type="text" id="nB" placeholder="Nama Barang...">
                    <input type="number" id="sAK" placeholder="Awal Kotor">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 100px; gap:8px; margin-bottom:15px; border-bottom:1px solid var(--b); padding-bottom:15px">
                    <input type="number" id="sAR" placeholder="Awal Ready">
                    <button class="btn" style="background:var(--p)" onclick="setMaster()">SIMPAN MASTER</button>
                    <button class="btn" style="background:var(--d)" onclick="delB()">HAPUS</button>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:8px">
                    <select id="sB"></select>
                    <input type="date" id="sT">
                </div>
                <div style="display:grid; grid-template-columns: 1.2fr 0.6fr 1fr; gap:8px">
                    <select id="sK">
                        <option value="m_ktr">Masuk (QC Lolos)</option>
                        <option value="rekon">Selesai Rekon</option>
                        <option value="j_u">Terjual Umum</option>
                        <option value="j_a">Terjual Agen</option>
                    </select>
                    <input type="number" id="sQ" placeholder="Qty">
                    <button class="btn" style="background:var(--s)" onclick="svS()">INPUT HARIAN</button>
                </div>
            </div>
        </div>

        <!-- PAGE ABSEN (Hidden by default) -->
        <div id="p-absen" class="page-content">
             <div class="card"><h3>Absensi Aktif</h3><p>Fitur absensi berjalan di latar belakang...</p></div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mb={}, st={};

        window.onload=()=>{
            document.getElementById('sT').value=new Date().toISOString().split('T')[0];
            db.ref('master_barang_v6').on('value',s=>{mb=s.val()||{}; uSB(); bS();});
            db.ref('stok_v6').on('value',s=>{st=s.val()||{}; bS();});
        };

        function switchP(p, el){
            document.querySelectorAll('.page-content, .tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active'); el.classList.add('active');
        }

        // FUNGSI MASTER (Untuk Set Stok Awal sesuai Excel)
        function setMaster(){
            let n=document.getElementById('nB').value, 
                ak=parseInt(document.getElementById('sAK').value)||0, 
                ar=parseInt(document.getElementById('sAR').value)||0;
            if(n) db.ref(`master_barang_v6/${n}`).set({awal_ktr:ak, awal_rdy:ar}).then(()=>alert("Master Tersimpan!"));
        }

        function delB(){
            let n=document.getElementById('nB').value;
            if(n && confirm('Hapus barang ini?')) db.ref(`master_barang_v6/${n}`).remove();
        }

        function uSB(){
            document.getElementById('sB').innerHTML=Object.keys(mb).map(b=>`<option value="${b}">${b}</option>`).join('');
        }

        // FUNGSI INPUT HARIAN (Masuk, Rekon, Jual)
        function svS(){
            let b=document.getElementById('sB').value, t=document.getElementById('sT').value, k=document.getElementById('sK').value, q=parseInt(document.getElementById('sQ').value);
            if(q) db.ref(`stok_v6/${t.slice(0,7)}/${b}/${k}`).transaction(c=>(c||0)+q).then(()=>alert("Transaksi Berhasil!"));
        }

        function bS(){
            let month = new Date().toISOString().slice(0,7), h="";
            Object.keys(mb).forEach(b=>{
                let d = (st[month] && st[month][b]) ? st[month][b] : {};
                let awk = mb[b].awal_ktr || 0;
                let awr = mb[b].awal_rdy || 0;
                
                // Rumus Excel Mas:
                // Sisa Kotor = Stok Awal Kotor + Masuk Kotor - Selesai Rekon
                // Sisa Ready = Stok Awal Ready + Selesai Rekon - Jual Umum - Jual Agen
                let mk = d.m_ktr || 0;
                let rk = d.rekon || 0;
                let ju = d.j_u || 0;
                let ja = d.j_a || 0;

                let sisa_k = awk + mk - rk;
                let sisa_r = awr + rk - ju - ja;

                h+=`<tr>
                    <td class="nama-fixed">${b}</td>
                    <td>${awk}</td><td>${awr}</td>
                    <td>${mk}</td><td>${rk}</td>
                    <td>${ju}</td><td>${ja}</td>
                    <td style="color:var(--s);font-weight:800">${sisa_r}</td>
                    <td style="color:var(--w);font-weight:800">${sisa_k + sisa_r}</td>
                </tr>`;
            });
            document.getElementById('tbS').innerHTML=h;
        }
    </script>
</body>
</html>
