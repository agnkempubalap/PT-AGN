<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN Ultimate</title><!-- LIBRARY --><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script><style>
body{
  font-family: sans-serif;
  margin:0;
  background: linear-gradient(to bottom,#6ea8dc,#cfe2f3);
}
.container{
  padding:15px;
}
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  color:white;
  font-weight:bold;
}
.green{background:#28a745}
.orange{background:#f39c12}
.red{background:#e74c3c}
.blue{background:#3498db}

select,input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:8px;
}
.dashboard{
  display:flex;
  gap:10px;
}
.box{
  flex:1;
  padding:15px;
  border-radius:10px;
  color:white;
  text-align:center;
}
.b1{background:#2d7be5}
.b2{background:#1abc9c}
.b3{background:#f1c40f}
</style></head><body>
<div class="container"><div class="card">
<h2>📋 Absensi PT-AGN</h2>
<select id="nama"></select>
<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="red" onclick="resetData()">Reset Hari Ini</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
</div><div class="card">
<h3>Filter</h3>
<select id="bulan"></select>
<input type="text" id="search" placeholder="Cari nama..." oninput="render()">
</div><div class="card">
<h3>Dashboard</h3>
<div class="dashboard">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div><div class="card">
<h3>Grafik</h3>
<canvas id="chart"></canvas>
</div><div id="list"></div></div><script>
// DATA
const karyawan=["Agung","Alda","Nur","Hasan","Hatta"];
let data=JSON.parse(localStorage.getItem("absensi"))||[];

// INIT
let select=document.getElementById("nama");
karyawan.forEach(n=>select.innerHTML+=`<option>${n}</option>`);

let bulanSelect=document.getElementById("bulan");
for(let i=1;i<=12;i++){
  bulanSelect.innerHTML+=`<option value="${i}">Bulan ${i}</option>`;
}

// ABSEN
function now(){
 let d=new Date();
 return {
  tanggal:d.toISOString().slice(0,10),
  jam:d.toTimeString().slice(0,8),
  bulan:d.getMonth()+1
 }
}

function absenMasuk(){
 let n=select.value;
 let t=now();

 let cek=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
 if(cek){alert("Sudah absen masuk!");return}

 data.push({nama:n,tanggal:t.tanggal,masuk:t.jam,pulang:"",status:"Hadir",bulan:t.bulan});
 save();
}

function absenPulang(){
 let n=select.value;
 let t=now();

 let d=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
 if(!d){alert("Belum absen masuk");return}
 if(d.pulang){alert("Sudah absen pulang");return}

 d.pulang=t.jam;
 save();
}

function resetData(){
 if(confirm("Reset hari ini?")){
  let today=now().tanggal;
  data=data.filter(x=>x.tanggal!=today);
  save();
 }
}

function save(){
 localStorage.setItem("absensi",JSON.stringify(data));
 render();
}

// RENDER
let chart;
function render(){
 let list=document.getElementById("list");
 list.innerHTML="";

 let bulan=bulanSelect.value;
 let search=document.getElementById("search").value.toLowerCase();

 let filtered=data.filter(x=>{
  return (!bulan||x.bulan==bulan) && x.nama.toLowerCase().includes(search);
 });

 let hadir=filtered.length;
 let telat=0;

 document.getElementById("total").innerText=filtered.length;
 document.getElementById("hadir").innerText=hadir;
 document.getElementById("telat").innerText=telat;

 filtered.forEach(x=>{
  list.innerHTML+=`
  <div class='card'>
  <b>${x.nama}</b><br>
  ${x.tanggal}<br>
  Masuk: ${x.masuk}<br>
  Pulang: ${x.pulang||"-"}<br>
  Status: ${x.status}
  </div>`;
 });

 // CHART
 let ctx=document.getElementById("chart");
 if(chart) chart.destroy();
 chart=new Chart(ctx,{
  type:'bar',
  data:{
    labels:["Hadir"],
    datasets:[{label:"Jumlah",data:[hadir]}]
  }
 });
}

// EXPORT EXCEL
function exportExcel(){
 let ws=XLSX.utils.json_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Absensi");
 XLSX.writeFile(wb,"absensi.xlsx");
}

// EXPORT PDF
function exportPDF(){
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();
 doc.text("LAPORAN ABSENSI PT-AGN",10,10);

 let rows=data.map((x,i)=>[
  i+1,x.nama,x.tanggal,x.masuk,x.pulang||"-",x.status
 ]);

 doc.autoTable({
  head:[["No","Nama","Tanggal","Masuk","Pulang","Status"]],
  body:rows
 });

 doc.save("absensi.pdf");
}

render();
</script></body>
</html>
