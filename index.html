<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#dbeafe;}

.nav{
 display:flex;overflow-x:auto;background:#fff;
 position:sticky;top:0;
}
.nav button{
 flex:none;padding:12px;border:none;background:none;
}
.nav .active{color:blue;border-bottom:2px solid blue;}

.page{display:none;padding:10px;}
.activePage{display:block;}

.card{
 background:#fff;margin:10px 0;padding:12px;
 border-radius:10px;
}

button{
 width:100%;padding:10px;margin:5px 0;
 border:none;border-radius:8px;color:#fff;
}

.green{background:green}
.orange{background:orange}
.red{background:red}
.blue{background:blue}

input,select{
 width:100%;padding:8px;margin:5px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="nav('home',this)" class="active">Home</button>
<button onclick="nav('absen',this)">Absensi</button>
</div>

<!-- HOME -->
<div id="home" class="page activePage">
<div class="card">🏠 Sistem siap</div>
</div>

<!-- ABSENSI -->
<div id="absen" class="page">

<div class="card">
<h3>Karyawan</h3>

<select id="nama"></select>

<input id="namaBaru" placeholder="Tambah karyawan">
<button class="blue" onclick="tambahKaryawan()">Tambah</button>
<button class="red" onclick="hapusKaryawan()">Hapus</button>

</div>

<div class="card">
<button class="green" onclick="masuk()">Masuk</button>
<button class="orange" onclick="pulang()">Pulang</button>
<button class="red" onclick="resetHari()">Reset</button>
</div>

<div class="card">
Total: <span id="total">0</span><br>
Hadir: <span id="hadir">0</span><br>
Telat: <span id="telat">0</span>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

</div>

<script>

// NAV
function nav(id,btn){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('activePage'));
 document.getElementById(id).classList.add('activePage');

 document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
}

// DATA (ANTI RESET)
let data = JSON.parse(localStorage.getItem("absen")) || [];
let karyawan = JSON.parse(localStorage.getItem("karyawan"));

if(!karyawan){
 karyawan = ["Agung","Alda","Nur","Budi","Siti"];
 localStorage.setItem("karyawan", JSON.stringify(karyawan));
}

// LOAD
const nama = document.getElementById("nama");

function loadNama(){
 nama.innerHTML = karyawan.map(n=>`<option>${n}</option>`).join("");
}
loadNama();

// SIMPAN
function save(){
 localStorage.setItem("absen", JSON.stringify(data));
 localStorage.setItem("karyawan", JSON.stringify(karyawan));
 render();
}

// TAMBAH KARYAWAN
function tambahKaryawan(){
 let n = document.getElementById("namaBaru").value;
 if(!n) return;

 karyawan.push(n);
 document.getElementById("namaBaru").value="";
 save();
 loadNama();
}

// HAPUS KARYAWAN
function hapusKaryawan(){
 let n = nama.value;
 karyawan = karyawan.filter(x=>x!=n);
 save();
 loadNama();
}

// TIME
function now(){
 let d=new Date();
 return {
  tgl:d.toISOString().split('T')[0],
  jam:d.toTimeString().split(' ')[0]
 };
}

// MASUK
function masuk(){
 let t=now();
 let n=nama.value;

 if(data.find(x=>x.nama==n && x.tgl==t.tgl)) return;

 let status = t.jam>"09:00:00"?"Telat":"Hadir";

 data.push({
  nama:n,
  tgl:t.tgl,
  masuk:t.jam,
  pulang:"-",
  status
 });

 save();
}

// PULANG
function pulang(){
 let t=now();
 let d=data.find(x=>x.nama==nama.value && x.tgl==t.tgl);
 if(d) d.pulang=t.jam;
 save();
}

// RESET
function resetHari(){
 let today=now().tgl;
 data = data.filter(x=>x.tgl!=today);
 save();
}

// CHART
let chart = new Chart(document.getElementById("chart"),{
 type:'bar',
 data:{labels:[],datasets:[{label:'Absensi',data:[]}]}
});

// RENDER
function render(){

 total.innerText = data.length;
 hadir.innerText = data.filter(x=>x.status=="Hadir").length;
 telat.innerText = data.filter(x=>x.status=="Telat").length;

 document.getElementById("list").innerHTML = data.map(x=>`
 <div class="card">
 ${x.nama}<br>
 ${x.tgl}<br>
 ${x.masuk} - ${x.pulang}<br>
 ${x.status}
 </div>
 `).join("");

 let group={};
 data.forEach(x=>{
  if(!group[x.tgl]) group[x.tgl]=0;
  group[x.tgl]++;
 });

 chart.data.labels = Object.keys(group);
 chart.data.datasets[0].data = Object.values(group);
 chart.update();
}

render();

</script>

</body>
</html>
