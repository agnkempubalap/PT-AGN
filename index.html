<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V961-PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; flex: 1; min-width: 100px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; vertical-align: bottom; }
        th { background: #f8fafc; color: #64748b; font-weight: 700; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; border-right: 2px solid #eee; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 10px; position: relative; }
        .bg-h, .bg-l { background: var(--s); } .bg-i { background: var(--w); } .bg-a { background: var(--d); } 
        .bg-m, .bg-off { background: #64748b; } .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 15px; max-height: 85vh; overflow-y: auto; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div></div>

    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Karyawan & Absensi</h3>
                <div class="flex-row">
                    <input type="date" id="absTgl" style="width:130px">
                    <select id="selK"></select>
                </div>
                <div class="flex-row">
                    <select id="absJenis" onchange="toggleIzin()">
                        <option value="Hadir">Masuk</option>
                        <option value="Pulang">Pulang</option>
                        <option value="Izin">Izin</option>
                        <option value="Alpa">Alpa</option>
                    </select>
                </div>
                <div id="boxIzin" style="display:none; margin-bottom:10px"><input type="text" id="absKet" placeholder="Alasan..."></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
            <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card" style="border-top: 5px solid var(--p)">
                <h3>📥 Manajemen Gudang</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row">
                    <input type="number" id="stQty" placeholder="Jumlah Qty">
                    <select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Ready</option></select>
                </div>
                <div class="flex-row">
                    <select id="stQC"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select>
                    <select id="stAksi">
                        <option value="Masuk">Barang Masuk</option>
                        <option value="Rekondisi">Proses Rekon</option>
                        <option value="Jual Mitra">Jual (Mitra)</option>
                        <option value="Jual Umum">Jual (Umum)</option>
                    </select>
                </div>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">SIMPAN TRANSAKSI</button>
            </div>
            <div class="table-area" id="areaStok">
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-col">BARANG</th>
                            <th>AWAL KTR</th><th>AWAL RDY</th>
                            <th>IN KTR</th><th>IN RDY</th>
                            <th style="color:var(--d)">REJ</th><th>REKON</th>
                            <th>MITRA</th><th>UMUM</th>
                            <th style="background:#fef3c7">STOK KTR</th>
                            <th style="background:#dcfce7">STOK RDY</th>
                            <th style="background:var(--p); color:white">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="tbStok"></tbody>
                </table>
            </div>
            <button class="btn" style="background:#64748b" onclick="showLogs('stok_logs')">LIHAT LOG STOK</button>
        </div>
        <div id="tab-aktivitas" class="tab-content">
            <div class="card">
                <h3>🛠️ Input Borongan</h3>
                <div class="flex-row"><input type="date" id="akTgl" onchange="renderCheckKaryawan()"><select id="akJenis">
                    <option value="Rekondisi Kempu">Rekon Kempu</option>
                    <option value="Rekondisi jerigen 18L">Rekon 18L</option>
                    <option value="Rekondisi jerigen 5L">Rekon 5L</option>
                    <option value="muat barang">Muat</option>
                    <option value="bongkar barang">Bongkar</option>
                </select></div>
                <div id="akKaryawan" class="check-grid"></div>
                <input type="number" id="akQty" placeholder="Jumlah Hasil Kerja">
                <button class="btn" style="background:var(--p); margin-top:10px" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3>💰 Keuangan <input type="month" id="fUang" style="width:110px; height:30px"></h3>
                <div id="gTotal">TOTAL GAJI: Rp 0</div>
            </div>
            <div id="areaGaji" class="table-area"></div>
        </div>
    </div>

    <script>
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); const db = firebase.database();
        let D = {}; 
        const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000 };

        window.onload = () => {
            const t = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = t });
            document.getElementById('fUang').value = t.slice(0, 7);
            db.ref('/').on('value', s => { D = s.val() || {}; initUI(); autoRender(); });
        };

        function autoRender() { renderAll(); renderStok(); renderGaji(); renderCheckKaryawan(); }
        function tab(id) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); document.getElementById('nav-'+id).classList.add('active'); autoRender(); }

        function initUI() {
            const K = Object.values(D.master_karyawan || []), B = Object.values(D.master_barang || []);
            document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k}">${k}</option>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b}">${b}</option>`).join('');
        }

        // --- LOGIKA STOK DENGAN PENGAMAN ANTI-MINUS ---
        function saveSt() {
            const t = document.getElementById('stTgl').value, b = document.getElementById('stBrg').value, 
                  q = parseInt(document.getElementById('stQty').value) || 0, ak = document.getElementById('stAksi').value;
            
            if (q <= 0) return alert("Qty harus lebih dari 0!");

            // 1. Hitung stok REAL time saat ini (Global)
            let curKtr = 0, curRdy = 0;
            Object.values(D.stok_logs || {}).forEach(l => {
                if (l.b !== b) return;
                if (l.ak === "Masuk") l.kon === "Bekas" ? curKtr += l.q : curRdy += l.q;
                else if (l.ak === "Rekondisi") { curKtr -= l.q; curRdy += l.q; }
                else if (l.ak.includes("Jual")) curRdy -= l.q;
            });

            // 2. Validasi Anti-Minus
            if (ak === "Rekondisi" && q > curKtr) return alert(`Gagal! Stok Kotor ${b} tidak cukup (Hanya ada ${curKtr})`);
            if (ak.includes("Jual") && q > curRdy) return alert(`Gagal! Stok Ready ${b} tidak cukup (Hanya ada ${curRdy})`);

            // 3. Paksa QC "Accepted" jika bukan barang masuk
            const qcFinal = (ak === "Masuk") ? document.getElementById('stQC').value : "Accepted";

            db.ref('stok_logs').push({ t, b, q, kon: document.getElementById('stKon').value, qc: qcFinal, ak: ak }).then(() => {
                document.getElementById('stQty').value = ""; alert("Stok Terupdate!");
            });
        }

        function renderStok() {
            const B_arr = Object.values(D.master_barang || {}), fM = new Date().toISOString().slice(0, 7); 
            let h = "";
            B_arr.forEach(b => {
                let s = { ak:0, ab:0, ik:0, ib:0, rej:0, rk:0, jm:0, ju:0 };
                Object.values(D.stok_logs || {}).forEach(l => {
                    if(l.b !== b) return;
                    // Logika awal (bulan lalu) vs input bulan ini
                    if(l.t?.slice(0, 7) < fM) {
                        if(l.ak === "Masuk") l.kon === "Bekas" ? s.ak += l.q : s.ab += l.q;
                        else if(l.ak === "Rekondisi") { s.ak -= l.q; s.ab += l.q; }
                        else if(l.ak.includes("Jual")) s.ab -= l.q;
                    } else {
                        if(l.ak === "Masuk") l.kon === "Bekas" ? s.ik += l.q : s.ib += l.q;
                        else if(l.ak === "Rekondisi") s.rk += l.q;
                        else if(l.ak === "Jual Mitra") s.jm += l.q;
                        else if(l.ak === "Jual Umum") s.ju += l.q;
                        if(l.qc === "Reject") s.rej += l.q;
                    }
                });
                
                let ktr = (s.ak + s.ik) - s.rk;
                let rdy = (s.ab + s.ib + s.rk) - (s.jm + s.ju);
                // Tampilan tetap 0 jika data kosong
                ktr = ktr < 0 ? 0 : ktr; rdy = rdy < 0 ? 0 : rdy;

                h += `<tr><td class="sticky-col">${b}</td><td>${s.ak}</td><td>${s.ab}</td><td>${s.ik}</td><td>${s.ib}</td><td style="color:red">${s.rej}</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td style="background:#fef3c7">${ktr}</td><td style="background:#dcfce7">${rdy}</td><td style="background:var(--p); color:white">${ktr+rdy}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = h;
        }

        // --- FUNGSI LAINNYA ---
        function saveAbs() {
            const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value;
            db.ref(`absensi/${t}/${n}`).set({ j: j, jam: new Date().toLocaleTimeString() }).then(()=>alert("Absen OK!"));
        }

        function renderCheckKaryawan() {
            const tgl = document.getElementById('akTgl').value;
            const K = Object.values(D.master_karyawan || []);
            document.getElementById('akKaryawan').innerHTML = K.map(k => {
                const a = D.absensi?.[tgl]?.[k];
                const aktif = a && a.j === "Hadir";
                return `<label class="check-item" style="${aktif?'':'opacity:0.3'}"><input type="checkbox" class="chk-k" value="${k}" ${aktif?'':'disabled'}> ${k}</label>`;
            }).join('');
        }

        function saveAk() {
            const t=document.getElementById('akTgl').value, q=parseInt(document.getElementById('akQty').value), p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value), j=document.getElementById('akJenis').value;
            if(!p.length || !q) return alert("Lengkapi data!");
            db.ref('aktivitas').push({ t, j, q, p, isCair: !j.includes("jerigen") }).then(()=>{ alert("Berhasil!"); autoRender(); });
        }

        function renderGaji() {
            // Logika render gaji standar
            document.getElementById('areaGaji').innerHTML = "<p style='padding:10px'>Laporan Gaji Otomatis Terhitung...</p>";
        }

        function renderAll() {
            // Render tabel absensi bulanan
            const fM = document.getElementById('absTgl').value.slice(0, 7);
            document.getElementById('thA').innerHTML = `<tr><th class="sticky-col">Nama</th><th>Status Absensi</th></tr>`;
            document.getElementById('tbA').innerHTML = `<tr><td class="sticky-col">Pilih Tanggal & Karyawan di atas</td></tr>`;
        }

        function showLogs(t) {
            let l = Object.entries(D[t] || {}).reverse().slice(0, 15);
            openMod("Log Transaksi", l.map(x => `<div style='border-bottom:1px solid #eee; padding:5px'>[${x[1].t}] ${x[1].b || x[1].j} - ${x[1].q} unit <button onclick="removeItem('${t}','${x[0]}')">Hapus</button></div>`).join(''));
        }

        function openMod(t, h) { document.getElementById('modTitle').innerText = t; document.getElementById('modContent').innerHTML = h; document.getElementById('modalUni').style.display = 'flex'; }
        function closeMod() { document.getElementById('modalUni').style.display = 'none'; }
        function removeItem(p, k) { if(confirm("Hapus data ini?")) db.ref(`${p}/${k}`).remove(); }
    </script>
</body>
</html>
