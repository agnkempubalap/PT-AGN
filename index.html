<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT-AGN System</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0}
.card{background:#fff;border-radius:15px;padding:15px;margin:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:12px;border:none;border-radius:10px;margin:5px 0;color:#fff;font-weight:bold}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}
input,select{width:100%;padding:10px;border-radius:8px;margin:5px 0}
.flex{display:flex;gap:10px}
.box{flex:1;padding:10px;border-radius:10px;color:#fff;text-align:center}
.b1{background:#3498db}.b2{background:#2ecc71}.b3{background:#f1c40f}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s}
.show{opacity:1}

/* NAV */
.nav{display:flex;background:#fff;border-bottom:1px solid #ccc}
.nav button{flex:1;background:none;color:#333}
.nav .active{color:#3498db;font-weight:bold}
.page{display:none}
.page.active{display:block}
</style></head>
<body><div id="toast"></div><!-- NAVIGATION --><div class="nav">
<button onclick="showPage('home',this)" class="active">Home</button>
<button onclick="showPage('absen',this)">Absensi</button>
<button onclick="showPage('stok',this)">Stok</button>
<button onclick="showPage('aktivitas',this)">Aktivitas</button>
<button onclick="showPage('gaji',this)">Gaji</button>
</div><!-- HOME --><div id="home" class="page active">
<div class="card">
<h3>🏠 Halaman Utama</h3>
<p>Selamat datang di sistem PT-AGN</p>
</div>
</div><!-- ABSENSI --><div id="absen" class="page">
<div class="card">
<h3>📋 Absensi</h3>
<select id="nama"></select>
<button class="green" onclick="absenMasuk()">Masuk</button>
<button class="orange" onclick="absenPulang()">Pulang</button>
<button class="red" onclick="resetHari()">Reset</button>
<button class="blue" onclick="exportExcel()">Excel</button>
<button class="blue" onclick="exportPDF()">PDF</button>
</div><div class="card">
<h4>Dashboard</h4>
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div><div id="list"></div>
</div><!-- STOK --><div id="stok" class="page">
<div class="card">
<h3>📦 Stok Gudang</h3>
<p>Belum diisi</p>
</div>
</div><!-- AKTIVITAS --><div id="aktivitas" class="page">
<div class="card">
<h3>🧑‍💼 Aktivitas Harian</h3>
<p>Belum diisi</p>
</div>
</div><!-- GAJI --><div id="gaji" class="page">
<div class="card">
<h3>💰 Gaji</h3>
<p>Belum diisi</p>
</div>
</div><script>

// ===== NAVIGATION =====
function showPage(id,btn){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');

 document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
}

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("absensi")) || [];
let karyawan = ["Agung","Alda","Nur","Hasan","Hatta"];

const namaSelect = document.getElementById("nama");
namaSelect.innerHTML = karyawan.map(n=>`<option>${n}</option>`);

function toast(msg){
 const t = document.getElementById("toast");
 t.innerText = msg;
 t.classList.add("show");
 setTimeout(()=>t.classList.remove("show"),2000);
}

function now(){
 let d=new Date();
 return {tanggal:d.toISOString().split('T')[0],jam:d.toTimeString().split(' ')[0]}
}

function save(){
 localStorage.setItem("absensi", JSON.stringify(data));
 render();
}

function isTelat(jam){return jam>"08:00:00"}

function absenMasuk(){
 let n=namaSelect.value;
 let t=now();
 if(data.find(x=>x.nama==n&&x.tanggal==t.tanggal)){toast("Sudah absen");return}
 let status=isTelat(t.jam)?"Telat":"Hadir";
 data.push({nama:n,tanggal:t.tanggal,masuk:t.jam,pulang:"-",status});
 save();
}

function absenPulang(){
 let n=namaSelect.value;
 let t=now();
 let d=data.find(x=>x.nama==n&&x.tanggal==t.tanggal);
 if(!d){toast("Belum masuk");return}
 d.pulang=t.jam;
 save();
}

function resetHari(){
 let today=now().tanggal;
 data=data.filter(x=>x.tanggal!=today);
 save();
}

function render(){
 document.getElementById("list").innerHTML=data.map(x=>`
 <div class="card">
 <b>${x.nama}</b><br>${x.tanggal}<br>${x.status}
 </div>`).join("");

 document.getElementById("total").innerText=data.length;
 document.getElementById("hadir").innerText=data.filter(x=>x.status=="Hadir").length;
 document.getElementById("telat").innerText=data.filter(x=>x.status=="Telat").length;
}

render();
</script></body>
</html>
