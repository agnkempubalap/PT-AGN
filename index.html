<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{font-family:sans-serif;background:#a9c4df;padding:10px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:10px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;color:#fff}
.green{background:#2ecc71}.orange{background:#f39c12}.blue{background:#3498db}.red{background:#e74c3c}
.status{padding:5px 10px;border-radius:10px;color:#fff}
.hadir{background:#2ecc71}.telat{background:#f39c12}.izin{background:#3498db}.alpa{background:#7f8c8d}
</style>
</head>

<body>

<div id="loginBox" class="card">
<h3>Login Admin</h3>
<input type="password" id="pin">
<button class="blue" onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<select id="nama"></select>

<button class="green" onclick="masuk()">Masuk</button>
<button class="orange" onclick="pulang()">Pulang</button>
<button class="blue" onclick="izin()">Izin</button>
<button class="red" onclick="reset()">Reset</button>

<input id="wa" placeholder="Nomor WA">
<button class="blue" onclick="kirimWA()">WA Harian</button>

<h4>Kelola Karyawan</h4>

<input id="karyawanBaru" placeholder="Tambah nama">
<button onclick="tambahKaryawan()">Tambah</button>

<select id="hapusNama"></select>
<button class="red" onclick="hapusKaryawan()">Hapus</button>

<select id="editNama"></select>
<input id="namaBaru" placeholder="Nama baru">
<button class="orange" onclick="editKaryawan()">Edit Nama</button>

</div>

<div class="card">
<h3>Dashboard</h3>
<div style="display:flex;gap:10px">
<div class="card" style="flex:1;background:#3498db;color:#fff" id="hadirBox">0</div>
<div class="card" style="flex:1;background:#2ecc71;color:#fff" id="telatBox">0</div>
<div class="card" style="flex:1;background:#f1c40f;color:#fff" id="alpaBox">0</div>
</div>
</div>

<div class="card">
<h3>Grafik Harian</h3>
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

<div class="card">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>Grafik Per Orang</h3>
<select id="pilih"></select>
<canvas id="chart2"></canvas>
</div>

<div class="card">
<h3>📊 Laporan Bulanan</h3>
<input type="month" id="bulan">
<button class="blue" onclick="kirimLaporanBulanan()">Kirim WA</button>
<pre id="previewBulanan"></pre>
</div>

</div>

<script>

// ===== FIREBASE =====
const firebaseConfig={
 apiKey:"AIzaSyAu67MAhW8xdmciPi3xOKwdy-uP4u9tXI",
 authDomain:"pt-agn.firebaseapp.com",
 databaseURL:"https://pt-agn-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let data=[],karyawan=[];

// ===== LOAD =====
db.ref("absensi").on("value",s=>{
 data=s.val()||[];
 render();
});

db.ref("karyawan").on("value",s=>{
 if(s.exists()){
   karyawan=s.val();
 }else{
   karyawan=["Agung","Alda","Nur","Budi","Siti"];
   db.ref("karyawan").set(karyawan);
 }
 updateDrop();
});

// ===== LOGIN =====
let PIN=localStorage.getItem("PIN")||"1234";
function login(){
 if(pin.value==PIN){
  localStorage.setItem("login",true);
  loginBox.style.display="none";
  app.style.display="block";
 }else alert("PIN salah");
}
if(localStorage.getItem("login")){
 loginBox.style.display="none";
 app.style.display="block";
}

// ===== DROPDOWN =====
function updateDrop(){
 nama.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
 pilih.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
 hapusNama.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
 editNama.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
}

// ===== KARYAWAN =====
function tambahKaryawan(){
 if(!karyawanBaru.value)return;
 karyawan.push(karyawanBaru.value);
 db.ref("karyawan").set(karyawan);
 karyawanBaru.value="";
}

function hapusKaryawan(){
 let n=hapusNama.value;
 if(!confirm("Hapus "+n+"?"))return;

 karyawan=karyawan.filter(x=>x!==n);
 data=data.filter(x=>x.nama!==n);

 db.ref("karyawan").set(karyawan);
 db.ref("absensi").set(data);
}

function editKaryawan(){
 let lama=editNama.value;
 let baru=namaBaru.value;

 if(!baru)return alert("Isi nama baru");

 // update list karyawan
 karyawan=karyawan.map(n=>n===lama?baru:n);

 // update data absensi
 data=data.map(x=>{
  if(x.nama===lama)x.nama=baru;
  return x;
 });

 db.ref("karyawan").set(karyawan);
 db.ref("absensi").set(data);

 namaBaru.value="";
 alert("Nama berhasil diubah");
}

// ===== WAKTU =====
function now(){
 let d=new Date();
 return {tgl:d.toISOString().split('T')[0],jam:d.toTimeString().split(' ')[0]};
}

// ===== ABSEN =====
function masuk(){
 let t=now(),n=nama.value;
 if(data.find(x=>x.nama==n&&x.tgl==t.tgl))return;
 data.push({nama:n,tgl:t.tgl,masuk:t.jam,status:t.jam>"09:00:00"?"Telat":"Hadir"});
 save();
}
function pulang(){
 let t=now();
 let d=data.find(x=>x.nama==nama.value&&x.tgl==t.tgl);
 if(d)d.pulang=t.jam;
 save();
}
function izin(){
 let t=now();
 data.push({nama:nama.value,tgl:t.tgl,status:"Izin"});
 save();
}
function reset(){
 let t=now().tgl;
 data=data.filter(x=>x.tgl!=t);
 save();
}
function save(){ db.ref("absensi").set(data); }

// ===== AUTO ALPA =====
setInterval(()=>{
 let t=now();
 if(t.jam>="16:00:00"){
  karyawan.forEach(n=>{
   if(!data.find(x=>x.nama==n&&x.tgl==t.tgl)){
    data.push({nama:n,tgl:t.tgl,status:"Alpa"});
   }
  });
  save();
 }
},60000);

// ===== RANKING =====
function rank(){
 let r={};
 data.forEach(x=>{
  if(!r[x.nama])r[x.nama]={score:0};
  if(x.status=="Hadir")r[x.nama].score+=3;
  if(x.status=="Telat")r[x.nama].score+=1;
  if(x.status=="Alpa")r[x.nama].score-=3;
 });
 return Object.entries(r).map(([n,v])=>({n,...v})).sort((a,b)=>b.score-a.score);
}

// ===== RENDER =====
let chart,chart2;

function render(){

list.innerHTML=data.map(x=>`
<div class="card">
<b>${x.nama}</b><br>
${x.tgl}<br>
Masuk:${x.masuk||'-'}<br>
Pulang:${x.pulang||'-'}<br>
<span class="status ${x.status.toLowerCase()}">${x.status}</span>
</div>
`).join("");

hadirBox.innerText=data.filter(x=>x.status=="Hadir").length;
telatBox.innerText=data.filter(x=>x.status=="Telat").length;
alpaBox.innerText=data.filter(x=>x.status=="Alpa").length;

let r=rank();
ranking.innerHTML=r.map((x,i)=>`#${i+1} ${x.n} (${x.score})`).join("<br>");

let h=data.filter(x=>x.status=="Hadir").length;
let t=data.filter(x=>x.status=="Telat").length;
let a=data.filter(x=>x.status=="Alpa").length;

if(chart)chart.destroy();
chart=new Chart(chart,{type:'bar',data:{labels:["Hadir","Telat","Alpa"],datasets:[{label:"Absensi",data:[h,t,a]}]}});

let n=pilih.value;
let d=data.filter(x=>x.nama==n);

if(chart2)chart2.destroy();
chart2=new Chart(chart2,{type:'bar',data:{labels:["Hadir","Telat","Alpa"],datasets:[{label:n,data:[
d.filter(x=>x.status=="Hadir").length,
d.filter(x=>x.status=="Telat").length,
d.filter(x=>x.status=="Alpa").length
]}]}});

previewBulanan.innerText=generateLaporan();
}

// ===== WA =====
function kirimWA(){
 if(!wa.value)return alert("Isi nomor");
 let txt="Absensi\n";
 data.forEach(d=>txt+=`${d.nama} ${d.status}\n`);
 window.open(`https://wa.me/${wa.value}?text=${encodeURIComponent(txt)}`);
}

// ===== LAPORAN BULANAN =====
function generateLaporan(){
 if(!bulan.value)return "Pilih bulan";
 let hasil={};

 data.forEach(x=>{
  if(!x.tgl.includes(bulan.value))return;
  if(!hasil[x.nama])hasil[x.nama]={h:0,t:0,a:0,s:0};

  if(x.status=="Hadir"){hasil[x.nama].h++;hasil[x.nama].s+=3;}
  if(x.status=="Telat"){hasil[x.nama].t++;hasil[x.nama].s+=1;}
  if(x.status=="Alpa"){hasil[x.nama].a++;hasil[x.nama].s-=3;}
 });

 let arr=Object.entries(hasil).map(([n,v])=>({n,...v}))
 .sort((a,b)=>b.s-a.s);

 let txt="📊 LAPORAN BULANAN\n\n";
 arr.forEach((x,i)=>{
  txt+=`#${i+1} ${x.n}\nH:${x.h} T:${x.t} A:${x.a}\nSkor:${x.s}\n\n`;
 });

 return txt;
}

function kirimLaporanBulanan(){
 if(!wa.value)return alert("Isi nomor");
 window.open(`https://wa.me/${wa.value}?text=${encodeURIComponent(generateLaporan())}`);
}

</script>
</body>
</html>
