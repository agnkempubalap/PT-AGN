<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PT AGN</title>

<style>
body { font-family: Arial; margin:0; background:#eef3ff; }
.page { display:none; padding:15px; }
.active { display:block; }
h2 { color:blue; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
}

.nav button {
  flex:1;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Aplikasi Gudang PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi</h2>
<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hata</option>
<option>Alda</option>
<option>Nur</option>
</select>
<button onclick="absen()">Hadir</button>
<ul id="listAbsen"></ul>
</div>

<!-- KERJA -->
<div id="kerja" class="page">
<h2>Kerja</h2>

<input id="kempu" placeholder="Kempu">
<button onclick="hitung('Kempu',100000,'kempu')">Hitung</button>

<input id="jerigen" placeholder="Jerigen">
<button onclick="hitung('Jerigen',1000,'jerigen')">Hitung</button>

<input id="bongkar" placeholder="Bongkar (25=100rb)">
<button onclick="hitungBongkar()">Hitung</button>

<input id="pangkalan" placeholder="Pangkalan">
<button onclick="hitung('Pangkalan',500000,'pangkalan')">Hitung</button>

</div>

<!-- STOK -->
<div id="stok" class="page">
<h2>Stok</h2>
<input id="barangStok" placeholder="Nama Barang">
<input id="jumlahStok" placeholder="Jumlah">
<button onclick="tambahStok()">Tambah</button>
<ul id="listStok"></ul>
</div>

<!-- KASIR -->
<div id="kasir" class="page">
<h2>Kasir</h2>
<input id="barang" placeholder="Barang">
<input id="harga" placeholder="Harga">
<input id="qty" placeholder="Qty">
<button onclick="tambahKasir()">Tambah</button>

<ul id="listKasir"></ul>
<h3>Total: <span id="totalKasir">0</span></h3>
</div>

<!-- GAJI -->
<div id="gaji" class="page">
<h2>Gaji</h2>

<input id="kasbon" placeholder="Kasbon">
<button onclick="tambahKasbon()">Tambah Kasbon</button>

<input id="bonus" placeholder="Bonus">
<button onclick="tambahBonus()">Tambah Bonus</button>

<button onclick="totalGaji()">Hitung Total</button>
<input id="totalGaji" readonly>

<ul id="rekap"></ul>
<button onclick="resetAll()">Reset Semua</button>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
<button onclick="show('kerja')">Kerja</button>
<button onclick="show('stok')">Stok</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('gaji')">Gaji</button>
</div>

<script>

// NAV
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// TANGGAL
function tgl(){
  let d=new Date();
  return d.toLocaleDateString();
}

// SIMPAN TRANSAKSI
function simpan(jenis,jumlah){
  let data=JSON.parse(localStorage.getItem("trx")||"[]");
  data.push({tgl:tgl(),jenis:jenis,jumlah:jumlah});
  localStorage.setItem("trx",JSON.stringify(data));
}

// ABSEN
function absen(){
  let nama=document.getElementById('nama').value;
  let data=JSON.parse(localStorage.getItem("absen")||"[]");
  data.push(nama+" hadir");
  localStorage.setItem("absen",JSON.stringify(data));
  tampilAbsen();
}

function tampilAbsen(){
  let data=JSON.parse(localStorage.getItem("absen")||"[]");
  let list=document.getElementById('listAbsen');
  list.innerHTML="";
  data.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i;
    list.appendChild(li);
  });
}

// KERJA
function hitung(jenis,harga,id){
  let j=document.getElementById(id).value;
  let hasil=j*harga;
  simpan(jenis,hasil);
}

function hitungBongkar(){
  let j=document.getElementById('bongkar').value;
  let hasil=(j/25)*100000;
  simpan("Bongkar",hasil);
}

// KASBON BONUS
function tambahKasbon(){
  let j=document.getElementById('kasbon').value;
  simpan("Kasbon",-j);
}

function tambahBonus(){
  let j=document.getElementById('bonus').value;
  simpan("Bonus",Number(j));
}

// TOTAL
function totalGaji(){
  let data=JSON.parse(localStorage.getItem("trx")||"[]");
  let total=0;
  data.forEach(d=> total+=Number(d.jumlah));
  document.getElementById('totalGaji').value=total;
  tampilRekap();
}

// REKAP
function tampilRekap(){
  let data=JSON.parse(localStorage.getItem("trx")||"[]");
  let list=document.getElementById('rekap');
  list.innerHTML="";
  data.forEach(d=>{
    let li=document.createElement('li');
    li.innerText=d.tgl+" | "+d.jenis+" | "+d.jumlah;
    list.appendChild(li);
  });
}

// STOK
function tambahStok(){
  let b=document.getElementById('barangStok').value;
  let j=document.getElementById('jumlahStok').value;
  let data=JSON.parse(localStorage.getItem("stok")||"[]");
  data.push(b+" : "+j);
  localStorage.setItem("stok",JSON.stringify(data));
  tampilStok();
}

function tampilStok(){
  let data=JSON.parse(localStorage.getItem("stok")||"[]");
  let list=document.getElementById('listStok');
  list.innerHTML="";
  data.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i;
    list.appendChild(li);
  });
}

// KASIR
function tambahKasir(){
  let b=document.getElementById('barang').value;
  let h=document.getElementById('harga').value;
  let q=document.getElementById('qty').value;

  let total=h*q;

  let data=JSON.parse(localStorage.getItem("kasir")||"[]");
  data.push(b+" x"+q+" = "+total);
  localStorage.setItem("kasir",JSON.stringify(data));

  let t=Number(localStorage.getItem("totalKasir")||0);
  t+=Number(total);
  localStorage.setItem("totalKasir",t);

  tampilKasir();
}

function tampilKasir(){
  let data=JSON.parse(localStorage.getItem("kasir")||"[]");
  let list=document.getElementById('listKasir');
  list.innerHTML="";
  data.forEach(i=>{
    let li=document.createElement('li');
    li.innerText=i;
    list.appendChild(li);
  });

  document.getElementById('totalKasir').innerText=localStorage.getItem("totalKasir")||0;
}

// RESET
function resetAll(){
  localStorage.clear();
  location.reload();
}

// LOAD
window.onload=function(){
  tampilAbsen();
  tampilStok();
  tampilKasir();
}
</script>

</body>
</html>
