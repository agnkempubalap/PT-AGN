<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PT AGN</title>

<style>
body { font-family: Arial; margin:0; background:#eef3ff; }
.page { display:none; padding:15px; }
.active { display:block; }
h2 { color:blue; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Selamat datang di PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi</h2>
<div class="card">
<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hata</option>
<option>Alda</option>
<option>Nur</option>
</select>
<button onclick="absen()">Hadir</button>
<ul id="listAbsen"></ul>
<button onclick="resetAbsen()">Reset Absen</button>
</div>
</div>

<!-- KERJA -->
<div id="kerja" class="page">
<h2>Input Kerja</h2>

<div class="card">
<h3>Kempu</h3>
<input id="kempu" placeholder="Jumlah">
<button onclick="hitungKempu()">Hitung</button>
<input id="hasilKempu" readonly>
</div>

<div class="card">
<h3>Jerigen</h3>
<input id="jerigen" placeholder="Jumlah">
<button onclick="hitungJerigen()">Hitung</button>
<input id="hasilJerigen" readonly>
</div>

<div class="card">
<h3>Bongkar Muat</h3>
<input id="bongkar" placeholder="Jumlah Kempu">
<button onclick="hitungBongkar()">Hitung</button>
<input id="hasilBongkar" readonly>
</div>

<div class="card">
<h3>Pangkalan</h3>
<input id="pangkalan" placeholder="Jumlah Orang">
<button onclick="hitungPangkalan()">Hitung</button>
<input id="hasilPangkalan" readonly>
</div>

</div>

<!-- STOK -->
<div id="stok" class="page">
<h2>Stok Gudang</h2>
<div class="card">
<input id="namaBarang" placeholder="Nama Barang">
<input id="stokMasuk" placeholder="Jumlah">
<button onclick="tambahStok()">Tambah</button>

<ul id="listStok"></ul>
<button onclick="resetStok()">Reset Stok</button>
</div>
</div>

<!-- KASIR -->
<div id="kasir" class="page">
<h2>Kasir</h2>
<div class="card">
<input id="barang" placeholder="Nama Barang">
<input id="harga" placeholder="Harga">
<input id="qty" placeholder="Jumlah">
<button onclick="tambahKasir()">Tambah</button>

<ul id="listKasir"></ul>

<h3>Total: <span id="totalKasir">0</span></h3>
<button onclick="resetKasir()">Reset</button>
</div>
</div>

<!-- GAJI -->
<div id="gaji" class="page">
<h2>Gaji</h2>
<div class="card">
<button onclick="totalGaji()">Hitung Total Gaji</button>
<input id="totalGaji" readonly>
<button onclick="resetGaji()">Reset Gaji</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
<button onclick="show('kerja')">Kerja</button>
<button onclick="show('stok')">Stok</button>
<button onclick="show('kasir')">Kasir</button>
<button onclick="show('gaji')">Gaji</button>
</div>

<script>
// NAV
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================= ABSEN =================
function absen(){
  let nama = document.getElementById('nama').value;
  let data = JSON.parse(localStorage.getItem("absen") || "[]");
  data.push(nama + " hadir");
  localStorage.setItem("absen", JSON.stringify(data));
  tampilAbsen();
}

function tampilAbsen(){
  let data = JSON.parse(localStorage.getItem("absen") || "[]");
  let list = document.getElementById('listAbsen');
  list.innerHTML = "";
  data.forEach(i=>{
    let li = document.createElement('li');
    li.innerText = i;
    list.appendChild(li);
  });
}

function resetAbsen(){
  localStorage.removeItem("absen");
  tampilAbsen();
}

// ================= GAJI =================
let total = localStorage.getItem("total") || 0;

function hitungKempu(){
  let j = document.getElementById('kempu').value;
  let hasil = j * 100000;
  total = Number(total) + hasil;
  localStorage.setItem("total", total);
  document.getElementById('hasilKempu').value = hasil;
}

function hitungJerigen(){
  let j = document.getElementById('jerigen').value;
  let hasil = j * 1000;
  total = Number(total) + hasil;
  localStorage.setItem("total", total);
  document.getElementById('hasilJerigen').value = hasil;
}

function hitungBongkar(){
  let j = document.getElementById('bongkar').value;
  let hasil = (j/25) * 100000;
  total = Number(total) + hasil;
  localStorage.setItem("total", total);
  document.getElementById('hasilBongkar').value = hasil;
}

function hitungPangkalan(){
  let j = document.getElementById('pangkalan').value;
  let hasil = j * 500000;
  total = Number(total) + hasil;
  localStorage.setItem("total", total);
  document.getElementById('hasilPangkalan').value = hasil;
}

function totalGaji(){
  document.getElementById('totalGaji').value = localStorage.getItem("total") || 0;
}

function resetGaji(){
  localStorage.removeItem("total");
  total = 0;
  document.getElementById('totalGaji').value = 0;
}

// ================= STOK =================
function tambahStok(){
  let nama = document.getElementById('namaBarang').value;
  let jumlah = document.getElementById('stokMasuk').value;

  let data = JSON.parse(localStorage.getItem("stok") || "[]");
  data.push(nama + " : " + jumlah);
  localStorage.setItem("stok", JSON.stringify(data));

  tampilStok();
}

function tampilStok(){
  let data = JSON.parse(localStorage.getItem("stok") || "[]");
  let list = document.getElementById('listStok');
  list.innerHTML = "";
  data.forEach(i=>{
    let li = document.createElement('li');
    li.innerText = i;
    list.appendChild(li);
  });
}

function resetStok(){
  localStorage.removeItem("stok");
  tampilStok();
}

// ================= KASIR =================
function tambahKasir(){
  let barang = document.getElementById('barang').value;
  let harga = document.getElementById('harga').value;
  let qty = document.getElementById('qty').value;

  let totalItem = harga * qty;

  let data = JSON.parse(localStorage.getItem("kasir") || "[]");
  data.push(barang + " x" + qty + " = " + totalItem);
  localStorage.setItem("kasir", JSON.stringify(data));

  let totalKasir = Number(localStorage.getItem("totalKasir") || 0);
  totalKasir += totalItem;
  localStorage.setItem("totalKasir", totalKasir);

  tampilKasir();
}

function tampilKasir(){
  let data = JSON.parse(localStorage.getItem("kasir") || "[]");
  let list = document.getElementById('listKasir');
  list.innerHTML = "";

  data.forEach(i=>{
    let li = document.createElement('li');
    li.innerText = i;
    list.appendChild(li);
  });

  document.getElementById('totalKasir').innerText = localStorage.getItem("totalKasir") || 0;
}

function resetKasir(){
  localStorage.removeItem("kasir");
  localStorage.removeItem("totalKasir");
  tampilKasir();
}

// ================= LOAD =================
window.onload = function(){
  tampilAbsen();
  tampilStok();
  tampilKasir();
  document.getElementById('totalGaji').value = localStorage.getItem("total") || 0;
}
</script>

</body>
</html>
