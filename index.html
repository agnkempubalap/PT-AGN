<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V961-PRO HYBRID</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; flex: 1; min-width: 100px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; }
        th { background: #f8fafc; color: #64748b; font-weight: 800; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; border-right: 2px solid #eee; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 10px; position: relative; }
        .dot { position: absolute; top: 1px; right: 1px; width: 4px; height: 4px; background: white; border-radius: 50%; }
        .bg-h, .bg-t { background: var(--s); } .bg-i { background: var(--w); } .bg-a { background: var(--d); } 
        .bg-m { background: #64748b; } .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .chk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .chk-item { background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal" onclick="if(event.target===this)closeMod()">
        <div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div>
    </div>
    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>
    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Karyawan <input type="text" id="inK" placeholder="Nama..." style="width:100px;height:30px"> <button class="btn" style="background:var(--p);width:50px;margin:0" onclick="addItem('master_karyawan','inK')">ADD</button></h3>
                <div id="listK" style="display:flex;flex-wrap:wrap;gap:5px"></div>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" style="width:110px;height:30px"></h3>
                <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
            </div>
            <div class="card">
                <h3>📅 Input <input type="date" id="absTgl" style="width:115px;height:30px"></h3>
                <div class="flex-row"><select id="selK"></select><select id="absJenis"><option value="Hadir">Masuk</option><option value="Pulang">Pulang</option><option value="Izin">Izin</option></select></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
        </div>
        <div id="tab-stok" class="tab-content">
             <div class="card">
                <h3>📥 Logistik & Penjualan</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row"><input type="number" id="stQty" placeholder="Jumlah"><select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Rdy</option></select></div>
                <div class="flex-row"><select id="stAksi"><option value="Masuk">Masuk</option><option value="Rekondisi">Rekondisi (Cairkan Jerigen)</option><option value="Jual Mitra">Jual Mitra (Cairkan Jerigen)</option><option value="Jual Umum">Jual Umum (Cairkan Jerigen)</option></select></div>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">PROSES & CAIRKAN UPAH</button>
            </div>
            <div class="table-area" id="areaStok"><table><thead><tr><th class="sticky-col">BARANG</th><th>IN KTR</th><th>IN RDY</th><th>REKON</th><th>MITRA</th><th>UMUM</th><th style="background:#fef3c7">S-KTR</th><th style="background:#dcfce7">S-RDY</th></tr></thead><tbody id="tbStok"></tbody></table></div>
        </div>
    <div id="tab-aktivitas" class="tab-content">
        <div class="card">
            <h3>🛠️ Input Borongan <input type="date" id="akTgl" onchange="renderCheckKaryawan()"></h3>
            <select id="akJenis" style="margin-bottom:10px">
                <option value="Rekondisi Kempu">Rekon Kempu (Langsung Cair)</option>
                <option value="Rekondisi jerigen 18L">Rekon 18L (Pending Cair Jual)</option>
                <option value="Rekondisi jerigen 5L">Rekon 5L (Pending Cair Jual)</option>
                <option value="muat barang">Muat (Langsung Cair)</option>
                <option value="bongkar barang">Bongkar (Langsung Cair)</option>
                <option value="kirim minyak">Kirim Minyak (Uang Bensin/Jalan)</option>
            </select>
            <div id="akKaryawan" class="chk-grid"></div>
            <input type="number" id="akQty" placeholder="Jumlah Output (Boleh 0)" style="margin-bottom:10px">
            <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
        </div>
    </div>

    <div id="tab-gaji" class="tab-content">
        <div class="card" style="background:var(--p); color:white">
            <h3>💰 Ringkasan <input type="month" id="fUang" style="width:110px;height:30px"></h3>
            <div class="flex-row"><div>GAJI CAIR: <b id="gTotal">0</b></div><div>TOTAL BELANJA/BENSIN: <b id="nTotal">0</b></div></div>
        </div>
        <div id="areaGaji"></div>
    </div>
</div>

<script>
    const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
    firebase.initializeApp(fbConfig); const db = firebase.database();
    let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000 };

    window.onload = () => {
        const t = new Date().toISOString().split('T')[0];
        ['absTgl','stTgl','akTgl'].forEach(i => document.getElementById(i).value = t);
        ['fM','fUang'].forEach(i => document.getElementById(i).value = t.slice(0, 7));
        db.ref('/').on('value', s => { D = s.val() || {}; initUI(); autoRender(); });
    };

    function autoRender() { renderAll(); renderStok(); renderGaji(); renderCheckKaryawan(); }
    function tab(id) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); document.getElementById('nav-'+id).classList.add('active'); }

    // --- LOGIKA AKTIVITAS & BENSIN ---
    function saveAk() {
        const t = document.getElementById('akTgl').value, j = document.getElementById('akJenis').value, q = parseInt(document.getElementById('akQty').value) || 0;
        const p = Array.from(document.querySelectorAll('.chk-k:checked')).map(c => c.value);
        const T = D.tarif || DEF_TARIF;
        if(!p.length) return alert("Pilih Karyawan!");

        const isMinyak = j.toLowerCase().includes("minyak");
        const isJerigen = j.toLowerCase().includes("jerigen");

        db.ref('aktivitas').push({ t, j, q, p, isCair: !isJerigen }).then(() => {
            if(isMinyak) {
                db.ref('belanja').push({ t, n: `Uang Jalan (${p.join(",")})`, rp: (T[j] || 0) });
                alert("Uang Jalan dicatat ke PENGELUARAN.");
            } else {
                alert("Kerja Berhasil Dicatat.");
            }
            document.getElementById('akQty').value = "";
        });
    }

    // --- LOGIKA GAJI (HYBRID) ---
    function renderGaji() {
        const fM = document.getElementById('fUang').value, T = D.tarif || DEF_TARIF, K = Object.values(D.master_karyawan || {});
        let tG = 0, tB = 0;
        Object.values(D.belanja || {}).forEach(b => { if(b.t.startsWith(fM)) tB += b.rp; });

        let h = `<table><tr><th class="sticky-col">NAMA</th><th>BORONG CAIR</th><th>PENDING</th><th>KASBON</th><th>NETT</th></tr>`;
        K.forEach(k => {
            let cair = 0, pend = 0, kas = 0;
            Object.values(D.aktivitas || {}).forEach(a => {
                if(a.t.startsWith(fM) && a.p.includes(k) && !a.j.includes("minyak")) {
                    let upah = (T[a.j] || 0) / a.p.length;
                    if(a.isCair) cair += upah; else pend += upah;
                }
            });
            Object.values(D.kasbon_bonus || {}).forEach(kb => { if(kb.n===k && kb.t===fM) kas += kb.rp; });
            let nett = cair - kas; tG += nett;
            h += `<tr><td class="sticky-col">${k}</td><td style="color:var(--s)">${Math.round(cair).toLocaleString()}</td><td style="color:var(--w)">${Math.round(pend).toLocaleString()}</td><td>${kas.toLocaleString()}</td><td style="font-weight:800">Rp ${Math.round(nett).toLocaleString()}</td></tr>`;
        });
        document.getElementById('areaGaji').innerHTML = h + `</table>`;
        document.getElementById('gTotal').innerText = "Rp " + tG.toLocaleString();
        document.getElementById('nTotal').innerText = "Rp " + tB.toLocaleString();
    }

    // --- LOGIKA STOK & CAIRKAN JERIGEN ---
    function saveSt() {
        const t = document.getElementById('stTgl').value, b = document.getElementById('stBrg').value, q = parseInt(document.getElementById('stQty').value), ak = document.getElementById('stAksi').value;
        if(!q) return alert("Isi Qty!");
        db.ref('stok_logs').push({ t, b, q, kon:document.getElementById('stKon').value, ak }).then(() => {
            if(ak.includes("Jual") || ak === "Rekondisi") {
                let sisa = q;
                let logs = Object.entries(D.aktivitas || {}).filter(x => x[1].j.toLowerCase().includes("jerigen") && !x[1].isCair).sort((a,b)=>a[1].t.localeCompare(b[1].t));
                logs.forEach(log => {
                    if(sisa > 0) { 
                        db.ref(`aktivitas/${log[0]}`).update({ isCair: true, tglCair: t }); 
                        sisa -= (log[1].q || 1); // Jika Qty 0, dianggap kurangi 1 antrean
                    }
                });
            }
            alert("Stok Update & Upah Jerigen Dicairkan!");
        });
    }

    // --- STANDAR UI ---
    function renderCheckKaryawan() {
        const t = document.getElementById('akTgl').value, K = Object.values(D.master_karyawan || {});
        document.getElementById('akKaryawan').innerHTML = K.map(k => {
            const a = D.absensi?.[t]?.[k], ok = a && (a.j === 'Hadir' || a.j === 'Telat');
            return `<label class="chk-item" style="${ok?'':'opacity:0.3'}"><input type="checkbox" class="chk-k" value="${k}" ${ok?'':'disabled'}> ${k}</label>`;
        }).join('');
    }
    function initUI() {
        const K = Object.values(D.master_karyawan || {}), B = Object.values(D.master_barang || {});
        document.getElementById('selK').innerHTML = K.map(k=>`<option>${k}</option>`).join('');
        document.getElementById('stBrg').innerHTML = B.map(b=>`<option>${b}</option>`).join('');
        document.getElementById('listK').innerHTML = Object.entries(D.master_karyawan||{}).map(k=>`<span>${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red">×</b></span>`).join('');
    }
    function tab(id) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); document.getElementById('nav-'+id).classList.add('active'); }
    function addItem(p,id) { const v=document.getElementById(id).value; if(v) db.ref(p).push(v).then(()=>document.getElementById(id).value=""); }
    function removeItem(p,k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove(); }
    function saveAbs() {
        const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value;
        db.ref(`absensi/${t}/${n}`).set({ j, jam: new Date().toLocaleTimeString() }).then(()=>alert("Absen OK!"));
    }
    function renderAll() {
        const K = Object.values(D.master_karyawan || {}), fM = document.getElementById('fM').value; if(!fM) return;
        const [Y, M] = fM.split('-'), lastD = new Date(Y, M, 0).getDate();
        let th = `<tr><th class="sticky-col">NAMA</th>`; for(let i=1;i<=lastD;i++) th+=`<th>${i}</th>`;
        document.getElementById('thA').innerHTML = th+`</tr>`;
        let tb = ""; K.forEach(k => {
            let r = `<td class="sticky-col">${k}</td>`;
            for(let i=1;i<=lastD;i++) {
                let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k];
                r += `<td><div class="badge ${a?'bg-'+a.j[0].toLowerCase():'bg-none'}">${a?a.j[0]:'-'}</div></td>`;
            }
            tb += `<tr>${r}</tr>`;
        });
        document.getElementById('tbA').innerHTML = tb;
    }
    function renderStok() {
        const B = Object.values(D.master_barang || {}); let h = "";
        B.forEach(b => {
            let ik=0, ir=0, rk=0, jm=0, ju=0;
            Object.values(D.stok_logs || {}).forEach(l => {
                if(l.b===b) {
                    if(l.ak==='Masuk') l.kon==='Bekas'?ik+=l.q:ir+=l.q;
                    else if(l.ak==='Rekondisi') rk+=l.q;
                    else if(l.ak==='Jual Mitra') jm+=l.q;
                    else if(l.ak==='Jual Umum') ju+=l.q;
                }
            });
            h += `<tr><td class="sticky-col">${b}</td><td>${ik}</td><td>${ir}</td><td>${rk}</td><td>${jm}</td><td>${ju}</td><td>${ik-rk}</td><td>${ir+rk-jm-ju}</td></tr>`;
        });
        document.getElementById('tbStok').innerHTML = h;
    }
</script>
</body>
</html>
