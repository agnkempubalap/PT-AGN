<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi PT-AGN</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, doc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
</script>

<!-- Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:sans-serif;background:#eef2f7;padding:10px}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;font-weight:bold;color:white}
.green{background:#27ae60}
.orange{background:#f39c12}
.red{background:#e74c3c}
.blue{background:#3498db}
select,input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
.badge{padding:4px 10px;border-radius:8px;color:white}
.hadir{background:#27ae60}
.telat{background:#f39c12}
</style>
</head>

<body>

<div class="card">
<h2>📋 Absensi PT-AGN</h2>

<select id="nama"></select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>

<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<h3>Filter</h3>
<input type="month" id="bulan">
<input type="text" id="search" placeholder="Cari nama...">
</div>

<div class="card">
<h3>Dashboard</h3>
<div id="dashboard"></div>
</div>

<div id="list"></div>

<script type="module">
import { collection, addDoc, updateDoc, doc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const db = window.db;

let allData = [];

// LOAD KARYAWAN
async function loadKaryawan(){
  const snap = await getDocs(collection(db,"karyawan"));
  const select = document.getElementById("nama");
  select.innerHTML="";
  snap.forEach(d=>{
    const opt=document.createElement("option");
    opt.value=d.data().nama;
    opt.textContent=d.data().nama;
    select.appendChild(opt);
  });
}
loadKaryawan();

// REALTIME DATA
onSnapshot(collection(db,"absensi"), snap=>{
  allData=[];
  snap.forEach(d=>allData.push({id:d.id,...d.data()}));
  render();
});

// ABSEN MASUK
window.absenMasuk=async()=>{
  const nama=document.getElementById("nama").value;
  const today=new Date().toISOString().split("T")[0];

  const q=query(collection(db,"absensi"),where("nama","==",nama),where("tanggal","==",today));
  const cek=await getDocs(q);

  if(!cek.empty){
    alert("Sudah absen masuk!");
    return;
  }

  await addDoc(collection(db,"absensi"),{
    nama,
    tanggal:today,
    jamMasuk:new Date().toLocaleTimeString(),
    jamPulang:"",
    statusMasuk:"Hadir"
  });

  alert("Absen masuk berhasil");
};

// ABSEN PULANG
window.absenPulang=async()=>{
  const nama=document.getElementById("nama").value;
  const today=new Date().toISOString().split("T")[0];

  const q=query(collection(db,"absensi"),where("nama","==",nama),where("tanggal","==",today));
  const snap=await getDocs(q);

  snap.forEach(async d=>{
    await updateDoc(doc(db,"absensi",d.id),{
      jamPulang:new Date().toLocaleTimeString()
    });
  });

  alert("Absen pulang berhasil");
};

// RESET
window.resetHari=async()=>{
  alert("Reset manual via Firestore ya");
};

// RENDER
function render(){
  const list=document.getElementById("list");
  const search=document.getElementById("search").value.toLowerCase();
  const bulan=document.getElementById("bulan").value;

  let data=allData.filter(d=>{
    return (!search || d.nama.toLowerCase().includes(search)) &&
           (!bulan || d.tanggal.startsWith(bulan));
  });

  // DASHBOARD
  document.getElementById("dashboard").innerHTML=
  `Total: ${data.length} | Hadir: ${data.filter(d=>d.statusMasuk=="Hadir").length}`;

  list.innerHTML="";
  data.reverse().forEach(d=>{
    list.innerHTML+=`
    <div class="card">
      <b>${d.nama}</b><br>
      ${d.tanggal}<br>
      Masuk: ${d.jamMasuk}<br>
      Pulang: ${d.jamPulang || "-"}<br>
      <span class="badge hadir">${d.statusMasuk}</span>
    </div>`;
  });
}

// FILTER EVENT
document.getElementById("search").oninput=render;
document.getElementById("bulan").onchange=render;

// EXCEL
window.exportExcel=()=>{
  let rows=[["No","Nama","Tanggal","Masuk","Pulang","Status"]];
  allData.forEach((d,i)=>{
    rows.push([i+1,d.nama,d.tanggal,d.jamMasuk,d.jamPulang,d.statusMasuk]);
  });

  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");
  XLSX.writeFile(wb,"Absensi.xlsx");
};

// PDF
window.exportPDF=()=>{
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();

  doc.text("LAPORAN ABSENSI PT-AGN",14,15);

  const rows=allData.map((d,i)=>[
    i+1,d.nama,d.tanggal,d.jamMasuk,d.jamPulang,d.statusMasuk
  ]);

  doc.autoTable({
    head:[["No","Nama","Tanggal","Masuk","Pulang","Status"]],
    body:rows,
    startY:20
  });

  doc.save("Absensi.pdf");
};
</script>

</body>
</html>
