<script>
// ... (Bagian atas sama) ...
function renderStok(){
    const curM = document.getElementById('fB').value;
    const bList = Object.values(brg).sort();
    const months = [...new Set(Object.values(st).map(x=>x.tgl.slice(0,7)))].sort();
    let h = "";
    
    bList.forEach(bn => {
        let r = { saK:0, saB:0, mK:0, mB:0, rek:0, siK:0, siB:0, jU:0, jM:0 };
        months.forEach(m => {
            if(m > curM) return;
            let isC = (m === curM);
            if(isC){ r.saK=r.siK; r.saB=r.siB; r.mK=0; r.mB=0; r.rek=0; r.jU=0; r.jM=0; }
            
            Object.values(st).filter(x=>x.tgl.startsWith(m) && x.barang===bn).forEach(d=>{
                if(d.aksi==='Masuk' && d.hasil!=='Reject'){
                    if(d.jenis==='Bekas'){ if(isC) r.mK+=d.qty; r.siK+=d.qty; } 
                    else { if(isC) r.mB+=d.qty; r.siB+=d.qty; }
                } 
                else if(d.aksi==='Rekondisi'){ 
                    if(isC) r.rek+=d.qty; 
                    r.siK -= d.qty; // Logika B.3: Mengurangi stok kotor
                    r.siB += d.qty; // Logika B.3: Menambah stok siap/ready
                }
                else if(d.aksi==='Jual'){ 
                    if(isC){ if(d.tipe==='Umum') r.jU+=d.qty; else r.jM+=d.qty; } 
                    r.siB -= d.qty; 
                }
            });
        });
        h += `<tr><td class="nama-fixed">${bn}</td><td>${r.saK}</td><td>${r.saB}</td><td>${r.mK}</td><td>${r.mB}</td><td>${r.rek}</td><td>${r.jU}</td><td>${r.jM}</td><td style="color:var(--te)">${r.siK}</td><td style="color:var(--s)">${r.siB}</td><td style="font-weight:800">${r.siK+r.siB}</td></tr>`;
    });
    document.getElementById('tbStokRekap').innerHTML = h;
}
</script>
