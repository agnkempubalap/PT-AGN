<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.6 - SMART ABSENSI PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F;--lb:#AA00FF;--sun:#ff4d4d;--te:#ec4899}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px}
        .container{max-width:1600px;margin:0 auto}
        
        /* NAV */
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .nav-btn { padding: 12px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 11px; text-align: center; opacity: 0.5; }
        .nav-btn.active { background: var(--p); border-color: var(--p); color: #fff; opacity: 1; }

        /* UI */
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        .grid-input{display:grid; grid-template-columns: 1fr 1fr; gap:10px}
        input,button,select{border-radius:12px;font-size:14px;height:50px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;padding:0 15px; outline:none}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        /* CALENDAR & SCROLL */
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth;}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:5px 2px;text-align:center;min-width:55px}
        .nama-fixed{position:sticky;left:0;background:var(--c)!important;z-index:10;min-width:140px;text-align:left!important;padding-left:10px!important;border-right:2px solid var(--p)!important; font-weight: 800}
        .today-col{background: rgba(37, 99, 235, 0.1) !important;}

        /* BOXES */
        .s-box{width:45px;height:45px;border-radius:8px;display:inline-flex;flex-direction:column;justify-content:center;align-items:center;font-weight:900;font-size:12px;margin:0 auto}
        .s-h{background:var(--s);color:#fff} .s-i{background:var(--iz);color:#fff} .s-a{background:var(--d);color:#fff} 
        .s-l{background:var(--lb);color:#fff} .s-m{background:var(--sun);color:#fff} .s-off{background:var(--al);color:#fff} .s-t{background:var(--te);color:#fff}
        .jam-v{font-size:7px;display:block;margin-top:1px;font-weight:500;line-height:1}
        .note-v{font-size:6px; color:var(--w); font-style:italic; margin-top:1px; max-width:45px; overflow:hidden; white-space:nowrap}

        @media print{ .no-print{display:none!important} .table-web{transform:scale(0.5);transform-origin:top left} }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-grid no-print">
            <button class="nav-btn active">ABSEN</button>
            <button class="nav-btn">STOK</button>
            <button class="nav-btn">AKTIVITAS</button>
            <button class="nav-btn">GAJI</button>
        </div>

        <div id="tabAbsen">
            <div class="card no-print">
                <h3>👥 DATA KARYAWAN</h3>
                <div class="grid-input">
                    <input type="text" id="inKar" placeholder="Nama Karyawan">
                    <div style="display:flex; gap:5px">
                        <button class="btn" style="background:var(--s)" onclick="addKar()">TAMBAH</button>
                        <button class="btn" style="background:var(--d)" onclick="delKar()">HAPUS</button>
                    </div>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PANEL INPUT (MASUK: 09:00 | PULANG: 16:00)</h3>
                <input list="lk" id="selKar" placeholder="Pilih Nama Karyawan..." style="margin-bottom:10px">
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px">
                    <button class="btn" style="background:var(--s)" onclick="sendAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--iz)" onclick="sendAbsen('Ijin')">IJIN</button>
                    <button class="btn" style="background:var(--al)" onclick="sendAbsen('Pulang')">PULANG</button>
                </div>
            </div>

            <div class="card no-print" style="border:1px dashed var(--d)">
                <h3>🔄 KOREKSI / RESET DATA PER TANGGAL</h3>
                <div class="grid-input">
                    <input type="date" id="resetTgl">
                    <button class="btn" style="background:var(--al)" onclick="doReset()">HAPUS DATA NAMA & TGL TERPILIH</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>🗓️ SET HARI LIBUR / OFF</h3>
                <div class="grid-input">
                    <input type="date" id="liburStart">
                    <input type="date" id="liburEnd" placeholder="Sampai Tanggal">
                </div>
                <div class="grid-input" style="margin-top:10px">
                    <button class="btn" style="background:var(--p)" onclick="setLibur(true)">SIMPAN LIBUR</button>
                    <button class="btn" style="background:var(--al)" onclick="setLibur(false)">HAPUS LIBUR</button>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <h3>📊 REKAP REAL-TIME</h3>
                    <div style="display:flex; gap:5px" class="no-print">
                        <input type="month" id="fB" onchange="renderAll()" style="height:35px; width:140px">
                        <button class="btn" style="background:#1d6f42; width:45px" onclick="exportEx()">XL</button>
                        <button class="btn" style="background:#b91c1c; width:45px" onclick="window.print()">PDF</button>
                    </div>
                </div>
                <div class="table-wrap" id="scroller">
                    <table class="table-web" id="tabelAbsen">
                        <thead id="thA"></thead>
                        <tbody id="tbA"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <datalist id="lk"></datalist>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={};

        window.onload=()=>{
            document.getElementById('fB').value = new Date().toISOString().slice(0,7);
            document.getElementById('resetTgl').value = new Date().toISOString().split('T')[0];
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uL(); renderAll(true);});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; renderAll();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; renderAll();});
            setInterval(renderAll, 60000); 
        };

        function uL(){ document.getElementById('lk').innerHTML=Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function addKar(){ let v=document.getElementById('inKar').value; if(v)db.ref('master_karyawan').push(v).then(()=>document.getElementById('inKar').value=""); }
        function delKar(){ let v=document.getElementById('selKar').value; let id=Object.keys(mk).find(k=>mk[k]===v); if(id && confirm('Hapus?'))db.ref(`master_karyawan/${id}`).remove(); }

        function sendAbsen(ty){
            let n=document.getElementById('selKar').value, t=new Date().toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let now = new Date();
            let jamStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            if(ty === 'Ijin'){
                let ket = prompt("Alasan Ijin:"); if(ket) db.ref(`absensi/${t}/${n}`).update({status:'Ijin', note:ket});
            } else if(ty === 'Masuk'){
                let isT = (now.getHours() > 9 || (now.getHours() === 9 && now.getMinutes() > 0));
                db.ref(`absensi/${t}/${n}`).update({masuk:jamStr, status: isT ? 'Telat' : 'Hadir'});
            } else if(ty === 'Pulang'){
                db.ref(`absensi/${t}/${n}`).update({pulang:jamStr});
            }
        }

        function doReset(){
            let n=document.getElementById('selKar').value, t=document.getElementById('resetTgl').value;
            if(n && t && confirm('Hapus data?')) db.ref(`absensi/${t}/${n}`).remove();
        }

        function setLibur(isSet){
            let s=document.getElementById('liburStart').value, e=document.getElementById('liburEnd').value || s;
            let curr = new Date(s), end = new Date(e);
            while(curr <= end){
                let d = curr.toISOString().split('T')[0];
                isSet ? db.ref(`hari_libur/${d}`).set(true) : db.ref(`hari_libur/${d}`).remove();
                curr.setDate(curr.getDate()+1);
            }
        }

        function renderAll(shouldScroll = false){
            const f=document.getElementById('fB').value, [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), kList=Object.values(mk).sort();
            const now = new Date(), todayStr = now.toISOString().split('T')[0], jamNow = now.getHours(), dateNow = now.getDate();

            let h=`<tr><th class="nama-fixed">Karyawan</th>`;
            for(let i=1;i<=last;i++){
                let isToday = (i === dateNow && y == now.getFullYear() && m == (now.getMonth()+1));
                h+=`<th class="${isToday?'today-col':''}" id="tgl-${i}">${i}</th>`;
            }
            h+=`<th>H</th><th>I</th><th>A</th><th>L</th><th>T</th></tr>`;
            document.getElementById('thA').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let c={H:0, I:0, A:0, L:0, T:0}, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let tglStr=`${y}-${m}-${String(i).padStart(2,'0')}`, dObj=new Date(tglStr);
                    let isMinggu = dObj.getDay() === 0, isLibur = hl[tglStr], data = ad[tglStr]?ad[tglStr][n]:null;
                    let sW="-", cl="", info="";

                    if(isMinggu) { sW="M"; cl="s-m"; } else if(isLibur) { sW="OFF"; cl="s-off"; }

                    if(data){
                        if(data.status==='Ijin'){ sW="I"; cl="s-i"; c.I++; info=`<span class="note-v">${data.note||''}</span>`; }
                        else {
                            if(isMinggu || isLibur){ sW="L"; cl="s-l"; c.L++; }
                            else if(data.status==='Telat'){ sW="T"; cl="s-t"; c.T++; }
                            else { sW="H"; cl="s-h"; c.H++; }
                            info=`<span class="jam-v">In:${data.masuk||'--'}</span><span class="jam-v">Out:${data.pulang||'--'}</span>`;
                        }
                    } else if(tglStr === todayStr && !isMinggu && !isLibur && jamNow >= 16){
                        sW="A"; cl="s-a"; c.A++;
                    }
                    row+=`<td><div class="s-box ${cl}">${sW}${info}</div></td>`;
                }
                b+=`<tr>${row}<td>${c.H}</td><td>${c.I}</td><td>${c.A}</td><td>${c.L}</td><td>${c.T}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;

            if(shouldScroll) {
                setTimeout(() => {
                    const todayEl = document.getElementById(`tgl-${dateNow}`);
                    if(todayEl) todayEl.scrollIntoView({behavior: "smooth", inline: "center", block: "nearest"});
                }, 500);
            }
        }

        function exportEx(){
            const blob = new Blob([document.getElementById("tabelAbsen").outerHTML], {type: "application/vnd.ms-excel"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `REKAP_PTAGN_${document.getElementById('fB').value}.xls`; a.click();
        }
    </script>
</body>
</html>
