<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:sans-serif;margin:0;background:#e0f2fe;padding-bottom:70px}
.page{display:none;padding:10px}
.active{display:block}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:10px}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;color:#fff}
.green{background:#22c55e}
.orange{background:#f59e0b}
.red{background:#ef4444}
.blue{background:#3b82f6}
input,select{width:100%;padding:10px;margin:5px 0}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
.nav button{flex:1;color:#333;background:none}
</style>
</head>

<body>

<!-- ABSEN -->
<div id="absen" class="page active">

<div class="card">
<select id="nama"></select>

<input id="namaBaru" placeholder="Tambah karyawan">
<button class="blue" onclick="tambah()">Tambah</button>
<button class="red" onclick="hapus()">Hapus</button>
</div>

<div class="card">
<button class="green" onclick="masuk()">Masuk</button>
<button class="orange" onclick="izin()">Izin</button>
</div>

<div id="list"></div>

</div>

<!-- AKTIVITAS -->
<div id="aktivitas" class="page">

<div class="card">
<b>Pilih Aktivitas</b>

<select id="aktifitas">
<option>Rekondisi Kempu</option>
<option>Derigen 18L</option>
<option>Derigen 5L</option>
<option>Muat/Bongkar</option>
<option>Pangkalan</option>
<option>Kirim Minyak</option>
</select>

<div id="cekKaryawan"></div>

<button class="blue" onclick="simpanAktivitas()">Simpan Aktivitas</button>
</div>

</div>

<!-- LAPORAN -->
<div id="laporan" class="page">
<div id="laporanIsi"></div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="pindah('absen')">Absen</button>
<button onclick="pindah('aktivitas')">Aktivitas</button>
<button onclick="pindah('laporan')">Laporan</button>
</div>

<script>

let karyawan = JSON.parse(localStorage.getItem("karyawan")) || ["Agung","Alda","Nur"];
let absen = JSON.parse(localStorage.getItem("absen")) || [];
let aktivitas = JSON.parse(localStorage.getItem("aktivitas")) || [];

const nama = document.getElementById("nama");

function loadNama(){
 nama.innerHTML = karyawan.map(n=>`<option>${n}</option>`).join("");
}
loadNama();

// NAV
function pindah(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// TAMBAH
function tambah(){
 let n=document.getElementById("namaBaru").value;
 if(!n) return;
 karyawan.push(n);
 save();
}

// HAPUS
function hapus(){
 let n=nama.value;
 karyawan=karyawan.filter(x=>x!=n);
 save();
}

// TIME
function now(){
 let d=new Date();
 return {
  tgl:d.toISOString().split('T')[0],
  jam:d.toTimeString().split(' ')[0]
 };
}

// MASUK
function masuk(){
 let t=now();
 let status = t.jam>"09:00:00"?"Telat":"Hadir";

 absen.push({
  nama:nama.value,
  tgl:t.tgl,
  masuk:t.jam,
  status
 });

 save();
}

// IZIN
function izin(){
 let t=now();
 absen.push({
  nama:nama.value,
  tgl:t.tgl,
  masuk:"-",
  status:"Izin"
 });
 save();
}

// AUTO ALFA
function cekAlfa(){
 let t=now();
 if(t.jam<"16:00:00") return;

 karyawan.forEach(n=>{
  let ada = absen.find(x=>x.nama==n && x.tgl==t.tgl);
  if(!ada){
   absen.push({nama:n,tgl:t.tgl,status:"Alfa"});
  }
 });

 save();
}

// AKTIVITAS
function loadCek(){
 document.getElementById("cekKaryawan").innerHTML =
 karyawan.map(n=>`<label><input type="checkbox" value="${n}"> ${n}</label><br>`).join("");
}
loadCek();

function simpanAktivitas(){
 let t=now();
 let akt = document.getElementById("aktifitas").value;
 let pilih=[...document.querySelectorAll("#cekKaryawan input:checked")].map(x=>x.value);

 aktivitas.push({
  tgl:t.tgl,
  aktivitas:akt,
  orang:pilih
 });

 save();
}

// RENDER
function render(){

 cekAlfa();

 document.getElementById("list").innerHTML =
 absen.map(x=>`
 <div class="card">
 ${x.nama} - ${x.tgl}<br>
 ${x.status}
 </div>
 `).join("");

 // LAPORAN DETAIL
 let html="";
 karyawan.forEach(n=>{
  html+=`<div class="card"><b>${n}</b><br>`;

  absen.filter(x=>x.nama==n).forEach(a=>{
   html+=`${a.tgl} - ${a.status}<br>`;

   aktivitas.filter(k=>k.tgl==a.tgl && k.orang.includes(n))
   .forEach(k=>{
    html+=`- ${k.aktivitas}<br>`;
   });

  });

  html+="</div>";
 });

 document.getElementById("laporanIsi").innerHTML = html;
}

// SAVE
function save(){
 localStorage.setItem("karyawan",JSON.stringify(karyawan));
 localStorage.setItem("absen",JSON.stringify(absen));
 localStorage.setItem("aktivitas",JSON.stringify(aktivitas));
 loadNama();
 loadCek();
 render();
}

render();

</script>

</body>
</html>
