<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT AGN v82 (NO LOGIN)</title><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif;padding:10px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:10px}
input,select,button{height:45px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;padding:0 10px}
button{cursor:pointer;font-weight:bold}
.table{width:100%;border-collapse:collapse}
.table td,.table th{border:1px solid #334155;padding:6px;text-align:center}
</style></head>
<body><div class="card">
<h3>Dashboard</h3>
<p id="totalReady"></p>
<p id="totalKotor"></p>
</div><div class="card">
<canvas id="chart"></canvas>
</div><div class="card">
<h3>Input Stok</h3>
<select id="barang"></select>
<select id="jenisBarang">
<option value="baru">Baru</option>
<option value="bekas">Bekas</option>
</select>
<select id="jenis">
<option value="qc_a">QC OK</option>
<option value="qc_amd">QC Minor</option>
<option value="rekon">Rekondisi</option>
<option value="jual_umum">Jual</option>
</select>
<input type="number" id="qty">
<button onclick="save()">Simpan</button>
</div><div class="card">
<h3>Data Stok</h3>
<table class="table">
<thead><tr><th>Barang</th><th>Ready</th><th>Kotor</th></tr></thead>
<tbody id="tb"></tbody>
</table>
</div><div class="card">
<h3>Audit Log</h3>
<div id="log"></div>
</div><script>
const firebaseConfig={apiKey:"AIzaSy...",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let barangData={},stokData={};

function load(){
db.ref('master_barang').on('value',s=>{
barangData=s.val()||{};
barang.innerHTML=Object.values(barangData).map(b=>`<option>${b}</option>`);
});

db.ref('stok_enterprise').on('value',s=>{
stokData=s.val()||{};
render();
logRender();
dashboard();
chartRender();
});
}

function save(){
let id=Date.now();
db.ref('stok_enterprise/'+id).set({
barang:barang.value,
jenis:jenis.value,
jenisBarang:jenisBarang.value,
qty:+qty.value,
waktu:new Date().toISOString(),
user:'admin'
});
}

function hitung(n){
let r=0,k=0;
Object.values(stokData).forEach(d=>{
if(d.barang!==n)return;
if(d.jenis==='qc_a'||d.jenis==='qc_amd'){
if(d.jenisBarang==='baru') r+=d.qty; else k+=d.qty;
}
if(d.jenis==='rekon'){k-=d.qty; r+=d.qty}
if(d.jenis==='jual_umum'){r-=d.qty}
});
return {r,k};
}

function render(){
let html='';
Object.values(barangData).forEach(n=>{
let s=hitung(n);
html+=`<tr><td>${n}</td><td>${s.r}</td><td>${s.k}</td></tr>`;
});
tb.innerHTML=html;
}

function logRender(){
let html='';
Object.values(stokData).slice(-30).reverse().forEach(d=>{
html+=`<div>${d.waktu} | ${d.barang} | ${d.qty}</div>`;
});
log.innerHTML=html;
}

function dashboard(){
let tr=0,tk=0;
Object.values(barangData).forEach(n=>{
let s=hitung(n);
tr+=s.r; tk+=s.k;
});
totalReady.innerText='Ready: '+tr;
totalKotor.innerText='Kotor: '+tk;
}

function chartRender(){
let labels=[],data=[];
Object.values(barangData).forEach(n=>{
let s=hitung(n);
labels.push(n);
data.push(s.r);
});
new Chart(chart,{type:'bar',data:{labels:labels,datasets:[{label:'Ready',data:data}]}});
}

load();
</script></body>
</html>
