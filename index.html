<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Management v6.0</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2, h3 { margin-top: 0; color: #0056b3; border-bottom: 2px solid #eee; padding-bottom: 8px; font-size: 1.1rem; }
        
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; color: #666; }
        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; 
        }
        
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.96); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-masuk { background: #28a745; }
        .btn-pulang { background: #dc3545; }
        .btn-izin { background: #ffc107; color: black; }
        .btn-tambah { background: #6f42c1; margin: 0; width: auto; }
        .btn-pdf { background: #6c757d; margin-top: 10px; }
        
        /* Table Styling */
        .table-container { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #f8f9fa; }
        
        /* Status Colors */
        .status-hadir { background: #d4edda; color: #155724; }
        .status-terlambat { background: #fff3cd; color: #856404; }
        .status-izin { background: #d1ecf1; color: #0c5460; }
        .status-alpa { background: #f8d7da; color: #721c24; }
        .nama-kolom { background: #f8f9fa; font-weight: bold; position: sticky; left: 0; z-index: 2; text-align: left; padding-left: 10px; width: 120px; }
        
        .manage-row { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        #notif { text-align: center; font-weight: bold; margin-top: 5px; height: 20px; }

        @media print {
            .card:not(#rekap-card) { display: none; }
            body { background: white; margin: 0; }
            .table-container { overflow: visible; }
            table { min-width: 100%; font-size: 9px; }
        }
    </style>
</head>
<body>

    <h2>📦 PT-AGN System</h2>

    <!-- PANEL 1: KELOLA & ABSEN -->
    <div class="card">
        <h3>1. Presensi & Karyawan</h3>
        
        <div class="manage-row">
            <input type="text" id="inputNamaBaru" placeholder="Nama Karyawan Baru..." style="margin:0; flex-grow:1;">
            <button class="btn-tambah" onclick="tambahKaryawan()">Tambah</button>
        </div>

        <label>Pilih Nama Karyawan:</label>
        <div style="display: flex; gap: 8px;">
            <select id="pilihKaryawan" style="margin:0; flex-grow:1;"><option value="">-- Memuat... --</option></select>
            <button onclick="hapusKaryawan()" style="background:#ff4d4d; width:auto; margin:0; padding:0 15px;">Hapus</button>
        </div>
        
        <div class="grid" style="margin-top:10px;">
            <button class="btn-masuk" onclick="prosesAbsen('Masuk')">MASUK</button>
            <button class="btn-pulang" onclick="prosesAbsen('Pulang')">PULANG</button>
        </div>
        <button class="btn-izin" onclick="prosesAbsen('Izin')">INPUT IZIN / SAKIT</button>
        <div id="notif"></div>
    </div>

    <!-- PANEL 2: REKAP -->
    <div id="rekap-card" class="card">
        <h3>2. Laporan Bulanan PT-AGN</h3>
        <label>Pilih Periode:</label>
        <div class="grid">
            <input type="month" id="filterBulan" style="margin:0;">
            <button onclick="renderRekap()" style="margin:0;">Cek Rekap</button>
        </div>
        
        <div class="table-container">
            <table id="tabelRekap">
                <thead><tr id="theadRekap"></tr></thead>
                <tbody id="tbodyRekap"></tbody>
            </table>
        </div>
        <button class="btn-pdf" onclick="window.print()">Cetak / Simpan PDF</button>
        <div style="margin-top:10px; font-size:10px; color:#777;">
            Ket: <b>V</b>: Hadir | <b>T</b>: Terlambat | <b>I</b>: Izin | <b>A</b>: Alpa
        </div>
    </div>

    <script>
        // === KONFIGURASI FIREBASE PT-AGN ===
        const firebaseConfig = {
            apiKey: "AIzaSyB-T-Your-Actual-Key-From-Console", 
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.firebaseio.com",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "125433246356", 
            appId: "1:125433246356:web:your-app-id"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let masterKaryawan = {};

        // Sinkronisasi Data Karyawan
        db.ref('master_karyawan').on('value', snap => {
            masterKaryawan = snap.val() || {};
            let options = '<option value="">-- Pilih Nama --</option>';
            for(let id in masterKaryawan) {
                options += `<option value="${masterKaryawan[id]}" data-id="${id}">${masterKaryawan[id]}</option>`;
            }
            document.getElementById('pilihKaryawan').innerHTML = options;
        });

        function tambahKaryawan() {
            const nama = document.getElementById('inputNamaBaru').value.trim();
            if(!nama) return alert("Isi nama karyawan!");
            db.ref('master_karyawan').push(nama).then(() => {
                document.getElementById('inputNamaBaru').value = "";
            });
        }

        function hapusKaryawan() {
            const el = document.getElementById('pilihKaryawan');
            const id = el.options[el.selectedIndex].getAttribute('data-id');
            if(!id) return alert("Pilih nama!");
            if(confirm("Hapus " + el.value + "?")) db.ref('master_karyawan/' + id).remove();
        }

        function prosesAbsen(tipe) {
            const nama = document.getElementById('pilihKaryawan').value;
            if(!nama) return alert("Pilih nama!");

            const skrg = new Date();
            const tglKey = skrg.toISOString().split('T')[0];
            const jam = skrg.getHours();
            const menit = skrg.getMinutes();
            const waktuStr = skrg.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            let status = "Hadir";
            if(tipe === 'Masuk') {
                if(jam >= 16) status = "Alpa";
                else if(jam > 9 || (jam === 9 && menit > 0)) status = "Terlambat";
            }

            db.ref(`absensi/${tglKey}/${nama}/${tipe}`).set({
                waktu: waktuStr,
                status: status
            }).then(() => {
                const n = document.getElementById('notif');
                n.innerText = `✅ Berhasil ${tipe}!`;
                setTimeout(() => n.innerText = "", 3000);
            });
        }

        function renderRekap() {
            const filter = document.getElementById('filterBulan').value;
            if(!filter) return alert("Pilih bulan!");
            const [th, bl] = filter.split('-');
            const jmlHari = new Date(th, bl, 0).getDate();
            const hariIni = new Date();
            hariIni.setHours(0,0,0,0);

            let hHtml = `<th class="nama-kolom">Nama Karyawan</th>`;
            for(let i=1; i<=jmlHari; i++) hHtml += `<th>${i}</th>`;
            document.getElementById('theadRekap').innerHTML = hHtml;

            db.ref('absensi').once('value', snap => {
                const data = snap.val() || {};
                let bHtml = "";
                for(let id in masterKaryawan) {
                    const nama = masterKaryawan[id];
                    bHtml += `<tr><td class="nama-kolom">${nama}</td>`;
                    for(let h=1; h<=jmlHari; h++) {
                        const tglKey = `${th}-${bl}-${String(h).padStart(2,'0')}`;
                        const tglObj = new Date(tglKey);
                        let simbol = "-";
                        let kls = "";
                        if(data[tglKey] && data[tglKey][nama]) {
                            const d = data[tglKey][nama];
                            if(d.Izin) { simbol = "I"; kls = "status-izin"; }
                            else if(d.Masuk) {
                                if(d.Masuk.status === "Alpa") { simbol = "A"; kls = "status-alpa"; }
                                else {
                                    simbol = d.Masuk.status === "Terlambat" ? "T" : "V";
                                    kls = d.Masuk.status === "Terlambat" ? "status-terlambat" : "status-hadir";
                                }
                            }
                        } else if(tglObj < hariIni) {
                            simbol = "A"; kls = "status-alpa";
                        }
                        bHtml += `<td class="${kls}">${simbol}</td>`;
                    }
                    bHtml += `</tr>`;
                }
                document.getElementById('tbodyRekap').innerHTML = bHtml;
            });
        }
    </script>
</body>
</html>
