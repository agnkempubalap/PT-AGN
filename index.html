<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN OMNI V101.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf-autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#22c55e;--d:#ef4444;--w:#f59e0b;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#8b5cf6;--al:#64748b;--lb:#d946ef;--sun:#f43f5e;--te:#ec4899}
        *{box-sizing:border-box} body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px;font-size:12px;}
        
        /* Navigasi */
        .nav-grid { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; z-index: 2000; background: var(--bg); padding: 5px 0;}
        .nav-btn { flex: 1; padding: 12px 5px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase;}
        .nav-btn.active { background: var(--p); border-color: var(--p); box-shadow: 0 4px 10px rgba(59,130,246,0.4); }

        .card{background:var(--c);padding:15px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);}
        h3{margin:0 0 12px;font-size:10px;color:var(--p);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        /* Tampilan Tabel yang Di-Undo ke Sistem Stabil */
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--b); background: var(--c); margin-bottom: 10px;}
        .table-web { width: 100%; border-collapse: collapse; min-width: 900px; }
        .table-web th { background: var(--b); color: #fff; padding: 12px 5px; font-size: 10px; border: 1px solid var(--bg); position: sticky; top: 0; z-index: 10; }
        .table-web td { padding: 10px 5px; border: 1px solid var(--b); text-align: center; font-weight: 700; font-size: 13px; }

        /* Fix Nama Barang Diam di Kiri tanpa Menutup Header */
        .nama-fixed { position: sticky; left: 0; background: #1e293b !important; z-index: 15; width: 130px; border-right: 2px solid var(--p) !important; text-align: left !important; padding-left: 10px !important; }
        
        /* Grup Warna Baru */
        .c-awal { color: #60a5fa; } .c-masuk { color: #4ade80; } .c-jual { color: #fbbf24; } .c-sisa { color: #f472b6; }

        /* Icon & Status */
        .s-box { width: 35px; height: 35px; border-radius: 8px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-size: 9px; font-weight: 800; }
        .s-h{background:var(--s)} .s-i{background:var(--iz)} .s-a{background:var(--d)} .s-l{background:var(--lb)} .s-m{background:var(--sun)} .s-off{background:var(--al)} .s-t{background:var(--te)}
        .box-jam { font-size: 7px; margin-top: 2px; }
        .kardus-head { color: var(--w); font-size: 10px; display: block; }
        
        input, button, select { height: 40px; border-radius: 10px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; width: 100%; outline: none;}
        .hidden { display: none !important; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="nav-grid">
        <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
        <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
        <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
    </div>

    <div id="t-absen" class="tab-content">
        <div class="card">
            <h3>👥 Master Karyawan</h3>
            <div style="display:flex; gap:5px"><input type="text" id="inNK" placeholder="Nama..."><button style="background:var(--s); width:80px" onclick="svK()">OK</button></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <h3>📊 Kalender Absen</h3>
                <input type="month" id="fM" onchange="renA()" style="width:120px; height:30px">
            </div>
            <div class="table-wrap"><table class="table-web" id="tableAbsen"><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
            <div class="btn-group">
                <button style="background:var(--s); font-weight:800" onclick="exX('tableAbsen')">EXCEL</button>
                <button style="background:var(--te); font-weight:800" onclick="exP('tableAbsen', 'ABSENSI')">PDF</button>
            </div>
        </div>
    </div>

    <div id="t-stok" class="tab-content hidden">
        <div class="card">
            <h3>📦 Transaksi Stok</h3>
            <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:5px; margin-bottom:5px">
                <select id="slB"></select><input type="number" id="stQ" placeholder="Qty">
            </div>
            <div style="display:flex; gap:5px; margin-bottom:5px">
                <select id="stA" onchange="tQC(this.value)"><option value="Masuk">Masuk (QC)</option><option value="Rekondisi">Rekondisi</option><option value="Jual Umum">Jual Umum</option><option value="Jual Mitra">Jual Mitra</option></select>
                <div id="qBx" style="display:none; gap:2px"><select id="qJ"><option value="Bekas">Bekas</option><option value="Baru">Baru</option></select></div>
            </div>
            <button style="background:var(--p); font-weight:800; height:45px" onclick="svS()">SIMPAN DATA STOK</button>
        </div>
        <div class="card">
            <h3>📈 Rekap Stok Bulanan</h3>
            <div class="table-wrap"><table class="table-web" id="tableStok">
                <thead>
                    <tr>
                        <th class="nama-fixed">BARANG</th>
                        <th class="c-awal">AWAL-K</th><th class="c-awal">AWAL-B</th>
                        <th class="c-masuk">IN-K</th><th class="c-masuk">IN-B</th>
                        <th style="background:var(--lb)">REKO</th>
                        <th class="c-jual">OUT-U</th><th class="c-jual">OUT-M</th>
                        <th class="c-sisa">SISA-K</th><th class="c-sisa">READY</th><th class="c-sisa">TOTAL</th>
                    </tr>
                </thead>
                <tbody id="tbS"></tbody>
            </table></div>
            <div class="btn-group">
                <button style="background:var(--s); font-weight:800" onclick="exX('tableStok')">EXCEL</button>
                <button style="background:var(--te); font-weight:800" onclick="exP('tableStok', 'STOK')">PDF</button>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mK={}, aD={}, hL={}, mB={}, sL={};

        window.onload=()=>{
            const t=new Date().toISOString().split('T')[0];
            document.getElementById('fM').value=t.slice(0,7);
            db.ref('master_karyawan').on('value',s=>{mK=s.val()||{}; renA();});
            db.ref('absensi').on('value',s=>{aD=s.val()||{}; renA();});
            db.ref('master_barang').on('value',s=>{mB=s.val()||{}; uLB(); renS();});
            db.ref('stok_log').on('value',s=>{sL=s.val()||{}; renS(); renA();});
        };

        function tab(t, b){
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden'));
            document.getElementById('t-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
            b.classList.add('active');
        }

        function svK(){ let v=document.getElementById('inNK').value; if(v)db.ref('master_karyawan').push(v).then(()=>document.getElementById('inNK').value=""); }
        function uLB(){ document.getElementById('slB').innerHTML=Object.values(mB).sort().map(v=>`<option value="${v}">${v}</option>`).join(''); }
        function tQC(v){ document.getElementById('qBx').style.display=(v==='Masuk'?'flex':'none'); }
        function svS(){
            let b=document.getElementById('slB').value, q=parseInt(document.getElementById('stQ').value), a=document.getElementById('stA').value;
            if(!b||!q) return alert("Isi Qty!");
            db.ref('stok_log').push({tgl:new Date().toISOString().split('T')[0], barang:b, aksi:a, qty:q, jenis:document.getElementById('qJ').value, hasil:'Accepted'}).then(()=>alert("Berhasil!"));
        }

        function renS(){
            const cM=document.getElementById('fM').value, bL=Object.values(mB).sort();
            let h=""; 
            bL.forEach(bn=>{
                let r={saK:0, saB:0, mK:0, mB:0, rek:0, jU:0, jM:0};
                Object.values(sL).forEach(d=>{
                    if(d.barang!==bn) return;
                    if(d.tgl.slice(0,7) < cM){
                        if(d.aksi==='Masuk'){ if(d.jenis==='Bekas')r.saK+=d.qty; else r.saB+=d.qty; }
                        else if(d.aksi==='Rekondisi'){ r.saK-=d.qty; r.saB+=d.qty; }
                        else if(d.aksi.startsWith('Jual')) r.saB-=d.qty;
                    } else if(d.tgl.slice(0,7) === cM){
                        if(d.aksi==='Masuk'){ if(d.jenis==='Bekas')r.mK+=d.qty; else r.mB+=d.qty; }
                        else if(d.aksi==='Rekondisi')r.rek+=d.qty;
                        else if(d.aksi==='Jual Umum')r.jU+=d.qty;
                        else if(d.aksi==='Jual Mitra')r.jM+=d.qty;
                    }
                });
                let siK=r.saK+r.mK-r.rek, siB=r.saB+r.mB+r.rek-r.jU-r.jM;
                h+=`<tr><td class="nama-fixed">${bn}</td><td>${r.saK}</td><td>${r.saB}</td><td>${r.mK}</td><td>${r.mB}</td><td>${r.rek}</td><td>${r.jU}</td><td>${r.jM}</td><td>${siK}</td><td>${siB}</td><td>${siK+siB}</td></tr>`;
            });
            document.getElementById('tbS').innerHTML=h;
        }

        function renA(){
            const f=document.getElementById('fM').value, [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), kL=Object.values(mK).sort();
            let sIn={}, sOut={}; Object.values(sL).forEach(s=>{ if(s.tgl.startsWith(f)){ if(s.aksi==='Masuk') sIn[s.tgl]=true; if(s.aksi.startsWith('Jual')) sOut[s.tgl]=true; } });
            
            let h=`<tr><th class="nama-fixed">KARYAWAN</th>`;
            for(let i=1;i<=last;i++){
                let tgl=`${y}-${m}-${String(i).padStart(2,'0')}`, icon=(sIn[tgl]?'📂':'')+(sOut[tgl]?'📁':'');
                h+=`<th style="min-width:40px">${i}<span class="kardus-head">${icon}</span></th>`;
            }
            h+=`<th>H</th></tr>`; document.getElementById('thA').innerHTML=h;
            
            let b=""; kL.forEach(n=>{
                let cH=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let tgl=`${y}-${m}-${String(i).padStart(2,'0')}`, da=aD[tgl]?aD[tgl][n]:null;
                    let sW="-", cl="", jam="";
                    if(da){ sW=da.status==='Telat'?'T':'H'; cl=da.status==='Telat'?'s-t':'s-h'; cH++; jam=`<div class="box-jam">${da.masuk||''}</div>`; }
                    row+=`<td><div class="s-box ${cl}">${sW}${jam}</div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;
        }

        // FUNGSI EXPORT (FIX PDF)
        function exX(id){ XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), `AGN_${id}.xlsx`); }
        function exP(id, title){
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4');
            doc.text(`LAPORAN ${title} - PT AGN`, 14, 15);
            doc.autoTable({ 
                html: '#' + id, 
                startY: 20, 
                theme: 'grid', 
                styles: { fontSize: 7 },
                headStyles: { fillColor: [30, 41, 59] }
            });
            doc.save(`PT_AGN_${title}.pdf`);
        }
    </script>
</body>
</html>
