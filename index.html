<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Absensi Karyawan</title>

<style>
body{
  font-family:sans-serif;
  background:#eef2f7;
  padding:20px;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
}
.masuk{background:green;color:white;}
.pulang{background:orange;color:white;}
.reset{background:red;color:white;}
.export{background:blue;color:white;}
</style>

</head>
<body>

<div class="card">
<h2>📋 Absensi Karyawan</h2>

<select id="nama"></select>

<button class="masuk" onclick="absenMasuk()">Absen Masuk</button>
<button class="pulang" onclick="absenPulang()">Absen Pulang</button>
<button class="reset" onclick="resetHari()">Reset Hari Ini</button>
<button class="export" onclick="exportExcel()">Export Excel</button>
</div>

<div class="card">
<h3>📅 Hari Ini</h3>
<div id="hariIni"></div>
</div>

<div class="card">
<h3>📊 Rekap Bulan Ini</h3>
<div id="rekap"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  doc, setDoc, updateDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// JAM KANTOR
const JAM_MASUK = 9;
const JAM_PULANG = 16;

// FORMAT TANGGAL
function getTanggal(){
  return new Date().toISOString().slice(0,10);
}

// FORMAT JAM
function getJam(){
  return new Date().toLocaleTimeString("id-ID");
}

// LOAD KARYAWAN
async function loadKaryawan(){
  const snap = await getDocs(collection(db,"karyawan"));
  let html="";
  snap.forEach(doc=>{
    const d=doc.data();
    if(d.aktif){
      html+=`<option value="${d.nama}">${d.nama}</option>`;
    }
  });
  document.getElementById("nama").innerHTML=html;
}

// ABSEN MASUK
window.absenMasuk = async ()=>{
  const nama = document.getElementById("nama").value;
  const tanggal = getTanggal();
  const ref = doc(db,"absensi",tanggal+"_"+nama);

  const now = new Date();
  const telat = now.getHours() >= JAM_MASUK;

  await setDoc(ref,{
    nama,
    tanggal,
    masuk:getJam(),
    pulang:null,
    statusMasuk: telat ? "Telat":"Normal",
    statusPulang:null
  });

  loadHari();
};

// ABSEN PULANG
window.absenPulang = async ()=>{
  const nama = document.getElementById("nama").value;
  const tanggal = getTanggal();
  const ref = doc(db,"absensi",tanggal+"_"+nama);

  const snap = await getDoc(ref);
  if(!snap.exists()){
    alert("Belum absen masuk!");
    return;
  }

  const now = new Date();
  const cepat = now.getHours() < JAM_PULANG;

  await updateDoc(ref,{
    pulang:getJam(),
    statusPulang: cepat ? "Cepat":"Normal"
  });

  loadHari();
};

// RESET
window.resetHari = async ()=>{
  const nama = document.getElementById("nama").value;
  const tanggal = getTanggal();
  await deleteDoc(doc(db,"absensi",tanggal+"_"+nama));
  loadHari();
};

// LOAD HARI INI
async function loadHari(){
  const snap = await getDocs(collection(db,"absensi"));
  let html="";

  snap.forEach(doc=>{
    const d = doc.data();
    if(d.tanggal===getTanggal()){
      html+=`
      <div>
      <b>${d.nama}</b><br>
      Masuk: ${d.masuk || "-"} (${d.statusMasuk || "-"})<br>
      Pulang: ${d.pulang || "-"} (${d.statusPulang || "-"})
      <hr>
      </div>`;
    }
  });

  document.getElementById("hariIni").innerHTML=html;
  loadRekap();
}

// REKAP BULAN
async function loadRekap(){
  const snap = await getDocs(collection(db,"absensi"));
  let map={};

  snap.forEach(doc=>{
    const d = doc.data();
    const bulan = d.tanggal.slice(0,7);

    if(!map[d.nama]){
      map[d.nama]={hadir:0,telat:0};
    }

    if(bulan===getTanggal().slice(0,7)){
      map[d.nama].hadir++;
      if(d.statusMasuk==="Telat") map[d.nama].telat++;
    }
  });

  let html="";
  for(let nama in map){
    html+=`${nama} → Hadir: ${map[nama].hadir} | Telat: ${map[nama].telat}<br>`;
  }

  document.getElementById("rekap").innerHTML=html;
}

// EXPORT EXCEL
window.exportExcel = async ()=>{
  const snap = await getDocs(collection(db,"absensi"));
  let csv="Nama,Tanggal,Masuk,Pulang,Status Masuk,Status Pulang\n";

  snap.forEach(doc=>{
    const d = doc.data();
    csv+=`${d.nama},${d.tanggal},${d.masuk||""},${d.pulang||""},${d.statusMasuk||""},${d.statusPulang||""}\n`;
  });

  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href=url;
  a.download="absensi.csv";
  a.click();
};

// INIT
loadKaryawan();
loadHari();

</script>
</body>
</html>
