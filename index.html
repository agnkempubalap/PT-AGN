<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V961-PRO (REJECT-FIX)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; flex: 1; min-width: 100px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; }
        th { background: #f8fafc; color: #64748b; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; border-right: 2px solid #eee; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 10px; cursor: pointer; }
        .bg-h { background: var(--s); } .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 15px; max-height: 85vh; overflow-y: auto; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div></div>

    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master Karyawan <input type="text" id="inK" placeholder="Nama..." style="width:100px; height:30px"> <button class="btn" style="background:var(--p); width:50px; margin:0" onclick="addItem('master_karyawan', 'inK')">ADD</button></h3>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absensi <input type="date" id="absTgl" style="width:115px; height:30px"></h3>
                <div class="flex-row"><select id="selK"></select><select id="absJenis"><option value="Hadir">Masuk</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option></select></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
            <div class="table-area"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <div class="flex-row"><input type="text" id="inB" placeholder="Barang..."><button class="btn" style="background:var(--p); width:80px" onclick="addItem('master_barang', 'inB')">ADD</button></div>
                <div id="listB" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card" style="border-top: 5px solid var(--s)">
                <h3>📥 Logistik & Hasil Ready</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row">
                    <input type="number" id="stQty" placeholder="Jumlah">
                    <select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Ready</option></select>
                </div>
                <div class="flex-row">
                    <select id="stAksi" onchange="toggleKon()">
                        <option value="Rekondisi">Selesai Rekondisi (Cair Gaji)</option>
                        <option value="Masuk">Barang Masuk Gudang</option>
                        <option value="Jual Mitra">Jual Mitra</option>
                        <option value="Jual Umum">Jual Umum</option>
                        <option value="Reject">Barang Rusak (Reject)</option>
                    </select>
                </div>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">PROSES STOK</button>
            </div>
            <div class="table-area"><table><thead><tr><th class="sticky-col">BRG</th><th>IN KTR</th><th>IN RDY</th><th>REKON</th><th>MITRA</th><th>UMUM</th><th style="background:#fef3c7">STOK KTR</th><th style="background:#dcfce7">STOK RDY</th></tr></thead><tbody id="tbStok"></tbody></table></div>
            <button class="btn" style="background:#64748b" onclick="showLogs('stok_logs')">LOG STOK</button>
        </div>

        <div id="tab-aktivitas" class="tab-content">
            <div class="card" style="border-top: 5px solid var(--d)">
                <h3>🛠️ Input Kerja (Chain Logic)</h3>
                <div class="flex-row"><input type="date" id="akTgl" onchange="renderCheckKaryawan()"><select id="akJenis">
                    <option value="Rekondisi Kempu">Rekon Kempu</option>
                    <option value="Rekondisi jerigen 18L">Rekon 18L</option>
                    <option value="Rekondisi jerigen 5L">Rekon 5L</option>
                    <option value="muat barang">Muat</option>
                    <option value="bongkar barang">Bongkar</option>
                    <option value="kirim minyak">Kirim Minyak</option>
                </select></div>
                <div id="akKaryawan" class="check-grid"></div>
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
            <button class="btn" style="background:#64748b" onclick="showLogs('aktivitas')">LOG KERJA</button>
        </div>

        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3>💰 Ringkasan Gaji <input type="month" id="fUang" style="width:110px; height:30px"></h3>
                <div id="gTotal">TOTAL: Rp 0</div>
            </div>
            <div class="flex-row"><button class="btn" style="background:var(--w); color:black" onclick="editTarif()">⚙️ ATUR TARIF</button></div>
            <div id="areaGaji" class="table-area"></div>
        </div>
    </div>
<script>
    const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
    firebase.initializeApp(fbConfig); const db = firebase.database();
    let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000 };

    window.onload = () => {
        const t = new Date().toISOString().split('T')[0];
        ['absTgl','stTgl','akTgl'].forEach(i => document.getElementById(i).value = t);
        document.getElementById('fUang').value = t.slice(0, 7);
        db.ref('/').on('value', s => { D = s.val() || {}; initUI(); renderCheckKaryawan(); renderAll(); renderStok(); renderGaji(); });
    };

    function tab(id) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); document.getElementById('nav-'+id).classList.add('active'); }

    function toggleKon() {
        const ak = document.getElementById('stAksi').value;
        const sK = document.getElementById('stKon');
        sK.disabled = (ak !== "Masuk");
        sK.style.opacity = (ak !== "Masuk" ? "0.5" : "1");
    }

    // LOGIKA STOK DENGAN PROTEKSI REJECT
    function saveSt() {
        const t = document.getElementById('stTgl').value, b = document.getElementById('stBrg').value, q = parseInt(document.getElementById('stQty').value);
        const ak = document.getElementById('stAksi').value, kon = document.getElementById('stKon').value;
        if(!q) return alert("Qty Kosong!");

        db.ref('stok_logs').push({ t, b, q, ak, kon: ak==="Masuk"?kon:"-" }).then(() => {
            if(ak === "Rekondisi") {
                const kw = b.toLowerCase().includes("jerigen") ? "jerigen" : "kempu";
                let logs = Object.entries(D.aktivitas || {}).filter(x => x[1].j.toLowerCase().includes(kw) && !x[1].isCair);
                let orangUnik = [];
                logs.forEach(l => { l[1].p.forEach(n => { if(!orangUnik.includes(n)) orangUnik.push(n); })});
                if(orangUnik.length > 0) {
                    logs.forEach(log => { db.ref(`aktivitas/${log[0]}`).update({ isCair:true, tglCair:t, qtyReady:q, totalOrang:orangUnik.length }); });
                }
            }
            alert("Proses " + ak + " Berhasil!"); document.getElementById('stQty').value="";
        });
    }

    function renderStok() {
        const B_arr = Object.values(D.master_barang || {}); let h = "";
        B_arr.forEach(b => {
            let s = { ik:0, ir:0, rk:0, jm:0, ju:0 };
            Object.values(D.stok_logs||{}).forEach(l => {
                if(l.b !== b || l.ak === "Reject") return; // REJECT DIABAIKAN DARI SALDO
                if(l.ak === "Masuk") l.kon === "Bekas" ? s.ik += l.q : s.ir += l.q;
                else if(l.ak === "Rekondisi") s.rk += l.q;
                else if(l.ak === "Jual Mitra") s.jm += l.q;
                else if(l.ak === "Jual Umum") s.ju += l.q;
            });
            h += `<tr><td class="sticky-col">${b}</td><td>${s.ik}</td><td>${s.ir}</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td style="background:#fef3c7"><b>${s.ik-s.rk}</b></td><td style="background:#dcfce7"><b>${s.ir+s.rk-s.jm-s.ju}</b></td></tr>`;
        }); document.getElementById('tbStok').innerHTML = h;
    }

    function renderCheckKaryawan() {
        const tgl = document.getElementById('akTgl').value;
        const K = Object.values(D.master_karyawan || {});
        document.getElementById('akKaryawan').innerHTML = K.map(k => {
            const a = D.absensi?.[tgl]?.[k];
            const sudahAbsen = a && ['Hadir', 'Telat', 'Lembur'].includes(a.j);
            return `<label class="check-item" style="${sudahAbsen?'':'opacity:0.3; background:#eee'}">
                <input type="checkbox" class="chk-k" value="${k}" ${sudahAbsen?'':'disabled'}> <span>${k} ${sudahAbsen?'':'(X)'}</span>
            </label>`;
        }).join('');
    }

    function saveAk() {
        const t=document.getElementById('akTgl').value, p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value), j=document.getElementById('akJenis').value;
        if(!p.length) return alert("Pilih Karyawan (Wajib Absen)!");
        db.ref('aktivitas').push({ t, j, q: j.includes("Rekon")?0:1, p, isCair: !j.includes("Rekon") }).then(()=>{
            alert("Kerja Simpan!"); document.querySelectorAll('.chk-k').forEach(c=>c.checked=false);
        });
    }

    function renderGaji() {
        const fM = document.getElementById('fUang').value, K = Object.values(D.master_karyawan||{}), Trf = D.tarif||DEF_TARIF;
        let h = `<table><tr><th class="sticky-col">NAMA</th><th>GAJI CAIR</th><th>NETT</th></tr>`, tS=0;
        K.forEach(k => {
            let cair=0;
            Object.values(D.aktivitas||{}).forEach(a => {
                if(a.t?.slice(0,7)===fM && a.p?.includes(k) && a.isCair) {
                    let upah = 0;
                    if(a.qtyReady) {
                        upah = ((Trf[a.j]||0) * a.qtyReady) / a.totalOrang / (Object.values(D.aktivitas).filter(x => x.tglCair===a.tglCair && x.qtyReady===a.qtyReady && x.p.includes(k)).length);
                    } else { upah = (Trf[a.j]||0) / (a.j.includes("muat")||a.j.includes("bongkar")?a.p.length:1); }
                    cair += upah;
                }
            });
            tS += cair;
            h += `<tr><td class="sticky-col">${k}</td><td>${Math.round(cair).toLocaleString()}</td><td><b>${Math.round(cair).toLocaleString()}</b></td></tr>`;
        });
        document.getElementById('areaGaji').innerHTML = h+"</table>";
        document.getElementById('gTotal').innerText = "TOTAL: Rp "+Math.round(tS).toLocaleString();
    }

    // FUNGSI UMUM LAINNYA
    function initUI() {
        const K = Object.entries(D.master_karyawan || {}), B = Object.entries(D.master_barang || {});
        document.getElementById('listK').innerHTML = K.map(k=>`<span style="background:#fff; border:1px solid #ddd; padding:4px; border-radius:5px; font-size:9px">${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red;cursor:pointer">×</b></span>`).join('');
        document.getElementById('listB').innerHTML = B.map(b=>`<span style="background:#fff; border:1px solid #ddd; padding:4px; border-radius:5px; font-size:9px">${b[1]} <b onclick="removeItem('master_barang','${b[0]}')" style="color:red;cursor:pointer">×</b></span>`).join('');
        document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k[1]}">${k[1]}</option>`).join('');
        document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b[1]}">${b[1]}</option>`).join('');
    }
    function saveAbs() { const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value; db.ref(`absensi/${t}/${n}`).set({j}).then(()=>alert("OK!")); }
    function renderAll() {
        const K_arr = Object.values(D.master_karyawan || {}), fM = document.getElementById('absTgl').value.slice(0,7);
        const lastD = new Date(fM.split('-')[0], fM.split('-')[1], 0).getDate();
        let th = `<tr><th class="sticky-col">NAMA</th>`; for(let i=1; i<=lastD; i++) th += `<th>${i}</th>`; th += `</tr>`;
        document.getElementById('thA').innerHTML = th;
        let tb = ""; K_arr.forEach(k => {
            let r = `<td class="sticky-col">${k}</td>`;
            for(let i=1; i<=lastD; i++){
                let d = `${fM}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k];
                r += `<td><div class="badge ${a?'bg-h':'bg-none'}">${a?a.j[0]:'-'}</div></td>`;
            }
            tb += `<tr>${r}</tr>`;
        }); document.getElementById('tbA').innerHTML = tb;
    }
    function addItem(p,id) { const v=document.getElementById(id).value; if(v) db.ref(p).push(v).then(()=>document.getElementById(id).value=""); }
    function removeItem(p,k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove(); }
    function editTarif() { let h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">${Object.entries(D.tarif||DEF_TARIF).map(t=>`<div><label style="font-size:9px">${t[0]}</label><input type="number" id="trf_${t[0].replace(/ /g,'_')}" value="${t[1]}"></div>`).join('')}</div><button class="btn" onclick="saveTarif()">UPDATE</button>`; openMod("Tarif", h); }
    function saveTarif() { let nT={}; Object.keys(D.tarif||DEF_TARIF).forEach(k=>nT[k]=parseInt(document.getElementById(`trf_${k.replace(/ /g,'_')}`).value)||0); db.ref('tarif').set(nT).then(()=>alert("OK!")); }
    function openMod(t,h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
    function closeMod() { document.getElementById('modalUni').style.display='none'; }
    function showLogs(t) { let l=Object.entries(D[t]||{}).reverse().slice(0,20); openMod("Log", l.map(x=>`<div style="font-size:10px;padding:5px;border-bottom:1px solid #eee"><span>[${x[1].t}] ${x[1].b||x[1].j} (${x[1].q}) ${x[1].ak||''}</span> <b onclick="removeItem('${t}','${x[0]}')" style="color:red; cursor:pointer">×</b></div>`).join('')); }
</script>
</body>
</html>
