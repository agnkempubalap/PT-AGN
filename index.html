<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Management v41.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --border: #e2e8f0;
            --nama-bg: #ffffff; --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --border: #334155;
            --nama-bg: #1e293b; --shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); 
            color: var(--text); padding: 10px; transition: background 0.3s ease; 
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 5px; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { height: 45px; border-radius: 8px; }

        .theme-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 10px; cursor: pointer; color: var(--text);
            font-weight: 600; font-size: 12px;
        }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border); box-shadow: var(--shadow);
        }

        h3 { margin: 0 0 12px 0; font-size: 10px; color: var(--warning); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }

        input, select, button { 
            border-radius: 12px; font-size: 14px; height: 48px; 
            border: 1px solid var(--border); outline: none;
            background: var(--card-bg); color: var(--text); width: 100%; box-sizing: border-box;
        }

        .btn { display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; border: none; color: white; }
        .management-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-sq { width: 55px; flex-shrink: 0; }
        .libur-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

        /* TOAST NOTIF */
        #toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 12px; color: white; font-weight: 600; font-size: 14px;
            transform: translateY(100px); transition: 0.3s; z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

        /* TABLE */
        .table-wrap { overflow: auto; border-radius: 15px; border: 1px solid var(--border); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1000px; }
        th, td { border-bottom: 1px solid var(--border); padding: 10px 5px; text-align: center; }
        .nama-fixed { position: sticky; left: 0; background: var(--nama-bg) !important; font-weight: 700; text-align: left; width: 120px; z-index: 4; border-right: 2px solid var(--border); padding-left: 10px; }
        .status-cell { border-radius: 6px; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 10px; }
        .status-v { background: var(--success); color: white; }
        .status-t { background: var(--warning); color: white; }
        .status-i { background: var(--primary); color: white; }
        .status-off { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        @media print { .no-print { display: none !important; } #kop-surat { display: flex !important; align-items: center; justify-content: center; border-bottom: 4px solid #000; padding-bottom: 15px; margin-bottom: 25px; gap: 20px; } @page { size: landscape; } }
    </style>
</head>
<body data-theme="light">
    <div id="toast"></div>
    <div class="container">
        <header class="no-print">
            <div class="logo-box">
                <img src="https://i.ibb.co.com/m50YkM4v/AGN-Logo.jpg" alt="Logo">
                <div><h2>PT ATHA GHANIA NUGRAHA</h2><span style="font-size: 9px; color: var(--warning); font-weight: 800;">PRESENSI v41.0</span></div>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" id="tBtn">🌙 Dark Mode</button>
        </header>

        <div class="card no-print">
            <h3>👤 Management</h3>
            <div class="management-row">
                <input list="listKaryawan" id="inputPilihNama" placeholder="Nama karyawan...">
                <datalist id="listKaryawan"></datalist>
                <button class="btn btn-sq" style="background:var(--success);" onclick="tambahKaryawan()">➕</button>
                <button class="btn btn-sq" style="background:var(--danger);" onclick="hapusKaryawan()">🗑️</button>
            </div>
            <h3>🗓️ Atur Libur</h3>
            <div class="libur-group"><input type="date" id="tglMulaiLibur"><input type="date" id="tglSelesaiLibur"></div>
            <div style="display:flex; gap:8px;">
                <button class="btn" style="background:var(--primary); flex:1;" onclick="setRentangLibur(true)">SIMPAN LIBUR</button>
                <button class="btn" style="background:var(--border); color:var(--text); flex:1;" onclick="setRentangLibur(false)">HAPUS</button>
            </div>
        </div>

        <div class="card no-print">
            <h3>⚡ Presensi</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" style="background:var(--success); height: 60px;" onclick="prosesAbsen('Masuk')">MASUK</button>
                <button class="btn" style="background:var(--danger); height: 60px;" onclick="prosesAbsen('Pulang')">PULANG</button>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px;">
                <button class="btn" style="background:var(--warning); height: 45px;" onclick="prosesAbsen('Izin')">📝 IZIN/SAKIT</button>
                <button class="btn" style="background:var(--border); color:var(--text); height: 45px;" onclick="resetAbsen()">♻️ RESET</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;" class="no-print">
                <input type="month" id="filterBulan" style="width: 150px;" onchange="renderRekap()">
                <div style="display: flex; gap: 5px;">
                    <button class="btn" style="background:#334155; padding: 0 12px;" onclick="exportToExcel()">📊 EXCEL</button>
                    <button class="btn" style="background:var(--primary); padding: 0 12px;" onclick="window.print()">📄 PDF</button>
                </div>
            </div>
            <div class="table-wrap"><table id="tabelUtama"><thead><tr id="theadRekap"></tr></thead><tbody id="tbodyRekap"></tbody></table></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "810494462386",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let masterKaryawan = {}, absensiData = {}, hariLibur = {};

        // THEME PERSISTENCE
        function toggleTheme() {
            const b = document.body;
            const newTheme = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            b.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('tBtn').innerHTML = newTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.innerHTML = msg;
            t.style.background = type === 'success' ? '#10b981' : '#ef4444';
            t.className = 'show';
            setTimeout(() => t.className = '', 3000);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('tBtn').innerHTML = savedTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';

            const s = new Date();
            document.getElementById('filterBulan').value = `${s.getFullYear()}-${String(s.getMonth() + 1).padStart(2, '0')}`;
            db.ref('master_karyawan').on('value', snap => { masterKaryawan = snap.val() || {}; updateDatalist(); renderRekap(); });
            db.ref('absensi').on('value', snap => { absensiData = snap.val() || {}; renderRekap(); });
            db.ref('hari_libur').on('value', snap => { hariLibur = snap.val() || {}; renderRekap(); });
        };

        function updateDatalist() {
            const dl = document.getElementById('listKaryawan');
            let opt = '';
            Object.values(masterKaryawan).sort().forEach(nama => { opt += `<option value="${nama}">`; });
            dl.innerHTML = opt;
        }

        function tambahKaryawan() {
            const n = document.getElementById('inputPilihNama');
            if(!n.value.trim()) return showToast("Isi nama!", "error");
            db.ref('master_karyawan').push(n.value.trim()).then(() => {
                showToast("Karyawan ditambahkan!");
                n.value = "";
            });
        }

        function hapusKaryawan() {
            const n = document.getElementById('inputPilihNama');
            const id = Object.keys(masterKaryawan).find(k => masterKaryawan[k] === n.value);
            if(id && confirm(`Hapus ${n.value}?`)) {
                db.ref(`master_karyawan/${id}`).remove().then(() => {
                    showToast("Karyawan dihapus!");
                    n.value = "";
                });
            }
        }

        function setRentangLibur(isSet) {
            const m = document.getElementById('tglMulaiLibur'), s = document.getElementById('tglSelesaiLibur');
            if(!m.value || !s.value) return showToast("Pilih tanggal!", "error");
            let u = {}, curr = new Date(m.value), end = new Date(s.value);
            while(curr <= end) { u[curr.toISOString().split('T')[0]] = isSet ? true : null; curr.setDate(curr.getDate()+1); }
            db.ref('hari_libur').update(u).then(() => {
                showToast(isSet ? "Libur disimpan!" : "Jadwal dihapus!");
                m.value = ""; s.value = "";
            });
        }

        function prosesAbsen(tipe) {
            const n = document.getElementById('inputPilihNama');
            if(!n.value) return showToast("Pilih karyawan!", "error");
            const s = new Date(), tgl = s.toISOString().split('T')[0];
            const jam = s.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            let status = (tipe==='Masuk' && (s.getHours()>9 || (s.getHours()===9 && s.getMinutes()>0))) ? "Terlambat" : "Hadir";
            db.ref(`absensi/${tgl}/${n.value}/${tipe}`).set({ waktu: jam, status: status }).then(() => {
                showToast(`Absen ${tipe} Berhasil!`);
                n.value = "";
            });
        }

        function renderRekap() {
            const f = document.getElementById('filterBulan').value;
            const [y, m] = f.split('-');
            const totalH = new Date(y, m, 0).getDate();
            let h = `<th class="nama-fixed">Karyawan</th>`;
            for(let i=1; i<=totalH; i++) h += `<th>${i}</th>`;
            h += `<th>H</th><th>T</th><th>I</th>`;
            document.getElementById('theadRekap').innerHTML = h;

            let b = "";
            Object.values(masterKaryawan).sort().forEach(nama => {
                let cH=0, cT=0, cI=0, r = `<td class="nama-fixed">${nama}</td>`;
                for(let i=1; i<=totalH; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2,'0')}`, dObj = new Date(tgl);
                    let sim = "-", cls = "";
                    if(dObj.getDay()===0) { sim = "OFF"; cls = "status-off"; }
                    else if(hariLibur[tgl]) { sim = "LBR"; cls = "status-off"; }
                    if(absensiData[tgl] && absensiData[tgl][nama]) {
                        const d = absensiData[tgl][nama];
                        if(d.Izin) { sim="I"; cls="status-i"; cI++; }
                        else if(d.Masuk) {
                            if(d.Masuk.status==="Terlambat") { sim="T"; cls="status-t"; cT++; }
                            else { sim="V"; cls="status-v"; cH++; }
                        }
                    }
                    r += `<td><div class="status-cell ${cls}">${sim}</div></td>`;
                }
                b += `<tr>${r}<td>${cH}</td><td>${cT}</td><td>${cI}</td></tr>`;
            });
            document.getElementById('tbodyRekap').innerHTML = b;
        }

        function exportToExcel() {
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelUtama")), `Absen_AGN_${document.getElementById('filterBulan').value}.xlsx`);
        }
        function resetAbsen() {
            const n = document.getElementById('inputPilihNama');
            if(n.value && confirm(`Reset data ${n.value}?`)) {
                db.ref(`absensi/${new Date().toISOString().split('T')[0]}/${n.value}`).remove().then(() => {
                    showToast("Data direset!");
                    n.value = "";
                });
            }
        }
    </script>
</body>
</html>
