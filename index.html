<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PT AGN</title>

<style>
body { font-family: Arial; margin:0; background:#eef3ff; }
.page { display:none; padding:15px; }
.active { display:block; }
h2 { color:blue; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Selamat datang di PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi</h2>
<div class="card">
<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hata</option>
<option>Alda</option>
<option>Nur</option>
</select>
<button onclick="absen()">Hadir</button>
<ul id="listAbsen"></ul>
</div>
</div>

<!-- NAVBAR -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
</div>

<!-- FIREBASE + SCRIPT -->
<script type="module">

// 🔥 IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 GANTI CONFIG INI
const firebaseConfig = {
  apiKey: "ISI_APIKEY_KAMU",
  authDomain: "ISI_AUTHDOMAIN",
  projectId: "ISI_PROJECT_ID",
  storageBucket: "ISI_STORAGE",
  messagingSenderId: "ISI_SENDER_ID",
  appId: "ISI_APP_ID"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// NAVIGASI
window.show = function(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 🔥 ABSEN → SIMPAN KE FIREBASE
window.absen = async function(){
  let nama = document.getElementById('nama').value;

  await addDoc(collection(db, "absensi"), {
    nama: nama,
    status: "hadir",
    waktu: new Date()
  });

  tampilAbsen();
}

// 🔥 TAMPILKAN DATA
window.tampilAbsen = async function(){
  let list = document.getElementById('listAbsen');
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "absensi"));
  querySnapshot.forEach((doc) => {
    let data = doc.data();
    let li = document.createElement('li');
    li.innerText = data.nama + " hadir";
    list.appendChild(li);
  });
}

// 🔥 LOAD OTOMATIS
window.onload = function(){
  tampilAbsen();
}

</script>

</body>
</html>
