<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kempu Balap OMNI V117</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#dc2626; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 13px; overflow-x: hidden; }
        
        /* Navbar Sticky */
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; position: sticky; top: 0; z-index: 1000; background: var(--p); padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .nav-btn { padding: 12px 2px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 8px; text-transform: uppercase; }
        .nav-btn.active { background: white; color: var(--p); }

        .container { padding: 10px; max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: var(--c); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--b); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 12px; font-size: 11px; color: var(--p); text-transform: uppercase; border-left: 4px solid var(--p); padding-left: 10px; letter-spacing: 0.5px; }

        /* Form Inputs */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input, select, textarea { width: 100%; height: 45px; background: #f8fafc; border: 1px solid var(--b); border-radius: 12px; padding: 0 12px; margin-bottom: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--p); background: white; }
        .btn { border: none; border-radius: 12px; padding: 12px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 5px; font-size: 11px; text-transform: uppercase; }
        
        /* Attendance Table */
        .table-res { overflow-x: auto; width: 100%; border-radius: 12px; border: 1px solid var(--b); background: white; scroll-behavior: smooth; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; padding: 10px; font-size: 10px; color: #64748b; border: 1px solid var(--b); }
        td { padding: 6px; border: 1px solid var(--b); text-align: center; font-size: 11px; }
        .sticky-col { position: sticky; left: 0; background: white !important; z-index: 10; width: 120px !important; border-right: 2px solid var(--b); font-weight: 800; color: var(--p); }

        /* Calendar Badges */
        .badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; font-weight: 800; color: white; font-size: 10px; cursor: pointer; }
        .bg-h { background: var(--s); } 
        .bg-m { background: var(--d) !important; } /* Minggu Tetap Merah */
        .bg-i { background: #8b5cf6; } 
        .bg-off { background: #94a3b8; } 
        .bg-t { background: #f59e0b; } 
        .bg-l { background: #0ea5e9; } 
        .bg-a { background: #000; }
        .today-hl { background: #eff6ff !important; border: 2px solid var(--p) !important; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 30px; z-index: 9999; display: none; font-weight: 700; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="toast">✅ Sukses!</div>

    <div class="nav-grid">
        <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
        <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
        <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
        <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
    </div>

    <div class="container">
        
        <div id="tab-absen" class="tab-content">
            <div class="card">
                <h3>👥 Data Karyawan & Libur</h3>
                <div class="grid-2">
                    <input type="text" id="inK" placeholder="Nama Baru...">
                    <button class="btn" style="background:var(--p)" onclick="addM('master_karyawan', 'inK')">TAMBAH</button>
                </div>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:6px; margin: 10px 0"></div>
                
                <div class="grid-2">
                    <input type="date" id="libS">
                    <input type="date" id="libE">
                </div>
                <div class="grid-2">
                    <button class="btn" style="background:#64748b" onclick="setLibur()">SET LIBUR</button>
                    <button class="btn" style="background:var(--d)" onclick="hapusLibur()">HAPUS LIBUR</button>
                </div>
            </div>

            <div class="card">
                <h3>📅 Kalender Real-Time</h3>
                <input type="month" id="fM" onchange="renderAll()">
                <div class="table-res" id="calScroll">
                    <table id="tblAbsen"><thead id="thA"></thead><tbody id="tbA"></tbody></table>
                </div>
                <div class="grid-2" style="margin-top:15px">
                    <button class="btn" style="background:#1d6f42" onclick="exportExcel()">EXCEL</button>
                    <button class="btn" style="background:#b91c1c" onclick="exportPDF()">PDF</button>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="card">
                <h3>📦 Inventory & QC</h3>
                <select id="stBrg"></select>
                <div class="grid-2">
                    <select id="stQC"><option value="Baru">Baru</option><option value="Bekas">Bekas</option></select>
                    <select id="stRes"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select>
                </div>
                <input type="number" id="stQty" placeholder="Jumlah Barang">
                <button class="btn" style="background:var(--s)" onclick="saveStok()">SIMPAN STOK</button>
            </div>
            <div class="card">
                <h3>📊 Rekap Bulanan</h3>
                <div class="table-res"><table id="tblStokR"><thead><tr><th class="sticky-col">BARANG</th><th>AWAL</th><th>MASUK</th><th>REKO</th><th>JUAL</th><th>TOTAL</th></tr></thead><tbody id="tbS"></tbody></table></div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content hidden">
            <div class="card">
                <h3>🛠️ Aktivitas Karyawan</h3>
                <select id="akK"></select>
                <select id="akJ">
                    <option value="Rekondisi Kempu">Rekondisi Kempu</option>
                    <option value="Muat Barang">Muat Barang (📦)</option>
                    <option value="Bongkar Barang">Bongkar Barang (📤)</option>
                    <option value="Pasang Pangkalan">Pasang Pangkalan</option>
                </select>
                <input type="number" id="akQ" placeholder="Jumlah (Pcs/Tim)">
                <button class="btn" style="background:var(--p)" onclick="saveAktivitas()">INPUT AKTIVITAS</button>
            </div>
            <div class="card">
                <h3>🛍️ Belanja Operasional</h3>
                <input type="text" id="belItem" placeholder="Barang Belanja...">
                <input type="number" id="belNom" placeholder="Nominal Rp">
                <button class="btn" style="background:var(--s)" onclick="saveBelanja()">SIMPAN NOTA</button>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content hidden">
            <div class="card">
                <h3>💰 Perhitungan Gaji Borongan</h3>
                <div id="listGaji"></div>
            </div>
        </div>

    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let DATA = {};
        // Daftar Tarif Borongan (Sesuai Spek Mas)
        const RATES = { 
            "Rekondisi Kempu": 100000, 
            "Pasang Pangkalan": 500000, 
            "Muat Barang": 12000, 
            "Bongkar Barang": 12000 
        };

        window.onload = () => {
            const now = new Date();
            document.getElementById('fM').value = now.toISOString().slice(0, 7);
            db.ref('/').on('value', s => { 
                DATA = s.val() || {}; 
                renderAll(); 
                checkAutoAlpa();
            });
        };

        function notify(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        function tab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            if(t==='absen') setTimeout(scrollToToday, 200);
        }

        // --- MANAJEMEN DATA ---
        function addM(p, id) {
            const v = document.getElementById(id).value;
            if(v) db.ref(p).push(v).then(() => { document.getElementById(id).value=""; notify("Berhasil!"); });
        }

        function setLibur() {
            const s = new Date(document.getElementById('libS').value), e = new Date(document.getElementById('libE').value);
            if(isNaN(s)) return alert("Set tgl!");
            let c = new Date(s);
            while(c <= e) {
                db.ref(`master_libur/${c.toISOString().split('T')[0]}`).set(true);
                c.setDate(c.getDate()+1);
            }
            notify("Libur Disimpan!");
        }

        function hapusLibur() {
            const s = new Date(document.getElementById('libS').value), e = new Date(document.getElementById('libE').value);
            if(isNaN(s)) return alert("Pilih tgl yang mau dihapus!");
            let c = new Date(s);
            while(c <= e) {
                db.ref(`master_libur/${c.toISOString().split('T')[0]}`).remove();
                c.setDate(c.getDate()+1);
            }
            notify("Libur Dihapus!");
        }

        function checkAutoAlpa() {
            const now = new Date();
            if(now.getHours() >= 16) {
                const tgl = now.toISOString().split('T')[0];
                Object.values(DATA.master_karyawan || {}).forEach(name => {
                    if(!DATA.absensi?.[tgl]?.[name] && now.getDay() !== 0 && !DATA.master_libur?.[tgl]) {
                        db.ref(`absensi/${tgl}/${name}`).update({ s: 'Alpa' });
                    }
                });
            }
        }

        function saveAktivitas() {
            const n = document.getElementById('akK').value, tgl = new Date().toISOString().split('T')[0];
            const j = document.getElementById('akJ').value, q = document.getElementById('akQ').value;
            db.ref('aktivitas').push({ n, tgl, j, q: parseInt(q) }).then(() => {
                document.getElementById('akQ').value = "";
                notify("Aktivitas Tersimpan!");
            });
        }

        // --- RENDER ENGINE ---
        function renderAll() {
            const kArr = Object.entries(DATA.master_karyawan || {});
            const fM = document.getElementById('fM').value;
            const [y, m] = fM.split('-'), last = new Date(y, m, 0).getDate();
            const tToday = new Date().toISOString().split('T')[0];

            // Update Select Dropdowns
            const kSelectHtml = kArr.map(([id, n]) => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('akK').innerHTML = kSelectHtml;
            document.getElementById('listK').innerHTML = kArr.map(([id, n]) => `<div style="background:#fff;padding:5px 10px;border:1px solid #ccc;border-radius:20px">${n} <b onclick="db.ref('master_karyawan/${id}').remove()">×</b></div>`).join('');

            // KALENDER ABSEN
            let th = `<tr><th class="sticky-col">KARYAWAN</th>`;
            for (let i = 1; i <= last; i++) th += `<th id="col-${i}">${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;

            let tb = "";
            kArr.forEach(([id, name]) => {
                let row = `<td class="sticky-col">${name}</td>`;
                for (let i = 1; i <= last; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2, '0')}`;
                    const d = DATA.absensi?.[tgl]?.[name];
                    const isSun = new Date(tgl).getDay() === 0;
                    const isLibur = DATA.master_libur?.[tgl];
                    
                    let txt = "-", cls = "";
                    
                    // PRIORITAS MINGGU HARGA MATI
                    if (isSun) { 
                        txt = "M"; cls = "bg-m"; 
                    } else if (isLibur) {
                        txt = "Off"; cls = "bg-off";
                    }

                    if (d) {
                        txt = d.s[0]; cls = `bg-${d.s.toLowerCase()[0]}`;
                        if(d.s==='Telat') { txt='T'; cls='bg-t'; }
                        if(d.s==='Lembur') { txt='L'; cls='bg-l'; }
                        if(d.s==='Alpa') { txt='A'; cls='bg-a'; }
                        if(isSun) { txt='M'; cls='bg-m'; } // Tetap Merah di Kalender
                    }

                    // Ikon Integrasi Aktivitas
                    let icons = "";
                    const aks = Object.values(DATA.aktivitas || {}).filter(a => a.n === name && a.tgl === tgl);
                    aks.forEach(a => {
                        if(a.j.includes('Muat')) icons += "📦";
                        if(a.j.includes('Bongkar')) icons += "📤";
                    });

                    row += `<td class="${tgl === tToday ? 'today-hl' : ''}"><div class="badge ${cls}" onclick="resetAbs('${tgl}','${name}')">${txt}</div><div style="font-size:9px">${icons}</div></td>`;
                }
                tb += `<tr>${row}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;

            renderGaji(fM, kArr);
        }

        function renderGaji(fM, kArr) {
            let html = "";
            kArr.forEach(([id, name]) => {
                let total = 0;
                Object.values(DATA.aktivitas || {}).forEach(a => {
                    if(a.n === name && a.tgl.startsWith(fM)) {
                        total += (RATES[a.j] || 0) * (a.q || 1);
                    }
                });
                html += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                    <b>${name}</b>
                    <span style="color:var(--s); font-weight:900; font-size:15px">Rp${total.toLocaleString()}</span>
                </div>`;
            });
            document.getElementById('listGaji').innerHTML = html || "Belum ada data gaji.";
        }

        function scrollToToday() {
            const day = new Date().getDate();
            const el = document.getElementById(`col-${day}`);
            const con = document.getElementById('calScroll');
            if(el && con) con.scrollLeft = el.offsetLeft - 130;
        }

        function resetAbs(t, n) { if(confirm(`Hapus data ${n} tgl ${t}?`)) db.ref(`absensi/${t}/${n}`).remove(); }

        function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('tblAbsen')), `Absen_${document.getElementById('fM').value}.xlsx`); }
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text(`Rekap Absensi: ${document.getElementById('fM').value}`, 10, 10);
            doc.autoTable({ html: '#tblAbsen', startY: 20, styles: { fontSize: 6 } });
            doc.save(`Absen_${document.getElementById('fM').value}.pdf`);
        }
    </script>
</body>
</html>
