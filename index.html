<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v77.8 - ELITE MINIMALIST</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#10b981;--d:#f43f5e;--w:#fbbf24;--bg:#0f172a;--c:#1e293b;--t:#f1f5f9;--b:#334155;--iz:#8b5cf6;--al:#475569}
        body[data-theme="light"]{--bg:#f8fafc;--c:#ffffff;--t:#0f172a;--b:#e2e8f0}
        body{font-family:'Inter',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:6px;transition:0.3s;letter-spacing:-0.01em}
        .container{max-width:1400px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:4px}
        .logo-box{display:flex;align-items:center;gap:8px}
        .logo-box img{width:45px;height:45px;border-radius:10px;background:#000;border:1.5px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:8px; border:1px solid var(--b); padding:4px 10px; display:flex; align-items:center; gap:5px; cursor:pointer; color:var(--t); font-size:11px}

        .card{background:var(--c);padding:12px;border-radius:10px;margin-bottom:6px;border:1px solid var(--b);box-shadow:0 1px 2px rgba(0,0,0,0.05)}
        h3{margin:0 0 8px;font-size:9px;color:var(--p);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;opacity:0.8}
        
        label{display:block;font-size:8.5px;margin-bottom:3px;font-weight:600;color:var(--t);opacity:0.6}
        input,button,select{border-radius:6px;font-size:12px;height:34px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none;padding:0 10px}
        input:focus{border-color:var(--p)}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer;border:none;color:#fff;transition:0.2s}
        .btn:active{transform:scale(0.96)}
        
        .export-group { display: flex; justify-content: flex-end; align-items: flex-end; gap: 6px; margin-bottom: 12px; }
        .btn-ex { width: 75px; height: 32px; font-size: 9px; border-radius: 6px; font-weight:700}

        .table-wrap{overflow-x:auto; border-radius:8px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:9.5px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:4px 1px;text-align:center;min-width:32px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:100px !important;text-align:left !important;padding-left:8px !important;font-weight:600; border-right: 1.5px solid var(--p) !important; font-size:10px}
        .th-main{background:#1e293b !important; color:#94a3b8 !important; font-weight:700}
        .rekap-akhir{background:var(--bg) !important; color:var(--t) !important; font-weight:700; min-width:28px !important}

        .s-cell{border-radius:4px;width:30px;height:30px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:9px;margin: 0 auto; -webkit-print-color-adjust: exact;}
        .s-v{background:rgba(16,185,129,0.2);color:#10b981;border:1px solid #10b981} 
        .s-late{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid #fbbf24} 
        .s-i{background:rgba(139,92,246,0.2);color:#8b5cf6;border:1px solid #8b5cf6}
        .s-off{background:rgba(244,63,94,0.2);color:#f43f5e;border:1px solid #f43f5e} 
        .s-a{background:rgba(71,85,105,0.2);color:#94a3b8;border:1px solid #475569} 
        .s-l{background:rgba(168,85,247,0.2);color:#a855f7;border:1px solid #a855f7} 
        .s-mng{background:rgba(51,65,85,0.1);color:#64748b;border:1px solid transparent; opacity:0.5}
        .jam-text{font-size:6px;font-weight:500;display:block;margin-top:1px;opacity:0.8}

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            header, .no-print, .export-group, .dark-card { display: none !important; }
            .table-web { width: 100% !important; transform: scale(0.75); transform-origin: top left; -webkit-print-color-adjust: exact; print-color-adjust: exact; border: 1px solid #000 !important; }
            .table-web th { background-color: #f1f5f9 !important; color: #000 !important; border: 1px solid #000 !important; }
            .table-web td { border: 1px solid #000 !important; color: #000 !important; }
            .s-cell { border: 1px solid #000 !important; background: transparent !important; color: #000 !important; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=3b82f6&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:14px;letter-spacing:1px">PT AGN</h2><span style="font-size:8px;color:var(--p);font-weight:800 uppercase">Elite System v77.8</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()"><span id="tIco">☀️</span></div>
        </header>

        <div class="card no-print">
            <div style="display:flex;gap:6px">
                <div style="flex-grow:1"><input list="lk" id="iNama" placeholder="Nama Karyawan..."></div>
                <datalist id="lk"></datalist>
                <button class="btn" style="background:var(--s);width:40px" onclick="tKaryawan()">+</button>
                <button class="btn" style="background:var(--d);width:40px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <div class="card no-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
            <div style="grid-column: span 2; display:flex; gap:6px">
                <input type="date" id="resetTgl" style="flex-grow:1">
                <button class="btn" style="background:var(--d); padding:0 15px; font-size:10px" onclick="resetAbsen()">RESET</button>
            </div>
            <div><label>Dari:</label><input type="date" id="tglAwal"></div>
            <div><label>Sampai:</label><input type="date" id="tglAkhir"></div>
            <button class="btn" style="background:var(--p); font-size:10px" onclick="sLib(true)">SET LIBUR</button>
            <button class="btn" style="background:var(--al); font-size:10px" onclick="sLib(false)">HAPUS</button>
        </div>

        <div class="card no-print">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-bottom:6px">
                <button class="btn" style="background:var(--s); height:38px" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn" style="background:var(--d); height:38px" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn" style="background:var(--iz); height:32px; font-size:11px" onclick="pAbsen('Izin')">IZIN / KETERANGAN</button>
        </div>

        <div class="card table-card">
            <div class="export-group no-print">
                <div style="flex-grow:1">
                    <input type="month" id="fB" style="width:120px; height:32px; font-size:11px" onchange="rRekap()">
                </div>
                <button class="btn btn-ex" style="background:#10b981" onclick="doExcel()">EXCEL</button>
                <button class="btn btn-ex" style="background:#f43f5e" onclick="window.print()">PDF</button>
            </div>
            <div class="table-wrap" id="scrollArea">
                <table class="table-web" id="rekapTable">
                    <thead id="thWeb"></thead>
                    <tbody id="tbWeb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            const savedTheme = localStorage.getItem('agnTheme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function toggleT(){ 
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt); localStorage.setItem('agnTheme', nt); document.getElementById('tIco').innerText=nt==='dark'?'☀️':'🌙';
        }

        function cLogo(e){
            const r=new FileReader(); r.onload=()=>{document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result);};
            r.readAsDataURL(e.target.files[0]);
        }

        function uDl(){
            let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');
            document.getElementById('lk').innerHTML=opt;
        }

        function tKaryawan(){
            let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value="";});}
        }

        function hKaryawan(){
            let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); 
            if(id && confirm('Hapus Karyawan?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");
        }

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan Izin:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{alert(`${ty} OK!`); inp.value="";});
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tgl=document.getElementById('resetTgl');
            if(!n.value || !tgl.value) return alert("Pilih Nama & Tgl!");
            if(confirm('Reset data?')) db.ref(`absensi/${tgl.value}/${n.value}`).remove();
        }

        function sLib(st){
            let d1=document.getElementById('tglAwal'), d2=document.getElementById('tglAkhir');
            if(!d1.value) return;
            let start = new Date(d1.value); let end = d2.value ? new Date(d2.value) : new Date(d1.value);
            while(start <= end){
                db.ref(`hari_libur/${start.toISOString().split('T')[0]}`).set(st?true:null);
                start.setDate(start.getDate() + 1);
            }
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed th-main">Karyawan</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}" class="th-main">${i}</th>`;
            h+=`<th class="th-main">H</th><th class="th-main">I</th><th class="th-main">A</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isMin = (d.getDay()===0), isLib = hl[t];
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isMin || isLib) { sW="L"; clW="s-l"; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu;
                        }
                    } 
                    else if(isMin){ sW="M"; clW="s-mng"; }
                    else if(isLib){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    row+=`<td><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td class="rekap-akhir">${cH}</td><td class="rekap-akhir">${cI}</td><td class="rekap-akhir">${cA}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
            setTimeout(() => {
                const scrollArea = document.getElementById('scrollArea');
                const target = document.getElementById(`tgl-${tglSkrg}`);
                if(target && scrollArea) {
                    const offset = target.offsetLeft - (scrollArea.offsetWidth / 2) + (target.offsetWidth / 2);
                    scrollArea.scrollTo({ left: offset, behavior: 'smooth' });
                }
            }, 500);
        }

        function doExcel(){
            const f=document.getElementById('fB').value;
            const table = document.getElementById("rekapTable").outerHTML;
            const blob = new Blob([table], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `AGN_${f}.xls`; a.click();
        }
    </script>
</body>
</html>
