<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V957 - FULL RESTORE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; }
        th { background: #f8fafc; color: #64748b; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 10px; position: relative; cursor: pointer; }
        .dot { position: absolute; top: 2px; right: 2px; width: 5px; height: 5px; background: white; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .bg-h, .bg-l { background: var(--s); } .bg-i { background: var(--w); } .bg-a { background: var(--d); } 
        .bg-m, .bg-off { background: #64748b; } .bg-t { background: #f97316; } .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 15px; max-height: 85vh; overflow-y: auto; }
        /* Fix Ceklis Aktivitas */
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; cursor: pointer; }
        .check-item input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
        .check-item span { font-weight: 600; font-size: 12px; }
    </style>
</head>
<body>

    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div></div>

    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master <input type="text" id="inK" placeholder="Nama..." style="width:100px; height:30px"> <button class="btn" style="background:var(--p); width:50px; margin:0" onclick="addItem('master_karyawan', 'inK')">ADD</button></h3>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absen <input type="date" id="absTgl" style="width:115px; height:30px"></h3>
                <div class="flex-row"><select id="selK"></select><select id="absJenis" onchange="toggleIzin()"><option value="Hadir">Masuk</option><option value="Pulang">Pulang</option><option value="Izin">Izin</option></select></div>
                <div id="boxIzin" style="display:none; margin-bottom:10px"><input type="text" id="absKet" placeholder="Alasan..."></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" onchange="renderAll()" style="width:110px; height:30px"></h3>
                <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <div class="flex-row">
                    <button class="btn" style="background:var(--w); color:black" onclick="openLiburMod()">⚙️ SET LIBUR</button>
                    <button class="btn" style="background:var(--s)" onclick="expEx('areaAbsen','Absen')">EXCEL</button>
                    <button class="btn" style="background:var(--d)" onclick="expPdf('areaAbsen','Absen_Bulanan')">DOWNLOAD PDF</button>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <div class="flex-row"><input type="text" id="inB" placeholder="Barang..."><button class="btn" style="background:var(--p); width:80px" onclick="addItem('master_barang', 'inB')">ADD</button></div>
                <div id="listB" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📥 Logistik</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row"><input type="number" id="stQty" placeholder="Jumlah"><select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Rdy</option></select></div>
                <div class="flex-row"><select id="stQC"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select><select id="stAksi"><option value="Masuk">Masuk</option><option value="Rekondisi">Rekon</option><option value="Jual Mitra">Mitra</option><option value="Jual Umum">Umum</option></select></div>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">UPDATE STOK</button>
            </div>
            <div class="table-area" id="areaStok"><table><thead><tr><th class="sticky-col">BRG</th><th>AWAL KTR</th><th>AWAL RDY</th><th>IN KTR</th><th>IN RDY</th><th>REJ</th><th>REKON</th><th>MITRA</th><th>UMUM</th><th style="background:#fef3c7">STOK KTR</th><th style="background:#dcfce7">STOK RDY</th><th style="background:var(--p); color:white">TOTAL</th></tr></thead><tbody id="tbStok"></tbody></table></div>
            <div class="flex-row">
                <button class="btn" style="background:var(--s)" onclick="expEx('areaStok','Stok')">EXCEL</button>
                <button class="btn" style="background:var(--d)" onclick="expPdf('areaStok','Stok_Bulanan')">DOWNLOAD PDF</button>
                <button class="btn" style="background:#64748b" onclick="showLogs('stok_logs')">HAPUS LOG STOK</button>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content">
            <div class="card">
                <h3>🛠️ Borongan Kerja <input type="date" id="akTgl" style="width:115px; height:30px"></h3>
                <select id="akJenis" style="margin-bottom:10px">
                    <option value="Rekondisi Kempu">Rekon Kempu</option><option value="Rekondisi jerigen 18L">Rekon 18L</option><option value="Rekondisi jerigen 5L">Rekon 5L</option><option value="muat barang">Muat</option><option value="bongkar barang">Bongkar</option><option value="kirim minyak">Kirim Minyak</option><option value="pasang pangkalan">Pasang Pangkalan</option><option value="pasang agen">Pasang Agen</option>
                </select>
                <div id="akKaryawan" class="check-grid"></div>
                <input type="number" id="akQty" placeholder="Jumlah" style="margin-bottom:10px">
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
            <div class="card">
                <h3>🛒 Nota Belanja</h3>
                <div class="flex-row"><input type="date" id="blTgl"><input type="text" id="blNama" placeholder="Item"></div>
                <div class="flex-row"><input type="number" id="blRp" placeholder="Rp"><input type="file" id="blImg" accept="image/*"></div>
                <button class="btn" style="background:var(--d)" onclick="saveBl()">SIMPAN NOTA</button>
            </div>
            <div class="flex-row"><button class="btn" style="background:#64748b" onclick="showLogs('aktivitas')">LOG KERJA</button><button class="btn" style="background:var(--w); color:black" onclick="showNotaLogs()">REKAP NOTA PDF</button></div>
        </div>

        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3 style="color:white">💰 Gaji <input type="month" id="fUang" onchange="renderGaji()" style="width:110px; height:30px"></h3>
                <div class="flex-row"><div>GAJI: <b id="gTotal">0</b></div><div>NOTA: <b id="nTotal">0</b></div></div>
            </div>
            <div class="flex-row">
                <button class="btn" style="background:var(--w); color:black" onclick="editTarif()">⚙️ TARIF</button>
                <button class="btn" style="background:var(--s)" onclick="openModKB()">💰 KASBON / BONUS</button>
            </div>
            <div id="areaGaji" class="table-area"></div>
            <button class="btn" style="background:var(--d)" onclick="expPdf('areaGaji','Rekap_Gaji')">DOWNLOAD PDF REKAP</button>
        </div>
    </div>

    <script>
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); const db = firebase.database();
        let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000, "pasang pangkalan":500000, "pasang agen":700000 };

        window.onload = () => {
            const t = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl','blTgl'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = t });
            ['fM','fUang'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = t.slice(0, 7) });
            db.ref('/').on('value', s => { D = s.val() || {}; initUI(); renderAll(); });
        };

        function tab(id) {
            document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id==='gaji') renderGaji();
        }

        function initUI() {
            const K = Object.entries(D.master_karyawan || {}), B = Object.entries(D.master_barang || {});
            document.getElementById('listK').innerHTML = K.map(k=>`<span style="background:#fff; border:1px solid #ddd; padding:4px; border-radius:5px; font-size:9px">${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red">×</b></span>`).join('');
            document.getElementById('listB').innerHTML = B.map(b=>`<span style="background:#fff; border:1px solid #ddd; padding:4px; border-radius:5px; font-size:9px">${b[1]} <b onclick="removeItem('master_barang','${b[0]}')" style="color:red">×</b></span>`).join('');
            document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k[1]}">${k[1]}</option>`).join('');
            document.getElementById('akKaryawan').innerHTML = K.map(k=>`<label class="check-item"><input type="checkbox" class="chk-k" value="${k[1]}"><span>${k[1]}</span></label>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b[1]}">${b[1]}</option>`).join('');
        }

        function saveAbs() {
            const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value, ket=document.getElementById('absKet').value;
            const now = new Date(); const jam = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.',':');
            const ref = db.ref(`absensi/${t}/${n}`);
            if(j==="Pulang") ref.update({ jamOut: jam }).then(()=>alert("Berhasil Pulang!"));
            else {
                let stat = "Hadir";
                if(new Date(`${t} 09:30`) < now) stat = "Telat";
                if(new Date(t).getDay() === 0 || D.libur?.[t]) stat = "Lembur";
                if(j==="Izin") stat = "Izin";
                ref.set({ j: stat, jam, ket: ket||"" }).then(()=>{ alert("Berhasil Absen!"); document.getElementById('absKet').value=""; });
            }
        }

        function renderAll() {
            const K_arr = Object.values(D.master_karyawan || {}), fM = document.getElementById('fM').value, [Y, M] = fM.split('-'), lastD = new Date(Y, M, 0).getDate();
            const now = new Date(); const curT = now.toISOString().split('T')[0]; const curH = now.getHours();
            let th = `<tr><th class="sticky-col">NAMA</th>`; for(let i=1; i<=lastD; i++) th += `<th>${i}</th>`; th += `<th>H</th></tr>`; 
            document.getElementById('thA').innerHTML = th;
            let tb = "";
            K_arr.forEach(k => {
                let r = `<td class="sticky-col">${k}</td>`, tH=0;
                for(let i=1; i<=lastD; i++) {
                    let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k], isLib = D.libur?.[d], isSun = new Date(d).getDay()===0;
                    let txt="-", cls="bg-none";
                    if(isSun) { txt="M"; cls="bg-m"; } else if(isLib) { txt="OFF"; cls="bg-off"; }
                    if(a) {
                        if(a.j==="Hadir") { txt="H"; cls="bg-h"; tH++; }
                        else if(a.j==="Telat") { txt="T"; cls="bg-t"; tH++; }
                        else if(a.j==="Lembur") { txt="L"; cls="bg-l"; tH++; }
                        else if(a.j==="Izin") { txt="I"; cls="bg-i"; }
                    } else { if(d === curT && !isSun && !isLib && curH >= 16) { txt="A"; cls="bg-a"; } }
                    r += `<td><div class="badge ${cls}" onclick="cellMod('${d}','${k}')">${txt}${a?.jamOut?'<div class="dot"></div>':''}</div></td>`;
                }
                tb += `<tr>${r}<td>${tH}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
            renderStok();
        }

        function cellMod(d, k) {
            let a = D.absensi?.[d]?.[k];
            openMod(`Detail ${k}`, a ? `Status: ${a.j}<br>Masuk: ${a.jam||'-'}<br>Pulang: ${a.jamOut||'-'}<br>Ket: ${a.ket||'-'}<br><br><button class='btn' style='background:var(--d)' onclick="removeItem('absensi/${d}','${k}')">HAPUS</button>` : "Kosong");
        }

        function renderStok() {
            const B_arr = Object.values(D.master_barang || {}), fM = document.getElementById('fM').value;
            let h = "";
            B_arr.forEach(b => {
                let s = { ak:0, ab:0, ik:0, ib:0, rj:0, rk:0, jm:0, ju:0 };
                Object.values(D.stok_logs || {}).forEach(l => {
                    if(l.b !== b) return;
                    if(l.t?.slice(0,7) < fM) {
                        if(l.ak==="Masuk") { if(l.kon==="Bekas") s.ak+=l.q; else s.ab+=l.q; }
                        else if(l.ak==="Rekondisi") { s.ak-=l.q; s.ab+=l.q; }
                        else if(l.ak.includes("Jual")) s.ab-=l.q;
                    } 
                    else if(l.t?.slice(0,7) === fM) {
                        if(l.ak==="Masuk") { if(l.kon==="Bekas") s.ik+=l.q; else s.ib+=l.q; if(l.qc==="Reject") s.rj+=l.q; }
                        else if(l.ak==="Rekondisi") s.rk+=l.q;
                        else if(l.ak==="Jual Mitra") s.jm+=l.q;
                        else if(l.ak==="Jual Umum") s.ju+=l.q;
                    }
                });
                let ktr = (s.ak+s.ik)-s.rk, rdy = (s.ab+s.ib+s.rk)-(s.jm+s.ju);
                h += `<tr><td class="sticky-col">${b}</td><td style="background:#f8fafc">${s.ak}</td><td style="background:#f8fafc">${s.ab}</td><td>${s.ik}</td><td>${s.ib}</td><td>${s.rj}</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td style="background:#fef3c7">${ktr}</td><td style="background:#dcfce7">${rdy}</td><td style="background:var(--p); color:white; font-weight:800">${ktr+rdy}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = h;
        }

        function saveSt() { 
            const t=document.getElementById('stTgl').value, b=document.getElementById('stBrg').value, q=parseInt(document.getElementById('stQty').value);
            if(q && b) db.ref('stok_logs').push({ t, b, q, kon:document.getElementById('stKon').value, qc:document.getElementById('stQC').value, ak:document.getElementById('stAksi').value }).then(()=>{ alert("Berhasil!"); document.getElementById('stQty').value=""; });
        }

        function saveAk() {
            const q=parseInt(document.getElementById('akQty').value)||0, p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value);
            if(p.length) db.ref('aktivitas').push({ t:document.getElementById('akTgl').value, j:document.getElementById('akJenis').value, q, p }).then(()=>{ alert("Berhasil!"); document.getElementById('akQty').value=""; document.querySelectorAll('.chk-k').forEach(c=>c.checked=false); });
            else alert("Pilih Karyawan!");
        }

        async function saveBl() {
            const t=document.getElementById('blTgl').value, n=document.getElementById('blNama').value, rp=parseInt(document.getElementById('blRp').value), file=document.getElementById('blImg').files[0];
            let imgBase = ""; if(file) {
