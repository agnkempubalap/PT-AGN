<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi</title>

<style>
body { font-family:Arial; background:#eef3ff; padding:15px; }

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
}

button {
  border:none;
  color:white;
  font-weight:bold;
}

#btnMasuk { background:#4CAF50; }
#btnPulang { background:#ff9800; }

.item {
  background:#f5f7ff;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
}

.telat { color:red; font-weight:bold; }
.tepat { color:green; font-weight:bold; }
</style>
</head>

<body>

<h2>📋 Absensi Karyawan</h2>

<div class="card">

<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hatta</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="btnMasuk">Absen Masuk</button>
<button id="btnPulang">Absen Pulang</button>

<h3>List Hari Ini</h3>
<div id="list">Memuat...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  setDoc, 
  getDoc,
  updateDoc,
  getDocs 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// FORMAT
function today(){
  let d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function jam(){
  return new Date().toLocaleTimeString("id-ID");
}


// STATUS TELAT (jam masuk > 08:00 = telat)
function statusMasuk(){
  let now = new Date();
  let batas = new Date();
  batas.setHours(8,0,0);

  return now > batas ? "Telat" : "Tepat Waktu";
}


// 🔵 ABSEN MASUK
document.getElementById("btnMasuk").onclick = async function(){

  let btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let id = nama + "_" + today();

  try{

    let ref = doc(db,"absensi",id);
    let snap = await getDoc(ref);

    if(snap.exists()){
      alert("❌ Sudah absen masuk");
      btn.disabled=false;
      btn.innerText="Absen Masuk";
      return;
    }

    await setDoc(ref,{
      nama:nama,
      tanggal:today(),
      jamMasuk:jam(),
      statusMasuk:statusMasuk()
    });

    alert("✅ Masuk berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Masuk";
};


// 🟠 ABSEN PULANG
document.getElementById("btnPulang").onclick = async function(){

  let btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let id = nama + "_" + today();

  try{

    let ref = doc(db,"absensi",id);
    let snap = await getDoc(ref);

    if(!snap.exists()){
      alert("❌ Belum absen masuk");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    let data = snap.data();

    if(data.jamPulang){
      alert("❌ Sudah absen pulang");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    await updateDoc(ref,{
      jamPulang: jam()
    });

    alert("✅ Pulang berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Pulang";
};


// LOAD DATA
async function loadData(){

  let list = document.getElementById("list");
  list.innerHTML = "Memuat...";

  let snap = await getDocs(collection(db,"absensi"));

  list.innerHTML = "";

  let tgl = today();

  snap.forEach(doc=>{
    let d = doc.data();

    if(d.tanggal === tgl){

      list.innerHTML += `
        <div class="item">
          <b>${d.nama}</b><br>
          Masuk: ${d.jamMasuk || "-"}<br>
          Status: <span class="${d.statusMasuk=='Telat'?'telat':'tepat'}">${d.statusMasuk || "-"}</span><br>
          Pulang: ${d.jamPulang || "-"}
        </div>
      `;
    }
  });

  if(list.innerHTML === ""){
    list.innerHTML = "Belum ada data";
  }
}


// LOAD AWAL
loadData();

</script>

</body>
</html>
