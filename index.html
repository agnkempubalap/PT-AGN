<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi PT AGN</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef3ff;
}

.page { display:none; padding:15px; }
.active { display:block; }

h2 { color:#2c3e50; }

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
select, button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  background:#4CAF50;
  color:white;
  font-weight:bold;
  border:none;
}

/* LIST */
.list-item {
  background:#f8f9ff;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

/* REKAP */
.rekap-box {
  background:#4CAF50;
  color:white;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
  display:flex;
  justify-content:space-between;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button {
  flex:1;
  background:white;
  color:#333;
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Aplikasi Absensi PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi Hari Ini</h2>

<div class="card">

<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hata</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="btnAbsen" onclick="absen()">Hadir</button>

<h3>Data Hari Ini</h3>
<div id="listAbsen"></div>

<h3>Rekap Bulanan</h3>
<div id="rekapBulanan"></div>

</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
</div>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  query,
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// 🔥 CONFIG (PUNYA KAMU - SUDAH BENAR)
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};


// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// 📅 FORMAT TANGGAL
function getTanggal(){
  let d = new Date();
  return d.getFullYear() + "-" +
    (d.getMonth()+1).toString().padStart(2,'0') + "-" +
    d.getDate().toString().padStart(2,'0');
}


// 🚫 ABSEN (ANTI DOUBLE SUPER)
window.absen = async function(){

  const btn = document.getElementById("btnAbsen");
  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let tanggal = getTanggal();
  let docId = nama + "_" + tanggal;

  try {

    const ref = doc(db, "absensi", docId);
    const snap = await getDoc(ref);

    if(snap.exists()){
      alert("❌ " + nama + " sudah absen hari ini!");
      btn.disabled = false;
      btn.innerText = "Hadir";
      return;
    }

    await setDoc(ref, {
      nama: nama,
      status: "Hadir",
      tanggal: tanggal,
      waktu: new Date()
    });

    alert("✅ Absen berhasil");

  } catch(e){
    alert("Error: " + e.message);
  }

  btn.disabled = false;
  btn.innerText = "Hadir";
};


// 📋 REALTIME HARI INI
function realtime(){

  const list = document.getElementById("listAbsen");

  let tanggal = getTanggal();

  const q = query(
    collection(db, "absensi"),
    where("tanggal", "==", tanggal),
    orderBy("waktu", "desc")
  );

  onSnapshot(q, (snap)=>{

    list.innerHTML = "";

    if(snap.empty){
      list.innerHTML = "<div class='list-item'>Belum ada absen</div>";
      return;
    }

    snap.forEach(doc=>{
      const d = doc.data();

      list.innerHTML += `
        <div class="list-item">
          <span>${d.nama}</span>
          <span>${d.status}</span>
        </div>
      `;
    });

  });
}


// 📊 REKAP BULANAN
function rekapBulanan(){

  const list = document.getElementById("rekapBulanan");

  let now = new Date();
  let prefix = now.getFullYear() + "-" + (now.getMonth()+1).toString().padStart(2,'0');

  const q = query(collection(db, "absensi"));

  onSnapshot(q, (snap)=>{

    let data = {};

    snap.forEach(doc=>{
      let d = doc.data();

      if(d.tanggal && d.tanggal.startsWith(prefix)){
        if(!data[d.nama]) data[d.nama]=0;
        data[d.nama]++;
      }
    });

    list.innerHTML = "";

    if(Object.keys(data).length === 0){
      list.innerHTML = "<div class='list-item'>Belum ada data</div>";
      return;
    }

    for(let nama in data){
      list.innerHTML += `
        <div class="rekap-box">
          <span>${nama}</span>
          <span>${data[nama]} hari</span>
        </div>
      `;
    }

  });
}


// LOAD
window.onload = function(){
  realtime();
  rekapBulanan();
};

</script>

</body>
</html>
