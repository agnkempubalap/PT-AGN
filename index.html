<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN ERP SLIM V110</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf-autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#22c55e;--d:#ef4444;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155}
        *{box-sizing:border-box} body{font-family:'Inter',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:8px;font-size:11px}
        
        /* Navigasi Ramping */
        .nav-grid { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px;}
        .nav-btn { flex: 1; min-width: 70px; padding: 10px 5px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 9px; white-space: nowrap;}
        .nav-btn.active { background: var(--p); border-color: var(--p); }

        .card{background:var(--c);padding:12px;border-radius:12px;margin-bottom:10px;border:1px solid var(--b);}
        h3{margin:0 0 10px;font-size:10px;color:var(--p);text-transform:uppercase;font-weight:800;}
        
        .form-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        input, button, select { height: 36px; border-radius: 6px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 8px; font-size: 11px; outline: none;}
        
        /* Tabel Anti-Geser Kebanyakan */
        .table-wrap{ overflow-x: auto; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); max-height: 400px;}
        .table-web{ width: 100%; border-collapse: collapse; table-layout: fixed; } /* Paksa Layout Tetap */
        
        .table-web th, .table-web td { border: 1px solid var(--b); text-align: center; vertical-align: middle; }
        .table-web th { background: var(--b); font-size: 9px; padding: 5px 2px; }
        
        /* Kolom Nama Mengunci */
        .nama-fixed { 
            position: sticky; left: 0; background: #1e293b !important; z-index: 21; 
            width: 85px !important; min-width: 85px; max-width: 85px;
            text-align: left !important; padding-left: 5px !important; font-size: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-right: 2px solid var(--p) !important;
        }

        /* Kotak Absen Mungil */
        .tgl-col { width: 32px; min-width: 32px; }
        .s-box { 
            width: 100%; height: 35px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 9px; font-weight: 800;
        }
        .s-h{background:var(--s)} .s-i{background:#8b5cf6} .s-a{background:var(--d)} 
        .s-m{background:#f43f5e} .s-off{background:#64748b} .s-t{background:#ec4899}
        
        .box-icon { font-size: 7px; line-height: 1; margin-top: 1px; }
        .summary-col { width: 25px; font-size: 9px; font-weight: 600; background: #2d3748; }

        .hidden { display: none !important; }
        .dash-val { font-size: 14px; font-weight: 800; color: var(--s); }
    </style>
</head>
<body>
    <div id="dashboard" class="form-row" style="justify-content: space-between; padding: 0 5px;">
        <div>Gaji: <span id="dashGaji" class="dash-val">0</span></div>
        <div>Belanja: <span id="dashBelanja" class="dash-val" style="color:var(--d)">0</span></div>
    </div>

    <div class="nav-grid">
        <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
        <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
        <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
        <button class="nav-btn" onclick="tab('belanja', this)">BELANJA</button>
        <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
    </div>

    <div id="tab-absen" class="tab-content">
        <div class="card">
            <div class="form-row">
                <select id="selK" style="flex:1.5"></select>
                <input type="date" id="tglAbs" style="flex:1">
            </div>
            <div class="form-row">
                <button style="background:var(--s);flex:1" onclick="abs('Masuk')">MASUK</button>
                <button style="background:var(--iz);flex:1" onclick="abs('Ijin')">IJIN</button>
                <button style="background:var(--al);flex:1" onclick="abs('Pulang')">PULANG</button>
            </div>
        </div>
        <div class="card" style="padding: 5px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                <h3 style="margin:0">KALENDER</h3>
                <input type="month" id="fM" onchange="renderAll()" style="height:25px">
            </div>
            <div class="table-wrap">
                <table class="table-web" id="tableAbsen">
                    <thead id="thA"></thead>
                    <tbody id="tbA"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-stok" class="tab-content hidden">
        <div class="card">
            <h3>INPUT STOK & TIM</h3>
            <div class="form-row">
                <input type="date" id="stT" style="flex:1">
                <select id="slB" style="flex:1"></select>
                <input type="number" id="stQ" style="width:50px" placeholder="Qty">
            </div>
            <div class="form-row">
                <select id="stA" style="flex:1" onchange="tQC(this.value)">
                    <option value="Masuk">Bongkar</option>
                    <option value="Rekondisi">Rekondisi</option>
                    <option value="Jual Mitra">Muat</option>
                </select>
                <input list="lk" id="wkSt" style="flex:1.5" placeholder="Tim (Nama1, Nama2)">
            </div>
            <button style="background:var(--p); width:100%" onclick="saveStokFull()">SIMPAN TRANSAKSI</button>
        </div>
        <div class="table-wrap">
            <table class="table-web" id="tableStok">
                <thead>
                    <tr>
                        <th class="nama-fixed">BARANG</th>
                        <th>AW</th><th>IN</th><th>REKO</th><th>OUT</th><th>READY</th>
                    </tr>
                </thead>
                <tbody id="tbS"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Logika Inti V110 - Fokus pada perampingan Tabel
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, brg={}, sl={}, la={}, pr={}, bel={};

        window.onload=()=>{
            const t=new Date().toISOString().split('T')[0];
            document.getElementById('fM').value=t.slice(0,7);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uL(); renderAll();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; renderAll();});
            db.ref('stok_log').on('value',s=>{sl=s.val()||{}; renderAll();});
            db.ref('log_aktivitas').on('value',s=>{la=s.val()||{}; renderAll();});
            // Fetch lainnya...
        };

        function rA(){
            const f=document.getElementById('fM').value, [y,m]=f.split('-'), last=new Date(y,m,0).getDate();
            const kL=Object.values(mk).sort();
            const curTgl=new Date().toISOString().split('T')[0];
            
            // Render Header Ramping
            let h=`<tr><th class="nama-fixed">NAMA</th>`;
            for(let i=1;i<=last;i++) h+=`<th class="tgl-col ${y+'-'+m+'-'+String(i).padStart(2,'0')===curTgl?'s-t':''}">${i}</th>`;
            h+=`<th class="summary-col">H</th><th class="summary-col">A</th></tr>`;
            document.getElementById('thA').innerHTML=h;

            // Render Body Padat
            let b="";
            kL.forEach(n=>{
                let row=`<td class="nama-fixed">${n}</td>`, cH=0, cA=0;
                for(let i=1;i<=last;i++){
                    let tg=`${y}-${m}-${String(i).padStart(2,'0')}`, da=ad[tg]?ad[tg][n]:null;
                    let sW="-", cl="";
                    if(da){ sW=da.status[0]; cl="s-h"; cH++; } // Ambil huruf depan saja biar muat
                    row+=`<td class="tgl-col"><div class="s-box ${cl}">${sW}</div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cA}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;
        }

        // Tab Switcher & Other Logic...
        function tab(t, b){
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
            b.classList.add('active');
        }
        function uL(){
            let h=Object.values(mk).sort().map(n=>`<option value="${n}">${n}</option>`).join('');
            document.getElementById('selK').innerHTML=h;
        }
        function renderAll(){ rA(); /* render lainnya... */ }
    </script>
</body>
</html>
