<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.7 - SLIM SOFT</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#1a4f8b;--gold:#c5a059;--s:#10b981;--d:#f43f5e;--bg:#0f172a;--c:#1e293b;--t:#f1f5f9;--b:#334155}
        body[data-theme="light"]{--bg:#f8fafc;--c:#ffffff;--t:#0f172a;--b:#e2e8f0}
        body{font-family:'Inter',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:6px;transition:0.3s}
        .container{max-width:1400px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:4px}
        .logo-box{display:flex;align-items:center;gap:10px}
        .logo-box img{width:45px;height:45px;border-radius:8px;border:1.5px solid var(--gold);background:#fff;object-fit:cover;cursor:pointer}
        .card{background:var(--c);padding:10px;border-radius:12px;margin-bottom:6px;border:1px solid var(--b)}
        
        /* UKURAN INPUT & TOMBOL DIPERKECIL */
        input,button{border-radius:6px;font-size:11px;height:32px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;outline:none;padding:0 10px}
        
        /* TOMBOL SOFT (GHOST STYLE) */
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;transition:0.2s;background:transparent}
        .btn:active{transform:scale(0.97)}
        
        .btn-agn-blue{color:#60a5fa; border:1px solid rgba(96,165,250,0.3); background:rgba(96,165,250,0.08)}
        .btn-agn-gold{color:#fbbf24; border:1px solid rgba(251,191,36,0.3); background:rgba(251,191,36,0.08)}
        .btn-danger{color:#f87171; border:1px solid rgba(248,113,113,0.3); background:rgba(248,113,113,0.08)}
        .btn-success{color:#34d399; border:1px solid rgba(52,211,153,0.3); background:rgba(52,211,153,0.08)}
        
        /* TOMBOL UTAMA MASUK/PULANG LEBIH PENDEK (36px) */
        .btn-main{height:36px; font-size:12px}

        .table-wrap{overflow-x:auto; border-radius:10px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:9.5px}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:5px 1px;text-align:center;min-width:32px}
        .nama-fixed{position:sticky;left:0;background:var(--c)!important;z-index:10;min-width:110px!important;text-align:left!important;padding-left:10px!important;font-weight:700; border-right: 2px solid var(--p)!important}
        
        .s-cell{border-radius:5px;width:30px;height:30px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:9px;margin: 0 auto}
        .s-v{background:rgba(16,185,129,0.12);color:#10b981;border:0.5px solid #10b981} 
        .s-late{background:rgba(251,191,36,0.12);color:#fbbf24;border:0.5px solid #fbbf24} 
        .s-i{background:rgba(139,92,246,0.12);color:#8b5cf6;border:0.5px solid #8b5cf6}
        .s-off{background:rgba(244,63,94,0.12);color:#f43f5e;border:0.5px solid #f43f5e} 
        .s-a{background:rgba(71,85,105,0.12);color:#94a3b8;border:0.5px solid #475569} 
        .s-l{background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid #a855f7} 
        .s-mng{color:#4b5563; opacity:0.35; font-weight:400; font-size:10px}
        .jam-text{font-size:6px;font-weight:500;display:block;margin-top:1px;opacity:0.8}

        @media print { .no-print { display: none !important; } .table-web { transform: scale(0.7); transform-origin: top left; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" onchange="cLogo(event)">
                <img id="mainLogo" src="https://i.ibb.co/mF9fR7z/agn-logo.png" onclick="document.getElementById('inpLogo').click()" onerror="this.src='https://ui-avatars.com/api/?name=AGN&background=1a4f8b&color=fff'">
                <div><h2 style="margin:0;font-size:13px">PT ATHA GHANIA</h2><span style="font-size:8px;color:var(--gold);font-weight:800">NUGRAHA • v78.7 SOFT</span></div>
            </div>
            <div style="cursor:pointer" onclick="toggleT()"><span id="tIco">☀️</span></div>
        </header>

        <div class="card no-print">
            <div style="display:flex;gap:4px">
                <input list="lk" id="iNama" placeholder="Cari Nama...">
                <datalist id="lk"></datalist>
                <button class="btn btn-success" style="width:38px" onclick="tKaryawan()">+</button>
                <button class="btn btn-danger" style="width:38px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <div class="card no-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:6px">
            <input type="date" id="resetTgl">
            <button class="btn btn-danger" onclick="resetAbsen()">RESET</button>
            <button class="btn btn-agn-blue" onclick="sLib(true)">SET OFF</button>
            <button class="btn btn-agn-gold" onclick="sLib(false)">HAPUS OFF</button>
        </div>

        <div class="card no-print">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-bottom:6px">
                <button class="btn btn-agn-blue btn-main" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn btn-agn-gold btn-main" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn btn-success" style="height:30px; color:#a78bfa; border-color:rgba(167,139,250,0.3)" onclick="pAbsen('Izin')">IZIN / KETERANGAN</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px" class="no-print">
                <input type="month" id="fB" style="width:120px; height:30px" onchange="rRekap()">
                <div style="display:flex; gap:4px">
                    <button class="btn btn-success" style="width:60px; height:30px" onclick="doExcel()">EXCEL</button>
                    <button class="btn btn-danger" style="width:60px; height:30px" onclick="window.print()">PDF</button>
                </div>
            </div>
            <div class="table-wrap" id="scrollArea">
                <table class="table-web" id="rekapTable">
                    <thead id="thWeb"></thead>
                    <tbody id="tbWeb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Logika tetap sama persis tanpa perubahan
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function toggleT(){ let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; b.setAttribute('data-theme',nt); document.getElementById('tIco').innerText=nt==='dark'?'☀️':'🌙';}
        function cLogo(e){const r=new FileReader(); r.onload=()=>{document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result);}; r.readAsDataURL(e.target.files[0]);}
        function uDl(){let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); document.getElementById('lk').innerHTML=opt;}
        function tKaryawan(){let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value="";});}}
        function hKaryawan(){let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");}

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), st="Hadir";
            if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{alert(`Selesai!`);});
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tgl=document.getElementById('resetTgl').value;
            if(!n.value || !tgl) return alert("Pilih Nama & Tgl!");
            if(confirm('Hapus data?')) db.ref(`absensi/${tgl}/${n.value}`).remove();
        }

        function sLib(st){
            let tgl = prompt("Tanggal (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
            if(tgl) db.ref(`hari_libur/${tgl}`).set(st?true:null);
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            let h=`<tr><th class="nama-fixed">Karyawan</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}">${i}</th>`;
            h+=`<th>H</th><th>L</th><th>I</th><th>A</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b="";
            kList.forEach(n=>{
                let cH=0, cL=0, cI=0, cA=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isMin = (d.getDay()===0), isLib = hl[t];
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isMin || isLib) { sW="L"; clW="s-l"; cL++; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu;
                        }
                    } 
                    else if(isMin){ sW="M"; clW="s-mng"; }
                    else if(isLib){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    row+=`<td><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cL}</td><td>${cI}</td><td>${cA}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
            setTimeout(() => {
                const scrollArea = document.getElementById('scrollArea');
                const target = document.getElementById(`tgl-${tglSkrg}`);
                if(target && scrollArea) {
                    const offset = target.offsetLeft - (scrollArea.offsetWidth / 2) + (target.offsetWidth / 2);
                    scrollArea.scrollTo({ left: offset, behavior: 'smooth' });
                }
            }, 500);
        }

        function doExcel(){
            const table = document.getElementById("rekapTable").outerHTML;
            const blob = new Blob([table], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN_${document.getElementById('fB').value}.xls`; a.click();
        }
    </script>
</body>
</html>
