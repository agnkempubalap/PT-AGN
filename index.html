        <!-- PAGE 2: STOK BARANG (REPLIKA EXCEL) -->
        <div id="page-stok" class="page">
            
            <!-- 1. DASHBOARD UTAMA (PERSIS FOTO 1) -->
            <div class="card">
                <h3>📊 DASHBOARD STOK (REPLIKA EXCEL)</h3>
                <div class="table-wrap">
                    <table class="table-web">
                        <thead>
                            <tr style="background:#2e7d32; color:#fff">
                                <th class="nama-fixed" style="background:#1b5e20 !important">NAMA BARANG</th>
                                <th>MASUK (KOTOR)</th>
                                <th>SELESAI REKONDISI</th>
                                <th style="background:#c62828">SISA STOK KOTOR</th>
                                <th>TERJUAL UMUM</th>
                                <th>TERJUAL AGEN</th>
                                <th style="background:#1565c0">SISA STOK READY</th>
                                <th style="background:#000">TOTAL STOK</th>
                            </tr>
                        </thead>
                        <tbody id="tbStok">
                            <!-- Data Otomatis Muncul Di Sini -->
                        </tbody>
                    </table>
                </div>
                <p style="font-size:10px; color:var(--iz); margin-top:10px">*Total Stok = Sisa Kotor + Sisa Ready</p>
            </div>

            <!-- 2. FORM INPUT LOG (PERSIS FOTO 2, 3, 4) -->
            <div class="card no-print" style="border-top: 4px solid var(--p)">
                <h3>📝 INPUT LOG TRANSAKSI</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <div>
                        <label style="font-size:11px">Nama Barang:</label>
                        <select id="sItem">
                            <option>Kempu</option><option>Derigen 18L</option><option>Derigen 5L</option>
                            <option>Botol 1L</option><option>Mesin Minyak</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:11px">Tanggal:</label>
                        <input type="date" id="sTgl">
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px; margin-bottom:15px">
                    <div>
                        <label style="font-size:11px">Pilih Jalur Log:</label>
                        <select id="sKategori" onchange="updatePlaceholder()">
                            <option value="m_ktr">Log Masuk (Kotor)</option>
                            <option value="rekon">Log Rekondisi (Selesai)</option>
                            <option value="j_umn">Log Jual (Umum)</option>
                            <option value="j_agn">Log Jual (Agen)</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:11px">Jumlah (Qty):</label>
                        <input type="number" id="sQty" placeholder="0">
                    </div>
                </div>

                <div style="display:flex; gap:10px">
                    <button class="btn" style="background:var(--s); flex:2; height:60px" onclick="saveStok()">SIMPAN LOG</button>
                    <button class="btn" style="background:var(--d); flex:1" onclick="undoStok()">BATAL (UNDO)</button>
                </div>
            </div>
        </div>

    <script>
        // --- LOGIKA HITUNGAN PERSIS RUMUS EXCEL MAS ---
        function renderStok() {
            let f = document.getElementById('sTgl').value.slice(0, 7);
            let h = "";
            const items = ["Kempu", "Derigen 18L", "Derigen 5L", "Botol 1L", "Mesin Minyak"];
            
            items.forEach(item => {
                let d = (stData[f] && stData[f][item]) ? stData[f][item] : {};
                
                let mKtr = d.m_ktr || 0;     // Masuk Kotor
                let rekon = d.rekon || 0;   // Selesai Rekondisi
                let jUmn = d.j_umn || 0;     // Terjual Umum
                let jAgn = d.j_agn || 0;     // Terjual Agen
                
                // RUMUS EXCEL:
                let sisaKtr = mKtr - rekon;          // Kolom H di foto
                let sisaReady = rekon - jUmn - jAgn; // Kolom K di foto
                let totalStok = sisaKtr + sisaReady; // Kolom L di foto (Stok Fisik Gudang)

                h += `<tr>
                    <td class="nama-fixed">${item}</td>
                    <td>${mKtr}</td>
                    <td>${rekon}</td>
                    <td style="color:#ef4444; font-weight:800">${sisaKtr}</td>
                    <td>${jUmn}</td>
                    <td>${jAgn}</td>
                    <td style="color:#2563eb; font-weight:800">${sisaReady}</td>
                    <td style="background:#f1f5f9; color:#000; font-weight:800">${totalStok}</td>
                </tr>`;
            });
            document.getElementById('tbStok').innerHTML = h;
        }

        function saveStok() {
            let itm = document.getElementById('sItem').value;
            let tgl = document.getElementById('sTgl').value;
            let kat = document.getElementById('sKategori').value;
            let qty = parseInt(document.getElementById('sQty').value);
            
            if (!qty || qty < 1) return alert("Isi jumlahnya dulu, Mas!");

            // Simpan ke Firebase Folder Baru v88
            db.ref(`stok_v88/${tgl.slice(0,7)}/${itm}/${kat}`).transaction(c => (c || 0) + qty);
            
            // Backup untuk Undo
            localStorage.setItem('lastPath', `stok_v88/${tgl.slice(0,7)}/${itm}/${kat}`);
            localStorage.setItem('lastQty', qty);

            alert("Log " + itm + " berhasil disimpan!");
            document.getElementById('sQty').value = "";
            
            // Re-render
            db.ref('stok_v88').once('value', s => { stData = s.val() || {}; renderStok(); });
        }

        function undoStok() {
            let path = localStorage.getItem('lastPath');
            let qty = localStorage.getItem('lastQty');
            if(!path) return alert("Belum ada data.");
            
            if(confirm("Hapus input terakhir (" + qty + ")?")) {
                db.ref(path).transaction(c => (c || 0) - parseInt(qty));
                localStorage.removeItem('lastPath');
                alert("Berhasil dihapus!");
                db.ref('stok_v88').once('value', s => { stData = s.val() || {}; renderStok(); });
            }
        }
        
        // Listener Firebase Data Stok
        db.ref('stok_v88').on('value', s => { stData = s.val() || {}; renderStok(); });
    </script>
