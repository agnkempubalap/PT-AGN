<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP ERP - V164 CLEAN</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#10b981; --d:#ef4444; --bg:#0f172a; --c:#1e293b; --t:#f8fafc; --b:#334155; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 11px; padding: 5px; }
        .nav { display: flex; gap: 3px; position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 5px 0; }
        .nav button { flex: 1; padding: 12px 2px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 8px; font-weight: 800; font-size: 9px; }
        .nav button.active { background: var(--p); border-color: var(--p); }
        .card { background: var(--c); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--b); }
        .form-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        input, select, button { height: 40px; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; font-size: 11px; flex: 1; }
        .btn-s { background: var(--s); border: none; font-weight: 800; }
        .btn-d { background: var(--d); border: none; font-weight: 800; }
        .table-wrap { overflow: auto; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); max-height: 500px; }
        .table-web { width: 100%; border-collapse: separate; border-spacing: 0; }
        .table-web th { background: var(--b); position: sticky; top: 0; z-index: 20; padding: 8px 4px; font-size: 9px; }
        .table-web td { border: 0.1px solid var(--b); text-align: center; padding: 4px 2px; height: 45px; }
        .sticky-col { position: sticky; left: 0; background: var(--c) !important; z-index: 10; min-width: 85px; text-align: left !important; padding-left: 8px !important; border-right: 2.5px solid var(--p) !important; font-weight: 800; }
        .box { width: 30px; height: 38px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 6px; font-weight: 900; margin: auto; font-size: 10px; position: relative; }
        .bg-h { background: var(--s); } .bg-i { background: #8b5cf6; } .bg-a { background: var(--d); } 
        .bg-m { background: #f43f5e; } .bg-off { background: #64748b; } .bg-t { background: #ec4899; }
        .bg-l { background: #d946ef; } .bg-none { color: #475569; }
        #toast { visibility: hidden; min-width: 200px; background: var(--p); color: #fff; text-align: center; border-radius: 10px; padding: 15px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 800; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toast">Berhasil!</div>
    <div class="nav">
        <button class="active" onclick="tab('abs', this)">ABSEN</button>
        <button onclick="tab('stk', this)">STOK</button>
        <button onclick="tab('act', this)">AKTIVITAS</button>
        <button onclick="tab('pay', this)">GAJI</button>
    </div>

    <div id="tab-abs" class="tab-content">
        <div class="card">
            <h3>MASTER KARYAWAN & LIBUR</h3>
            <div class="form-row">
                <input type="text" id="mKar" placeholder="Tambah Nama Karyawan">
                <button class="btn-s" style="flex:0.3" onclick="addM('karyawan', 'mKar')">+</button>
            </div>
            <div class="form-row" style="margin-top:10px">
                <input type="date" id="libS">
                <input type="date" id="libE">
                <button class="btn-d" style="flex:0.5" onclick="setL()">SET LIBUR</button>
            </div>
        </div>
        <div class="card">
            <h3>INPUT ABSEN</h3>
            <div class="form-row">
                <select id="selK"></select>
                <input type="date" id="absTgl">
            </div>
            <div class="form-row">
                <button class="btn-s" onclick="saveA('Hadir')">MASUK</button>
                <button style="background:#8b5cf6" onclick="saveA('Ijin')">IJIN</button>
                <button style="background:orange" onclick="saveA('Pulang')">PULANG</button>
                <button class="btn-d" onclick="resetA()">RESET</button>
            </div>
            <input type="text" id="absKet" placeholder="Keterangan Ijin..." style="width:100%; margin-top:5px">
        </div>
        <div class="card" style="padding:5px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                <input type="month" id="fM" onchange="renderAll()" style="max-width:130px">
                <button onclick="exportTableToExcel('absTable', 'Rekap_Absensi')" style="font-size:8px; width:auto">DOWNLOAD EXCEL</button>
            </div>
            <div class="table-wrap">
                <table class="table-web" id="absTable">
                    <thead id="thA"></thead>
                    <tbody id="tbA"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-stk" class="tab-content hidden">
        <div class="card">
            <h3>MASTER BARANG</h3>
            <div class="form-row"><input type="text" id="mBrg" placeholder="Tambah Jenis Barang"><button class="btn-s" style="flex:0.3" onclick="addM('barang', 'mBrg')">+</button></div>
        </div>
        <div class="card">
            <h3>TRANSAKSI BARANG</h3>
            <div class="form-row">
                <input type="date" id="stTgl">
                <select id="selB"></select>
                <input type="number" id="stQty" placeholder="Qty">
            </div>
            <div class="form-row">
                <select id="stAksi" onchange="toggleQC(this.value)">
                    <option value="Masuk">Bongkar (Masuk)</option>
                    <option value="Rekondisi">Rekondisi (Proses)</option>
                    <option value="Muat">Muat (Jual Mitra)</option>
                    <option value="JualUmum">Jual Umum</option>
                </select>
                <select id="qcJ"><option value="Bekas">Bekas</option><option value="Baru">Baru</option></select>
                <select id="qcH"><option value="Accepted">Accepted</option><option value="Minor">Minor</option><option value="Reject">Reject</option></select>
            </div>
            <div class="form-row"><input list="listK" id="stTim" placeholder="Nama Tim (Pisahkan koma)"></div>
            <button class="btn-s" style="width:100%" onclick="saveS()">SIMPAN DATA</button>
        </div>
        <div class="card" style="padding:5px">
            <h3>REKAP STOK</h3>
            <div class="table-wrap">
                <table class="table-web" style="min-width:1100px" id="stkTable">
                    <thead><tr><th class="sticky-col">BARANG</th><th>AW KTR</th><th>AW BRU</th><th>IN KTR</th><th>IN BRU</th><th>REKO</th><th>SISA KTR</th><th>UMUM</th><th>MITRA</th><th>READY</th><th>TOTAL</th></tr></thead>
                    <tbody id="tbS"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-act" class="tab-content hidden">
        <div class="card">
            <h3>AKTIVITAS LAIN</h3>
            <div class="form-row">
                <select id="actK"></select>
                <select id="actT">
                    <option value="Pasang Pangkalan">Pasang Pangkalan</option>
                    <option value="Kirim Minyak Jauh">Kirim Minyak Jauh</option>
                    <option value="Kirim Minyak Dekat">Kirim Minyak Dekat</option>
                </select>
                <button class="btn-s" onclick="saveAct()">SIMPAN</button>
            </div>
        </div>
        <div class="card">
            <h3>PENGELUARAN / BELANJA</h3>
            <div class="form-row">
                <input type="text" id="blItem" placeholder="Beli apa?">
                <input type="number" id="blHarga" placeholder="Harga Rp">
            </div>
            <div class="form-row">
                <input type="file" id="blFoto" accept="image/*">
                <button class="btn-s" onclick="saveBelanja()">UPLOAD NOTA</button>
            </div>
        </div>
        <div class="card">
            <div class="table-wrap"><table class="table-web"><thead><tr><th>Tgl</th><th>Item</th><th>Harga</th><th>Foto</th></tr></thead><tbody id="tbB"></tbody></table></div>
        </div>
    </div>

    <div id="tab-pay" class="tab-content hidden">
        <div class="card">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div style="background:var(--bg); padding:10px; border-radius:10px; text-align:center">Total Gaji:<br><b id="dG" style="color:var(--s); font-size:14px">0</b></div>
                <div style="background:var(--bg); padding:10px; border-radius:10px; text-align:center">Total Belanja:<br><b id="dN" style="color:var(--d); font-size:14px">0</b></div>
            </div>
        </div>
        <div class="card">
            <h3>REKAP GAJI <button onclick="toggleP()" style="width:auto; font-size:8px">EDIT NOMINAL</button></h3>
            <div id="pBox" class="hidden" style="margin-bottom:15px; background:var(--bg); padding:10px; border-radius:10px"></div>
            <div class="table-wrap"><table class="table-web"><thead><tr><th class="sticky-col">NAMA</th><th>GAJI</th><th>SLIP</th></tr></thead><tbody id="tbG"></tbody></table></div>
        </div>
    </div>

    <datalist id="listK"></datalist>

    <script>
        const cfg = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(cfg); const db = firebase.database();

        let mk={}, ad={}, sl={}, la={}, bel={}, pr={}, lib={};
        const defPr = { "Kempu": 100000, "Jerigen 18L": 2000, "Jerigen 5L": 2000, "Bongkar": 600000, "Muat": 600000, "Pasang Pangkalan": 500000, "Kirim Minyak Jauh": 250000, "Kirim Minyak Dekat": 100000 };

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','libS'].forEach(id => document.getElementById(id).value = now);
            document.getElementById('fM').value = now.slice(0, 7);
            db.ref('master_karyawan').on('value', s => { mk=s.val()||{}; updateK(); renderAll(); });
            db.ref('master_barang').on('value', s => { let b=s.val()||{}; updateB(b); });
            db.ref('absensi').on('value', s => { ad=s.val()||{}; renderAll(); });
            db.ref('stok_log').on('value', s => { sl=s.val()||{}; renderAll(); });
            db.ref('log_aktivitas').on('value', s => { la=s.val()||{}; renderAll(); });
            db.ref('belanja').on('value', s => { bel=s.val()||{}; renderBelanja(); });
            db.ref('libur').on('value', s => { lib=s.val()||{}; renderAll(); });
            db.ref('prices').on('value', s => { pr=s.val()||{}; if(!Object.keys(pr).length) db.ref('prices').set(defPr); updateP(); });
        };

        function notify(m) { const x=document.getElementById("toast"); x.innerText=m; x.className="show"; setTimeout(()=>x.className="", 2500); }
        function tab(t, b) { document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('.nav button').forEach(n=>n.classList.remove('active')); b.classList.add('active'); }
        function toggleQC(v) { ['qcJ','qcH'].forEach(id=>document.getElementById(id).classList.toggle('hidden', v!=='Masuk')); }

        function addM(p, id) { const v=document.getElementById(id).value; if(v){ db.ref('master_'+p).push(v); document.getElementById(id).value=""; notify("Berhasil Ditambah!"); }}
        
        // --- LOGIKA SEMBUNYIKAN DAFTAR (TAPI TETAP MASUK DROPDOWN) ---
        function updateK() {
            const unique = [...new Set(Object.values(mk))].sort();
            document.getElementById('selK').innerHTML = unique.map(v=>`<option value="${v}">${v}</option>`).join('');
            document.getElementById('actK').innerHTML = unique.map(v=>`<option value="${v}">${v}</option>`).join('');
            document.getElementById('listK').innerHTML = unique.map(v=>`<option value="${v}">`).join('');
        }
        function updateB(b) {
            const unique = [...new Set(Object.values(b))].sort();
            document.getElementById('selB').innerHTML = unique.map(v=>`<option value="${v}">${v}</option>`).join('');
        }

        function setL() {
            const s=document.getElementById('libS').value, e=document.getElementById('libE').value||s;
            let c=new Date(s); while(c<=new Date(e)){ db.ref('libur/'+c.toISOString().split('T')[0]).set(true); c.setDate(c.getDate()+1); }
            notify("Libur Disimpan!");
        }
        function saveA(st) {
            const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value;
            const jam=new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', hour12:false});
            db.ref(`absensi/${t}/${n}`).set({ st:st, jam:jam, ket:document.getElementById('absKet').value });
            notify("Absen " + st);
        }
        function resetA() { const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value; db.ref(`absensi/${t}/${n}`).remove(); notify("Data Dihapus"); }

        function renderAbsen() {
            const fM=document.getElementById('fM').value, [y,m]=fM.split('-'), last=new Date(y,m,0).getDate(), today = new Date().toISOString().split('T')[0];
            const names = [...new Set(Object.values(mk))].sort();
            let firstDate = "9999-12-31"; Object.keys(ad).forEach(d => { if(d < firstDate) firstDate = d; });
            let h=`<tr><th class="sticky-col">NAMA</th>`;
            for(let i=1; i<=last; i++) h+=`<th>${i}</th>`;
            h+=`<th>H</th><th>I</th><th>A</th><th>L</th></tr>`;
            document.getElementById('thA').innerHTML=h;
            let b=""; names.forEach(n=>{
                let r={H:0, I:0, A:0, L:0}, row=`<td class="sticky-col">${n}</td>`;
                for(let i=1; i<=last; i++){
                    let tg=`${y}-${m}-${String(i).padStart(2,'0')}`, dt=ad[tg]?.[n], isSun=new Date(tg).getDay()===0, isOff=lib[tg];
                    let sW="-", cl="bg-none";
                    if(isSun){ sW="M"; cl="bg-m"; } else if(isOff){ sW="Off"; cl="bg-off"; }
                    if(dt){
                        if(dt.st==='Ijin'){ sW="I"; cl="bg-i"; r.I++; }
                        else if(dt.st==='Hadir'){
                            if(isSun||isOff){ sW="L"; cl="bg-l"; r.L++; }
                            else { sW=(dt.jam > "09:00")?"T":"H"; cl=(sW==="T"?"bg-t":"bg-h"); r.H++; }
                        }
                    } else if(tg < today && tg >= firstDate && !isSun && !isOff){ sW="A"; cl="bg-a"; r.A++; }
                    row+=`<td><div class="box ${cl}">${sW}</div></td>`;
                }
                b+=`<tr>${row}<td>${r.H}</td><td>${r.I}</td><td>${r.A}</td><td>${r.L}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;
        }

        function renderStok() {
            const fM=document.getElementById('fM').value;
            const bL=['Kempu','Jerigen 18L','Jerigen 5L'];
            let h=""; bL.forEach(bn=>{
                let r={ak:0, ab:0, ik:0, ib:0, re:0, ju:0, jm:0};
                Object.values(sl).forEach(d=>{
                    let m=d.tgl.slice(0,7); if(d.barang!==bn) return;
                    if(m < fM){ 
                        if(d.aksi==='Masuk' && d.hsl!=='Reject'){ if(d.jns==='Bekas') r.ak+=d.qty; else r.ab+=d.qty; }
                        else if(d.aksi==='Rekondisi'){ r.ak-=d.qty; r.ab+=d.qty; }
                        else if(d.aksi==='Muat'||d.aksi==='JualUmum') r.ab-=d.qty;
                    } else if(m===fM){
                        if(d.aksi==='Masuk' && d.hsl!=='Reject'){ if(d.jns==='Bekas') r.ik+=d.qty; else r.ib+=d.qty; }
                        else if(d.aksi==='Rekondisi') r.re+=d.qty;
                        else if(d.aksi==='JualUmum') r.ju+=d.qty;
                        else if(d.aksi==='Muat') r.jm+=d.qty;
                    }
                });
                let sk=r.ak+r.ik-r.re, sr=r.ab+r.ib+r.re-r.ju-r.jm;
                h+=`<tr><td class="sticky-col">${bn}</td><td>${r.ak}</td><td>${r.ab}</td><td>${r.ik}</td><td>${r.ib}</td><td>${r.re}</td><td>${sk}</td><td>${r.ju}</td><td>${r.jm}</td><td>${sr}</td><td>${sk+sr}</td></tr>`;
            });
            document.getElementById('tbS').innerHTML=h;
        }

        function saveS() {
            const t=document.getElementById('stTgl').value, b=document.getElementById('selB').value, q=parseInt(document.getElementById('stQty').value), a=document.getElementById('stAksi').value, tim=document.getElementById('stTim').value;
            if(!q||!tim) return alert("Qty & Tim Wajib!");
            const timL=tim.split(',').map(s=>s.trim()), nT=timL.length;
            db.ref('stok_log').push({ tgl:t, barang:b, qty:q, aksi:a, jns:document.getElementById('qcJ').value, hsl:document.getElementById('qcH').value });
            let upah=0;
            if(a==='Masuk') upah=(pr.Bongkar*(q/50))/nT; 
            else if(a==='Muat') upah=(pr.Muat*(q/50))/nT;
            else if(a==='Rekondisi'){ let p=b.includes('Kempu')?pr.Kempu:(b.includes('18L')?pr['Jerigen 18L']:pr['Jerigen 5L']); upah=(p*q)/nT; }
            timL.forEach(p=>{ db.ref('log_aktivitas').push({ tgl:t, nama:p, act:a, gaji:upah, ico:"📦" }); });
            notify("Data Masuk!"); ['stQty','stTim'].forEach(id=>document.getElementById(id).value="");
        }

        function saveAct() {
            const t=document.getElementById('absTgl').value, n=document.getElementById('actK').value, tp=document.getElementById('actT').value;
            db.ref('log_aktivitas').push({ tgl:t, nama:n, act:tp, gaji:pr[tp], ico:"🚛" });
            notify("Aktivitas Masuk!");
        }

        function saveBelanja() {
            const t=document.getElementById('absTgl').value, it=document.getElementById('blItem').value, h=parseInt(document.getElementById('blHarga').value), f=document.getElementById('blFoto').files[0];
            if(!it||!h) return;
            if(f){ const r=new FileReader(); r.onload=(e)=>{ db.ref('belanja').push({tgl:t, item:it, hrg:h, img:e.target.result}); notify("Nota Masuk!"); }; r.readAsDataURL(f); }
            else db.ref('belanja').push({tgl:t, item:it, hrg:h});
            ['blItem','blHarga','blFoto'].forEach(id=>document.getElementById(id).value="");
        }

        function renderBelanja() {
            let h="", tot=0, fM=document.getElementById('fM').value;
            Object.values(bel).forEach(d=>{ if(d.tgl.startsWith(fM)){ tot+=d.hrg; h+=`<tr><td>${d.tgl}</td><td>${d.item}</td><td>${d.hrg.toLocaleString()}</td><td>${d.img?'<img src="'+d.img+'" width="30" onclick="window.open(this.src)">':'-'}</td></tr>`; }});
            document.getElementById('tbB').innerHTML=h; document.getElementById('dN').innerText="Rp "+tot.toLocaleString();
        }

        function renderGaji() {
            const fM=document.getElementById('fM').value, names = [...new Set(Object.values(mk))].sort();
            let b="", totG=0; names.forEach(n=>{
                let tot=0; Object.values(la).forEach(l=>{ if(l.nama===n && l.tgl.startsWith(fM)) tot+=l.gaji; });
                totG+=tot; b+=`<tr><td class="sticky-col">${n}</td><td>Rp ${Math.round(tot).toLocaleString()}</td><td><button onclick="notify('Cetak Slip...')">SLIP</button></td></tr>`;
            });
            document.getElementById('tbG').innerHTML=b; document.getElementById('dG').innerText="Rp "+Math.round(totG).toLocaleString();
        }

        function updateP() {
            let h=""; Object.keys(pr).forEach(k=>{ h+=`<div class="form-row"><span style="flex:1.5">${k}</span><input type="number" id="p-${k}" value="${pr[k]}"><button onclick="db.ref('prices/${k}').set(parseInt(document.getElementById('p-${k}').value))">SET</button></div>`; });
            document.getElementById('pBox').innerHTML=h;
        }
        function toggleP() { document.getElementById('pBox').classList.toggle('hidden'); }
        function renderAll() { renderAbsen(); renderStok(); renderGaji(); }
        function exportTableToExcel(id, name){ const table=document.getElementById(id); const wb=XLSX.utils.table_to_book(table); XLSX.writeFile(wb, name+".xlsx"); }
    </script>
</body>
</html>
