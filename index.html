<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PT AGN</title>

<style>
body { font-family: Arial; margin:0; background:#eef3ff; }
.page { display:none; padding:15px; }
.active { display:block; }
h2 { color:blue; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button { flex:1; }
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Aplikasi PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi</h2>

<div class="card">

<select id="nama">
<option value="Agung">Agung</option>
<option value="Hasan">Hasan</option>
<option value="Hata">Hata</option>
<option value="Alda">Alda</option>
<option value="Nur">Nur</option>
</select>

<button onclick="absen()">Hadir</button>

<ul id="listAbsen"></ul>

</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
</div>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 ABSEN
window.absen = async function(){

  let nama = document.getElementById("nama").value;
  console.log("Dipilih:", nama);

  try {
    await addDoc(collection(db, "absensi"), {
      nama: nama,
      status: "Hadir",
      waktu: serverTimestamp()
    });

    alert("Absen berhasil ✅");

    tampilAbsen();

  } catch (e) {
    console.error(e);
    alert("Gagal: " + e.message);
  }
}

// 🔥 TAMPIL DATA
async function tampilAbsen(){
  let list = document.getElementById("listAbsen");
  list.innerHTML = "";

  try {
    const snapshot = await getDocs(collection(db, "absensi"));

    snapshot.forEach(doc=>{
      let d = doc.data();

      let li = document.createElement("li");
      li.innerText = d.nama + " - " + d.status;

      list.appendChild(li);
    });

  } catch (e) {
    console.error("Load error:", e);
  }
}

// LOAD AWAL
window.onload = tampilAbsen;

</script>

</body>
</html>
