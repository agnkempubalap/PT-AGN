<!DOCTYPE html>
<html>
<head>
  <title>Absensi Karyawan</title>
  <style>
    body {
      font-family: Arial;
      background:#f0f2f5;
      padding:20px;
    }
    h1 {text-align:center;}

    .card {
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    select, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .btn-masuk {background:green;color:white;}
    .btn-pulang {background:orange;color:white;}
    .btn-reset {background:red;color:white;}

    .calendar {
      display:grid;
      grid-template-columns: repeat(7,1fr);
      gap:5px;
      margin-top:10px;
    }

    .day {
      padding:10px;
      text-align:center;
      border-radius:6px;
      background:#eee;
      font-size:12px;
    }

    .hadir {background:#4caf50;color:white;}
    .telat {background:#f44336;color:white;}
    .kosong {background:#ddd;}

  </style>
</head>

<body>

<h1>📋 Absensi Karyawan</h1>

<div class="card">
  <select id="nama"></select>

  <button class="btn-masuk" onclick="absenMasuk()">Absen Masuk</button>
  <button class="btn-pulang" onclick="absenPulang()">Absen Pulang</button>
  <button class="btn-reset" onclick="resetHari()">Reset Hari Ini</button>
</div>

<div class="card">
  <h3>📅 Hari Ini</h3>
  <div id="today"></div>
</div>

<div class="card">
  <h3>📊 Kalender Bulan Ini</h3>
  <div id="calendar" class="calendar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_API_KEY_KAMU",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let karyawanList = [];

// ================= LOAD KARYAWAN =================
async function loadKaryawan() {
  const q = query(collection(db, "karyawan"), where("aktif", "==", true));
  const snap = await getDocs(q);

  let html = "";
  snap.forEach(doc => {
    let nama = doc.data().nama;
    karyawanList.push(nama);
    html += `<option>${nama}</option>`;
  });

  document.getElementById("nama").innerHTML = html;
}

// ================= ABSEN MASUK =================
window.absenMasuk = async () => {
  const nama = document.getElementById("nama").value;
  const now = new Date();
  const jam = now.toLocaleTimeString();
  const tanggal = now.toISOString().split("T")[0];

  let status = now.getHours() >= 9 ? "Telat" : "Hadir";

  await addDoc(collection(db,"absensi"),{
    nama, tanggal, masuk: jam, status
  });

  loadHariIni();
  loadKalender();
}

// ================= ABSEN PULANG =================
window.absenPulang = async () => {
  const nama = document.getElementById("nama").value;
  const now = new Date();
  const jam = now.toLocaleTimeString();
  const tanggal = now.toISOString().split("T")[0];

  await addDoc(collection(db,"absensi"),{
    nama, tanggal, pulang: jam
  });

  loadHariIni();
}

// ================= RESET =================
window.resetHari = async () => {
  const today = new Date().toISOString().split("T")[0];
  const q = query(collection(db,"absensi"), where("tanggal","==",today));
  const snap = await getDocs(q);

  snap.forEach(async d => {
    await deleteDoc(d.ref);
  });

  alert("Reset berhasil");
  loadHariIni();
  loadKalender();
}

// ================= HARI INI =================
async function loadHariIni() {
  const today = new Date().toISOString().split("T")[0];
  const q = query(collection(db,"absensi"), where("tanggal","==",today));
  const snap = await getDocs(q);

  let html = "";

  snap.forEach(doc=>{
    let d = doc.data();
    html += `<div>${d.nama} - ${d.masuk || "-"} (${d.status || "-"})</div>`;
  });

  document.getElementById("today").innerHTML = html;
}

// ================= KALENDER =================
async function loadKalender() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  const q = await getDocs(collection(db,"absensi"));

  let data = {};

  q.forEach(doc=>{
    let d = doc.data();
    let day = d.tanggal.split("-")[2];
    data[day] = d.status;
  });

  let html = "";

  for(let i=1;i<=31;i++){
    let status = data[i];
    let cls = "day kosong";

    if(status=="Hadir") cls="day hadir";
    if(status=="Telat") cls="day telat";

    html += `<div class="${cls}">${i}</div>`;
  }

  document.getElementById("calendar").innerHTML = html;
}

// ================= INIT =================
loadKaryawan();
loadHariIni();
loadKalender();

</script>

</body>
</html>
