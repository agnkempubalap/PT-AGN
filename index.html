<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.appspot.com",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.colRef = collection(db, "absensi");
window.addDoc = addDoc;
window.getDocs = getDocs;
</script>

<style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0;padding:15px}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:12px;border:none;border-radius:10px;margin:5px 0;color:#fff;font-weight:bold}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}
input,select{width:100%;padding:10px;border-radius:8px;margin:5px 0}
.flex{display:flex;gap:10px}
.box{flex:1;padding:10px;border-radius:10px;color:#fff;text-align:center}
.b1{background:#3498db}.b2{background:#2ecc71}.b3{background:#f1c40f}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s}
.show{opacity:1}
</style>
</head>

<body>

<div id="toast"></div>

<div class="card">
<h3>📋 Absensi PT-AGN</h3>

<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="orange" onclick="izin()">Izin</button>
<button class="red" onclick="alpa()">Alpa</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>

<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
<button class="green" onclick="kirimWA()">Kirim Laporan WA</button>
</div>

<div class="card">
<h4>Filter</h4>
<select id="bulan"></select>
<input type="text" id="search" placeholder="Cari nama...">
</div>

<div class="card">
<h4>Dashboard</h4>
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div>

<div class="card">
<h4>Grafik</h4>
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("absensi")) || [];

const bulanSelect = document.getElementById("bulan");
const namaBulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

namaBulan.forEach((b,i)=>{
  bulanSelect.innerHTML += `<option value="${i+1}">${b}</option>`;
});
bulanSelect.value = new Date().getMonth()+1;

bulanSelect.onchange = render;
document.getElementById("search").oninput = render;

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function now(){
  let d=new Date();
  return {
    tanggal:d.toISOString().split('T')[0],
    jam:d.toTimeString().split(' ')[0],
    bulan:d.getMonth()+1
  }
}

// ===== CLOUD SYNC =====
async function syncCloud(){
  let snap = await getDocs(colRef);
  data=[];
  snap.forEach(doc=>data.push(doc.data()));
  localStorage.setItem("absensi",JSON.stringify(data));
  render();
}

async function save(item){
  if(item) await addDoc(colRef,item);
  localStorage.setItem("absensi",JSON.stringify(data));
  render();
}

// ===== AUTO ALPA =====
function autoAlpa(){
  let t=now();
  if(t.jam < "16:00:00") return;

  let semua=["Agung","Alda","Nur","Hasan","Hatta"];

  semua.forEach(n=>{
    let cek=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
    if(!cek){
      let obj={nama:n,tanggal:t.tanggal,masuk:"-",pulang:"-",status:"Alpa",bulan:t.bulan};
      data.push(obj);
      save(obj);
    }
  });
}

// ===== ABSEN =====
function absenMasuk(){
  let n=nama.value;
  let t=now();

  if(data.find(x=>x.nama==n && x.tanggal==t.tanggal)){
    toast("Sudah absen");return;
  }

  let status = t.jam > "09:00:00" ? "Telat":"Hadir";

  let obj={nama:n,tanggal:t.tanggal,masuk:t.jam,pulang:"-",status:status,bulan:t.bulan};
  data.push(obj);
  toast("Absen masuk");
  save(obj);
}

function absenPulang(){
  let n=nama.value;
  let t=now();

  let d=data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(!d){toast("Belum masuk");return;}

  d.pulang=t.jam;
  save();
}

function izin(){
  let n=nama.value;
  let t=now();

  let obj={nama:n,tanggal:t.tanggal,masuk:"-",pulang:"-",status:"Izin",bulan:t.bulan};
  data.push(obj);
  save(obj);
}

function alpa(){
  let n=nama.value;
  let t=now();

  let obj={nama:n,tanggal:t.tanggal,masuk:"-",pulang:"-",status:"Alpa",bulan:t.bulan};
  data.push(obj);
  save(obj);
}

function resetHari(){
  let today=now().tanggal;
  data=data.filter(x=>x.tanggal!=today);
  save();
}

// ===== RENDER =====
function render(){
  autoAlpa();

  let bulan=bulanSelect.value;
  let search=document.getElementById("search").value.toLowerCase();

  let filtered=data.filter(x=>x.bulan==bulan && x.nama.toLowerCase().includes(search));

  document.getElementById("list").innerHTML = filtered.map(x=>`
  <div class="card">
  <b>${x.nama}</b><br>
  ${x.tanggal}<br>
  Masuk: ${(x.status=="Alpa"||x.status=="Izin")?"-":x.masuk}<br>
  Pulang: ${(x.status=="Alpa"||x.status=="Izin")?"-":(x.pulang=="-"?"Belum pulang":x.pulang)}<br>
  ${x.status}
  </div>`).join("");

  total.innerText=filtered.length;
  hadir.innerText=filtered.filter(x=>x.status=="Hadir").length;
  telat.innerText=filtered.filter(x=>x.status=="Telat").length;

  let group={};
  filtered.forEach(x=>{
    if(!group[x.tanggal]) group[x.tanggal]=0;
    group[x.tanggal]++;
  });

  chart.data.labels=Object.keys(group);
  chart.data.datasets[0].data=Object.values(group);
  chart.update();
}

// ===== WA PRO MAX =====
function kirimWA(){
  let bulan = bulanSelect.value;
  let filtered = data.filter(x=>x.bulan==bulan);

  let rekap = {};

  filtered.forEach(x=>{
    if(!rekap[x.nama]){
      rekap[x.nama]={hadir:0,telat:0,izin:0,alpa:0};
    }
    rekap[x.nama][x.status.toLowerCase()]++;
  });

  let ranking = Object.keys(rekap).map(n=>{
    let r = rekap[n];
    return {nama:n, skor:r.hadir - r.telat};
  }).sort((a,b)=>b.skor-a.skor);

  let text = "📊 *LAPORAN ABSENSI BULANAN PT-AGN*\n";
  text += `📅 Bulan: ${bulanSelect.options[bulanSelect.selectedIndex].text}\n\n`;

  Object.keys(rekap).forEach(n=>{
    let r = rekap[n];
    text += `👤 *${n}*\n`;
    text += `✅ Hadir : ${r.hadir}\n⏰ Telat : ${r.telat}\n📌 Izin : ${r.izin}\n❌ Alpa : ${r.alpa}\n\n`;
  });

  text += "🏆 *RANKING*\n";
  ranking.forEach((r,i)=>{
    text += `${i+1}. ${r.nama} (${r.skor})\n`;
  });

  let nomorList = ["6281234567890","6289876543210"];

  nomorList.forEach(no=>{
    let url = `https://wa.me/${no}?text=${encodeURIComponent(text)}`;
    window.open(url,"_blank");
  });

  toast("WA siap dikirim");
}

// ===== EXPORT =====
function exportExcel(){
  let ws=XLSX.utils.json_to_sheet(data);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");
  XLSX.writeFile(wb,"absensi.xlsx");
}

async function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();
  doc.text("Laporan",10,10);
  data.forEach((d,i)=>{
    doc.text(`${i+1}. ${d.nama} ${d.status}`,10,20+(i*8));
  });
  doc.save("laporan.pdf");
}

// INIT
syncCloud();

const chart = new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{labels:[],datasets:[{label:'Absensi',data:[]}]}
});
</script>

</body>
</html>
