<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN OMNI V99.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf-autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#22c55e;--d:#ef4444;--w:#f59e0b;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#8b5cf6;--al:#64748b;--lb:#d946ef;--sun:#f43f5e;--te:#ec4899}
        *{box-sizing:border-box} body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px;font-size:12px}
        .nav-grid { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 5px 0;}
        .nav-btn { flex: 1; padding: 12px 5px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase;}
        .nav-btn.active { background: var(--p); border-color: var(--p); box-shadow: 0 4px 10px rgba(59,130,246,0.4); }
        .card{background:var(--c);padding:15px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 12px;font-size:10px;color:var(--p);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        .form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, button, select { height: 42px; border-radius: 10px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; width: 100%; font-size: 13px; outline: none;}
        button { cursor: pointer; font-weight: 700; border: none; color: #fff;}

        /* FIX REKAP BERANTAKAN */
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--b); background: var(--c); position: relative; -webkit-overflow-scrolling: touch; }
        .table-web { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1100px; table-layout: fixed; }
        .table-web th { background: var(--b); padding: 12px 4px; font-size: 8px; border-bottom: 2px solid var(--bg); position: sticky; top: 0; z-index: 10; color: #94a3b8; }
        .table-web td { padding: 12px 4px; border-bottom: 1px solid var(--b); text-align: center; font-weight: 700; font-size: 13px; white-space: nowrap; }
        
        /* Kolom Nama Barang / Karyawan Tetap Diam */
        .nama-fixed { position: sticky; left: 0; background: var(--c)!important; z-index: 20; width: 130px !important; border-right: 3px solid var(--p)!important; text-align: left !important; padding-left: 10px !important; color: var(--t); }
        
        /* Grup Warna Header */
        .h-awal { background: #1e3a8a !important; color: #fff !important; }
        .h-masuk { background: #064e3b !important; color: #fff !important; }
        .h-jual { background: #854d0e !important; color: #fff !important; }
        .h-sisa { background: #4c1d95 !important; color: #fff !important; }

        .s-box { width: 40px; height: 40px; border-radius: 8px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; font-weight: 800; margin: 0 auto; }
        .s-h{background:var(--s)} .s-i{background:var(--iz)} .s-a{background:var(--d)} .s-l{background:var(--lb)} .s-m{background:var(--sun)} .s-off{background:var(--al)} .s-t{background:var(--te)}
        .box-jam { font-size: 8px; font-weight: 400; line-height: 1; margin-top: 2px; }
        .kardus-head { color: var(--w); font-size: 10px; display: block; margin-top: 2px; }
        .hidden { display: none !important; }
        .btn-group { display: flex; gap: 6px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-grid">
            <button class="nav-btn active" onclick="tab('absen', this)">TAB ABSEN</button>
            <button class="nav-btn" onclick="tab('stok', this)">TAB STOK</button>
            <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
            <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
        </div>

        <div id="t-absen" class="tab-content">
            <div class="card">
                <h3>👥 Team & Libur</h3>
                <div class="form-row"><input type="text" id="inNK" style="flex:2" placeholder="Nama..."><button style="background:var(--s);flex:1" onclick="svK()">TAMBAH</button><button style="background:var(--d);flex:1" onclick="dlK()">HAPUS</button></div>
                <div class="form-row"><input type="date" id="lS" style="flex:1"><input type="date" id="lE" style="flex:1"><button style="background:var(--p);flex:1" onclick="svL()">SIMPAN LIBUR</button></div>
            </div>
            <div class="card">
                <h3>⚡ Fingerprint</h3>
                <div class="form-row"><input list="lk" id="selK" style="flex:2" placeholder="Cari Nama..."><input type="date" id="tglR" style="flex:1"></div>
                <div class="form-row"><button style="background:var(--s);flex:1" onclick="ab('Masuk')">MASUK</button><button style="background:var(--iz);flex:1" onclick="ab('Ijin')">IJIN</button><button style="background:var(--al);flex:1" onclick="ab('Pulang')">PULANG</button><button style="background:var(--d);flex:1" onclick="re()">RESET</button></div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <h3>📊 Kalender Operasional 📦</h3>
                    <input type="month" id="fM" onchange="renA()" style="width:130px; height:35px">
                </div>
                <div class="table-wrap"><table class="table-web" id="tableAbsen"><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <div class="btn-group">
                    <button style="background:var(--s); flex:1" onclick="exX('tableAbsen')">EXCEL</button>
                    <button style="background:var(--te); flex:1" onclick="exP('tableAbsen', 'ABSEN')">PDF</button>
                </div>
            </div>
        </div>

        <div id="t-stok" class="tab-content hidden">
            <div class="card">
                <h3>📦 Barang & QC</h3>
                <div class="form-row"><input type="text" id="inNB" style="flex:2" placeholder="Barang..."><button style="background:var(--s);flex:1" onclick="svB()">TAMBAH</button><button style="background:var(--d);flex:1" onclick="dlB()">HAPUS</button></div>
                <div class="form-row"><input type="date" id="stT" style="flex:1.2"><select id="slB" style="flex:1.5"></select><input type="number" id="stQ" style="flex:0.8" placeholder="Qty"></div>
                <div class="form-row">
                    <select id="stA" onchange="tQC(this.value)" style="flex:1"><option value="Masuk">Masuk (QC)</option><option value="Rekondisi">Rekondisi</option><option value="Jual Umum">Jual Umum</option><option value="Jual Mitra">Jual Mitra</option></select>
                    <div id="qBx" style="flex:1.2; display:flex; gap:4px"><select id="qJ"><option value="Bekas">Bekas</option><option value="Baru">Baru</option></select><select id="qH"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select></div>
                </div>
                <button style="background:var(--p); width:100%; height:45px" onclick="svS()">SIMPAN TRANSAKSI STOK</button>
            </div>
            <div class="card">
                <h3>📈 Rekap Flow Bulanan</h3>
                <div class="table-wrap"><table class="table-web" id="tableStok">
                    <thead>
                        <tr>
                            <th class="nama-fixed">NAMA BARANG</th>
                            <th class="h-awal">AWAL-K</th><th class="h-awal">AWAL-B</th>
                            <th class="h-masuk">MASUK-K</th><th class="h-masuk">MASUK-B</th>
                            <th style="background:var(--lb); color:#fff">REKOD</th>
                            <th class="h-jual">JUAL-U</th><th class="h-jual">JUAL-M</th>
                            <th class="h-sisa">SISA-K</th><th class="h-sisa">READY</th><th class="h-sisa">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="tbS"></tbody>
                </table></div>
                <div class="btn-group">
                    <button style="background:var(--s); flex:1" onclick="exX('tableStok')">EXCEL</button>
                    <button style="background:var(--te); flex:1" onclick="exP('tableStok', 'STOK')">PDF</button>
                </div>
            </div>
            <div class="card"><h3>📜 Log Harian</h3><div class="table-wrap"><table class="table-web" style="min-width:600px"><thead><tr><th>Tgl</th><th>Barang</th><th>Aksi</th><th>Qty</th><th>QC</th><th>X</th></tr></thead><tbody id="logS"></tbody></table></div></div>
        </div>

        <div id="t-aktivitas" class="tab-content hidden"><div class="card"><h3>📝 Aktivitas</h3><p style="text-align:center">Sedang Maintenance...</p></div></div>
        <div id="t-gaji" class="tab-content hidden"><div class="card"><h3>💰 Payroll</h3><p style="text-align:center">Sedang Maintenance...</p></div></div>
    </div>
    <datalist id="lk"></datalist>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mK={}, aD={}, hL={}, mB={}, sL={};

        window.onload=()=>{
            const n=new Date(); const t=n.toISOString().split('T')[0];
            document.getElementById('fM').value=t.slice(0,7);
            document.getElementById('stT').value=t; document.getElementById('tglR').value=t;
            db.ref('master_karyawan').on('value',s=>{mK=s.val()||{}; uLK(); renA();});
            db.ref('absensi').on('value',s=>{aD=s.val()||{}; renA();});
            db.ref('hari_libur').on('value',s=>{hL=s.val()||{}; renA();});
            db.ref('master_barang').on('value',s=>{mB=s.val()||{}; uLB(); renS();});
            db.ref('stok_log').on('value',s=>{sL=s.val()||{}; renS(); renA();});
        };

        function tab(t, b){
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden'));
            document.getElementById('t-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
            b.classList.add('active');
            if(t==='absen') scToDay();
        }

        function uLK(){ document.getElementById('lk').innerHTML=Object.values(mK).sort().map(n=>`<option value="${n}">`).join(''); }
        function svK(){ let v=document.getElementById('inNK').value; if(v)db.ref('master_karyawan').push(v).then(()=>document.getElementById('inNK').value=""); }
        function dlK(){ let v=document.getElementById('selK').value; let id=Object.keys(mK).find(k=>mK[k]===v); if(id&&confirm('Hapus?'))db.ref(`master_karyawan/${id}`).remove(); }
        function svL(){ let s=new Date(document.getElementById('lS').value), e=new Date(document.getElementById('lE').value); while(s<=e){ db.ref(`hari_libur/${s.toISOString().split('T')[0]}`).set(true); s.setDate(s.getDate()+1); } alert("Libur Disimpan!"); }
        
        function ab(ty){
            let n=document.getElementById('selK').value, t=new Date().toISOString().split('T')[0]; if(!n) return alert("Pilih Nama!");
            let now=new Date(), jam=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if(ty==='Ijin'){ let k=prompt("Alasan Ijin:"); if(k) db.ref(`absensi/${t}/${n}`).update({status:'Ijin', note:k}); }
            else if(ty==='Masuk'){ let isT=(now.getHours()>9||(now.getHours()===9&&now.getMinutes()>0)); db.ref(`absensi/${t}/${n}`).update({masuk:jam, status:isT?'Telat':'Hadir'}); }
            else if(ty==='Pulang'){ db.ref(`absensi/${t}/${n}`).update({pulang:jam}); }
        }
        function re(){ let n=document.getElementById('selK').value, t=document.getElementById('tglR').value; if(n&&t&&confirm('Hapus Data?')) db.ref(`absensi/${t}/${n}`).remove(); }

        function uLB(){ document.getElementById('slB').innerHTML=Object.values(mB).sort().map(v=>`<option value="${v}">${v}</option>`).join(''); }
        function svB(){ let v=document.getElementById('inNB').value; if(v)db.ref('master_barang').push(v).then(()=>document.getElementById('inNB').value=""); }
        function dlB(){ let v=document.getElementById('slB').value; let id=Object.keys(mB).find(k=>mB[k]===v); if(id&&confirm('Hapus?'))db.ref(`master_barang/${id}`).remove(); }
        function tQC(v){ document.getElementById('qBx').style.display=(v==='Masuk'?'flex':'none'); }
        
        function svS(){
            let b=document.getElementById('slB').value, t=document.getElementById('stT').value, q=parseInt(document.getElementById('stQ').value), a=document.getElementById('stA').value;
            if(!b||!t||!q) return alert("Lengkapi!");
            let d={tgl:t, barang:b, aksi:a, qty:q};
            if(a==='Masuk'){ d.jenis=document.getElementById('qJ').value; d.hasil=document.getElementById('qH').value; }
            db.ref('stok_log').push(d).then(()=>alert("Transaksi Stok Berhasil!"));
        }

        function renS(){
            const cM=document.getElementById('fM').value, bL=Object.values(mB).sort();
            let h="", logH=""; 
            bL.forEach(bn=>{
                let r={saK:0, saB:0, mK:0, mB:0, rek:0, jU:0, jM:0};
                Object.values(sL).forEach(d=>{
                    if(d.barang!==bn) return;
                    let dm=d.tgl.slice(0,7);
                    if(dm < cM){
                        if(d.aksi==='Masuk'&&d.hasil!=='Reject'){ if(d.jenis==='Bekas')r.saK+=d.qty; else r.saB+=d.qty; }
                        else if(d.aksi==='Rekondisi'){ r.saK-=d.qty; r.saB+=d.qty; }
                        else if(d.aksi.startsWith('Jual')) r.saB-=d.qty;
                    } else if(dm === cM){
                        if(d.aksi==='Masuk'&&d.hasil!=='Reject'){ if(d.jenis==='Bekas')r.mK+=d.qty; else r.mB+=d.qty; }
                        else if(d.aksi==='Rekondisi')r.rek+=d.qty;
                        else if(d.aksi==='Jual Umum')r.jU+=d.qty;
                        else if(d.aksi==='Jual Mitra')r.jM+=d.qty;
                    }
                });
                let siK=r.saK+r.mK-r.rek, siB=r.saB+r.mB+r.rek-r.jU-r.jM;
                h+=`<tr><td class="nama-fixed">${bn}</td><td>${r.saK}</td><td>${r.saB}</td><td>${r.mK}</td><td>${r.mB}</td><td>${r.rek}</td><td>${r.jU}</td><td>${r.jM}</td><td style="color:var(--te)">${siK}</td><td style="color:var(--s)">${siB}</td><td style="background:rgba(255,255,255,0.05)">${siK+siB}</td></tr>`;
            });
            document.getElementById('tbS').innerHTML=h;
            Object.keys(sL).reverse().slice(0,10).forEach(k=>{
                let d=sL[k]; logH+=`<tr><td>${d.tgl.slice(5)}</td><td>${d.barang}</td><td>${d.aksi}</td><td>${d.qty}</td><td>${d.hasil||''}</td><td><button onclick="db.ref('stok_log/${k}').remove()" style="background:var(--d);height:25px">X</button></td></tr>`;
            });
            document.getElementById('logS').innerHTML=logH;
        }

        function renA(){
            const f=document.getElementById('fM').value, [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), kL=Object.values(mK).sort(), now=new Date(), tS=now.toISOString().split('T')[0];
            let sIn={}, sOut={}; 
            Object.values(sL).forEach(s=>{ if(s.tgl.startsWith(f)){ if(s.aksi==='Masuk') sIn[s.tgl]=true; if(s.aksi.startsWith('Jual')) sOut[s.tgl]=true; } });
            
            let h=`<tr><th class="nama-fixed">KARYAWAN</th>`;
            for(let i=1;i<=last;i++){
                let tgl=`${y}-${m}-${String(i).padStart(2,'0')}`, icon=(sIn[tgl]?'📂':'')+(sOut[tgl]?'📁':'');
                h+=`<th id="day-${i}" style="min-width:45px">${i}<span class="kardus-head">${icon}</span></th>`;
            }
            h+=`<th>H</th><th>I</th><th>A</th><th>L</th></tr>`;
            document.getElementById('thA').innerHTML=h;
            
            let b=""; kL.forEach(n=>{
                let c={H:0,I:0,A:0,L:0}, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let tgl=`${y}-${m}-${String(i).padStart(2,'0')}`, dO=new Date(tgl), isM=dO.getDay()===0, isL=hL[tgl], da=aD[tgl]?aD[tgl][n]:null;
                    let sW="-", cl="", info="";
                    if(isM) { sW="M"; cl="s-m"; } else if(isL) { sW="OFF"; cl="s-off"; }
                    if(da){
                        if(isM || isL) { sW="L"; cl="s-l"; c.L++; }
                        else if(da.status==='Ijin'){ sW="I"; cl="s-i"; c.I++; info=`<div style="font-size:7px">${da.note||''}</div>`; }
                        else { sW=da.status==='Telat'?'T':'H'; cl=da.status==='Telat'?'s-t':'s-h'; c.H++; }
                        info+=`<div class="box-jam">${da.masuk||''}</div>`;
                    } else if(tgl===tS && !isM && !isL && now.getHours()>=16) { sW="A"; cl="s-a"; c.A++; }
                    row+=`<td><div class="s-box ${cl}">${sW}${info}</div></td>`;
                }
                b+=`<tr>${row}<td>${c.H}</td><td>${c.I}</td><td>${c.A}</td><td>${c.L}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;
            scToDay();
        }

        function scToDay(){
            const d = new Date().getDate();
            const el = document.getElementById('day-'+d);
            if(el) el.scrollIntoView({behavior: "smooth", inline: "center", block: "nearest"});
        }

        function exX(id){ let wb=XLSX.utils.table_to_book(document.getElementById(id)); XLSX.writeFile(wb, `AGN_REKAP_${id}.xlsx`); }
        function exP(id, title){
            const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4');
            doc.text(`LAPORAN ${title} - PT AGN`, 14, 10);
            doc.autoTable({ html: '#'+id, startY: 15, theme: 'grid', styles: { fontSize: 6 }, headStyles: { fillColor: [30, 41, 59] } });
            doc.save(`AGN_REKAP_${title}.pdf`);
        }
    </script>
</body>
</html>
