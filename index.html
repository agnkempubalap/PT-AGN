<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Absensi Karyawan</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔥 CONFIG (SUDAH DISIAPKAN - GANTI APIKEY SAJA)
    const firebaseConfig = {
      apiKey: "ISI_API_KEY_KAMU",
      authDomain: "pt-agn.firebaseapp.com",
      projectId: "PT-AGN",
      storageBucket: "pt-agn.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456:web:abc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 📅 FORMAT TANGGAL
    function today() {
      return new Date().toISOString().split("T")[0];
    }

    // 🚫 CEK SUDAH ABSEN
    async function sudahAbsen(nama) {
      const q = query(
        collection(db, "absensi"),
        where("nama", "==", nama),
        where("tanggal", "==", today())
      );
      const snap = await getDocs(q);
      return !snap.empty;
    }

    // ✅ ABSEN
    window.absen = async function () {
      const nama = document.getElementById("nama").value;
      const btn = document.getElementById("btn");

      btn.disabled = true;
      btn.innerText = "Loading...";

      if (await sudahAbsen(nama)) {
        alert("❌ Sudah absen hari ini");
        btn.disabled = false;
        btn.innerText = "Hadir";
        return;
      }

      await addDoc(collection(db, "absensi"), {
        nama: nama,
        status: "Hadir",
        tanggal: today(),
        waktu: new Date().toLocaleString()
      });

      alert("✅ Absen berhasil");
      loadHariIni();

      btn.disabled = false;
      btn.innerText = "Hadir";
    };

    // 📋 LOAD HARI INI
    async function loadHariIni() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      const q = query(
        collection(db, "absensi"),
        where("tanggal", "==", today())
      );

      const snap = await getDocs(q);

      snap.forEach(doc => {
        const d = doc.data();
        const li = document.createElement("li");
        li.innerText = d.nama + " - " + d.status;
        list.appendChild(li);
      });
    }

    // 📊 REKAP BULANAN
    window.loadRekap = async function () {
      const list = document.getElementById("rekap");
      list.innerHTML = "";

      const snap = await getDocs(collection(db, "absensi"));

      let hasil = {};

      snap.forEach(doc => {
        const d = doc.data();
        const bulan = d.tanggal.substring(0,7);

        if (!hasil[d.nama]) hasil[d.nama] = {};
        if (!hasil[d.nama][bulan]) hasil[d.nama][bulan] = 0;

        hasil[d.nama][bulan]++;
      });

      for (let nama in hasil) {
        for (let bulan in hasil[nama]) {
          const li = document.createElement("li");
          li.innerText = `${nama} - ${bulan} : ${hasil[nama][bulan]} hari`;
          list.appendChild(li);
        }
      }
    };

    // TAB
    window.showAbsen = function () {
      document.getElementById("absen").style.display = "block";
      document.getElementById("rekapPage").style.display = "none";
    };

    window.showRekap = function () {
      document.getElementById("absen").style.display = "none";
      document.getElementById("rekapPage").style.display = "block";
    };

    window.onload = loadHariIni;
  </script>

  <style>
    body {
      font-family: Arial;
      background: #f1f2f6;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #2ed573;
      color: white;
      border: none;
      font-weight: bold;
    }

    button:disabled {
      background: gray;
    }

    .tabs {
      display: flex;
      gap: 5px;
    }

    .tabs button {
      flex: 1;
      background: #ced6e0;
      color: black;
    }
  </style>
</head>

<body>

<h2>📋 Absensi Karyawan</h2>

<div class="tabs">
  <button onclick="showAbsen()">Absen</button>
  <button onclick="showRekap()">Rekap</button>
</div>

<!-- ABSEN -->
<div id="absen" class="card">
  <h3>Absensi Hari Ini</h3>

  <select id="nama">
    <option>Agung</option>
    <option>Nur</option>
    <option>Hasan</option>
    <option>Alda</option>
  </select>

  <button onclick="absen()" id="btn">Hadir</button>

  <h4>List:</h4>
  <ul id="list"></ul>
</div>

<!-- REKAP -->
<div id="rekapPage" class="card" style="display:none">
  <h3>Rekap Bulanan</h3>
  <button onclick="loadRekap()">Load Rekap</button>
  <ul id="rekap"></ul>
</div>

</body>
</html>
