<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi Karyawan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#eef2f3,#dfe9f3);
  padding: 15px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 { margin-bottom: 10px; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.btn-masuk { background:#16a34a; color:white; }
.btn-pulang { background:#f59e0b; color:white; }
.btn-reset { background:#ef4444; color:white; }
.btn-excel { background:#3b82f6; color:white; }

input, select {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:8px;
}

.status-hadir {background:#16a34a;color:white;padding:3px 10px;border-radius:10px;}
.status-telat {background:#f59e0b;color:white;padding:3px 10px;border-radius:10px;}

.dashboard {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box {
  padding:15px;
  border-radius:15px;
  color:white;
  text-align:center;
}

.hadir { background:#16a34a; }
.telat { background:#f59e0b; }
.total { background:#3b82f6; }
</style>
</head>

<body>

<div class="card">
  <h2>📋 Absensi Karyawan</h2>

  <select id="nama"></select>

  <button class="btn-masuk" onclick="absenMasuk()">Absen Masuk</button>
  <button class="btn-pulang" onclick="absenPulang()">Absen Pulang</button>
  <button class="btn-reset" onclick="resetHari()">Reset Hari Ini</button>
  <button class="btn-excel" onclick="exportExcel()">Export Excel</button>
</div>

<div class="card">
  <h3>🔍 Filter</h3>

  <input type="date" id="filterTanggal" onchange="loadData()">
  <input type="month" id="filterBulan" onchange="loadData()">
  <input type="text" id="searchNama" placeholder="Cari nama..." onkeyup="loadData()">
</div>

<div class="card">
  <h3>📊 Dashboard</h3>
  <div class="dashboard">
    <div class="box total">Total<br><b id="total">0</b></div>
    <div class="box hadir">Hadir<br><b id="hadir">0</b></div>
    <div class="box telat">Telat<br><b id="telat">0</b></div>
  </div>
</div>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const namaList = ["Agung","Hasan","Hatta","Nur","Alda"];

function nowJam() {
  return new Date().toLocaleTimeString("id-ID");
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function bulanNow() {
  return new Date().toISOString().slice(0,7);
}

function initNama() {
  const select = document.getElementById("nama");
  namaList.forEach(n => {
    select.innerHTML += `<option>${n}</option>`;
  });
}

window.absenMasuk = async () => {
  const nama = document.getElementById("nama").value;

  await addDoc(collection(db,"absensi"),{
    nama,
    jamMasuk: nowJam(),
    jamPulang: "-",
    statusMasuk: (new Date().getHours() > 8 ? "Telat" : "Hadir"),
    tanggal: today()
  });

  loadData();
};

window.absenPulang = async () => {
  const nama = document.getElementById("nama").value;

  const q = query(collection(db,"absensi"), where("nama","==",nama), where("tanggal","==",today()));
  const snap = await getDocs(q);

  snap.forEach(async d=>{
    await updateDoc(doc(db,"absensi",d.id),{
      jamPulang: nowJam()
    });
  });

  loadData();
};

window.resetHari = async () => {
  const snap = await getDocs(collection(db,"absensi"));
  snap.forEach(async d=>{
    await updateDoc(doc(db,"absensi",d.id),{
      jamMasuk:"-",
      jamPulang:"-",
      statusMasuk:"-"
    });
  });
  loadData();
};

async function loadData() {
  const list = document.getElementById("list");
  list.innerHTML="Loading...";

  const tgl = document.getElementById("filterTanggal").value;
  const bln = document.getElementById("filterBulan").value;
  const search = document.getElementById("searchNama").value.toLowerCase();

  const snap = await getDocs(collection(db,"absensi"));

  let html="";
  let total=0, hadir=0, telat=0;

  snap.forEach(docItem=>{
    const d = docItem.data();

    if (tgl && d.tanggal !== tgl) return;
    if (bln && !d.tanggal.startsWith(bln)) return;
    if (search && !d.nama.toLowerCase().includes(search)) return;

    total++;
    if (d.statusMasuk==="Hadir") hadir++;
    if (d.statusMasuk==="Telat") telat++;

    html += `
      <div class="card">
        <b>${d.nama}</b><br>
        ${d.tanggal}<br>
        Masuk: ${d.jamMasuk}<br>
        Pulang: ${d.jamPulang}<br>
        Status: <span class="${d.statusMasuk==='Telat'?'status-telat':'status-hadir'}">${d.statusMasuk}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("hadir").innerText=hadir;
  document.getElementById("telat").innerText=telat;

  list.innerHTML = html || "Tidak ada data";
}

window.exportExcel = async () => {
  const snap = await getDocs(collection(db,"absensi"));

  let html = `<table border="1">
  <tr style="background:#16a34a;color:white">
  <th>Nama</th><th>Tanggal</th><th>Masuk</th><th>Pulang</th><th>Status</th></tr>`;

  snap.forEach(d=>{
    const x=d.data();
    html+=`<tr>
    <td>${x.nama}</td>
    <td>${x.tanggal}</td>
    <td>${x.jamMasuk}</td>
    <td>${x.jamPulang}</td>
    <td>${x.statusMasuk}</td>
    </tr>`;
  });

  html+="</table>";

  const blob = new Blob([html],{type:"application/vnd.ms-excel"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Absensi.xls";
  a.click();
};

initNama();
document.getElementById("filterTanggal").value = today();
document.getElementById("filterBulan").value = bulanNow();
loadData();

</script>

</body>
</html>
