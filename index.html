<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(180deg,#6fa8dc,#cfe2f3);
}

/* CARD */
.card{
 background:rgba(255,255,255,0.9);
 backdrop-filter:blur(10px);
 padding:15px;
 margin:10px;
 border-radius:20px;
 box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 margin:5px 0;
 font-weight:bold;
}

.green{background:#2ecc71;color:#fff}
.orange{background:#f39c12;color:#fff}
.red{background:#e74c3c;color:#fff}
.blue{background:#3498db;color:#fff}

/* INPUT */
input,select{
 width:100%;
 padding:10px;
 border-radius:10px;
 border:none;
 margin:5px 0;
}

/* TAB */
.tab{
 display:none;
 animation:fade 0.3s;
 padding-bottom:90px;
}
.tab.active{display:block}

@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1;transform:translateY(0)}
}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 background:#fff;
 border-top:1px solid #ddd;
}

.nav button{
 flex:1;
 background:none;
 padding:12px;
 font-size:12px;
}

.nav .activeTab{
 color:#3498db;
}

/* DASHBOARD BOX */
.flex{display:flex;gap:10px}
.box{
 flex:1;
 padding:15px;
 border-radius:15px;
 color:#fff;
 text-align:center;
 font-weight:bold;
}
.b1{background:#3498db}
.b2{background:#2ecc71}
.b3{background:#f1c40f}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>🔐 Login Admin</h3>
<input type="password" id="pin" placeholder="Masukkan PIN">
<button class="blue" onclick="login()">Login</button>

<h4>Ganti PIN</h4>
<input type="password" id="pinLama" placeholder="PIN lama">
<input type="password" id="pinBaru" placeholder="PIN baru">
<button class="orange" onclick="gantiPin()">Ganti PIN</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- DASHBOARD -->
<div id="tabDashboard" class="tab active">
<div class="card">
<h3>Dashboard</h3>
<div class="flex">
<div class="box b1" id="hadirBox">0</div>
<div class="box b2" id="telatBox">0</div>
<div class="box b3" id="alpaBox">0</div>
</div>
</div>
</div>

<!-- ABSENSI -->
<div id="tabAbsensi" class="tab">
<div class="card">
<select id="nama"></select>
<button class="green" onclick="masuk()">Masuk</button>
<button class="blue" onclick="izin()">Izin</button>
</div>

<div id="list"></div>
</div>

<!-- KARYAWAN -->
<div id="tabKaryawan" class="tab">
<div class="card">
<input id="karyawanBaru" placeholder="Tambah nama">
<button class="blue" onclick="tambahKaryawan()">Tambah</button>

<select id="hapusNama"></select>
<button class="red" onclick="hapusKaryawan()">Hapus</button>
</div>
</div>

<!-- LAPORAN -->
<div id="tabLaporan" class="tab">
<div class="card">
<h3>📊 Laporan</h3>
(isi nanti)
</div>
</div>

<!-- LOG -->
<div id="tabLog" class="tab">
<div class="card">
<h3>📜 Log Aktivitas</h3>
<div id="logList"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showTab('Dashboard',this)" class="activeTab">🏠</button>
<button onclick="showTab('Absensi',this)">📋</button>
<button onclick="showTab('Karyawan',this)">👤</button>
<button onclick="showTab('Laporan',this)">📊</button>
<button onclick="showTab('Log',this)">🧠</button>
</div>

</div>

<script>

// ===== FIREBASE =====
const firebaseConfig={
 apiKey:"AIzaSy...",
 authDomain:"pt-agn.firebaseapp.com",
 databaseURL:"https://pt-agn-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let data=[],karyawan=[],PIN_GLOBAL="1234",logs=[];
let SESSION_ID=Date.now();

// ===== TAB =====
function showTab(n,btn){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById("tab"+n).classList.add("active");

 document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('activeTab'));
 btn.classList.add("activeTab");
}

// ===== LOGIN =====
db.ref("config/pin").on("value",s=>{
 PIN_GLOBAL=s.val()||"1234";
});

function login(){
 if(pin.value==PIN_GLOBAL){
  localStorage.setItem("login",true);
  localStorage.setItem("session",SESSION_ID);
  db.ref("config/session").set(SESSION_ID);
  loginBox.style.display="none";
  app.style.display="block";
 }else alert("PIN salah");
}

if(localStorage.getItem("login")){
 loginBox.style.display="none";
 app.style.display="block";
}

// ===== DATA =====
db.ref("karyawan").on("value",s=>{
 if(!s.exists() || !Array.isArray(s.val()) || s.val().length===0){
  karyawan=["Agung","Alda","Nur","Budi","Siti"];
  db.ref("karyawan").set(karyawan);
 }else karyawan=s.val();
 updateDrop();
});

db.ref("absensi").on("value",s=>{
 data=s.val()||[];
 render();
});

// ===== LOG =====
db.ref("config/logs").limitToLast(20).on("value",s=>{
 logs=[];
 s.forEach(c=>logs.push(c.val()));
 logs.reverse();
 renderLogs();
});

// ===== KARYAWAN =====
function updateDrop(){
 nama.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
 hapusNama.innerHTML=karyawan.map(n=>`<option>${n}</option>`);
}

function tambahKaryawan(){
 if(!karyawanBaru.value)return;
 karyawan.push(karyawanBaru.value);
 db.ref("karyawan").set(karyawan);
}

function hapusKaryawan(){
 let n=hapusNama.value;
 karyawan=karyawan.filter(x=>x!==n);
 db.ref("karyawan").set(karyawan);
}

// ===== ABSEN =====
function now(){
 let d=new Date();
 return {tgl:d.toISOString().split('T')[0]};
}

function masuk(){
 let t=now();
 data.push({nama:nama.value,tgl:t.tgl,status:"Hadir"});
 save();
}

function izin(){
 let t=now();
 data.push({nama:nama.value,tgl:t.tgl,status:"Izin"});
 save();
}

function save(){ db.ref("absensi").set(data); }

// ===== RENDER =====
function render(){
 list.innerHTML=data.map(x=>`
 <div class="card">${x.nama} - ${x.status}</div>
 `).join("");

 hadirBox.innerText=data.filter(x=>x.status=="Hadir").length;
 telatBox.innerText=data.filter(x=>x.status=="Telat").length;
 alpaBox.innerText=data.filter(x=>x.status=="Alpa").length;
}

// ===== LOG VIEW =====
function renderLogs(){
 logList.innerHTML=logs.map(l=>`
 <div class="card">
 ${l.type} (${l.status})<br>
 ${l.time}
 </div>
 `).join("");
}

// ===== PIN =====
function gantiPin(){
 if(pinLama.value!==PIN_GLOBAL){alert("PIN salah");return;}
 db.ref("config/pin").set(pinBaru.value);
 db.ref("config/session").set(Date.now());
 alert("PIN diganti");
}

</script>
</body>
</html>
