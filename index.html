<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi PT-AGN</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Library -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#74b9ff,#dfe6e9);
  padding:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2,h3{margin:5px 0}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
  color:white;
  font-size:15px;
}

.green{background:#27ae60}
.orange{background:#f39c12}
.red{background:#e74c3c}
.blue{background:#3498db}

select,input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.dashboard{
  display:flex;
  gap:10px;
}

.box{
  flex:1;
  color:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.b1{background:#0984e3}
.b2{background:#00b894}
.b3{background:#fdcb6e;color:black}

.badge{
  padding:5px 12px;
  border-radius:10px;
  color:white;
  font-size:12px;
}

.hadir{background:#00b894}
.telat{background:#f39c12}
</style>
</head>

<body>

<div class="card">
<h2>📋 Absensi PT-AGN</h2>

<select id="nama"></select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>

<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<h3>Filter</h3>
<input type="month" id="bulan">
<input type="text" id="search" placeholder="Cari nama...">
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<div class="dashboard">
  <div class="box b1" id="total">0</div>
  <div class="box b2" id="hadir">0</div>
  <div class="box b3" id="telat">0</div>
</div>
</div>

<div id="list"></div>

<script type="module">
import { collection, addDoc, updateDoc, doc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const db = window.db;
let allData=[];

// LOAD KARYAWAN
async function loadKaryawan(){
  const snap=await getDocs(collection(db,"karyawan"));
  const select=document.getElementById("nama");
  select.innerHTML="";
  snap.forEach(d=>{
    let opt=document.createElement("option");
    opt.value=d.data().nama;
    opt.textContent=d.data().nama;
    select.appendChild(opt);
  });
}
loadKaryawan();

// REALTIME
onSnapshot(collection(db,"absensi"), snap=>{
  allData=[];
  snap.forEach(d=>allData.push({id:d.id,...d.data()}));
  render();
});

// ABSEN MASUK
window.absenMasuk=async()=>{
  const nama=namaEl.value;
  const today=new Date().toISOString().split("T")[0];

  const q=query(collection(db,"absensi"),
    where("nama","==",nama),
    where("tanggal","==",today));

  const cek=await getDocs(q);
  if(!cek.empty){
    alert("Sudah absen!");
    return;
  }

  await addDoc(collection(db,"absensi"),{
    nama,
    tanggal:today,
    jamMasuk:new Date().toLocaleTimeString(),
    jamPulang:"",
    statusMasuk:"Hadir"
  });
};

// ABSEN PULANG
window.absenPulang=async()=>{
  const nama=namaEl.value;
  const today=new Date().toISOString().split("T")[0];

  const q=query(collection(db,"absensi"),
    where("nama","==",nama),
    where("tanggal","==",today));

  const snap=await getDocs(q);
  snap.forEach(async d=>{
    await updateDoc(doc(db,"absensi",d.id),{
      jamPulang:new Date().toLocaleTimeString()
    });
  });
};

// RENDER
function render(){
  const list=document.getElementById("list");
  const search=document.getElementById("search").value.toLowerCase();
  const bulan=document.getElementById("bulan").value;

  let data=allData.filter(d=>{
    return (!search || d.nama.toLowerCase().includes(search)) &&
           (!bulan || d.tanggal.startsWith(bulan));
  });

  document.getElementById("total").innerText="Total\n"+data.length;
  document.getElementById("hadir").innerText="Hadir\n"+data.filter(d=>d.statusMasuk=="Hadir").length;
  document.getElementById("telat").innerText="Telat\n"+data.filter(d=>d.statusMasuk=="Telat").length;

  list.innerHTML="";
  data.reverse().forEach(d=>{
    list.innerHTML+=`
    <div class="card">
      <b>${d.nama}</b><br>
      ${d.tanggal}<br>
      Masuk: ${d.jamMasuk}<br>
      Pulang: ${d.jamPulang || "-"}<br>
      <span class="badge hadir">${d.statusMasuk}</span>
    </div>`;
  });
}

// FILTER
search.oninput=render;
bulan.onchange=render;

// EXCEL
window.exportExcel=()=>{
  let rows=[["No","Nama","Tanggal","Masuk","Pulang","Status"]];
  allData.forEach((d,i)=>{
    rows.push([i+1,d.nama,d.tanggal,d.jamMasuk,d.jamPulang,d.statusMasuk]);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");
  XLSX.writeFile(wb,"Absensi.xlsx");
};

// PDF
window.exportPDF=()=>{
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();

  doc.text("LAPORAN ABSENSI PT-AGN",14,15);

  const rows=allData.map((d,i)=>[
    i+1,d.nama,d.tanggal,d.jamMasuk,d.jamPulang,d.statusMasuk
  ]);

  doc.autoTable({
    head:[["No","Nama","Tanggal","Masuk","Pulang","Status"]],
    body:rows,
    startY:20
  });

  doc.save("Absensi.pdf");
};
</script>

</body>
</html>
