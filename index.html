<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.0 - REVERTED SLIM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--p:#60a5fa;--s:#34d399;--d:#fb7185;--w:#fbbf24;--bg:#020617;--c:#111827;--t:#e2e8f0;--b:#1f2937;--iz:#a78bfa}
        body[data-theme="light"]{--bg:#f8fafc;--c:#ffffff;--t:#1e293b;--b:#e2e8f0}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:6px;transition:0.2s}
        .container{max-width:1400px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:2px 4px}
        .logo-box{display:flex;align-items:center;gap:6px}
        .logo-box img{width:40px;height:40px;border-radius:8px;border:1px solid var(--b);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:6px; border:1px solid var(--b); padding:4px 8px; cursor:pointer; color:var(--t); font-size:10px}

        .card{background:var(--c);padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid var(--b)}
        h3{margin:0 0 6px;font-size:8px;color:var(--p);text-transform:uppercase;letter-spacing:1px;font-weight:700}
        
        input,button,select{border-radius:5px;font-size:11px;height:30px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none;padding:0 8px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer;border:none;color:#fff;font-size:10px}
        
        /* GHOST COLORS - GAYA v78.0 */
        .btn-ghost{background:transparent !important; border:1px solid var(--b) !important; color:var(--t)}
        .btn-s{background:rgba(52,211,153,0.15); color:#34d399; border:1px solid rgba(52,211,153,0.3)}
        .btn-d{background:rgba(251,113,133,0.15); color:#fb7185; border:1px solid rgba(251,113,133,0.3)}
        .btn-p{background:rgba(96,165,250,0.15); color:#60a5fa; border:1px solid rgba(96,165,250,0.3)}
        .btn-iz{background:rgba(167,139,250,0.15); color:#a78bfa; border:1px solid rgba(167,139,250,0.3)}

        .table-wrap{overflow-x:auto; border-radius:6px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:9px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:4px 1px;text-align:center;min-width:32px}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:90px !important;text-align:left !important;padding-left:6px !important;font-weight:600; border-right: 1.2px solid var(--p) !important}
        
        .s-cell{border-radius:4px;width:28px;height:28px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:9px;margin: 0 auto;}
        .s-v{background:rgba(52,211,153,0.1);color:#34d399;border:0.5px solid #34d399} 
        .s-late{background:rgba(251,191,36,0.1);color:#fbbf24;border:0.5px solid #fbbf24} 
        .s-i{background:rgba(167,139,250,0.1);color:#a78bfa;border:0.5px solid #a78bfa}
        .s-off{background:rgba(251,113,133,0.1);color:#fb7185;border:0.5px solid #fb7185} 
        .s-mng{background:transparent;color:#4b5563;opacity:0.5;border:0.5px solid rgba(75,85,99,0.3)}
        .jam-text{font-size:5.5px;font-weight:500;display:block;margin-top:1px;opacity:0.7}

        @media print {
            header, .no-print, .dark-card { display: none !important; }
            .table-web { width: 100% !important; transform: scale(0.7); transform-origin: top left; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=111827&color=60a5fa" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:12px;font-weight:800">PT AGN</h2><span style="font-size:7px;color:var(--p)">REVERTED v78.0</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()"><span id="tIco">☀️</span></div>
        </header>

        <!-- KARYAWAN -->
        <div class="card no-print">
            <div style="display:flex;gap:4px">
                <input list="lk" id="iNama" placeholder="Pilih Nama...">
                <datalist id="lk"></datalist>
                <button class="btn btn-s" style="width:34px" onclick="tKaryawan()">+</button>
                <button class="btn btn-d" style="width:34px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <!-- FITUR v77.8: RESET & MULTI LIBUR -->
        <div class="card no-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:6px">
            <div style="grid-column: span 2; display:flex; gap:4px">
                <input type="date" id="resetTgl">
                <button class="btn btn-ghost" style="width:70px" onclick="resetAbsen()">RESET</button>
            </div>
            <input type="date" id="tglAwal">
            <input type="date" id="tglAkhir">
            <button class="btn btn-p" onclick="sLib(true)">SET LIBUR</button>
            <button class="btn btn-ghost" onclick="sLib(false)">HAPUS</button>
        </div>

        <!-- PRESENSI SLIM -->
        <div class="card no-print">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; margin-bottom:6px">
                <button class="btn btn-s" style="height:34px" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn btn-d" style="height:34px" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn btn-iz" onclick="pAbsen('Izin')">IZIN / KETERANGAN</button>
        </div>

        <!-- TABLE REKAP -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px" class="no-print">
                <input type="month" id="fB" style="width:110px" onchange="rRekap()">
                <div style="display:flex; gap:4px">
                    <button class="btn btn-s" style="width:60px" onclick="doExcel()">EXCEL</button>
                    <button class="btn btn-d" style="width:60px" onclick="window.print()">PDF</button>
                </div>
            </div>
            <div class="table-wrap" id="scrollArea">
                <table class="table-web" id="rekapTable">
                    <thead id="thWeb"></thead>
                    <tbody id="tbWeb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            const savedTheme = localStorage.getItem('agnTheme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function toggleT(){ 
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt); localStorage.setItem('agnTheme', nt); 
        }

        function cLogo(e){
            const r=new FileReader(); r.onload=()=>{document.getElementById('mainLogo').src=r.result; localStorage.setItem('agnLogo',r.result);};
            r.readAsDataURL(e.target.files[0]);
        }

        function uDl(){
            let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');
            document.getElementById('lk').innerHTML=opt;
        }

        function tKaryawan(){
            let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value="";});}
        }

        function hKaryawan(){
            let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); 
            if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");
        }

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(nt===null)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{alert(`Selesai!`); inp.value="";});
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tgl=document.getElementById('resetTgl');
            if(!n.value || !tgl.value) return;
            if(confirm('Hapus data?')) db.ref(`absensi/${tgl.value}/${n.value}`).remove();
        }

        function sLib(st){
            let d1=document.getElementById('tglAwal'), d2=document.getElementById('tglAkhir');
            if(!d1.value) return;
            let start = new Date(d1.value); let end = d2.value ? new Date(d2.value) : new Date(d1.value);
            while(start <= end){
                db.ref(`hari_libur/${start.toISOString().split('T')[0]}`).set(st?true:null);
                start.setDate(start.getDate() + 1);
            }
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed">Karyawan</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}">${i}</th>`;
            h+=`<th>H</th><th>I</th><th>A</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isMin = (d.getDay()===0), isLib = hl[t];
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isMin || isLib) { sW="H"; clW="s-v"; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu;
                        }
                    } 
                    else if(isMin){ sW="M"; clW="s-mng"; } // Hari Minggu muncul M
                    else if(isLib){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    row+=`<td><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cI}</td><td>${cA}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
            setTimeout(() => {
                const scrollArea = document.getElementById('scrollArea');
                const target = document.getElementById(`tgl-${tglSkrg}`);
                if(target && scrollArea) {
                    const offset = target.offsetLeft - (scrollArea.offsetWidth / 2);
                    scrollArea.scrollTo({ left: offset, behavior: 'smooth' });
                }
            }, 500);
        }

        function doExcel(){
            const table = document.getElementById("rekapTable").outerHTML;
            const blob = new Blob([table], {type: "application/vnd.ms-excel"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN.xls`; a.click();
        }
    </script>
</body>
</html>
