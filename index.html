<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.7 - TOTAL RECOVERED</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: 0.3s}
        .container{max-width:1450px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .tabs{display:flex; gap:10px; margin-bottom:15px}
        .tab-btn{flex:1; padding:15px; border-radius:12px; background:var(--c); color:var(--t); border:1px solid var(--b); cursor:pointer; font-weight:800}
        .tab-btn.active{background:var(--p); border-color:var(--p); color:#fff}
        .hidden {display:none !important}
        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;font-weight:800}
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:8px 4px;text-align:center}
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .edit-mode{background:rgba(255, 214, 0, 0.1); cursor:pointer}
        @media print { .no-print, .tabs, header {display:none !important} body{background:#fff;color:#000} .table-web{color:#000} }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v78.7 - FINAL</span></div>
            </div>
            <button class="btn no-print" style="background:var(--b); width:120px; height:40px" onclick="toggleT()">🌓 Mode</button>
        </header>

        <div class="tabs no-print">
            <button id="tabAbsen" class="tab-btn active" onclick="switchTab('absen')">📅 ABSENSI</button>
            <button id="tabStok" class="tab-btn" onclick="switchTab('stok')">📦 STOK BARANG</button>
        </div>

        <!-- PAGE ABSENSI -->
        <div id="page-absen">
            <!-- (Bagian Absensi Tetap Stabil Sesuai v77.6) -->
            <div class="card no-print">
                <h3>👥 KARYAWAN & PRESENSI</h3>
                <input list="lk" id="iNama" placeholder="Pilih Nama..." style="margin-bottom:10px">
                <datalist id="lk"></datalist>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px">
                    <button class="btn" style="background:var(--s)" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d)" onclick="pAbsen('Pulang')">PULANG</button>
                    <button class="btn" style="background:var(--iz)" onclick="pAbsen('Izin')">IZIN</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <input type="month" id="fB" onchange="rRekap()" style="width:150px">
                    <button class="btn no-print" style="background:#b91c1c; width:80px" onclick="window.print()">PDF</button>
                </div>
                <div class="table-wrap" id="scrollArea">
                    <table class="table-web" id="rekapTable"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table>
                </div>
            </div>
        </div>

        <!-- PAGE STOK -->
        <div id="page-stok" class="hidden">
            <div class="card no-print">
                <h3>🛠️ MASTER BARANG</h3>
                <div style="display:flex; gap:10px">
                    <input type="text" id="masterBrgBaru" placeholder="Barang Baru...">
                    <button class="btn" style="background:var(--s); width:60px" onclick="tambahMasterBarang()">+</button>
                    <button class="btn" style="background:var(--d); width:60px" onclick="hapusMasterBarang()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>📦 UPDATE STOK</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="skBrg"></select>
                    <input type="date" id="skTgl">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="skJns">
                        <option value="awal_ready">Awal Ready</option><option value="awal_kotor">Awal Kotor</option>
                        <option value="masuk_kotor">Masuk Kotor</option><option value="masuk_bersih">Masuk Bersih</option>
                        <option value="rekon">Rekon</option><option value="jual_u">Jual Umum</option><option value="jual_a">Jual Agen</option>
                    </select>
                    <input type="number" id="skQty" placeholder="Qty">
                    <select id="skQC"><option>Accepted</option><option>Reject</option><option>Minor</option></select>
                </div>
                <button class="btn" style="background:var(--p)" onclick="saveStok()">SIMPAN DATA</button>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                    <h3>📦 REKAP STOK GUDANG</h3>
                    <div class="no-print" style="display:flex; gap:8px">
                        <button class="btn" style="background:#1d6f42; width:90px; height:40px; font-size:11px" onclick="doExcel('stokTable')">EXCEL</button>
                        <button class="btn" style="background:#b91c1c; width:90px; height:40px; font-size:11px" onclick="window.print()">CETAK PDF</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table class="table-web" id="stokTable">
                        <thead id="thStok"></thead><tbody id="tbStok"></tbody>
                    </table>
                </div>
                <p style="font-size:9px; color:var(--iz); margin-top:10px">*Tips: Hapus data salah melalui tabel Log Riwayat di bawah.</p>
            </div>

            <div class="card no-print">
                <h3>📋 LOG RIWAYAT HARIAN</h3>
                <div class="table-wrap"><table class="table-web"><thead><tr><th>Tgl</th><th>Barang</th><th>Jenis</th><th>Qty</th><th>QC</th><th>Aksi</th></tr></thead><tbody id="tbLog"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG & INIT
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, stData={}, mb={};

        window.onload=()=>{
            const now = new Date();
            document.getElementById('fB').value = now.toISOString().slice(0,7);
            document.getElementById('skTgl').value = now.toISOString().split('T')[0];
            
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('stok_barang').on('value',s=>{stData=s.val()||{}; renderStok();});
            db.ref('master_barang').on('value',s=>{mb=s.val()||{}; renderDropdownBarang(); renderStok();});
        };

        // --- TAB & UTILS ---
        function switchTab(t){
            document.getElementById('page-absen').classList.toggle('hidden', t!=='absen');
            document.getElementById('page-stok').classList.toggle('hidden', t!=='stok');
            document.getElementById('tabAbsen').classList.toggle('active', t==='absen');
            document.getElementById('tabStok').classList.toggle('active', t==='stok');
        }
        function toggleT(){ let d=document.body; d.setAttribute('data-theme', d.getAttribute('data-theme')==='dark'?'light':'dark'); }
        function doExcel(id){
            let table = document.getElementById(id);
            let html = table.outerHTML;
            window.open('data:application/vnd.ms-excel,' + encodeURIComponent(html));
        }

        // --- MASTER BARANG ---
        function tambahMasterBarang(){
            let n = document.getElementById('masterBrgBaru').value;
            if(n) db.ref('master_barang').push(n).then(()=>document.getElementById('masterBrgBaru').value="");
        }
        function hapusMasterBarang(){
            let n = document.getElementById('skBrg').value;
            let id = Object.keys(mb).find(k=>mb[k]===n);
            if(id && confirm(`Hapus ${n} permanently?`)) db.ref(`master_barang/${id}`).remove();
        }
        function renderDropdownBarang(){
            let list = Object.values(mb).sort();
            document.getElementById('skBrg').innerHTML = list.map(b=>`<option value="${b}">${b}</option>`).join('');
        }

        // --- STOK LOGIC (v77.6 Mix v78.5) ---
        function saveStok(){
            const b=document.getElementById('skBrg').value, t=document.getElementById('skTgl').value, j=document.getElementById('skJns').value, q=parseInt(document.getElementById('skQty').value), qc=document.getElementById('skQC').value;
            if(!b || !t || isNaN(q)) return alert("Data belum lengkap!");
            db.ref(`stok_barang/${t}`).push({barang:b, jenis:j, qty:q, qc:qc}).then(()=>{alert("Data Tersimpan!"); document.getElementById('skQty').value="";});
        }

        function renderStok(){
            let log="", items=Object.values(mb).sort(), sum={};
            items.forEach(i=>sum[i]={awal_ready:0,awal_kotor:0,masuk_kotor:0,masuk_bersih:0,rekon:0,jual_u:0,jual_a:0});
            
            Object.keys(stData).sort().reverse().forEach(t=>{
                Object.keys(stData[t]).forEach(id=>{
                    const e=stData[t][id];
                    log+=`<tr><td>${t}</td><td>${e.barang}</td><td>${e.jenis}</td><td>${e.qty}</td><td>${e.qc}</td><td><button onclick="hpsStok('${t}','${id}')" style="background:var(--d); border:none; color:#fff; border-radius:5px; cursor:pointer">X</button></td></tr>`;
                    if(sum[e.barang]) sum[e.barang][e.jenis]+=e.qty;
                });
            });

            let thS=`<tr style="background:var(--p)"><th class="nama-fixed">Nama Barang</th><th>Rdy Awal</th><th>Ktr Awal</th><th>+Ktr</th><th>+Brsh</th><th>Rekon</th><th style="background:var(--d)">Sisa Ktr</th><th>Jual U</th><th>Jual A</th><th style="background:var(--s)">Ready</th><th style="background:var(--iz)">Total</th></tr>`;
            let tbS="";
            items.forEach(i=>{
                const s=sum[i], sk=(s.awal_kotor+s.masuk_kotor)-s.rekon, sr=(s.awal_ready+s.masuk_bersih+s.rekon)-(s.jual_u+s.jual_a);
                tbS+=`<tr><td class="nama-fixed">${i}</td><td>${s.awal_ready}</td><td>${s.awal_kotor}</td><td>${s.masuk_kotor}</td><td>${s.masuk_bersih}</td><td>${s.rekon}</td><td style="font-weight:bold; color:var(--d)">${sk}</td><td>${s.jual_u}</td><td>${s.jual_a}</td><td style="font-weight:bold; color:var(--s)">${sr}</td><td style="background:var(--b)">${sk+sr}</td></tr>`;
            });
            document.getElementById('thStok').innerHTML=thS; document.getElementById('tbStok').innerHTML=tbS; document.getElementById('tbLog').innerHTML=log;
        }

        function hpsStok(t,id){ if(confirm('Hapus log ini?')) db.ref(`stok_barang/${t}/${id}`).remove(); }
        
        // --- ABSENSI (STABIL v77.6) ---
        function uDl(){ document.getElementById('lk').innerHTML = Object.values(mk).sort().map(n=>`<option value="${n}">`).join(''); }
        function pAbsen(ty){
            let n=document.getElementById('iNama').value, now=new Date(), tgl=now.toISOString().split('T')[0], jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            if(!n) return alert("Pilih Nama!");
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:ty}).then(()=>alert("OK!"));
        }
        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate();
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th>${i}</th>`;
            h+=`</tr>`; document.getElementById('thWeb').innerHTML=h;
            let b="";
            Object.values(mk).sort().forEach(n=>{
                let row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null, s="-";
                    if(data) s = data.Masuk ? "H" : (data.Izin ? "I" : "-");
                    row+=`<td>${s}</td>`;
                }
                b+=`<tr>${row}</tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }
    </script>
</body>
</html>
