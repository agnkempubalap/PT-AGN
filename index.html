<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v59.0 - Final Excel Color</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#10b981;--d:#ef4444;--w:#f59e0b;--bg:#f1f5f9;--c:#fff;--t:#1e293b;--b:#e2e8f0}
        [data-theme="dark"]{--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:8px}
        .container{max-width:1200px;margin:0 auto}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;padding:5px}
        .logo-box{display:flex;align-items:center;gap:10px}
        .logo-box img{width:60px;height:60px;border-radius:12px;background:#fff;border:2px solid var(--p);object-fit:contain}
        .card{background:var(--c);padding:15px;border-radius:15px;margin-bottom:10px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 10px;font-size:10px;color:var(--w);text-transform:uppercase;letter-spacing:1px}
        input,button{border-radius:10px;font-size:14px;height:45px;border:1px solid var(--b);background:var(--c);color:var(--t);width:100%;box-sizing:border-box}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        .table-wrap{overflow:auto;border-radius:12px;background:var(--c);border:1px solid var(--b)}
        table{width:100%;border-collapse:collapse;font-size:10px;min-width:1100px}
        th,td{border:1px solid var(--b);padding:8px 4px;text-align:center}
        .nama-fixed{position:sticky;left:0;background:var(--c)!important;font-weight:700;z-index:4;border-right:2px solid var(--b)}
        .s-cell{border-radius:4px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
        .s-v{background:#22c55e;color:#fff} .s-i{background:#eab308;color:#000} .s-off{background:#ef4444;color:#fff}
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="logo-box">
                <img src="https://ui-avatars.com/api/?name=AGN&background=2563eb&color=fff">
                <div><h2 style="margin:0;font-size:1rem">PT AGN</h2><span style="font-size:9px;color:var(--w);font-weight:800">SYSTEM v59.0</span></div>
            </div>
            <button onclick="toggleT()" id="tBtn" style="width:80px;font-size:11px">🌙 Dark</button>
        </header>

        <div class="card">
            <h3>👤 Management</h3>
            <div style="display:flex;gap:8px">
                <input list="lk" id="iNama" placeholder="Nama Karyawan...">
                <datalist id="lk"></datalist>
                <button class="btn" style="background:var(--s);width:60px" onclick="tKaryawan()">➕</button>
                <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <div class="card">
            <h3>⚡ Presensi</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
                <button class="btn" style="background:var(--s);height:50px" onclick="pAbsen('Masuk')">HADIR</button>
                <button class="btn" style="background:var(--w);height:50px" onclick="pAbsen('Izin')">IZIN</button>
                <button class="btn" style="background:var(--d);height:50px" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <input type="month" id="fB" style="width:140px" onchange="rRekap()">
                <button class="btn" style="background:#1d6f42;width:120px;font-size:12px" onclick="exportKeExcel()">📂 UNDUH EXCEL</button>
            </div>
            <div class="table-wrap"><table><thead><tr id="thR"></tr></thead><tbody id="tbR"></tbody></table></div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={};

        function toggleT(){ let t=document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme',t); }
        window.onload=()=>{
            document.getElementById('fB').value=new Date().toISOString().slice(0,7);
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
        };

        function uDl(){document.getElementById('lk').innerHTML=Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');}
        function tKaryawan(){let n=document.getElementById('iNama'); if(n.value) db.ref('master_karyawan').push(n.value).then(()=>n.value="");}
        function hKaryawan(){let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); if(id && confirm('Hapus?')) db.ref(`master_karyawan/${id}`).remove();}
        function pAbsen(ty){let n=document.getElementById('iNama').value, t=new Date().toISOString().split('T')[0]; if(n) db.ref(`absensi/${t}/${n}/${ty}`).set({status:'OK'});}

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate();
            document.getElementById('thR').innerHTML=`<th class="nama-fixed">Nama</th>${Array.from({length:last},(_,i)=>`<th>${i+1}</th>`).join('')}`;
            document.getElementById('tbR').innerHTML=Object.values(mk).sort().map(n=>{
                let row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), s="-", cl="";
                    if(d.getDay()===0){s="OFF"; cl="s-off";}
                    if(ad[t]&&ad[t][n]){ if(ad[t][n].Izin){s="I";cl="s-i"}else if(ad[t][n].Masuk){s="H";cl="s-v"} }
                    row+=`<td><div class="s-cell ${cl}">${s}</div></td>`;
                }
                return `<tr>${row}</tr>`;
            }).join('');
        }

        // --- SOLUSI FINAL WARNA EXCEL ---
        function exportKeExcel() {
            const f = document.getElementById('fB').value;
            const [y, m] = f.split('-'), last = new Date(y, m, 0).getDate();
            
            let tabelHtml = `
            <html><head><meta charset="UTF-8"></head><body>
            <table border="1">
                <tr><th colspan="${last+2}" style="background-color:#FFA500; color:#FFFFFF; font-size:14pt; height:40px;">ABSENSI PT AGN - ${f}</th></tr>
                <tr style="background-color:#E0E0E0; font-weight:bold;">
                    <th style="width:150px;">Nama Karyawan</th><th style="width:100px;">Jabatan</th>
                    ${Array.from({length:last},(_,i)=>`<th style="width:35px;">${i+1}</th>`).join('')}
                </tr>`;

            Object.values(mk).sort().forEach(n => {
                tabelHtml += `<tr><td style="font-weight:bold; text-align:left;">${n}</td><td>Karyawan</td>`;
                for(let i=1; i<=last; i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), bg="#FFFFFF", txt="-", color="#000000";
                    if(d.getDay()===0){ bg="#FF0000"; txt="OFF"; color="#FFFFFF"; }
                    if(ad[t]&&ad[t][n]){
                        if(ad[t][n].Izin){ bg="#FFFF00"; txt="I"; }
                        else if(ad[t][n].Masuk){ bg="#00FF00"; txt="H"; }
                    }
                    tabelHtml += `<td style="background-color:${bg}; color:${color}; text-align:center; font-weight:bold;">${txt}</td>`;
                }
                tabelHtml += `</tr>`;
            });

            tabelHtml += `</table></body></html>`;

            // Download menggunakan Blob & Base64
            const fileName = `ABSENSI_AGN_${f}.xls`;
            const dataType = 'application/vnd.ms-excel';
            const base64 = s => window.btoa(unescape(encodeURIComponent(s)));
            
            const link = document.createElement("a");
            link.href = `data:${dataType};base64,${base64(tabelHtml)}`;
            link.download = fileName;
            link.click();
        }
    </script>
</body>
</html>
