<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi</title>

<style>
body { font-family:Arial; background:#eef3ff; padding:15px; }

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
}

.item {
  background:#f5f7ff;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<h2>Absensi Karyawan</h2>

<div class="card">

<select id="nama">
<option value="Agung">Agung</option>
<option value="Hasan">Hasan</option>
<option value="Hatta">Hatta</option>
<option value="Alda">Alda</option>
<option value="Nur">Nur</option>
</select>

<button id="btn">Hadir</button>

<h3>List Hari Ini</h3>
<div id="list">Memuat...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  setDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// FORMAT TANGGAL
function today(){
  let d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}


// ABSEN
document.getElementById("btn").onclick = async function(){

  let btn = this;
  if(btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;
  let id = nama + "_" + today();

  try{

    await setDoc(doc(db,"absensi",id),{
      nama:nama,
      tanggal:today(),
      status:"Hadir"
    });

    alert("✅ Berhasil");

    loadData();

  }catch(e){
    alert("Error: "+e.message);
  }

  btn.disabled = false;
  btn.innerText = "Hadir";
};


// LOAD DATA (TANPA QUERY RIBET)
async function loadData(){

  let list = document.getElementById("list");
  list.innerHTML = "Memuat...";

  try{

    let snap = await getDocs(collection(db,"absensi"));

    list.innerHTML = "";

    let tgl = today();

    snap.forEach(doc=>{
      let d = doc.data();

      if(d.tanggal === tgl){
        list.innerHTML += `
          <div class="item">
            <span>${d.nama}</span>
            <span>${d.status}</span>
          </div>
        `;
      }
    });

    if(list.innerHTML === ""){
      list.innerHTML = "Belum ada data";
    }

  }catch(e){
    list.innerHTML = "Error load data";
  }
}


// LOAD AWAL
loadData();

</script>

</body>
</html>
