<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v76.5 - FINAL REVISION</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#fff;--t:#1e293b;--b:#e2e8f0}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        .dark-card{background:var(--c); border-radius:12px; border:1px solid var(--b); padding:10px 15px; display:flex; align-items:center; gap:8px; cursor:pointer}

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.2)}
        h3{margin:0 0 15px;font-size:11px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;font-weight:800;display:flex;align-items:center;gap:5px}
        
        label{display:block;font-size:10px;margin-bottom:5px;font-weight:600;color:var(--t);opacity:0.8}
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff; transition: 0.2s}
        .btn:active{transform: scale(0.95)}
        
        .table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--b);background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:10px 4px;text-align:center;min-width:45px}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:120px !important;text-align:left !important;padding-left:15px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        .today-col{background: rgba(37, 99, 235, 0.15) !important;}

        .rekap-akhir{background:#0f172a !important; color:#ffffff !important; font-weight:800; min-width:35px !important}
        .th-rekap{background:#020617 !important; color:#f59e0b !important; font-weight:800}

        .s-cell{border-radius:6px;width:42px;height:40px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:11px}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-l{background:#AA00FF;color:#fff}
        .jam-text{font-size:8px;font-weight:600;display:block;margin-top:2px}

        @media print { header, .card:not(.table-card), .no-print { display: none !important; } }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <input type="file" id="inpLogo" style="display:none" accept="image/*" onchange="cLogo(event)">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff" onclick="document.getElementById('inpLogo').click()">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">SYSTEM v76.5</span></div>
            </div>
            <div class="dark-card" onclick="toggleT()">
                <span id="tIco">☀️</span> <span style="font-size:12px;font-weight:600" id="tTxt">Dark Mode</span>
            </div>
        </header>

        <!-- KARYAWAN & NAMA UTAMA -->
        <div class="card">
            <h3>👥 DATA KARYAWAN (NAMA UTAMA)</h3>
            <div style="display:flex;gap:10px">
                <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama untuk Presensi & Reset...">
                <datalist id="lk"></datalist>
                <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
            </div>
        </div>

        <!-- RESET & LIBUR -->
        <div class="card">
            <h3>🧹 KONTROL DATA (RESET & LIBUR)</h3>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px">
                <div><label>Tanggal Reset (Harian):</label><input type="date" id="resetTgl"></div>
                <button class="btn" style="background:var(--d); margin-top:18px" onclick="resetAbsen()">RESET DATA NAMA DI ATAS</button>
            </div>
            <hr style="border:0; border-top:1px solid var(--b); margin-bottom:15px">
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px">
                <div><label>Dari Tanggal (Libur/Rentang):</label><input type="date" id="tglAwal"></div>
                <div><label>Sampai Tanggal (Libur/Rentang):</label><input type="date" id="tglAkhir"></div>
            </div>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px">
                <button class="btn" style="background:var(--p)" onclick="sLib(true)">SET LIBUR / RENTANG</button>
                <button class="btn" style="background:var(--d)" onclick="sLib(false)">HAPUS LIBUR / RENTANG</button>
            </div>
        </div>

        <!-- PRESENSI -->
        <div class="card">
            <h3>⚡ PRESENSI HARIAN</h3>
            <div style="display:grid;grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
                <button class="btn" style="background:var(--s);height:65px;font-size:18px" onclick="pAbsen('Masuk')">MASUK</button>
                <button class="btn" style="background:var(--d);height:65px;font-size:18px" onclick="pAbsen('Pulang')">PULANG</button>
            </div>
            <button class="btn" style="background:var(--iz);height:55px;font-size:16px" onclick="pAbsen('Izin')">📝 IZIN / KETERANGAN</button>
        </div>

        <!-- REKAP -->
        <div class="card table-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px" class="no-print">
                <input type="month" id="fB" style="width:160px" onchange="rRekap()">
                <div style="display:flex;gap:8px">
                    <button class="btn" style="background:#1d6f42;width:100px;font-size:11px" onclick="doExcel()">📂 EXCEL</button>
                    <button class="btn" style="background:#b91c1c;width:100px;font-size:11px" onclick="window.print()">📜 PDF</button>
                </div>
            </div>
            <div class="table-wrap" id="scrollArea">
                <table class="table-web"><thead id="thWeb"></thead><tbody id="tbWeb"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}; const TGL_MULAI_SISTEM = "2026-03-21";

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            document.getElementById('fB').value=m;
            if(localStorage.getItem('agnLogo')) document.getElementById('mainLogo').src=localStorage.getItem('agnLogo');
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
        };

        function toggleT(){ 
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark'; 
            b.setAttribute('data-theme',nt);
            document.getElementById('tIco').innerText=nt==='dark'?'☀️':'🌙';
            document.getElementById('tTxt').innerText=nt==='dark'?'Light Mode':'Dark Mode';
        }

        function cLogo(e){
            const r=new FileReader(); r.onload=()=>{
                document.getElementById('mainLogo').src=r.result;
                localStorage.setItem('agnLogo',r.result);
            }; r.readAsDataURL(e.target.files[0]);
        }

        function uDl(){
            let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');
            document.getElementById('lk').innerHTML=opt;
        }

        function tKaryawan(){
            let n=document.getElementById('iNama'); 
            if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value=""; alert("Karyawan Ditambah!");});}
        }

        function hKaryawan(){
            let n=document.getElementById('iNama'); 
            let id=Object.keys(mk).find(k=>mk[k]===n.value); 
            if(id && confirm('Hapus Karyawan ini?')) db.ref(`master_karyawan/${id}`).remove().then(()=>n.value="");
        }

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama di kolom atas!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9 || (now.getHours()===9 && now.getMinutes()>0))) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan Izin:"); if(nt===null)return; st="Izin";}
            
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt}).then(()=>{
                alert(`${ty} Berhasil Jam: ${jam}`);
                inp.value="";
            });
        }

        function resetAbsen(){
            let n=document.getElementById('iNama'), tglHarian=document.getElementById('resetTgl'), d1=document.getElementById('tglAwal'), d2=document.getElementById('tglAkhir');
            if(!n.value) return alert("Pilih Nama di kolom paling atas!");
            
            let targets = [];
            if(tglHarian.value) targets.push(tglHarian.value);
            if(d1.value && d2.value){
                let start = new Date(d1.value), end = new Date(d2.value);
                while(start <= end){
                    targets.push(start.toISOString().split('T')[0]);
                    start.setDate(start.getDate() + 1);
                }
            }

            if(targets.length === 0) return alert("Pilih Tanggal Reset Harian atau Rentang Tanggal!");

            if(confirm(`Hapus data ${n.value} untuk tanggal yang dipilih?`)){
                targets.forEach(t => db.ref(`absensi/${t}/${n.value}`).remove());
                alert("Data Berhasil Direset!");
                n.value=""; tglHarian.value=""; d1.value=""; d2.value="";
            }
        }

        function sLib(st){
            let d1=document.getElementById('tglAwal'), d2=document.getElementById('tglAkhir');
            if(!d1.value) return alert("Pilih minimal tanggal 'Dari'!");
            
            let start = new Date(d1.value);
            let end = d2.value ? new Date(d2.value) : new Date(d1.value); // Hybrid: kalau d2 kosong, pakai d1 (satu hari)

            while(start <= end){
                let tgl = start.toISOString().split('T')[0];
                db.ref(`hari_libur/${tgl}`).set(st?true:null);
                start.setDate(start.getDate() + 1);
            }
            alert(st?"Libur Berhasil Diset!":"Libur Telah Dihapus!");
            d1.value=""; d2.value="";
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), todayFull = new Date().toISOString().split('T')[0], tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}" class="${i===tglSkrg?'today-col':''}">${i}</th>`;
            h+=`<th class="th-rekap">H</th><th class="th-rekap">I</th><th class="th-rekap">A</th><th class="th-rekap">L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;

            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, d=new Date(t), isOff=(d.getDay()===0 || hl[t]);
                    let data=ad[t]?ad[t][n]:null, sW="-", clW="", infoW="";
                    
                    if(data){
                        if(data.Izin){ sW="I"; clW="s-i"; cI++; }
                        else if(data.Masuk){ 
                            if(isOff) { sW="L"; clW="s-l"; cL++; } 
                            else { sW="H"; clW=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                            infoW = data.Masuk.waktu;
                            if(data.Pulang) infoW += ` | ${data.Pulang.waktu}`;
                        }
                    } else if(isOff){ sW="OFF"; clW="s-off"; }
                    else if(t < todayFull && t >= TGL_MULAI_SISTEM){ sW="A"; clW="s-a"; cA++; }
                    
                    row+=`<td class="${i===tglSkrg?'today-col':''}"><div class="s-cell ${clW}">${sW}<span class="jam-text">${infoW}</span></div></td>`;
                }
                b+=`<tr>${row}<td class="rekap-akhir">${cH}</td><td class="rekap-akhir">${cI}</td><td class="rekap-akhir">${cA}</td><td class="rekap-akhir">${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;

            setTimeout(() => {
                const target = document.getElementById(`tgl-${tglSkrg}`);
                if(target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }, 500);
        }

        function doExcel(){
            const f=document.getElementById('fB').value;
            let table = document.querySelector(".table-web").outerHTML;
            let blob = new Blob([table], {type: "application/vnd.ms-excel"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a"); a.href = url; a.download = `REKAP_AGN_${f}.xls`; a.click();
        }
    </script>
</body>
</html>
