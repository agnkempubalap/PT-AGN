<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kempu Balap OMNI - PT-AGN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#dc2626; --bg:#f8fafc; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; --al:#64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--t); font-size: 13px; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; position: sticky; top: 0; z-index: 1000; background: var(--p); padding: 10px; }
        .nav-btn { padding: 12px 2px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 9px; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .card { background: var(--c); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--b); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px; font-size: 12px; color: var(--p); text-transform: uppercase; border-left: 4px solid var(--p); padding-left: 10px; }
        input, select { width: 100%; height: 48px; background: #f1f5f9; border: 1px solid var(--b); border-radius: 12px; padding: 0 15px; margin-bottom: 10px; font-size: 14px; }
        .btn { border: none; border-radius: 12px; padding: 14px; font-weight: 800; cursor: pointer; width: 100%; color: white; margin-bottom: 8px; font-size: 12px; }
        .scroll-x { overflow-x: auto; border-radius: 15px; border: 1px solid var(--b); background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f1f5f9; color: var(--al); font-size: 10px; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid var(--b); text-align: center; font-weight: 700; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; border-right: 2px solid var(--b); min-width: 100px; color: var(--p); }
        .badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; font-weight: 800; color: white; font-size: 10px; }
        .bg-h { background: var(--s); } .bg-m { background: var(--d); } .bg-i { background: #8b5cf6; } .bg-off { background: #94a3b8; }
        .export-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-grid">
        <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
        <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
        <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
        <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content">
            <div class="card">
                <h3>👥 Master Karyawan</h3>
                <input type="text" id="inK" placeholder="Nama Karyawan Baru...">
                <button class="btn" style="background:var(--p)" onclick="addM('master_karyawan', 'inK')">TAMBAH KARYAWAN</button>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px"></div>
            </div>

            <div class="card">
                <h3>⚡ Input Absensi & Libur</h3>
                <select id="selK"></select>
                <input type="date" id="absTgl">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <button class="btn" style="background:var(--s)" onclick="saveAbs('Hadir')">HADIR (H)</button>
                    <button class="btn" style="background:var(--d)" onclick="saveAbs('Alpa')">ALPA (A)</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <button class="btn" style="background:#8b5cf6" onclick="saveAbs('Izin')">IZIN (I)</button>
                    <button class="btn" style="background:#94a3b8" onclick="saveAbs('Off')">LIBUR (Off)</button>
                </div>
            </div>

            <div class="card">
                <h3>📅 Rekap Kalender</h3>
                <input type="month" id="fM" onchange="renderAll()">
                <div class="scroll-x">
                    <table id="tblAbsen">
                        <thead id="thA"></thead>
                        <tbody id="tbA"></tbody>
                    </table>
                </div>
                <div class="export-row">
                    <button class="btn" style="background:#1d6f42" onclick="exportExcel('tblAbsen', 'Absensi')">EXCEL</button>
                    <button class="btn" style="background:#b91c1c" onclick="exportPDF('tblAbsen', 'Laporan Absensi')">PDF</button>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="card">
                <h3>📊 Rekap Stok</h3>
                <div class="scroll-x">
                    <table id="tblStok">
                        <thead><tr><th>BARANG</th><th>AWAL</th><th>MASUK</th><th>REKO</th><th>JUAL</th><th>TOTAL</th></tr></thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
                <div class="export-row">
                    <button class="btn" style="background:#1d6f42" onclick="exportExcel('tblStok', 'Stok')">EXCEL</button>
                </div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content hidden"><div class="card"><h3>🛠️ Aktivitas</h3><p>Gunakan Tab Absen untuk input dasar.</p></div></div>
        <div id="tab-gaji" class="tab-content hidden"><div class="card"><h3>💰 Gaji</h3><p>Otomatis terhitung dari aktivitas.</p></div></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let DATA = { master_karyawan: {}, master_barang: {}, absensi: {} };

        window.onload = () => {
            const now = new Date();
            document.getElementById('absTgl').value = now.toISOString().split('T')[0];
            document.getElementById('fM').value = now.toISOString().slice(0, 7);
            
            db.ref('/').on('value', s => {
                DATA = s.val() || DATA;
                renderAll();
            });
        };

        function tab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function addM(p, id) {
            const v = document.getElementById(id).value;
            if(v) db.ref(p).push(v).then(() => { document.getElementById(id).value=""; });
        }

        function saveAbs(s) {
            const n = document.getElementById('selK').value, t = document.getElementById('absTgl').value;
            if(!n) return alert("Pilih Karyawan!");
            db.ref(`absensi/${t}/${n}`).set({ s }).then(() => alert("Data Tersimpan!"));
        }

        function renderAll() {
            const kArr = Object.entries(DATA.master_karyawan || {});
            const bArr = Object.entries(DATA.master_barang || {});
            const fM = document.getElementById('fM').value;

            // Render List Hapus
            document.getElementById('listK').innerHTML = kArr.map(([id, n]) => 
                `<div style="background:#e2e8f0; padding:5px 10px; border-radius:20px; font-size:11px">
                    ${n} <b onclick="db.ref('master_karyawan/${id}').remove()" style="color:var(--d)">×</b>
                </div>`).join('');

            // Render Select
            document.getElementById('selK').innerHTML = kArr.map(([id, n]) => `<option value="${n}">${n}</option>`).join('');

            // Render Kalender
            const [y, m] = fM.split('-'), last = new Date(y, m, 0).getDate();
            let th = `<tr><th class="sticky-col">NAMA</th>`;
            for (let i = 1; i <= last; i++) th += `<th>${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;

            let tb = "";
            kArr.forEach(([id, name]) => {
                let row = `<td class="sticky-col"><b>${name}</b></td>`;
                for (let i = 1; i <= last; i++) {
                    const tgl = `${y}-${m}-${String(i).padStart(2, '0')}`;
                    const d = (DATA.absensi && DATA.absensi[tgl]) ? DATA.absensi[tgl][name] : null;
                    const day = new Date(tgl).getDay();
                    
                    let txt = "-", cls = "";
                    if (day === 0) { txt = "M"; cls = "bg-m"; }
                    if (d) { 
                        txt = d.s === 'Hadir' ? 'H' : (d.s === 'Izin' ? 'I' : (d.s === 'Off' ? 'Off' : 'A'));
                        cls = d.s === 'Hadir' ? 'bg-h' : (d.s === 'Izin' ? 'bg-i' : (d.s === 'Off' ? 'bg-off' : 'bg-m'));
                    }
                    row += `<td><div class="badge ${cls}">${txt}</div></td>`;
                }
                tb += `<tr>${row}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
        }

        // FUNGSI EXCEL
        function exportExcel(id, name) {
            const wb = XLSX.utils.table_to_book(document.getElementById(id));
            XLSX.writeFile(wb, `${name}_${document.getElementById('fM').value}.xlsx`);
        }

        // FUNGSI PDF
        function exportPDF(id, title) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text(title, 14, 10);
            doc.autoTable({ html: `#${id}`, startY: 20, theme: 'grid', styles: { fontSize: 7 } });
            doc.save(`${title}.pdf`);
        }
    </script>
</body>
</html>
