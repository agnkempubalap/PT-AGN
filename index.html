<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Absensi Karyawan</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; background: #f4f6f9; padding: 20px; }
    h1 { text-align: center; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn-masuk { background: #4CAF50; color: white; }
    .btn-pulang { background: orange; color: white; }
    .btn-reset { background: red; color: white; }
    .btn-export { background: blue; color: white; }

    .item {
      background: #eef1f5;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 5px;
    }

    .day {
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      background: #ddd;
    }
  </style>
</head>
<body>

<h1>📋 Absensi Karyawan</h1>

<div class="card">
  <select id="nama"></select>

  <button class="btn-masuk" onclick="absenMasuk()">Absen Masuk</button>
  <button class="btn-pulang" onclick="absenPulang()">Absen Pulang</button>
  <button class="btn-reset" onclick="resetHari()">Reset Hari Ini</button>
</div>

<div class="card">
  <h3>📅 Hari Ini</h3>
  <div id="listHari"></div>
</div>

<div class="card">
  <h3>📊 Rekap Bulan Ini</h3>
  <div id="rekap"></div>
  <button class="btn-export" onclick="exportExcel()">Export Excel</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 CONFIG SUDAH DARI PUNYA KAMU
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab",
  measurementId: "G-N6S12LYQLD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== FUNGSI =====
function today(){
  return new Date().toISOString().split("T")[0];
}

function jam(){
  return new Date().toLocaleTimeString("id-ID");
}

// ===== LOAD KARYAWAN =====
async function loadKaryawan(){
  const snap = await getDocs(collection(db,"karyawan"));
  let html = "";
  snap.forEach(doc=>{
    if(doc.data().aktif){
      html += `<option>${doc.data().nama}</option>`;
    }
  });
  document.getElementById("nama").innerHTML = html;
}

// ===== ABSEN MASUK =====
window.absenMasuk = async function(){
  const nama = document.getElementById("nama").value;

  const q = query(collection(db,"absensi"),
    where("nama","==",nama),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  if(!snap.empty){
    alert("Sudah absen!");
    return;
  }

  await addDoc(collection(db,"absensi"),{
    nama,
    tanggal: today(),
    masuk: jam(),
    pulang: "-"
  });

  loadHari();
}

// ===== ABSEN PULANG =====
window.absenPulang = async function(){
  const nama = document.getElementById("nama").value;

  const q = query(collection(db,"absensi"),
    where("nama","==",nama),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  snap.forEach(async doc=>{
    await addDoc(collection(db,"absensi"),{
      nama,
      tanggal: today(),
      masuk: doc.data().masuk,
      pulang: jam()
    });

    await deleteDoc(doc.ref);
  });

  loadHari();
}

// ===== LOAD HARI INI =====
async function loadHari(){
  const q = query(collection(db,"absensi"),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  let html = "";
  snap.forEach(doc=>{
    const d = doc.data();
    html += `
      <div class="item">
        <b>${d.nama}</b><br>
        Masuk: ${d.masuk}<br>
        Pulang: ${d.pulang}
      </div>
    `;
  });

  document.getElementById("listHari").innerHTML = html;
}

// ===== RESET =====
window.resetHari = async function(){
  const q = query(collection(db,"absensi"),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  snap.forEach(async doc=>{
    await deleteDoc(doc.ref);
  });

  alert("Reset berhasil");
  loadHari();
}

// ===== EXPORT =====
window.exportExcel = async function(){
  const snap = await getDocs(collection(db,"absensi"));
  let data = [];

  snap.forEach(doc=>{
    data.push(doc.data());
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Absensi");
  XLSX.writeFile(wb, "absensi.xlsx");
}

// ===== INIT =====
loadKaryawan();
loadHari();

</script>

</body>
</html>
