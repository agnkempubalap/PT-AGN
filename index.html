<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktivitas Karyawan</title>
  <style>
    body { font-family: Arial; background:#e3f2fd; margin:0; padding:10px; }
    .card { background:#fff; padding:15px; border-radius:12px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1);} 
    h3 { margin:0 0 10px; }
    .row { margin-bottom:10px; }
    button { width:100%; padding:12px; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
    .save { background:#4caf50; color:#fff; }
    .reset { background:#f44336; color:#fff; }
    .log { background:#fff; padding:10px; border-radius:10px; margin-top:8px; }
  </style>
</head>
<body><div class="card">
  <h3>Input Aktivitas</h3>  <div id="karyawanList"></div><button class="save" onclick="simpan()">Simpan Aktivitas</button>

</div><div class="card">
  <h3>Data Aktivitas</h3>
  <button class="reset" onclick="resetData()">Reset</button>
  <div id="output"></div>
</div><script>
const karyawan = ["Hatta", "Agung"];
const aktivitasList = [
  "Rekondisi Kempu",
  "Rekondisi 18L",
  "Cuci",
  "Isi",
  "Packing"
];

function renderForm(){
  const container = document.getElementById("karyawanList");
  container.innerHTML = "";

  karyawan.forEach(nama => {
    let html = `<div class="card"><b>${nama}</b><br>`;

    aktivitasList.forEach(act => {
      html += `
        <div class="row">
          <label>
            <input type="checkbox" data-nama="${nama}" value="${act}"> ${act}
          </label>
        </div>`;
    });

    html += `</div>`;
    container.innerHTML += html;
  });
}

function simpan(){
  const checkboxes = document.querySelectorAll("input[type=checkbox]:checked");
  let data = [];

  checkboxes.forEach(cb => {
    data.push({
      nama: cb.dataset.nama,
      aktivitas: cb.value,
      waktu: new Date().toLocaleString()
    });
  });

  let lama = JSON.parse(localStorage.getItem("aktivitas") || "[]");
  let gabung = lama.concat(data);

  localStorage.setItem("aktivitas", JSON.stringify(gabung));

  tampilkan();
  document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
}

function tampilkan(){
  const output = document.getElementById("output");
  const data = JSON.parse(localStorage.getItem("aktivitas") || "[]");

  output.innerHTML = "";

  data.reverse().forEach(item => {
    output.innerHTML += `
      <div class="log">
        ${item.nama} - ${item.aktivitas}<br>
        ${item.waktu}
      </div>
    `;
  });
}

function resetData(){
  localStorage.removeItem("aktivitas");
  tampilkan();
}

renderForm();
tampilkan();
</script></body>
</html>
