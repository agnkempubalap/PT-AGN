<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V961-PRO (STABLE)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; flex: 1; min-width: 100px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; vertical-align: bottom; }
        th { background: #f8fafc; color: #64748b; position: relative; padding-top: 20px; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; border-right: 2px solid #eee; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; font-size: 10px; position: relative; cursor: pointer; }
        .dot { position: absolute; top: 1px; right: 1px; width: 4px; height: 4px; background: white; border-radius: 50%; }
        .bg-h, .bg-l, .bg-hadir, .bg-lembur { background: var(--s); } 
        .bg-i, .bg-izin { background: var(--w); } 
        .bg-a, .bg-alpa { background: var(--d); } 
        .bg-m, .bg-off { background: #64748b; } 
        .bg-t, .bg-telat { background: #f97316; } 
        .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 15px; max-height: 85vh; overflow-y: auto; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div></div>

    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>

    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master Karyawan</h3>
                <div class="flex-row">
                    <input type="text" id="inK" placeholder="Nama Karyawan Baru...">
                    <button class="btn" style="background:var(--p); max-width:80px" onclick="addItem('master_karyawan', 'inK')">ADD</button>
                </div>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absensi <input type="date" id="absTgl" style="width:115px; height:30px"></h3>
                <div class="flex-row">
                    <select id="selK"></select>
                    <select id="absJenis">
                        <option value="Hadir">Masuk</option>
                        <option value="Pulang">Pulang</option>
                        <option value="Izin">Izin</option>
                        <option value="Alpa">Alpa</option>
                    </select>
                </div>
                <input type="text" id="absKet" placeholder="Keterangan (Opsional)" style="margin-bottom:10px">
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" style="width:110px; height:30px"></h3>
                <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <div class="flex-row">
                    <button class="btn" style="background:var(--w); color:black" onclick="openLiburMod()">⚙️ SET LIBUR</button>
                    <button class="btn" style="background:var(--s)" onclick="expEx('areaAbsen','Absen')">EXCEL</button>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content">
            <div class="card">
                <h3>📦 Master Barang</h3>
                <div class="flex-row">
                    <input type="text" id="inB" placeholder="Nama Barang Baru...">
                    <button class="btn" style="background:var(--p); max-width:80px" onclick="addItem('master_barang', 'inB')">ADD</button>
                </div>
                <div id="listB" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px"></div>
            </div>
            <div class="card">
                <h3>📥 Logistik & Penjualan</h3>
                <div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div>
                <div class="flex-row"><input type="number" id="stQty" placeholder="Jumlah"><select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Rdy</option></select></div>
                <div class="flex-row">
                    <select id="stQC"><option value="Accepted">Accepted</option><option value="Reject">Reject</option></select>
                    <select id="stAksi">
                        <option value="Masuk">Masuk</option>
                        <option value="Rekondisi">Rekon</option>
                        <option value="Jual Mitra">Jual Mitra</option>
                        <option value="Jual Umum">Jual Umum</option>
                    </select>
                </div>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">PROSES STOK & CAIRKAN UPAH</button>
            </div>
            <div class="table-area" id="areaStok">
                <table>
                    <thead>
                        <tr><th class="sticky-col">BRG</th><th>AWAL KTR</th><th>AWAL RDY</th><th>IN KTR</th><th>IN RDY</th><th style="color:var(--d)">REJ</th><th>REKON</th><th>MITRA</th><th>UMUM</th><th style="background:#fef3c7">STOK KTR</th><th style="background:#dcfce7">STOK RDY</th><th style="background:var(--p); color:white">TOTAL</th></tr>
                    </thead>
                    <tbody id="tbStok"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content">
            <div class="card">
                <h3>🛠️ Input Borongan</h3>
                <div class="flex-row">
                    <input type="date" id="akTgl" onchange="renderCheckKaryawan()">
                    <select id="akJenis">
                        <option value="Rekondisi Kempu">Rekon Kempu</option>
                        <option value="Rekondisi jerigen 18L">Rekon 18L</option>
                        <option value="Rekondisi jerigen 5L">Rekon 5L</option>
                        <option value="muat barang">Muat</option>
                        <option value="bongkar barang">Bongkar</option>
                        <option value="kirim minyak">Kirim Minyak</option>
                        <option value="pasang pangkalan">Pasang Pangkalan</option>
                        <option value="pasang agen">Pasang Agen</option>
                    </select>
                </div>
                <div id="akKaryawan" class="check-grid"></div>
                <input type="number" id="akQty" placeholder="Jumlah Output" style="margin-bottom:10px">
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
            <div class="flex-row">
                <button class="btn" style="background:#64748b" onclick="showLogs('aktivitas')">LOG KERJA</button>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3>💰 Ringkasan Keuangan <input type="month" id="fUang" style="width:110px; height:30px; color:black"></h3>
                <div class="flex-row"><div>TOTAL GAJI CAIR: <b id="gTotal">0</b></div></div>
            </div>
            <div id="areaGaji" class="table-area"></div>
        </div>
    </div>

    <script>
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); const db = firebase.database();
        let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000, "pasang pangkalan":500000, "pasang agen":700000 };

        window.onload = () => {
            const t = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl','blTgl'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = t });
            ['fM','fUang'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = t.slice(0, 7) });
            db.ref('/').on('value', s => { D = s.val() || {}; initUI(); autoRender(); });
        };

        function autoRender() { renderAll(); renderStok(); renderGaji(); renderCheckKaryawan(); }
        
        function tab(id) { 
            document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); 
            if(document.getElementById('tab-'+id)) document.getElementById('tab-'+id).classList.add('active'); 
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active'); 
            autoRender(); 
        }

        function initUI() {
            const K = Object.entries(D.master_karyawan || {}), B = Object.entries(D.master_barang || {});
            // Master List Karyawan
            document.getElementById('listK').innerHTML = K.map(k=>`<span style="background:#fff; border:1px solid #ddd; padding:5px; border-radius:5px; font-size:10px">${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red;cursor:pointer">×</b></span>`).join('');
            // Master List Barang
            document.getElementById('listB').innerHTML = B.map(b=>`<span style="background:#fff; border:1px solid #ddd; padding:5px; border-radius:5px; font-size:10px">${b[1]} <b onclick="removeItem('master_barang','${b[0]}')" style="color:red;cursor:pointer">×</b></span>`).join('');
            // Dropdowns - Menggunakan ID (k[0]) sebagai value agar data konsisten
            document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k[0]}">${k[1]}</option>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b[1]}">${b[1]}</option>`).join('');
        }

        function saveAbs() {
            const kID = document.getElementById('selK').value, t = document.getElementById('absTgl').value, j = document.getElementById('absJenis').value;
            const jamStr = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}).replace('.',':');
            const ref = db.ref(`absensi/${t}/${kID}`);
            if(j==="Pulang") ref.update({ jamOut: jamStr }).then(()=>alert("Pulang!")); 
            else {
                let stat = (j==="Izin"||j==="Alpa") ? j : (new Date(t).getDay()===0||D.libur?.[t]?"Lembur":(new Date()>new Date(t+"T09:30:00")?"Telat":"Hadir"));
                ref.set({ j: stat, jam: jamStr, ket: document.getElementById('absKet').value||"" }).then(()=>alert(stat + "!"));
            }
        }

        function renderAll() {
            const fM = document.getElementById('fM').value; if(!fM || !D.master_karyawan) return;
            const K_arr = Object.entries(D.master_karyawan), Y=fM.split('-')[0], M=fM.split('-')[1], lastD = new Date(Y, M, 0).getDate();
            let th = `<tr><th class="sticky-col">NAMA</th>`; for(let i=1; i<=lastD; i++) th += `<th>${i}</th>`; th += `<th>H/T</th><th>L</th></tr>`; document.getElementById('thA').innerHTML = th;
            let tb = ""; K_arr.forEach(k => {
                let r = `<td class="sticky-col">${k[1]}</td>`, tH=0, tL=0;
                for(let i=1; i<=lastD; i++) {
                    let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k[0]], isL = D.libur?.[d]||new Date(d).getDay()===0;
                    let txt=isL?"M":"-", cls=isL?"bg-m":"bg-none";
                    if(a) { txt=a.j[0]; cls="bg-"+a.j.toLowerCase(); if(a.j==="Hadir"||a.j==="Telat") tH++; else if(a.j==="Lembur") tL++; }
                    r += `<td><div class="badge ${cls}" onclick="cellMod('${d}','${k[0]}')">${txt}${a?.jamOut?'<div class="dot"></div>':''}</div></td>`;
                }
                tb += `<tr>${r}<td>${tH}</td><td>${tL}</td></tr>`;
            }); document.getElementById('tbA').innerHTML = tb;
        }

        function renderCheckKaryawan() {
            const tgl = document.getElementById('akTgl').value;
            const K = Object.entries(D.master_karyawan || {});
            document.getElementById('akKaryawan').innerHTML = K.map(k => {
                const a = D.absensi?.[tgl]?.[k[0]];
                const sudahAbsen = a && ['Hadir', 'Telat', 'Lembur'].includes(a.j);
                return `<label class="check-item" style="${sudahAbsen?'':'opacity:0.3; background:#eee'}">
                    <input type="checkbox" class="chk-k" value="${k[0]}" ${sudahAbsen?'':'disabled'}> 
                    <span>${k[1]} ${sudahAbsen?'':'(X)'}</span>
                </label>`;
            }).join('');
        }

        function saveAk() {
            const tgl=document.getElementById('akTgl').value, q=parseInt(document.getElementById('akQty').value)||0, p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value), j=document.getElementById('akJenis').value;
            if(!p.length || q<=0) return alert("Pilih Karyawan & Isi Qty!");
            db.ref('aktivitas').push({ t:tgl, j, q, p, isCair: !j.toLowerCase().includes("jerigen") }).then(()=>{
                document.getElementById('akQty').value=""; alert("Kerja Tersimpan!");
            });
        }

        function renderStok() {
            const B_arr = Object.values(D.master_barang || {}), fM = document.getElementById('fM').value; let h = "";
            B_arr.forEach(b => {
                let s = { ak:0, ab:0, ik:0, ib:0, rej:0, rk:0, jm:0, ju:0 };
                Object.values(D.stok_logs || {}).forEach(l => {
                    if(l.b!==b) return; 
                    if(l.t?.slice(0,7)<fM) { 
                        if(l.ak==="Masuk") l.kon==="Bekas"?s.ak+=l.q:s.ab+=l.q; 
                        else if(l.ak==="Rekondisi"){s.ak-=l.q;s.ab+=l.q;} 
                        else if(l.ak.includes("Jual")) s.ab-=l.q; 
                    } else if(l.t?.slice(0,7)===fM) { 
                        if(l.ak==="Masuk") l.kon==="Bekas"?s.ik+=l.q:s.ib+=l.q; 
                        else if(l.ak==="Rekondisi") s.rk+=l.q; 
                        else if(l.ak==="Jual Mitra") s.jm+=l.q; 
                        else if(l.ak==="Jual Umum") s.ju+=l.q; 
                        if(l.qc==="Reject") s.rej+=l.q; 
                    }
                });
                let ktr = (s.ak+s.ik)-s.rk, rdy = (s.ab+s.ib+s.rk)-(s.jm+s.ju);
                h += `<tr><td class="sticky-col">${b}</td><td>${s.ak}</td><td>${s.ab}</td><td>${s.ik}</td><td>${s.ib}</td><td>${s.rej}</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td>${ktr}</td><td>${rdy}</td><td style="background:var(--p); color:white">${ktr+rdy}</td></tr>`;
            }); document.getElementById('tbStok').innerHTML = h;
        }

        function renderGaji() {
            const fM = document.getElementById('fUang').value, T = D.tarif||DEF_TARIF, K = Object.entries(D.master_karyawan||{});
            let tG=0; let h = `<table><tr><th class="sticky-col">NAMA</th><th>BORONG CAIR</th><th>BONUS</th><th>KASBON</th><th>NETT</th></tr>`;
            K.forEach(k => {
                let brCair=0, bo=0, ka=0;
                Object.values(D.aktivitas||{}).forEach(a => {
                    if(a.t?.slice(0,7)===fM && a.p?.includes(k[0]) && a.isCair) brCair += (T[a.j]||0)*a.q/(a.j.includes("pasang")?1:a.p.length);
                });
                Object.values(D.kasbon_bonus||{}).forEach(kb => { if(kb.n===k[0] && kb.t===fM) kb.tipe==="Bonus"?bo+=kb.rp:ka+=kb.rp; });
                let nett = (brCair+bo)-ka; tG+=nett;
                h += `<tr><td class="sticky-col">${k[1]}</td><td>${Math.round(brCair).toLocaleString()}</td><td>${bo.toLocaleString()}</td><td>${ka.toLocaleString()}</td><td><b>Rp ${Math.round(nett).toLocaleString()}</b></td></tr>`;
            });
            document.getElementById('gTotal').innerText = "Rp "+Math.round(tG).toLocaleString(); document.getElementById('areaGaji').innerHTML = h+"</table>";
        }

        function saveSt() {
            const t=document.getElementById('stTgl').value, b=document.getElementById('stBrg').value, q=parseInt(document.getElementById('stQty').value), ak=document.getElementById('stAksi').value;
            if(!q) return alert("Qty Kosong!");
            db.ref('stok_logs').push({ t, b, q, kon:document.getElementById('stKon').value, qc:document.getElementById('stQC').value, ak:ak }).then(() => { alert("Berhasil!"); });
        }

        function addItem(p,id) { const v=document.getElementById(id).value; if(v) db.ref(p).push(v).then(()=>document.getElementById(id).value=""); }
        function removeItem(p,k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove(); }
        function cellMod(d,kID) { let a=D.absensi?.[d]?.[kID]; openMod(`Detail`, `<p>Status: ${a?.j||'-'}</p><button class='btn' style='background:red' onclick="removeItem('absensi/${d}','${kID}')">HAPUS</button>`); }
        function openMod(t,h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
        function closeMod() { document.getElementById('modalUni').style.display='none'; }
        function expEx(id,n) { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(id)), n+'.xlsx'); }
        function showLogs(t) { let l=Object.entries(D[t]||{}).reverse().slice(0,20); openMod("Log", l.map(x=>`<div style="font-size:10px;padding:5px;border-bottom:1px solid #eee"><span>[${x[1].t}] ${x[1].j} (${x[1].q})</span> <b onclick="removeItem('${t}','${x[0]}')" style="color:red; cursor:pointer">×</b></div>`).join('')); }
    </script>
</body>
</html>
