<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN ERP V111</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf-autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#22c55e;--d:#ef4444;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155}
        *{box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif;} 
        body{margin:0; background:var(--bg); color:var(--t); padding:10px; font-size:11px; overflow-x: hidden;}
        
        /* Layout Responsif */
        .container { max-width: 100%; margin: 0 auto; }
        .nav-grid { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch;}
        .nav-btn { flex: 1; min-width: 80px; padding: 10px 5px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 9px; white-space: nowrap;}
        .nav-btn.active { background: var(--p); border-color: var(--p); box-shadow: 0 0 10px rgba(59,130,246,0.3); }

        .card{background:var(--c); padding:12px; border-radius:12px; margin-bottom:10px; border:1px solid var(--b);}
        h3{margin:0 0 10px; font-size:10px; color:var(--p); text-transform:uppercase; font-weight:800; display:flex; justify-content:space-between;}
        
        .form-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        input, button, select, textarea { height: 38px; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; font-size: 11px; outline: none; transition: 0.2s;}
        input:focus{border-color:var(--p)}
        .btn-full{width:100%; font-weight:800; cursor:pointer;}

        /* Tabel Ultra-Compact & Sticky */
        .table-container { position: relative; overflow: auto; border-radius: 8px; border: 1px solid var(--b); background: var(--bg); max-height: 500px; }
        .table-web { width: 100%; border-collapse: separate; border-spacing: 0; }
        .table-web th, .table-web td { border: 0.5px solid var(--b); text-align: center; height: 40px; }
        .table-web th { background: var(--b); position: sticky; top: 0; z-index: 30; font-size: 9px; }

        /* Kunci Kolom Nama */
        .nama-fixed { 
            position: sticky; left: 0; background: #1e293b !important; z-index: 40; 
            width: 90px !important; min-width: 90px; text-align: left !important; padding-left: 8px !important;
            border-right: 2px solid var(--p) !important; font-weight: 800;
        }
        
        /* Lebar Kolom Tanggal */
        .tgl-col { min-width: 32px; width: 32px; font-size: 9px; }
        .s-box { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 800; font-size: 9px; color: #fff; }
        
        /* Indikator Warna */
        .s-h{background:var(--s)} .s-i{background:#8b5cf6} .s-a{background:var(--d)} .s-m{background:#f43f5e} .s-off{background:#64748b} .s-t{background:#ec4899} .s-l{background:#d946ef}
        .box-icon { font-size: 8px; margin-top: 1px; }

        /* Toast Notifikasi */
        #toast { visibility: hidden; min-width: 200px; background-color: var(--p); color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 800;}
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="toast">Berhasil!</div>
    <div class="container">
        <div class="form-row" style="justify-content: space-between; padding: 0 5px; margin-bottom: 10px;">
            <div style="font-weight: 800;">💰 GAJI: <span id="dashGaji" style="color:var(--s)">0</span></div>
            <div style="font-weight: 800;">🛒 NOTA: <span id="dashBelanja" style="color:var(--d)">0</span></div>
        </div>

        <nav class="nav-grid">
            <button class="nav-btn active" onclick="tab('absen', this)">ABSEN</button>
            <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
            <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
            <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
        </nav>

        <div id="tab-absen" class="tab-content">
            <div class="card">
                <h3>INPUT ABSENSI</h3>
                <div class="form-row">
                    <select id="selK" style="flex:2"></select>
                    <input type="date" id="tglAbs" style="flex:1">
                </div>
                <div class="form-row">
                    <button style="background:var(--s);flex:1" onclick="abs('Masuk')">MASUK</button>
                    <button style="background:var(--iz);flex:1" onclick="abs('Ijin')">IJIN</button>
                    <button style="background:var(--al);flex:1" onclick="abs('Pulang')">PULANG</button>
                    <button style="background:var(--d);flex:0.4" onclick="resAbs()" title="Reset">🗑️</button>
                </div>
                <div class="form-row hidden" id="rowIjin">
                    <input type="text" id="noteIjin" placeholder="Keterangan Ijin..." style="width:100%">
                </div>
            </div>
            
            <div class="card" style="padding: 5px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin: 5px;">
                    <h3>REKAP KALENDER</h3>
                    <input type="month" id="fM" onchange="renderAll()" style="height:30px">
                </div>
                <div class="table-container" id="scrollContainer">
                    <table class="table-web">
                        <thead id="thA"></thead>
                        <tbody id="tbA"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="card">
                <h3>TRANSAKSI BARANG</h3>
                <div class="form-row">
                    <input type="date" id="stT" style="flex:1">
                    <select id="slB" style="flex:1.5"></select>
                    <input type="number" id="stQ" style="flex:0.5" placeholder="Qty">
                </div>
                <div class="form-row">
                    <select id="stA" style="flex:1" onchange="tQC(this.value)">
                        <option value="Masuk">Stok Masuk (Bongkar)</option>
                        <option value="Rekondisi">Proses Rekondisi</option>
                        <option value="Jual Mitra">Jual Agen (Muat)</option>
                        <option value="Jual Umum">Jual Umum</option>
                    </select>
                </div>
                <div class="form-row" id="qcDetail">
                    <select id="qcJ" style="flex:1"><option value="Bekas">BEKAS</option><option value="Baru">BARU</option></select>
                    <select id="qcH" style="flex:1"><option value="Accepted">Accepted</option><option value="Minor">Minor Damage</option><option value="Reject">Reject</option></select>
                </div>
                <div class="form-row">
                    <input list="lk" id="wkSt" style="flex:1" placeholder="Siapa yang kerja? (Nama1, Nama2...)">
                </div>
                <button class="btn-full" style="background:var(--p)" onclick="saveStokFull()">SIMPAN & UPDATE GAJI</button>
            </div>
            
            <div class="card">
                <h3>TABEL REKAP FLOW BULANAN</h3>
                <div class="table-container">
                    <table class="table-web" style="min-width: 800px;">
                        <thead>
                            <tr>
                                <th class="nama-fixed">BARANG</th>
                                <th>AW KTR</th><th>AW BRU</th><th>IN KTR</th><th>IN BRU</th><th>REKO</th><th>REJECT</th><th>SISA KTR</th><th>UMUM</th><th>AGEN</th><th>READY</th><th>TOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content hidden">
            <div class="card">
                <h3>BELANJA HARIAN (NOTA)</h3>
                <div class="form-row">
                    <input type="date" id="bT" style="flex:1">
                    <input type="text" id="bN" placeholder="Nama Barang..." style="flex:2">
                </div>
                <div class="form-row">
                    <input type="number" id="bH" placeholder="Rp Total" style="flex:1">
                    <input type="file" id="bF" accept="image/*" capture="camera" style="flex:1.5">
                </div>
                <button class="btn-full" style="background:var(--s)" onclick="saveBelanja()">SIMPAN NOTA</button>
            </div>
            <div class="table-container">
                <table class="table-web">
                    <thead><tr><th>Tgl</th><th>Barang</th><th>Harga</th><th>Foto</th><th>Hapus</th></tr></thead>
                    <tbody id="tbLogB"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-gaji" class="tab-content hidden">
            <div class="card">
                <h3>SLIP GAJI & BORONGAN</h3>
                <div class="form-row">
                    <select id="selSlip" style="flex:2"></select>
                    <button style="background:var(--p)" onclick="genSlip()">CETAK PDF</button>
                </div>
                <div class="table-container">
                    <table class="table-web">
                        <thead><tr><th class="nama-fixed">NAMA</th><th>TOTAL GAJI</th><th>RINCIAN</th></tr></thead>
                        <tbody id="tbG"></tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h3>PENGATURAN HARGA BORONGAN</h3>
                <div id="tbPr"></div>
            </div>
        </div>
    </div>
    <datalist id="lk"></datalist>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let mk={}, ad={}, hl={}, brg={}, sl={}, la={}, pr={}, bel={};

        const defPr = { 
            "Rekondisi Kempu": 100000, "Rekondisi Jerigen 18L": 2000, "Rekondisi Jerigen 5L": 2000,
            "Pasang Pangkalan": 500000, "Muat Barang": 600000, "Bongkar Barang": 600000,
            "Kirim Jauh": 250000, "Kirim Dekat": 100000 
        };

        window.onload=()=>{
            const t=new Date().toISOString().split('T')[0];
            document.getElementById('fM').value=t.slice(0,7);
            ['tglAbs','stT','bT'].forEach(id=>document.getElementById(id).value=t);

            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uL(); renderAll();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; renderAll();});
            db.ref('stok_log').on('value',s=>{sl=s.val()||{}; renderAll();});
            db.ref('log_aktivitas').on('value',s=>{la=s.val()||{}; renderAll();});
            db.ref('belanja').on('value',s=>{bel=s.val()||{}; renderAll();});
            db.ref('prices').on('value',s=>{pr=s.val()||{}; if(!Object.keys(pr).length) db.ref('prices').set(defPr); rPr();});
            
            // Auto Alpa Logic (Check every hour)
            setInterval(checkAutoAlpa, 3600000); checkAutoAlpa();
        };

        function showToast(m){ const x=document.getElementById("toast"); x.innerHTML=m; x.className="show"; setTimeout(()=>{x.className=x.className.replace("show","")},3000); }
        function tab(t, b){ document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active')); b.classList.add('active'); }
        function clearInput(ids){ ids.forEach(id=>document.getElementById(id).value=""); }

        // --- CORE LOGIC: GAJI & STOK ---
        function saveStokFull(){
            const t=document.getElementById('stT').value, b=document.getElementById('slB').value, q=parseInt(document.getElementById('stQ').value), a=document.getElementById('stA').value, wk=document.getElementById('wkSt').value;
            if(!t||!b||!q||!wk) return showToast("⚠️ Isi Nama Barang, Qty, dan Tim!");

            const tim = wk.split(',').map(x=>x.trim());
            const nTim = tim.length;

            // 1. Simpan Stok
            let ds = {tgl:t, barang:b, aksi:a, qty:q};
            if(a==='Masuk'){ ds.jenis=document.getElementById('qcJ').value; ds.hasil=document.getElementById('qcH').value; }
            db.ref('stok_log').push(ds);

            // 2. Kalkulasi Gaji Borongan (Logika Point D.1)
            let actKey = ""; let upah = 0; let icon = "🛠️";
            if(a==='Masuk' && ds.jenis==='Bekas'){ actKey = "Bongkar Barang"; icon="📦+"; upah = (pr[actKey] * (q/50)) / nTim; }
            else if(a==='Jual Mitra'){ actKey = "Muat Barang"; icon="📦-"; upah = (pr[actKey] * (q/25)) / nTim; }
            else if(a==='Rekondisi'){ actKey = "Rekondisi " + (b.includes('Kempu')?'Kempu':b); icon="⚙️"; upah = pr[actKey] / nTim; }

            if(actKey){
                tim.forEach(p=>{
                    db.ref('log_aktivitas').push({tgl:t, nama:p, act:actKey, qty:q, gaji:upah, icon:icon});
                });
            }
            showToast("✅ Berhasil Disimpan!");
            clearInput(['stQ','wkSt']);
        }

        // --- KALENDER & ABSENSI ---
        function rA(){
            const f=document.getElementById('fM').value, [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), kL=Object.values(mk).sort();
            const curTgl=new Date().toISOString().split('T')[0];
            
            let uAct={}; Object.values(la).forEach(l=>{ if(l.tgl.startsWith(f)){ if(!uAct[l.tgl])uAct[l.tgl]={}; if(!uAct[l.tgl][l.nama])uAct[l.tgl][l.nama]=[]; uAct[l.tgl][l.nama].push(l.icon); }});

            let h=`<tr><th class="nama-fixed">NAMA</th>`;
            for(let i=1;i<=last;i++) h+=`<th class="tgl-col">${i}</th>`;
            h+=`<th>H</th><th>I</th><th>A</th><th>L</th></tr>`;
            document.getElementById('thA').innerHTML=h;

            let b=""; kL.forEach(n=>{
                let c={H:0,I:0,A:0,L:0}, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let tg=`${y}-${m}-${String(i).padStart(2,'0')}`, dt=new Date(tg), isM=dt.getDay()===0, da=ad[tg]?ad[tg][n]:null;
                    let sW="-", cl="", icons=uAct[tg]&&uAct[tg][n]?uAct[tg][n].join(''):'';
                    
                    if(isM){sW="M"; cl="s-m";}
                    if(da){
                        if(da.status==='Ijin'){sW="I"; cl="s-i"; c.I++;}
                        else if(da.status==='Lembur'||isM){sW="L"; cl="s-l"; c.L++;}
                        else{sW=(da.masuk > "09:00")?"T":"H"; cl=(sW==="T"?"s-t":"s-h"); c.H++;}
                    } else if(tg<curTgl && !isM) {sW="A"; cl="s-a"; c.A++;}
                    
                    row+=`<td><div class="s-box ${cl}">${sW}<div class="box-icon">${icons}</div></div></td>`;
                }
                b+=`<tr>${row}<td>${c.H}</td><td>${c.I}</td><td>${c.A}</td><td>${c.L}</td></tr>`;
            });
            document.getElementById('tbA').innerHTML=b;
            // Auto Scroll ke Tanggal Hari ini
            const day = new Date().getDate();
            document.getElementById('scrollContainer').scrollLeft = (day > 5) ? (day * 20) : 0;
        }

        function checkAutoAlpa(){
            const now = new Date(), h = now.getHours(), t = now.toISOString().split('T')[0];
            if(h >= 16){
                Object.values(mk).forEach(n=>{
                    if(!ad[t] || !ad[t][n]) db.ref(`absensi/${t}/${n}`).update({status:'Alpa'});
                });
            }
        }

        // --- TAB STOK FLOW ---
        function rS(){
            const fM=document.getElementById('fM').value, bL=Object.values(brg).sort(); let h="";
            bL.forEach(bn=>{
                let r={ak:0, ab:0, ik:0, ib:0, re:0, rj:0, ju:0, jm:0};
                Object.values(sl).forEach(d=>{
                    let m=d.tgl.slice(0,7); if(d.barang!==bn) return;
                    if(m < fM){ // Sisa otomatis jadi Awal (B.11)
                        if(d.aksi==='Masuk'&&d.hasil!=='Reject'){ if(d.jenis==='Bekas') r.ak+=d.qty; else r.ab+=d.qty; }
                        else if(d.aksi==='Rekondisi'){ r.ak-=d.qty; r.ab+=d.qty; }
                        else if(d.aksi.startsWith('Jual')) r.ab-=d.qty;
                    } else if(m === fM){
                        if(d.aksi==='Masuk'){ if(d.hasil==='Reject') r.rj+=d.qty; else if(d.jenis==='Bekas') r.ik+=d.qty; else r.ib+=d.qty; }
                        else if(d.aksi==='Rekondisi') r.re+=d.qty;
                        else if(d.aksi==='Jual Umum') r.ju+=d.qty;
                        else if(d.aksi==='Jual Mitra') r.jm+=d.qty;
                    }
                });
                let sk=r.ak+r.ik-r.re; let sr=r.ab+r.ib+r.re-r.ju-r.jm;
                h+=`<tr><td class="nama-fixed">${bn}</td><td>${r.ak}</td><td>${r.ab}</td><td>${r.ik}</td><td>${r.ib}</td><td>${r.re}</td><td>${r.rj}</td><td>${sk}</td><td>${r.ju}</td><td>${r.jm}</td><td>${sr}</td><td>${sk+sr}</td></tr>`;
            }); document.getElementById('tbS').innerHTML=h;
        }

        // --- UTILS ---
        function abs(s){ let n=document.getElementById('selK').value, t=document.getElementById('tglAbs').value; if(!n) return showToast("Pilih Nama!"); db.ref(`absensi/${t}/${n}`).update({status:s, masuk:new Date().toLocaleTimeString('id-ID',{hour12:false,hour:'2-digit',minute:'2-digit'})}); showToast("Absen OK"); }
        function resAbs(){ let n=document.getElementById('selK').value, t=document.getElementById('tglAbs').value; if(n&&t) db.ref(`absensi/${t}/${n}`).remove(); showToast("Data Direset"); }
        function uL(){ let o=Object.values(mk).sort().map(n=>`<option value="${n}">${n}</option>`).join(''); document.getElementById('selK').innerHTML=o; document.getElementById('selSlip').innerHTML=o; document.getElementById('lk').innerHTML=Object.values(mk).map(n=>`<option value="${n}">`).join(''); }
        function uB(){ document.getElementById('slB').innerHTML=Object.values(brg).sort().map(v=>`<option value="${v}">${v}</option>`).join(''); if(!Object.keys(brg).length) ['Kempu','Jerigen 18L','Jerigen 5L'].forEach(x=>db.ref('master_barang').push(x)); }
        function tQC(v){ document.getElementById('qcDetail').className=(v==='Masuk'?'form-row':'hidden'); }
        function rPr(){ let h=""; Object.keys(pr).forEach(k=>{ h+=`<div class="form-row"><span>${k}</span><input type="number" id="p-${k.replace(/ /g,'_')}" value="${pr[k]}" style="width:100px"><button onclick="db.ref('prices/${k}').set(parseInt(document.getElementById('p-${k.replace(/ /g,'_')}').value)); showToast('Harga Update')">OK</button></div>`; }); document.getElementById('tbPr').innerHTML=h; }
        function renderAll(){ rA(); rS(); rG(); rBel(); calcDash(); uB(); }
        function calcDash(){ let g=0, b=0, f=document.getElementById('fM').value; Object.values(la).forEach(l=>{if(l.tgl.startsWith(f)) g+=l.gaji}); Object.values(bel).forEach(x=>{if(x.tgl.startsWith(f)) b+=x.harga}); document.getElementById('dashGaji').innerText="Rp "+Math.round(g).toLocaleString(); document.getElementById('dashBelanja').innerText="Rp "+b.toLocaleString(); }
        function saveBelanja(){ const t=document.getElementById('bT').value, n=document.getElementById('bN').value, h=parseInt(document.getElementById('bH').value), f=document.getElementById('bF').files[0]; if(!t||!n||!h) return; if(f){ const r=new FileReader(); r.onload=(e)=>{db.ref('belanja').push({tgl:t, item:n, harga:h, img:e.target.result}); showToast("Nota Disimpan")}; r.readAsDataURL(f); } else { db.ref('belanja').push({tgl:t, item:n, harga:h}); showToast("Nota Disimpan"); } clearInput(['bN','bH','bF']); }
        function rBel(){ let h=""; Object.keys(bel).reverse().forEach(k=>{ let d=bel[k]; h+=`<tr><td>${d.tgl}</td><td>${d.item}</td><td>${d.harga}</td><td>${d.img?'<img src="'+d.img+'" width="30">':'-'}</td><td><button onclick="db.ref('belanja/'+k).remove()">X</button></td></tr>` }); document.getElementById('tbLogB').innerHTML=h; }
        function rG(){ let h=""; Object.values(mk).sort().forEach(n=>{ let t=0; Object.values(la).forEach(l=>{if(l.nama===n && l.tgl.startsWith(document.getElementById('fM').value)) t+=l.gaji}); h+=`<tr><td class="nama-fixed">${n}</td><td>Rp ${Math.round(t).toLocaleString()}</td><td><button onclick="showToast('Rincian via PDF')">Detail</button></td></tr>` }); document.getElementById('tbG').innerHTML=h; }
    </script>
</body>
</html>
