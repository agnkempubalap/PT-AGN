<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN Management v12.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2, h3 { margin-top: 0; color: #0056b3; border-bottom: 2px solid #eee; padding-bottom: 8px; font-size: 1.1rem; }
        label { font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; color: #666; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.96); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-masuk { background: #28a745; }
        .btn-pulang { background: #dc3545; }
        .btn-izin { background: #ffc107; color: black; }
        .btn-tambah { background: #6f42c1; margin: 0; width: auto; }
        
        .table-container { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 1000px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: #f8f9fa; }
        
        .status-hadir { background: #d4edda; color: #155724; font-weight: bold; }
        .status-terlambat { background: #fff3cd; color: #856404; font-weight: bold; }
        .status-izin { background: #d1ecf1; color: #0c5460; font-weight: bold; }
        .status-alpa { background: #f8d7da; color: #721c24; font-weight: bold; }
        .status-minggu { background: #ffebf0; color: #d00000; font-weight: bold; }
        .status-libur { background: #e9ecef; color: #6c757d; font-weight: normal; }
        
        .nama-kolom { background: #f8f9fa; font-weight: bold; position: sticky; left: 0; z-index: 2; text-align: left; padding-left: 10px; width: 130px; }
        .manage-row { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        #notif { text-align: center; font-weight: bold; margin-top: 5px; min-height: 20px; }
    </style>
</head>
<body>

    <h2>📦 PT-AGN System v12.0</h2>

    <!-- PANEL 1: ABSENSI -->
    <div class="card">
        <h3>1. Presensi & Kelola Karyawan</h3>
        <div class="manage-row">
            <input type="text" id="inputNamaBaru" placeholder="Ketik Nama Baru..." style="margin:0; flex-grow:1;">
            <button class="btn-tambah" onclick="tambahKaryawan()">Tambah</button>
        </div>

        <label>Pilih Nama Karyawan:</label>
        <div style="display: flex; gap: 8px;">
            <select id="pilihKaryawan" style="margin:0; flex-grow:1;"><option value="">-- Memuat... --</option></select>
            <button onclick="hapusKaryawan()" style="background:#ff4d4d; width:auto; margin:0; padding:0 15px;">Hapus</button>
        </div>
        
        <div class="grid" style="margin-top:10px;">
            <button class="btn-masuk" onclick="prosesAbsen('Masuk')">MASUK</button>
            <button class="btn-pulang" onclick="prosesAbsen('Pulang')">PULANG</button>
        </div>
        <button class="btn-izin" onclick="prosesAbsen('Izin')">INPUT IZIN / SAKIT</button>
        <div id="notif"></div>
    </div>

    <!-- PANEL 2: RENTANG LIBUR -->
    <div class="card">
        <h3>2. Kelola Libur Panjang (Rentang Tanggal)</h3>
        <div class="grid">
            <div>
                <label>Dari Tanggal:</label>
                <input type="date" id="tglMulaiLibur">
            </div>
            <div>
                <label>Sampai Tanggal:</label>
                <input type="date" id="tglSelesaiLibur">
            </div>
        </div>
        <button class="btn-tambah" onclick="setRentangLibur()" style="background:#6c757d; width: 100%;">Terapkan Libur Panjang</button>
        <p style="font-size: 11px; color: #888; margin-top: 5px;">*Gunakan ini untuk libur Lebaran, Natal, atau cuti bersama.</p>
    </div>

    <!-- PANEL 3: REKAP -->
    <div class="card">
        <h3>3. Laporan Bulanan Realtime</h3>
        <input type="month" id="filterBulan">
        <button onclick="renderRekap()">Tampilkan Rekap</button>
        <div class="table-container">
            <table id="tabelRekap">
                <thead><tr id="theadRekap"></tr></thead>
                <tbody id="tbodyRekap"></tbody>
            </table>
        </div>
        <button onclick="window.print()" style="background:#333; margin-top:10px;">Cetak / Simpan PDF</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",
            authDomain: "pt-agn.firebaseapp.com",
            databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pt-agn",
            storageBucket: "pt-agn.appspot.com",
            messagingSenderId: "810494462386",
            appId: "1:810494462386:web:432a3050c054bdd8437cab"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let masterKaryawan = {};
        let hariLibur = {};

        db.ref('master_karyawan').on('value', snap => {
            masterKaryawan = snap.val() || {};
            let options = '<option value="">-- Pilih Nama --</option>';
            for(let id in masterKaryawan) {
                options += `<option value="${masterKaryawan[id]}" data-id="${id}">${masterKaryawan[id]}</option>`;
            }
            document.getElementById('pilihKaryawan').innerHTML = options;
        });

        db.ref('hari_libur').on('value', snap => { hariLibur = snap.val() || {}; });

        function tambahKaryawan() {
            const nama = document.getElementById('inputNamaBaru').value.trim();
            if(!nama) return;
            db.ref('master_karyawan').push(nama).then(() => {
                document.getElementById('inputNamaBaru').value = "";
            });
        }

        function hapusKaryawan() {
            const el = document.getElementById('pilihKaryawan');
            const id = el.options[el.selectedIndex].getAttribute('data-id');
            if(id && confirm("Hapus karyawan ini?")) db.ref('master_karyawan/' + id).remove();
        }

        // FUNGSI BARU: SET RENTANG LIBUR
        function setRentangLibur() {
            const mulai = document.getElementById('tglMulaiLibur').value;
            const selesai = document.getElementById('tglSelesaiLibur').value;

            if(!mulai || !selesai) return alert("Pilih tanggal mulai dan selesai!");
            
            let dateMulai = new Date(mulai);
            let dateSelesai = new Date(selesai);

            if(dateMulai > dateSelesai) return alert("Tanggal mulai tidak boleh lebih besar dari tanggal selesai!");

            let updates = {};
            let tempDate = new Date(dateMulai);

            while(tempDate <= dateSelesai) {
                const tglKey = tempDate.toISOString().split('T')[0];
                updates[tglKey] = true;
                tempDate.setDate(tempDate.getDate() + 1);
            }

            db.ref('hari_libur').update(updates).then(() => {
                alert("Berhasil menyetel libur panjang!");
            }).catch(e => alert("Gagal: " + e.message));
        }

        function prosesAbsen(tipe) {
            const nama = document.getElementById('pilihKaryawan').value;
            if(!nama) return alert("Pilih nama!");
            const skrg = new Date();
            const tglKey = skrg.toISOString().split('T')[0];
            const waktuStr = skrg.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            const jam = skrg.getHours();

            let status = "Hadir";
            if(tipe === 'Masuk' && jam >= 9) status = "Terlambat";

            db.ref(`absensi/${tglKey}/${nama}/${tipe}`).set({ waktu: waktuStr, status: status })
                .then(() => {
                    document.getElementById('notif').innerText = `✅ Berhasil ${tipe}!`;
                    setTimeout(() => document.getElementById('notif').innerText = "", 3000);
                });
        }

        function renderRekap() {
            const filter = document.getElementById('filterBulan').value;
            if(!filter) return alert("Pilih bulan!");
            const [th, bl] = filter.split('-');
            const jmlHari = new Date(th, bl, 0).getDate();

            let hHtml = `<th class="nama-kolom">Nama Karyawan</th>`;
            for(let i=1; i<=jmlHari; i++) {
                const d = new Date(th, bl-1, i);
                const hari = d.toLocaleDateString('id-ID', {weekday: 'short'});
                const color = d.getDay() === 0 ? 'color:red;' : '';
                hHtml += `<th style="${color}">${i}<br>${hari}</th>`;
            }
            document.getElementById('theadRekap').innerHTML = hHtml;

            db.ref('absensi').once('value', snap => {
                const data = snap.val() || {};
                let bHtml = "";
                for(let id in masterKaryawan) {
                    const nama = masterKaryawan[id];
                    bHtml += `<tr><td class="nama-kolom">${nama}</td>`;
                    for(let h=1; h<=jmlHari; h++) {
                        const tglKey = `${th}-${bl}-${String(h).padStart(2,'0')}`;
                        const dObj = new Date(tglKey);
                        let simbol = "-";
                        let kls = "";

                        if(dObj.getDay() === 0) { simbol = "OFF"; kls = "status-minggu"; }
                        else if(hariLibur[tglKey]) { simbol = "LBR"; kls = "status-libur"; }

                        if(data[tglKey] && data[tglKey][nama]) {
                            const d = data[tglKey][nama];
                            if(d.Izin) { simbol = "I"; kls = "status-izin"; }
                            else if(d.Masuk) {
                                simbol = d.Masuk.status === "Terlambat" ? "T" : "V";
                                kls = d.Masuk.status === "Terlambat" ? "status-terlambat" : "status-hadir";
                            }
                        }
                        bHtml += `<td class="${kls}">${simbol}</td>`;
                    }
                    bHtml += `</tr>`;
                }
                document.getElementById('tbodyRekap').innerHTML = bHtml;
            });
        }
    </script>
</body>
</html>
