<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V959</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --bg:#f1f5f9; --c:#ffffff; }
        * { box-sizing: border-box; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); font-size: 12px; padding-top: 60px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 5px; }
        .nav-btn { padding: 12px 0; border: none; background: transparent; color: #fff; opacity: 0.6; font-weight: 700; font-size: 11px; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid white; }
        .container { padding: 10px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; }
        h3 { margin-bottom: 10px; font-size: 13px; color: var(--p); }
        input, select { width: 100%; height: 38px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 8px; padding: 0 8px; }
        .btn { border: none; border-radius: 8px; padding: 10px; font-weight: 700; cursor: pointer; color: white; width: 100%; margin-top: 5px; }
        .table-area { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th, td { padding: 6px; border: 1px solid #eee; text-align: center; }
        .badge { width: 18px; height: 18px; border-radius: 4px; display: inline-block; color: white; font-weight: 700; line-height: 18px; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#666" onclick="closeMod()">TUTUP</button></div></div>
    <div class="nav">
        <button id="n-absen" class="nav-btn active" onclick="tab('absen')">ABSEN</button>
        <button id="n-stok" class="nav-btn" onclick="tab('stok')">STOK</button>
        <button id="n-aktivitas" class="nav-btn" onclick="tab('aktivitas')">KERJA</button>
        <button id="n-gaji" class="nav-btn" onclick="tab('gaji')">GAJI</button>
    </div>
    <div class="container">
        <div id="t-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master Karyawan</h3>
                <div style="display:flex; gap:5px"><input id="inK" placeholder="Nama baru..."><button class="btn" style="background:var(--p); width:60px; margin:0" onclick="addM('master_karyawan','inK')">ADD</button></div>
                <div id="listK" style="margin-top:10px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absen <input type="date" id="absTgl" style="width:120px; height:30px; float:right"></h3>
                <select id="selK"></select>
                <select id="absJenis"><option value="Hadir">Masuk</option><option value="Pulang">Pulang</option><option value="Izin">Izin</option></select>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN</button>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" onchange="render()" style="width:120px; height:30px; float:right"></h3>
                <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <button class="btn" style="background:var(--p)" onclick="expEx('areaAbsen','Absen')">EXPORT EXCEL</button>
            </div>
        </div>
        <div id="t-stok" class="tab-content">
            <div class="card">
                <h3>📦 Logistik <input type="date" id="stTgl" style="width:120px; height:30px; float:right"></h3>
                <select id="stBrg"></select>
                <div style="display:flex; gap:5px"><input type="number" id="stQty" placeholder="Jumlah"><select id="stKon"><option value="Bekas">Kotor</option><option value="Baru">Ready</option></select></div>
                <select id="stAksi"><option value="Masuk">Masuk</option><option value="Rekondisi">Rekon</option><option value="Jual Mitra">Mitra</option><option value="Jual Umum">Umum</option></select>
                <button class="btn" style="background:var(--p)" onclick="saveSt()">UPDATE STOK</button>
            </div>
            <div class="table-area" id="areaStok"><table><thead><tr><th>BRG</th><th>KTR</th><th>RDY</th><th>RKON</th><th>MTR</th><th>UMM</th><th style="background:#ddd">TOTAL</th></tr></thead><tbody id="tbStok"></tbody></table></div>
            <button class="btn" style="background:#666" onclick="logs('stok_logs')">LOG HAPUS STOK</button>
        </div>
        <div id="t-aktivitas" class="tab-content">
            <div class="card">
                <h3>🛠️ Borongan <input type="date" id="akTgl" style="width:120px; height:30px; float:right"></h3>
                <select id="akJenis">
                    <option value="Rekondisi Kempu">Rekon Kempu</option><option value="muat barang">Muat</option><option value="bongkar barang">Bongkar</option><option value="kirim minyak">Kirim Minyak</option><option value="pasang pangkalan">Pasang Pangkalan</option><option value="pasang agen">Pasang Agen</option>
                </select>
                <div id="akKaryawan" class="check-grid"></div>
                <input type="number" id="akQty" placeholder="Jumlah (Kosong = 0)" style="margin-top:10px">
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
            <button class="btn" style="background:#666" onclick="logs('aktivitas')">LOG HAPUS KERJA</button>
        </div>
        <div id="t-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3>💰 Gaji <input type="month" id="fUang" onchange="renderGaji()" style="width:120px; height:30px; float:right"></h3>
                <p>Total Gaji: <b id="gTotal">0</b></p>
            </div>
            <div style="display:flex; gap:5px"><button class="btn" style="background:var(--s)" onclick="modKB()">KASBON/BONUS</button><button class="btn" style="background:#666" onclick="modTarif()">SET TARIF</button></div>
            <div id="areaGaji" class="table-area"></div>
        </div>
    </div>

    <script>
        const conf = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(conf); const db = firebase.database();
        let D = {}; const T_DEF = { "Rekondisi Kempu":100000, "muat barang":600000, "bongkar barang":600000, "kirim minyak":150000, "pasang pangkalan":500000, "pasang agen":700000 };

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl','fM','fUang'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = (i.length<4?now.slice(0,7):now) });
            db.ref('/').on('value', s => { D = s.val() || {}; ui(); render(); });
        };

        function tab(id) {
            document.querySelectorAll('.tab-content, .nav-btn').forEach(e => { e.classList.remove('active'); if(e.id==='n-'+id || e.id==='t-'+id) e.classList.add('active'); });
            if(id==='gaji') renderGaji();
        }

        function ui() {
            const K = Object.entries(D.master_karyawan || {}), B = Object.values(D.master_barang || {});
            document.getElementById('listK').innerHTML = K.map(k=>`<small style="border:1px solid #ccc; padding:2px 5px; border-radius:4px; margin-right:3px">${k[1]} <b onclick="rem('master_karyawan','${k[0]}')" style="color:red">x</b></small>`).join('');
            document.getElementById('selK').innerHTML = K.map(k=>`<option>${k[1]}</option>`).join('');
            document.getElementById('akKaryawan').innerHTML = K.map(k=>`<label class="check-item"><input type="checkbox" class="chk-k" value="${k[1]}"> ${k[1]}</label>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option>${b}</option>`).join('');
        }

        function render() {
            const K_arr = Object.values(D.master_karyawan || {}), [Y, M] = document.getElementById('fM').value.split('-'), last = new Date(Y, M, 0).getDate();
            let th = `<tr><th>NAMA</th>`; for(let i=1; i<=last; i++) th += `<th>${i}</th>`; th += `</tr>`;
            document.getElementById('thA').innerHTML = th;
            let tb = "";
            K_arr.forEach(k => {
                let r = `<td><b>${k}</b></td>`;
                for(let i=1; i<=last; i++) {
                    let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k], bg = "#eee", txt = "-";
                    if(a) { txt=a.j[0]; bg=a.j==="Hadir"?"var(--s)":a.j==="Izin"?"var(--w)":"var(--d)"; }
                    r += `<td><div class="badge" style="background:${bg}">${txt}</div></td>`;
                }
                tb += `<tr>${r}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
            renderStok();
        }

        function renderStok() {
            const B = Object.values(D.master_barang || {}), fM = document.getElementById('fM').value;
            let h = "";
            B.forEach(b => {
                let s = { ik:0, ir:0, rk:0, jm:0, ju:0 };
                Object.values(D.stok_logs || {}).forEach(l => {
                    if(l.b===b && l.t.slice(0,7)===fM) {
                        if(l.ak==="Masuk") { if(l.kon==="Bekas") s.ik+=l.q; else s.ir+=l.q; }
                        else if(l.ak==="Rekondisi") s.rk+=l.q;
                        else if(l.ak==="Jual Mitra") s.jm+=l.q;
                        else if(l.ak==="Jual Umum") s.ju+=l.q;
                    }
                });
                h += `<tr><td>${b}</td><td>${s.ik}</td><td>${s.ir}</td><td>${s.rk}</td><td>${s.jm}</td><td>${s.ju}</td><td style="background:#f0f0f0">${(s.ik+s.ir+s.rk)-(s.jm+s.ju)}</td></tr>`;
            });
            document.getElementById('tbStok').innerHTML = h;
        }

        function renderGaji() {
            const fM = document.getElementById('fUang').value, K = Object.values(D.master_karyawan || {}), T = D.tarif || T_DEF;
            let totG = 0, h = `<table><tr><th>NAMA</th><th>BORONG</th><th>BONUS</th><th>KASBON</th><th>NET</th><th>SLIP</th></tr>`;
            K.forEach(k => {
                let brg=0, bon=0, kas=0;
                Object.values(D.aktivitas||{}).forEach(a => { if(a.t.slice(0,7)===fM && a.p.includes(k)) {
                    let v = T[a.j]||0; brg += (a.j.includes("pasang") ? (v*a.q) : (v*a.q/a.p.length));
                }});
                Object.values(D.kasbon_bonus||{}).forEach(kb => { if(kb.n===k && kb.t===fM) { if(kb.tipe==="Bonus") bon+=kb.rp; else kas+=kb.rp; } });
                let net = (brg+bon)-kas; totG += net;
                h += `<tr><td>${k}</td><td>${Math.round(brg).toLocaleString()}</td><td>${bon}</td><td>${kas}</td><td style="color:green"><b>${Math.round(net).toLocaleString()}</b></td><td><button onclick="genSlip('${k}')" style="background:var(--p); color:white; border:none; padding:3px 5px; border-radius:4px">SLIP</button></td></tr>`;
            });
            document.getElementById('gTotal').innerText = "Rp " + Math.round(totG).toLocaleString();
            document.getElementById('areaGaji').innerHTML = h + "</table>";
        }

        function saveAbs() {
            const t=document.getElementById('absTgl').value, n=document.getElementById('selK').value, j=document.getElementById('absJenis').value;
            db.ref(`absensi/${t}/${n}`).set({ j }).then(()=>alert("Ok!"));
        }

        function saveSt() {
            const t=document.getElementById('stTgl').value, b=document.getElementById('stBrg').value, q=parseInt(document.getElementById('stQty').value);
            if(q) db.ref('stok_logs').push({ t, b, q, kon:document.getElementById('stKon').value, ak:document.getElementById('stAksi').value }).then(()=>alert("Ok!"));
        }

        function saveAk() {
            const q=parseInt(document.getElementById('akQty').value)||0, p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value);
            if(p.length) db.ref('aktivitas').push({ t:document.getElementById('akTgl').value, j:document.getElementById('akJenis').value, q, p }).then(()=>alert("Ok!"));
        }

        function genSlip(n) {
            const fM = document.getElementById('fUang').value;
            openMod("Slip "+n, `<div id="p-slip" style="padding:10px; background:white; color:black"><h3>KEMPU BALAP</h3><p>${n} - ${fM}</p><hr>...Data Terlampir...</div><button class="btn" style="background:var(--d)" onclick="expPdf('p-slip','Slip_${n}')">CETAK PDF</button>`);
        }

        function addM(p, id) { const v=document.getElementById(id).value; if(v) db.ref(p).push(v); }
        function rem(p, k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove(); }
        function logs(t) { let l=Object.entries(D[t]||{}).reverse().slice(0,20); openMod("Logs", l.map(x=>`<div style="font-size:10px; padding:5px; border-bottom:1px solid #eee">${x[1].t} - ${x[1].j||x[1].b} <button onclick="rem('${t}','${x[0]}')" style="color:red; border:none; background:none">HAPUS</button></div>`).join('')); }
        function openMod(t, h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
        function closeMod() { document.getElementById('modalUni').style.display='none'; }
        function expEx(id, n) { let wb = XLSX.utils.table_to_book(document.getElementById(id)); XLSX.writeFile(wb, `${n}.xlsx`); }
        function expPdf(id, n) { html2pdf().from(document.getElementById(id)).save(); }
        function modKB() { const K=Object.values(D.master_karyawan||{}); openMod("Kasbon", `<select id="kbN">${K.map(k=>`<option>${k}</option>`).join('')}</select><select id="kbT"><option>Bonus</option><option>Kasbon</option></select><input type="number" id="kbR" placeholder="Rp"><button class="btn" style="background:var(--s)" onclick="db.ref('kasbon_bonus').push({n:document.getElementById('kbN').value, t:document.getElementById('fUang').value, tipe:document.getElementById('kbT').value, rp:parseInt(document.getElementById('kbR').value)}); closeMod();">SAVE</button>`); }
    </script>
</body>
</html>
