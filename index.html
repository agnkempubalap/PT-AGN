<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMPU BALAP V961-FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --p:#2563eb; --s:#16a34a; --d:#ef4444; --w:#f59e0b; --bg:#f1f5f9; --c:#ffffff; --t:#1e293b; --b:#e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); font-size: 13px; padding-bottom: 30px; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--p); padding: 6px; gap: 4px; }
        .nav-btn { padding: 12px 2px; border: none; background: transparent; color: rgba(255,255,255,0.6); font-weight: 700; font-size: 10px; border-radius: 8px; cursor: pointer; }
        .nav-btn.active { background: white; color: var(--p); }
        .container { width: 100%; max-width: 950px; margin: 65px auto 0; padding: 0 12px; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--b); }
        h3 { margin-bottom: 12px; font-size: 13px; color: var(--p); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 800; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, select { width: 100%; height: 40px; background: #f8fafc; border: 1px solid var(--b); border-radius: 10px; padding: 0 10px; font-size: 13px; outline: none; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 800; cursor: pointer; color: white; font-size: 11px; text-align: center; width: 100%; margin-bottom: 5px; flex: 1; min-width: 100px; }
        .table-area { width: 100%; overflow-x: auto; border: 1px solid var(--b); border-radius: 12px; background: white; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; }
        th, td { padding: 8px; border: 1px solid #f1f5f9; text-align: center; font-size: 10px; }
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 800; z-index: 5; border-right: 2px solid #eee; }
        .badge { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; margin: auto; position: relative; }
        .dot { position: absolute; top: 1px; right: 1px; width: 4px; height: 4px; background: white; border-radius: 50%; }
        .bg-h, .bg-l { background: var(--s); } .bg-i { background: var(--w); } .bg-a { background: var(--d); } 
        .bg-m, .bg-off { background: #64748b; } .bg-none { background: #e2e8f0; color: #94a3b8; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 15px; max-height: 85vh; overflow-y: auto; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="modalUni" class="modal"><div class="modal-box"><h3 id="modTitle"></h3><div id="modContent"></div><button class="btn" style="background:#64748b; margin-top:15px" onclick="closeMod()">TUTUP</button></div></div>
    <div class="nav">
        <button id="nav-absen" class="nav-btn active" onclick="tab('absen')">Absen</button>
        <button id="nav-stok" class="nav-btn" onclick="tab('stok')">Stok</button>
        <button id="nav-aktivitas" class="nav-btn" onclick="tab('aktivitas')">Kerja</button>
        <button id="nav-gaji" class="nav-btn" onclick="tab('gaji')">Gaji</button>
    </div>
    <div class="container">
        <div id="tab-absen" class="tab-content active">
            <div class="card">
                <h3>👥 Master Karyawan <input type="text" id="inK" placeholder="Nama..." style="width:100px; height:30px"> <button class="btn" style="background:var(--p); width:50px; margin:0" onclick="addItem('master_karyawan', 'inK')">ADD</button></h3>
                <div id="listK" style="display:flex; flex-wrap:wrap; gap:5px"></div>
            </div>
            <div class="card">
                <h3>📅 Input Absen <input type="date" id="absTgl" style="width:130px; float:right"></h3>
                <div class="flex-row"><select id="selK"></select><select id="absJenis" onchange="toggleIzin()">
                    <option value="Hadir">Masuk</option><option value="Pulang">Pulang</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option>
                </select></div>
                <div id="boxIzin" style="display:none; margin-bottom:10px"><input type="text" id="absKet" placeholder="Keterangan..."></div>
                <button class="btn" style="background:var(--s)" onclick="saveAbs()">SIMPAN ABSEN</button>
            </div>
            <div class="card">
                <h3>📊 Laporan <input type="month" id="fM" onchange="renderAll()" style="width:110px; height:30px"></h3>
                <div class="table-area" id="areaAbsen"><table><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
                <div class="flex-row"><button class="btn" style="background:var(--w); color:black" onclick="openLiburMod()">⚙️ SET LIBUR</button><button class="btn" style="background:var(--d)" onclick="expPdf('areaAbsen','Absen_Bulanan')">PDF ABSEN</button></div>
            </div>
        </div>
        <div id="tab-stok" class="tab-content">
            <div class="card"><h3>📦 Master Barang</h3><div class="flex-row"><input type="text" id="inB" placeholder="Barang..."><button class="btn" style="background:var(--p)" onclick="addItem('master_barang', 'inB')">ADD</button></div><div id="listB" style="display:flex; flex-wrap:wrap; gap:5px"></div></div>
            <div class="card"><h3>📥 Logistik</h3><div class="flex-row"><input type="date" id="stTgl"><select id="stBrg"></select></div><div class="flex-row"><input type="number" id="stQty" placeholder="Jumlah"><select id="stAksi"><option value="Masuk">Masuk</option><option value="Rekondisi">Rekon</option><option value="Keluar">Keluar</option></select></div><button class="btn" style="background:var(--p)" onclick="saveSt()">UPDATE STOK</button></div>
        </div>
        <div id="tab-aktivitas" class="tab-content">
            <div class="card">
                <h3>🛠️ Borongan Kerja <input type="date" id="akTgl" style="width:115px; height:30px"></h3>
                <select id="akJenis" style="margin-bottom:10px">
                    <option value="Rekondisi Kempu">Rekon Kempu</option><option value="Rekondisi jerigen 18L">Rekon 18L (Laku)</option><option value="Rekondisi jerigen 5L">Rekon 5L (Laku)</option><option value="muat barang">Muat</option><option value="bongkar barang">Bongkar</option>
                </select>
                <div id="akKaryawan" class="check-grid"></div>
                <input type="number" id="akQty" placeholder="Jumlah" style="margin-bottom:10px">
                <button class="btn" style="background:var(--p)" onclick="saveAk()">SIMPAN KERJA</button>
            </div>
            <div class="card"><h3>🛒 Nota Belanja</h3><div class="flex-row"><input type="date" id="blTgl"><input type="text" id="blNama" placeholder="Item"></div><input type="number" id="blRp" placeholder="Rp" style="margin-bottom:10px"><button class="btn" style="background:var(--d)" onclick="saveBl()">SIMPAN NOTA</button></div>
            <div class="flex-row"><button class="btn" style="background:var(--w); color:black" onclick="openPending()">📦 CEK JERIGEN</button><button class="btn" style="background:#64748b" onclick="showLogs('aktivitas')">LOG KERJA</button><button class="btn" style="background:#0ea5e9" onclick="genRekapKerja()">REKAP PDF</button></div>
        </div>
        <div id="tab-gaji" class="tab-content">
            <div class="card" style="background:var(--p); color:white">
                <h3 style="color:white">💰 Gaji <input type="month" id="fUang" onchange="renderGaji()" style="width:110px; float:right"></h3>
                <div style="font-size:18px; font-weight:800">TOTAL: <span id="gTotal">0</span></div>
            </div>
            <div class="flex-row"><button class="btn" style="background:var(--s)" onclick="openModKB()">💰 KASBON / BONUS</button><button class="btn" style="background:#64748b" onclick="editTarif()">⚙️ TARIF</button></div>
            <div id="areaGaji" class="table-area"></div>
            <button class="btn" style="background:var(--d)" onclick="expPdf('areaGaji','Rekap_Gaji')">DOWNLOAD PDF</button>
        </div>
    </div>
    <script>
        const fbConfig = { apiKey: "AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI", authDomain: "pt-agn.firebaseapp.com", databaseURL: "https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "pt-agn", appId: "1:810494462386:web:432a3050c054bdd8437cab" };
        firebase.initializeApp(fbConfig); const db = firebase.database();
        let D = {}; const DEF_TARIF = { "Rekondisi Kempu":100000, "Rekondisi jerigen 18L":2000, "Rekondisi jerigen 5L":1000, "muat barang":600000, "bongkar barang":600000 };

        window.onload = () => {
            const t = new Date().toISOString().split('T')[0];
            ['absTgl','stTgl','akTgl','blTgl','fM','fUang'].forEach(i => { if(document.getElementById(i)) document.getElementById(i).value = (i.length<=7?t.slice(0,7):t); });
            db.ref('/').on('value', s => { D = s.val() || {}; initUI(); renderAll(); if(document.getElementById('tab-gaji').classList.contains('active')) renderGaji(); });
        };

        function tab(id) {
            document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            if(id==='gaji') renderGaji();
        }

        function initUI() {
            const K = Object.entries(D.master_karyawan || {}), B = Object.entries(D.master_barang || {});
            document.getElementById('listK').innerHTML = K.map(k=>`<span style="background:#fff; border:1px solid #ddd; padding:4px; border-radius:5px; font-size:9px">${k[1]} <b onclick="removeItem('master_karyawan','${k[0]}')" style="color:red">×</b></span>`).join('');
            document.getElementById('selK').innerHTML = K.map(k=>`<option value="${k[1]}">${k[1]}</option>`).join('');
            document.getElementById('akKaryawan').innerHTML = K.map(k=>`<label class="check-item"><input type="checkbox" class="chk-k" value="${k[1]}"> <span>${k[1]}</span></label>`).join('');
            document.getElementById('stBrg').innerHTML = B.map(b=>`<option value="${b[1]}">${b[1]}</option>`).join('');
        }

        function saveAbs() {
            const n=document.getElementById('selK').value, t=document.getElementById('absTgl').value, j=document.getElementById('absJenis').value;
            const jam = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            if(j==="Pulang") db.ref(`absensi/${t}/${n}`).update({ jamOut: jam }).then(()=>alert("Jam Pulang Disimpan!"));
            else db.ref(`absensi/${t}/${n}`).set({ j, jam, ket: document.getElementById('absKet').value||"" }).then(()=>alert("Absen Masuk!"));
        }

        function renderAll() {
            const fM = document.getElementById('fM').value; if(!fM) return;
            const fmArr = fM.split('-'), K = Object.values(D.master_karyawan || {});
            const Y=fmArr[0], M=fmArr[1], lastD = new Date(Y, M, 0).getDate();
            let th = `<tr><th class="sticky-col">NAMA</th>`;
            for(let i=1; i<=lastD; i++) th += `<th>${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;
            let tb = "";
            K.forEach(k => {
                let r = `<td class="sticky-col">${k}</td>`;
                for(let i=1; i<=lastD; i++) {
                    let d = `${Y}-${M}-${String(i).padStart(2,'0')}`, a = D.absensi?.[d]?.[k], isSun = new Date(d).getDay()===0;
                    let txt="-", cls="bg-none"; if(isSun) { txt="M"; cls="bg-m"; }
                    if(a) { txt=a.j.charAt(0); cls=(a.j==="Hadir"?"bg-h": (a.j==="Izin"?"bg-i":"bg-a")); }
                    r += `<td><div class="badge ${cls}" onclick="cellMod('${d}','${k}')">${txt}${a?.jamOut?'<div class="dot"></div>':''}</div></td>`;
                }
                tb += `<tr>${r}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
        }

        function saveAk() {
            const j=document.getElementById('akJenis').value, q=parseInt(document.getElementById('akQty').value)||0, p=Array.from(document.querySelectorAll('.chk-k:checked')).map(c=>c.value);
            if(!p.length || !q) return alert("Pilih orang & jumlah!");
            const isP = j.includes("jerigen");
            db.ref('aktivitas').push({ t:document.getElementById('akTgl').value, j, q, p, laku:!isP, tglLaku: isP?null:document.getElementById('akTgl').value }).then(()=>{
                alert(isP?"Disimpan ke Pending!":"Berhasil!");
                document.getElementById('akQty').value=""; document.querySelectorAll('.chk-k').forEach(c=>c.checked=false);
            });
        }

        function openPending() {
            let list = Object.entries(D.aktivitas || {}).filter(x => x[1].laku === false);
            let h = list.map(x => `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee"><span>[${x[1].t}] ${x[1].j} (${x[1].q})</span><button class="btn" style="background:var(--s);width:60px;margin:0" onclick="cairkan('${x[0]}')">LAKU</button></div>`).join('');
            openMod("Jerigen Belum Laku", h || "Semua sudah laku!");
        }

        function cairkan(id) {
            const t = new Date().toISOString().split('T')[0];
            db.ref(`aktivitas/${id}`).update({ laku:true, tglLaku:t }).then(()=>alert("Selesai dibayar!"));
        }

        function renderGaji() {
            const fM = document.getElementById('fUang').value, T = D.tarif||DEF_TARIF, K = Object.values(D.master_karyawan||{});
            let totG = 0, h = `<table><tr><th class="sticky-col">NAMA</th><th>BORONG</th><th>BONUS</th><th>KASBON</th><th>TOTAL</th></tr>`;
            K.forEach(k => {
                let brg=0, bon=0, kas=0;
                Object.values(D.aktivitas||{}).forEach(a => {
                    if(a.laku && a.tglLaku?.slice(0,7)===fM && (a.p||[]).includes(k)) brg += ( (T[a.j]||0) * a.q / a.p.length );
                });
                Object.values(D.kasbon_bonus||{}).forEach(kb => {
                    if(kb.n===k && kb.t===fM) { if(kb.tipe==="Bonus") bon+=kb.rp; else kas+=kb.rp; }
                });
                let net = (brg+bon)-kas; totG += net;
                h += `<tr><td class="sticky-col">${k}</td><td>${Math.round(brg).toLocaleString()}</td><td>${bon.toLocaleString()}</td><td>${kas.toLocaleString()}</td><td style="font-weight:800;color:green">Rp ${Math.round(net).toLocaleString()}</td></tr>`;
            });
            document.getElementById('gTotal').innerText = "Rp " + Math.round(totG).toLocaleString();
            document.getElementById('areaGaji').innerHTML = h + "</table>";
        }

        function openModKB() {
            const fM = document.getElementById('fUang').value, K = Object.values(D.master_karyawan||{});
            let logs = Object.entries(D.kasbon_bonus||{}).filter(x => x[1].t === fM).reverse();
            let h = `<select id="kbN">${K.map(k=>`<option>${k}</option>`).join('')}</select><select id="kbT"><option>Bonus</option><option>Kasbon</option></select><input type="number" id="kbR" placeholder="Rp"><button class="btn" style="background:var(--s)" onclick="saveKB()">SIMPAN</button><hr>`;
            h += logs.map(x => `<div style="display:flex;justify-content:space-between;padding:5px;border-bottom:1px solid #eee"><span>${x[1].n}: ${x[1].tipe} (${x[1].rp})</span><b style="color:red;cursor:pointer" onclick="removeItem('kasbon_bonus','${x[0]}')">HAPUS</b></div>`).join('');
            openMod("Input Kasbon / Bonus", h);
        }

        function saveKB() {
            const n=document.getElementById('kbN').value, t=document.getElementById('fUang').value, tipe=document.getElementById('kbT').value, rp=parseInt(document.getElementById('kbR').value);
            if(rp) db.ref('kasbon_bonus').push({ n, t, tipe, rp }).then(()=>openModKB());
        }

        function saveBl() {
            const t=document.getElementById('blTgl').value, n=document.getElementById('blNama').value, rp=parseInt(document.getElementById('blRp').value);
            if(rp) db.ref('belanja').push({ t, n, rp }).then(()=>alert("Nota Disimpan!"));
        }

        function genRekapKerja() {
            const fM = document.getElementById('fUang').value; const K = Object.values(D.master_karyawan || {});
            let h = `<div id="p-rekap" style="padding:20px"><h2>REKAP KERJA KEMPU BALAP</h2><p>Bulan: ${fM}</p><hr>`;
            K.forEach(k => {
                let list = Object.values(D.aktivitas||{}).filter(a => a.tglLaku?.slice(0,7)===fM && (a.p||[]).includes(k));
                if(list.length) { h += `<h3>${k}</h3><ul>` + list.map(x => `<li>[${x.t}] ${x.j} - ${x.q} unit</li>`).join('') + `</ul>`; }
            });
            openMod("Preview PDF", h + `</div><button class="btn" onclick="expPdf('p-rekap','Rekap_Kerja')">DOWNLOAD PDF</button>`);
        }

        function cellMod(d, k) { let a = D.absensi?.[d]?.[k]; openMod(`Detail ${k}`, `Tgl: ${d}<br>Status: ${a?a.j:'-'}<br>Jam: ${a?.jam||'-'} s/d ${a?.jamOut||'-'}<br><br><button class="btn" style="background:var(--d)" onclick="removeItem('absensi/${d}','${k}')">HAPUS</button>`); }
        function addItem(p, id) { const v=document.getElementById(id).value; if(v) db.ref(p).push(v).then(()=>document.getElementById(id).value=""); }
        function removeItem(p, k) { if(confirm("Hapus?")) db.ref(`${p}/${k}`).remove().then(()=>closeMod()); }
        function openMod(t, h) { document.getElementById('modTitle').innerText=t; document.getElementById('modContent').innerHTML=h; document.getElementById('modalUni').style.display='flex'; }
        function closeMod() { document.getElementById('modalUni').style.display='none'; }
        function toggleIzin() { document.getElementById('boxIzin').style.display = (['Izin','Alpa'].includes(document.getElementById('absJenis').value)?'block':'none'); }
        function showLogs(t) { let list = Object.entries(D[t]||{}).reverse().slice(0,20); openMod("Log Terakhir", list.map(x => `<div style="display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee"><span>[${x[1].t}] ${x[1].j}</span><b style="color:red" onclick="removeItem('${t}','${x[0]}')">HAPUS</b></div>`).join('') || "Kosong"); }
        function editTarif() { let h = Object.entries(D.tarif||DEF_TARIF).map(t=>`<div><label>${t[0]}</label><input type="number" id="trf_${t[0].replace(/ /g,'_')}" value="${t[1]}"></div>`).join('') + `<button class="btn" style="background:var(--s)" onclick="saveTrf()">SIMPAN</button>`; openMod("Tarif Borongan", h); }
        function saveTrf() { let nT={}; Object.keys(D.tarif||DEF_TARIF).forEach(k=>nT[k]=parseInt(document.getElementById(`trf_${k.replace(/ /g,'_')}`).value)||0); db.ref('tarif').set(nT).then(()=>alert("Tarif Diperbarui!")); }
        function saveSt() { const t=document.getElementById('stTgl').value, b=document.getElementById('stBrg').value, q=parseInt(document.getElementById('stQty').value), a=document.getElementById('stAksi').value; if(q) db.ref('stok_logs').push({ t, b, q, ak:a }).then(()=>alert("Stok Berhasil!")); }
        function expPdf(id, n) { html2pdf().set({margin:5, filename:n+'.pdf', jsPDF:{orientation:'landscape'}}).from(document.getElementById(id)).save(); }
        function openLiburMod() { let h = `<input type="date" id="tglL"><button class="btn" onclick="db.ref('libur/'+document.getElementById('tglL').value).set(true)">SET LIBUR</button><hr>`; h += Object.keys(D.libur||{}).map(l => `<div>${l} <b style="color:red" onclick="db.ref('libur/${l}').remove()">×</b></div>`).join(''); openMod("Daftar Hari Libur", h); }
    </script>
</body>
</html>
