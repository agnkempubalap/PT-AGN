<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Pro++</title>

<style>
body { font-family:Arial; background:#eef3ff; padding:15px; }

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
}

button { border:none; color:white; font-weight:bold; }

#masuk { background:#4CAF50; }
#pulang { background:#ff9800; }
#export { background:#2196F3; }

.item {
  background:#f5f7ff;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
}

.kalender {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}

.hari {
  padding:10px;
  text-align:center;
  border-radius:8px;
  font-size:12px;
}

.hadir { background:#4CAF50; color:white; }
.tidak { background:#f44336; color:white; }
</style>
</head>

<body>

<h2>📋 Absensi Karyawan</h2>

<div class="card">
<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hatta</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="masuk">Absen Masuk</button>
<button id="pulang">Absen Pulang</button>
<button id="export">Export Excel</button>
</div>

<div class="card">
<h3>📅 Hari Ini</h3>
<div id="list">Loading...</div>
</div>

<div class="card">
<h3>📊 Rekap Bulan Ini</h3>
<div id="rekap">Loading...</div>
</div>

<div class="card">
<h3>📆 Kalender Absensi</h3>
<select id="filterNama">
<option>Agung</option>
<option>Hasan</option>
<option>Hatta</option>
<option>Alda</option>
<option>Nur</option>
</select>
<div id="kalender" class="kalender"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ===== FORMAT =====
function today(){
  let d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}
function jam(){
  return new Date().toLocaleTimeString("id-ID");
}

// ===== TELAT =====
function hitungTelat(){
  let now=new Date();
  let batas=new Date();
  batas.setHours(9,0,0);
  return now>batas ? Math.floor((now-batas)/60000) : 0;
}
function statusMasuk(){
  return hitungTelat()>0?"Telat":"Tepat";
}
function statusPulang(){
  let now=new Date();
  let batas=new Date();
  batas.setHours(16,0,0);
  return now<batas?"Cepat":"Normal";
}


// ===== MASUK =====
document.getElementById("masuk").onclick = async function(){

  let btn=this;
  if(btn.disabled) return;

  btn.disabled=true;
  btn.innerText="Loading...";

  let nama=document.getElementById("nama").value;
  let id=nama+"_"+today();

  try{

    let ref=doc(db,"absensi",id);
    let snap=await getDoc(ref);

    if(snap.exists()){
      alert("Sudah absen");
      btn.disabled=false;
      btn.innerText="Absen Masuk";
      return;
    }

    await setDoc(ref,{
      nama,
      tanggal:today(),
      jamMasuk:jam(),
      statusMasuk:statusMasuk(),
      telatMenit:hitungTelat()
    });

    alert("Masuk berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Masuk";
};


// ===== PULANG =====
document.getElementById("pulang").onclick = async function(){

  let btn=this;
  if(btn.disabled) return;

  btn.disabled=true;
  btn.innerText="Loading...";

  let nama=document.getElementById("nama").value;
  let id=nama+"_"+today();

  try{

    let ref=doc(db,"absensi",id);
    let snap=await getDoc(ref);

    if(!snap.exists()){
      alert("Belum masuk");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    let data=snap.data();

    if(data.jamPulang){
      alert("Sudah pulang");
      btn.disabled=false;
      btn.innerText="Absen Pulang";
      return;
    }

    await updateDoc(ref,{
      jamPulang:jam(),
      statusPulang:statusPulang()
    });

    alert("Pulang berhasil");

    loadData();

  }catch(e){
    alert(e.message);
  }

  btn.disabled=false;
  btn.innerText="Absen Pulang";
};


// ===== LOAD =====
async function loadData(){

  let list=document.getElementById("list");
  let rekap=document.getElementById("rekap");

  list.innerHTML="";
  rekap.innerHTML="";

  let snap=await getDocs(collection(db,"absensi"));
  let allData=[];
  let tgl=today();

  let dataRekap={};

  snap.forEach(doc=>{
    let d=doc.data();
    allData.push(d);

    // HARI INI
    if(d.tanggal===tgl){
      list.innerHTML+=`
        <div class="item">
          <b>${d.nama}</b><br>
          Masuk: ${d.jamMasuk||"-"}<br>
          Telat: ${d.telatMenit||0} menit<br>
          Pulang: ${d.jamPulang||"-"}
        </div>
      `;
    }

    // REKAP
    let date=new Date(d.tanggal);
    let now=new Date();

    if(date.getMonth()===now.getMonth()){

      if(!dataRekap[d.nama]){
        dataRekap[d.nama]={hadir:0,telat:0};
      }

      dataRekap[d.nama].hadir++;
      dataRekap[d.nama].telat += d.telatMenit||0;
    }
  });

  // tampil rekap
  for(let n in dataRekap){
    let r=dataRekap[n];
    rekap.innerHTML+=`
      <div class="item">
        <b>${n}</b><br>
        Hadir: ${r.hadir}<br>
        Telat: ${r.telat} menit
      </div>
    `;
  }

  generateKalender(allData);

  window.allDataGlobal = allData;
}


// ===== KALENDER WARNA =====
function generateKalender(data){

  let el=document.getElementById("kalender");
  let nama=document.getElementById("filterNama").value;

  el.innerHTML="";

  let now=new Date();
  let year=now.getFullYear();
  let month=now.getMonth();

  let days=new Date(year,month+1,0).getDate();

  for(let i=1;i<=days;i++){

    let tgl=year+"-"+(month+1)+"-"+i;
    let hadir=false;

    data.forEach(d=>{
      if(d.nama===nama && d.tanggal===tgl){
        hadir=true;
      }
    });

    el.innerHTML+=`
      <div class="hari ${hadir?"hadir":"tidak"}">
        ${i}
      </div>
    `;
  }
}

document.getElementById("filterNama").onchange=()=>{
  generateKalender(window.allDataGlobal);
};


// ===== EXPORT EXCEL =====
document.getElementById("export").onclick=function(){

  let data=window.allDataGlobal;
  let csv="Nama,Tanggal,Masuk,Telat,Pulang\n";

  data.forEach(d=>{
    csv+=`${d.nama},${d.tanggal},${d.jamMasuk||""},${d.telatMenit||0},${d.jamPulang||""}\n`;
  });

  let blob=new Blob([csv],{type:"text/csv"});
  let url=URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="absensi.csv";
  a.click();
};

loadData();

</script>

</body>
</html>
