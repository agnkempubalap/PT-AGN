<!DOCTYPE html>
<html>
<head>
  <title>Absensi Karyawan</title>
  <style>
    body { font-family: sans-serif; background:#eef1f5; padding:15px }
    .card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px }
    button { width:100%; padding:12px; margin-top:8px; border:none; border-radius:8px; color:#fff }
    .masuk { background:green }
    .pulang { background:orange }
    .reset { background:red }
    .export { background:blue }
    select { width:100%; padding:10px; border-radius:8px }
  </style>
</head>

<body>

<div class="card">
  <h2>Absensi Karyawan</h2>

  <select id="nama"></select>

  <button class="masuk" onclick="absenMasuk()">Absen Masuk</button>
  <button class="pulang" onclick="absenPulang()">Absen Pulang</button>
  <button class="reset" onclick="resetHari()">Reset Hari Ini</button>
  <button class="export" onclick="exportExcel()">Export Excel</button>
</div>

<div class="card">
  <h3>Hari Ini</h3>
  <div id="hariIni"></div>
</div>

<div class="card">
  <h3>Rekap Bulan Ini</h3>
  <div id="rekap"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  doc, setDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const jamMasuk = 9;

function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString('id-ID');
}

function todayID() {
  return new Date().toISOString().split('T')[0];
}

// 🔥 LOAD KARYAWAN (FIX HASAN HILANG)
async function loadKaryawan() {
  const snap = await getDocs(collection(db, "karyawan"));
  const select = document.getElementById("nama");
  select.innerHTML = "";

  snap.forEach(doc => {
    const data = doc.data();
    if (data.aktif !== false) {
      const opt = document.createElement("option");
      opt.value = data.nama;
      opt.textContent = data.nama;
      select.appendChild(opt);
    }
  });
}

// ✅ ABSEN MASUK
window.absenMasuk = async () => {
  const nama = document.getElementById("nama").value;
  const ref = doc(db, "absensi", todayID());

  const snap = await getDoc(ref);
  let data = snap.exists() ? snap.data() : {};

  const jam = new Date().getHours();
  const status = jam > jamMasuk ? "Telat" : "Tepat";

  data[nama] = {
    masuk: nowTime(),
    pulang: data[nama]?.pulang || "-",
    status: status
  };

  await setDoc(ref, data);
  loadHari();
  loadRekap();
};

// ✅ ABSEN PULANG
window.absenPulang = async () => {
  const nama = document.getElementById("nama").value;
  const ref = doc(db, "absensi", todayID());

  const snap = await getDoc(ref);
  let data = snap.data() || {};

  if (!data[nama]) data[nama] = {};

  data[nama].pulang = nowTime();

  await setDoc(ref, data);
  loadHari();
};

// ✅ RESET
window.resetHari = async () => {
  await deleteDoc(doc(db, "absensi", todayID()));
  loadHari();
};

// ✅ LOAD HARI INI
async function loadHari() {
  const el = document.getElementById("hariIni");
  const snap = await getDoc(doc(db, "absensi", todayID()));

  if (!snap.exists()) {
    el.innerHTML = "Belum ada data";
    return;
  }

  let html = "";
  const data = snap.data();

  for (let nama in data) {
    const d = data[nama];

    html += `
      <div style="border-bottom:1px solid #ccc;padding:8px 0">
        <b>${nama}</b><br>
        Masuk: ${d.masuk || "-"}<br>
        Pulang: ${d.pulang || "-"}<br>
        Status: ${d.status || "-"}
      </div>
    `;
  }

  el.innerHTML = html;
}

// ✅ REKAP BULAN
async function loadRekap() {
  const el = document.getElementById("rekap");
  const snap = await getDocs(collection(db, "absensi"));

  let rekap = {};

  snap.forEach(doc => {
    const data = doc.data();

    for (let nama in data) {
      if (!rekap[nama]) rekap[nama] = 0;
      rekap[nama]++;
    }
  });

  let html = "";
  for (let nama in rekap) {
    html += `<div>${nama}: ${rekap[nama]} hari hadir</div>`;
  }

  el.innerHTML = html;
}

// ✅ EXPORT
window.exportExcel = async () => {
  const snap = await getDocs(collection(db, "absensi"));

  let csv = "Tanggal,Nama,Masuk,Pulang,Status\n";

  snap.forEach(doc => {
    const tgl = doc.id;
    const data = doc.data();

    for (let nama in data) {
      const d = data[nama];
      csv += `${tgl},${nama},${d.masuk},${d.pulang},${d.status}\n`;
    }
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "absensi.csv";
  a.click();
};

// INIT
loadKaryawan();
loadHari();
loadRekap();

</script>
</body>
</html>
