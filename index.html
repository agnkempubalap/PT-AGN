<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v78.0 - INTEGRATED SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F;--qc:#a855f7}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: background 0.3s}
        .container{max-width:1450px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:70px;height:70px;border-radius:50%;background:#000;border:3px solid var(--p);object-fit:cover;cursor:pointer}
        
        /* TABS */
        .tabs{display:flex; gap:10px; margin-bottom:15px}
        .tab-btn{flex:1; padding:15px; border-radius:12px; background:var(--c); color:var(--t); border:1px solid var(--b); cursor:pointer; font-weight:800; transition:0.3s}
        .tab-btn.active{background:var(--p); border-color:var(--p); color:#fff}

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;letter-spacing:1px;font-weight:800}
        
        input,button,select{border-radius:12px;font-size:14px;height:52px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none; padding:0 15px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c); scroll-behavior: smooth}
        .table-web{width:100%;border-collapse:separate;border-spacing:0;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border-bottom:1px solid var(--b);border-right:1px solid var(--b);padding:10px 5px;text-align:center}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        
        /* STOK SPECIFIC */
        .grid-stok{display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px; margin-bottom:15px}
        .stok-val{font-size:24px; font-weight:800; color:var(--s)}
        .qc-tag{padding:4px 8px; border-radius:6px; font-size:9px; font-weight:800; text-transform:uppercase}
        .qc-acc{background:var(--s); color:#fff}
        .qc-minor{background:var(--w); color:#000}
        .qc-rej{background:var(--d); color:#fff}

        .hidden {display:none}

        @media print {
            .no-print, .tabs, header { display: none !important; }
            .table-web { transform: scale(0.8); transform-origin: top left; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="container">
        <header>
            <div class="logo-box">
                <img id="mainLogo" src="https://ui-avatars.com/api/?name=AGN&background=000&color=fff">
                <div><h2 style="margin:0;font-size:1.3rem">PT AGN</h2><span style="font-size:10px;color:var(--p);font-weight:800">INTEGRATED v78.0</span></div>
            </div>
            <button class="btn" style="width:auto; padding:0 20px; background:var(--b)" onclick="toggleT()">🌓 Mode</button>
        </header>

        <div class="tabs no-print">
            <button class="tab-btn active" onclick="openTab('absensi')">📅 ABSENSI</button>
            <button class="tab-btn" onclick="openTab('stok')">📦 STOK BARANG</button>
        </div>

        <!-- PAGE 1: ABSENSI (LOCKED v77.6) -->
        <div id="page-absensi" class="tab-content">
            <div class="card no-print">
                <h3>👥 DATA KARYAWAN</h3>
                <div style="display:flex;gap:10px">
                    <input list="lk" id="iNama" placeholder="Ketik/Pilih Nama...">
                    <datalist id="lk"></datalist>
                    <button class="btn" style="background:var(--s);width:60px;font-size:24px" onclick="tKaryawan()">+</button>
                    <button class="btn" style="background:var(--d);width:60px" onclick="hKaryawan()">🗑️</button>
                </div>
            </div>

            <div class="card no-print">
                <h3>⚡ PRESENSI & KONTROL</h3>
                <div style="display:grid;grid-template-columns: 1fr 1fr 1fr; gap:12px; margin-bottom:12px">
                    <button class="btn" style="background:var(--s);height:60px" onclick="pAbsen('Masuk')">MASUK</button>
                    <button class="btn" style="background:var(--d);height:60px" onclick="pAbsen('Pulang')">PULANG</button>
                    <button class="btn" style="background:var(--iz);height:60px" onclick="pAbsen('Izin')">IZIN</button>
                </div>
                <div style="display:grid;grid-template-columns: 1fr 1fr; gap:10px">
                    <input type="date" id="fB_custom" onchange="syncDate(this.value)">
                    <button class="btn" style="background:var(--p)" onclick="window.print()">📄 CETAK REKAP</button>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <h3>📊 REKAPITULASI BULANAN</h3>
                    <input type="month" id="fB" style="width:150px; height:40px" onchange="rRekap()">
                </div>
                <div class="table-wrap" id="scrollArea">
                    <table class="table-web" id="rekapTable">
                        <thead id="thWeb"></thead>
                        <tbody id="tbWeb"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PAGE 2: STOK BARANG -->
        <div id="page-stok" class="tab-content hidden">
            <div class="card no-print">
                <h3>➕ UPDATE STOK & QC</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="sBarang">
                        <option value="Kempu">Kempu</option>
                        <option value="Jerigen 18L">Jerigen 18L</option>
                        <option value="Jerigen 5L">Jerigen 5L</option>
                        <option value="Mesin Pom Minyak">Mesin Pom Minyak</option>
                    </select>
                    <input type="date" id="sTgl">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:10px">
                    <input type="number" id="sQty" placeholder="Jumlah (Qty)">
                    <select id="sJenis">
                        <option value="masuk_kotor">Masuk Kotor</option>
                        <option value="masuk_bersih">Masuk Bersih/Baru</option>
                        <option value="selesai_rekondisi">Selesai Rekondisi</option>
                        <option value="terjual_umum">Terjual Umum</option>
                        <option value="terjual_agen">Terjual Agen</option>
                        <option value="stok_awal_ready">Set Stok Awal Ready</option>
                        <option value="stok_awal_kotor">Set Stok Awal Kotor</option>
                    </select>
                    <select id="sQC">
                        <option value="Accepted">✅ Accepted</option>
                        <option value="Minor Damage">⚠️ Minor Damage</option>
                        <option value="Reject">❌ Reject</option>
                    </select>
                </div>
                <button class="btn" style="background:var(--s); height:50px" onclick="updateStok()">SIMPAN PENCATATAN STOK</button>
            </div>

            <div class="card">
                <h3>📦 LAPORAN STOK TERPADU</h3>
                <div class="table-wrap">
                    <table class="table-web">
                        <thead>
                            <tr style="background:var(--p)">
                                <th>Barang</th>
                                <th>Stok Awal (Ready)</th>
                                <th>Stok Awal (Kotor)</th>
                                <th>Masuk Kotor</th>
                                <th>Masuk Bersih</th>
                                <th>Rekondisi</th>
                                <th>Sisa Kotor</th>
                                <th>Jual Umum</th>
                                <th>Jual Agen</th>
                                <th>Sisa Ready</th>
                                <th style="background:var(--iz)">TOTAL STOK</th>
                            </tr>
                        </thead>
                        <tbody id="tbStok">
                            <!-- Render via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (LOCKED)
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        
        let mk={}, ad={}, hl={}, stData={};
        const TGL_MULAI_SISTEM = "2026-03-21";
        const LIST_BARANG = ["Kempu", "Jerigen 18L", "Jerigen 5L", "Mesin Pom Minyak"];

        window.onload=()=>{
            const m = new Date().toISOString().slice(0,7);
            const d = new Date().toISOString().split('T')[0];
            document.getElementById('fB').value=m;
            document.getElementById('sTgl').value=d;
            
            db.ref('master_karyawan').on('value',s=>{mk=s.val()||{}; uDl(); rRekap();});
            db.ref('absensi').on('value',s=>{ad=s.val()||{}; rRekap();});
            db.ref('hari_libur').on('value',s=>{hl=s.val()||{}; rRekap();});
            db.ref('stok_barang').on('value',s=>{stData=s.val()||{}; rStok();});
        };

        // NAVIGATION
        function openTab(t){
            document.querySelectorAll('.tab-content').forEach(el=>el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById('page-'+t).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function toggleT(){
            let b=document.body; let nt=b.getAttribute('data-theme')==='dark'?'light':'dark';
            b.setAttribute('data-theme',nt);
        }

        // --- CORE ABSENSI (v77.6 LOCKED) ---
        function uDl(){
            let opt = Object.values(mk).sort().map(n=>`<option value="${n}">`).join('');
            document.getElementById('lk').innerHTML=opt;
        }

        function tKaryawan(){
            let n=document.getElementById('iNama'); if(n.value){db.ref('master_karyawan').push(n.value).then(()=>{n.value=""; alert("Karyawan Ditambah!");});}
        }

        function hKaryawan(){
            let n=document.getElementById('iNama'); let id=Object.keys(mk).find(k=>mk[k]===n.value); 
            if(id && confirm('Hapus Karyawan?')) db.ref(`master_karyawan/${id}`).remove();
        }

        function pAbsen(ty){
            let inp=document.getElementById('iNama'), n=inp.value, now=new Date(), tgl=now.toISOString().split('T')[0];
            if(!n) return alert("Pilih Nama!");
            let jam=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            let st="Hadir"; if(ty==='Masuk' && (now.getHours()>9)) st="Terlambat";
            let nt=""; if(ty==='Izin'){nt=prompt("Alasan:"); if(!nt)return; st="Izin";}
            db.ref(`absensi/${tgl}/${n}/${ty}`).set({waktu:jam, status:st, note:nt});
        }

        function rRekap(){
            const f=document.getElementById('fB').value; if(!f) return;
            const [y,m]=f.split('-'), last=new Date(y,m,0).getDate(), tglSkrg = new Date().getDate();
            const kList=Object.values(mk).sort();
            let h=`<tr><th class="nama-fixed">Nama</th>`;
            for(let i=1;i<=last;i++) h+=`<th id="tgl-${i}">${i}</th>`;
            h+=`<th>H</th><th>I</th><th>A</th><th>L</th></tr>`;
            document.getElementById('thWeb').innerHTML=h;
            let b="";
            kList.forEach(n=>{
                let cH=0, cI=0, cA=0, cL=0, row=`<td class="nama-fixed">${n}</td>`;
                for(let i=1;i<=last;i++){
                    let t=`${y}-${m}-${String(i).padStart(2,'0')}`, data=ad[t]?ad[t][n]:null;
                    let cl="", txt="-";
                    if(data){
                        if(data.Izin){ txt="I"; cl="s-i"; cI++; }
                        else if(data.Masuk){ txt="H"; cl=(data.Masuk.status==="Terlambat")?"s-late":"s-v"; cH++; }
                    }
                    row+=`<td><div class="s-cell ${cl}">${txt}</div></td>`;
                }
                b+=`<tr>${row}<td>${cH}</td><td>${cI}</td><td>${cA}</td><td>${cL}</td></tr>`;
            });
            document.getElementById('tbWeb').innerHTML=b;
        }

        // --- MODULE STOK (NEW) ---
        function updateStok(){
            const brg = document.getElementById('sBarang').value;
            const tgl = document.getElementById('sTgl').value;
            const qty = parseInt(document.getElementById('sQty').value);
            const jns = document.getElementById('sJenis').value;
            const qc  = document.getElementById('sQC').value;

            if(!qty || !tgl) return alert("Isi Qty dan Tanggal!");

            db.ref(`stok_barang/${brg}/${tgl}`).push({
                jenis: jns,
                qty: qty,
                qc: qc,
                timestamp: new Date().getTime()
            }).then(()=>{
                alert("Data Stok Berhasil Dicatat!");
                document.getElementById('sQty').value = "";
            });
        }

        function rStok(){
            let b = "";
            LIST_BARANG.forEach(name => {
                let sA_R = 0, sA_K = 0, m_K = 0, m_B = 0, s_Rek = 0, j_U = 0, j_A = 0;
                
                if(stData[name]){
                    Object.values(stData[name]).forEach(dayRecords => {
                        Object.values(dayRecords).forEach(rec => {
                            if(rec.jenis === 'stok_awal_ready') sA_R += rec.qty;
                            if(rec.jenis === 'stok_awal_kotor') sA_K += rec.qty;
                            if(rec.jenis === 'masuk_kotor') m_K += rec.qty;
                            if(rec.jenis === 'masuk_bersih') m_B += rec.qty;
                            if(rec.jenis === 'selesai_rekondisi') s_Rek += rec.qty;
                            if(rec.jenis === 'terjual_umum') j_U += rec.qty;
                            if(rec.jenis === 'terjual_agen') j_A += rec.qty;
                        });
                    });
                }

                let sisaKotor = (sA_K + m_K) - s_Rek;
                let sisaReady = (sA_R + m_B + s_Rek) - (j_U + j_A);
                let totalStok = sisaKotor + sisaReady;

                b += `<tr>
                    <td class="nama-fixed" style="background:var(--bg) !important">${name}</td>
                    <td>${sA_R}</td>
                    <td>${sA_K}</td>
                    <td>${m_K}</td>
                    <td>${m_B}</td>
                    <td>${s_Rek}</td>
                    <td style="color:var(--d)">${sisaKotor}</td>
                    <td>${j_U}</td>
                    <td>${j_A}</td>
                    <td style="color:var(--s)">${sisaReady}</td>
                    <td style="background:rgba(255,214,0,0.1); font-weight:800">${totalStok}</td>
                </tr>`;
            });
            document.getElementById('tbStok').innerHTML = b;
        }

        function syncDate(val){
            document.getElementById('sTgl').value = val;
        }
    </script>
</body>
</html>
