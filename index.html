<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT-AGN OMNI V97.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#3b82f6;--s:#22c55e;--d:#ef4444;--w:#f59e0b;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#8b5cf6;--al:#64748b;--lb:#d946ef;--sun:#f43f5e;--te:#ec4899}
        *{box-sizing:border-box} body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px;font-size:12px}
        
        /* Navigasi */
        .nav-grid { display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 5px 0;}
        .nav-btn { flex: 1; padding: 12px 5px; background: var(--c); border: 1px solid var(--b); color: var(--t); border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase;}
        .nav-btn.active { background: var(--p); border-color: var(--p); box-shadow: 0 4px 10px rgba(59,130,246,0.4); }

        /* Card */
        .card{background:var(--c);padding:15px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b);}
        h3{margin:0 0 12px;font-size:10px;color:var(--p);text-transform:uppercase;font-weight:800; display: flex; align-items: center; gap: 5px;}
        .form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        input, button, select { height: 42px; border-radius: 10px; border: 1px solid var(--b); background: var(--bg); color: var(--t); padding: 0 10px; width: 100%; font-size: 13px; outline: none;}
        button { cursor: pointer; font-weight: 700; border: none; color: #fff;}

        /* Table */
        .table-wrap{ overflow-x: auto; border-radius: 12px; border: 1px solid var(--b); background: var(--bg); }
        .table-web{ width: 100%; border-collapse: collapse; min-width: 800px; }
        .table-web th{ background: var(--b); padding: 10px 5px; font-size: 9px; border: 1px solid var(--c); color: #cbd5e1; }
        .table-web td{ padding: 8px 5px; border: 1px solid var(--b); text-align: center; font-weight: 700; font-size: 12px; }
        
        /* Sticky Name Column */
        .n-fix{ position: sticky; left: 0; background: var(--c)!important; z-index: 20; width: 110px; border-right: 2px solid var(--p)!important; text-align: left !important; padding-left: 8px !important; color: var(--p); }
        
        .s-box{ width: 35px; height: 35px; border-radius: 6px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; font-weight: 800; }
        .s-h{background:var(--s)} .s-i{background:var(--iz)} .s-a{background:var(--d)} .s-m{background:var(--sun)} .s-off{background:var(--al)} .s-t{background:var(--te)}
        .box-jam{ font-size: 8px; font-weight: 400; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-grid">
            <button class="nav-btn active" onclick="tab('absen', this)">ABSENSI</button>
            <button class="nav-btn" onclick="tab('stok', this)">STOK</button>
            <button class="nav-btn" onclick="tab('aktivitas', this)">AKTIVITAS</button>
            <button class="nav-btn" onclick="tab('gaji', this)">GAJI</button>
        </div>

        <div id="tab-absen" class="tab-content">
            <div class="card">
                <h3>👥 PENGELOLAAN TIM</h3>
                <div class="form-row">
                    <input type="text" id="inK" style="flex:2" placeholder="Input Nama Karyawan Baru...">
                    <button style="background:var(--s); flex:1" onclick="dbOp('karyawan','push',document.getElementById('inK').value)">TAMBAH</button>
                </div>
                <div id="listKaryawan" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px"></div>
            </div>
            
            <div class="card">
                <h3>⚡ FINGERPRINT</h3>
                <div class="form-row">
                    <select id="selK" style="flex:2"></select>
                    <input type="date" id="absT" style="flex:1.2">
                </div>
                <div class="form-row">
                    <button style="background:var(--s);flex:1" onclick="doAbs('Hadir')">MASUK</button>
                    <button style="background:var(--iz);flex:1" onclick="doAbs('Izin')">IZIN</button>
                    <button style="background:var(--d);flex:1" onclick="doAbs('Alpa')">ALPA</button>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <h3>📊 KALENDER</h3>
                    <input type="month" id="fM" onchange="renderAll()" style="width:120px; height:30px">
                </div>
                <div class="table-wrap"><table class="table-web"><thead id="thA"></thead><tbody id="tbA"></tbody></table></div>
            </div>
        </div>

        <div id="tab-stok" class="tab-content hidden">
            <div class="card">
                <h3>📦 BARANG</h3>
                <div class="form-row">
                    <input type="text" id="inB" style="flex:2" placeholder="Nama Barang Baru...">
                    <button style="background:var(--s); flex:1" onclick="dbOp('barang','push',document.getElementById('inB').value)">TAMBAH</button>
                </div>
                <div id="listBarang" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px"></div>
            </div>

            <div class="card">
                <div class="form-row">
                    <select id="slB" style="flex:2"></select>
                    <input type="number" id="stQ" style="flex:1" placeholder="Qty">
                </div>
                <div class="form-row">
                    <select id="stA" style="flex:1">
                        <option value="Masuk">Masuk</option>
                        <option value="Jual Umum">Jual Umum</option>
                        <option value="Jual Mitra">Jual Mitra</option>
                        <option value="Rekondisi">Rekondisi</option>
                    </select>
                    <select id="stKon" style="flex:1">
                        <option value="Baru">Baru/Bersih</option>
                        <option value="Bekas">Bekas/Kotor</option>
                    </select>
                </div>
                <button style="background:var(--p); width:100%" onclick="saveStok()">SIMPAN TRANSAKSI</button>
            </div>

            <div class="card">
                <h3>📈 REKAP STOK</h3>
                <div class="table-wrap">
                    <table class="table-web">
                        <thead>
                            <tr><th class="n-fix">BARANG</th><th>AWAL K</th><th>AWAL B</th><th>MASUK K</th><th>MASUK B</th><th>REKON</th><th>READY</th></tr>
                        </thead>
                        <tbody id="tbS"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-aktivitas" class="tab-content hidden"><div class="card"><h3>🛠️ AKTIVITAS</h3><p>Modul Segera Hadir.</p></div></div>
        <div id="tab-gaji" class="tab-content hidden"><div class="card"><h3>💰 GAJI</h3><p>Modul Segera Hadir.</p></div></div>

    </div>

    <script>
        const cfg={apiKey:"AIzaSyAu67MAhWBxdmciPi3xOKWhdy-uP4u9tXI",databaseURL:"https://pt-agn-default-rtdb.asia-southeast1.firebasedatabase.app"};
        firebase.initializeApp(cfg); const db=firebase.database();
        let DATA = { karyawan:{}, barang:{}, absensi:{}, stok_log:{} };

        window.onload=()=>{
            const t=new Date().toISOString().split('T')[0];
            document.getElementById('fM').value=t.slice(0,7);
            document.getElementById('absT').value=t;
            
            // Listener Utama - Menggunakan path yang sesuai dengan User Summary Mas
            db.ref('/').on('value', s => {
                const v = s.val() || {};
                DATA.karyawan = v.karyawan || {};
                DATA.barang = v.barang || {};
                DATA.absensi = v.absensi || {};
                DATA.stok_log = v.stok_log || {};
                renderAll();
            });
        };

        function tab(t, b){
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
            b.classList.add('active');
        }

        function dbOp(path, op, val){
            if(!val) return;
            if(op==='push') db.ref(path).push(val);
            if(op==='del') if(confirm('Hapus?')) db.ref(`${path}/${val}`).remove();
        }

        function doAbs(stat){
            const n = document.getElementById('selK').value;
            const t = document.getElementById('absT').value;
            if(!n) return alert("Pilih Karyawan!");
            db.ref(`absensi/${t}/${n}`).set({s: stat, t: new Date().toLocaleTimeString('id-ID',{hour12:false,hour:'2-digit',minute:'2-digit'})});
        }

        function saveStok(){
            const b=document.getElementById('slB').value, q=parseInt(document.getElementById('stQ').value), t=new Date().toISOString().split('T')[0];
            const a=document.getElementById('stA').value, k=document.getElementById('stKon').value;
            if(!b || !q) return alert("Isi data!");
            db.ref('stok_log').push({brg:b, qty:q, tgl:t, aksi:a, kon:k});
        }

        function renderAll(){
            const f = document.getElementById('fM').value;
            const kArr = Object.entries(DATA.karyawan);
            const bArr = Object.entries(DATA.barang);

            // Render List Pengelolaan
            document.getElementById('listKaryawan').innerHTML = kArr.map(([id,n])=>`<div style="background:var(--b); padding:5px 10px; border-radius:8px; font-size:10px">${n} <b style="color:var(--d); cursor:pointer" onclick="dbOp('karyawan','del','${id}')">×</b></div>`).join('');
            document.getElementById('listBarang').innerHTML = bArr.map(([id,n])=>`<div style="background:var(--b); padding:5px 10px; border-radius:8px; font-size:10px">${n} <b style="color:var(--d); cursor:pointer" onclick="dbOp('barang','del','${id}')">×</b></div>`).join('');

            // Render Selects
            const kOpt = kArr.map(([id,n])=>`<option value="${n}">${n}</option>`).join('');
            const bOpt = bArr.map(([id,n])=>`<option value="${n}">${n}</option>`).join('');
            document.getElementById('selK').innerHTML = kOpt;
            document.getElementById('slB').innerHTML = bOpt;

            renderAbsenTable(f, kArr);
            renderStokTable(f, bArr);
        }

        function renderAbsenTable(f, kArr){
            const [y, m] = f.split('-'), last = new Date(y, m, 0).getDate();
            let th = `<tr><th class="n-fix">NAMA</th>`, tb = "";
            for(let i=1; i<=last; i++) th += `<th>${i}</th>`;
            document.getElementById('thA').innerHTML = th + `</tr>`;

            kArr.forEach(([id, name]) => {
                let row = `<td class="n-fix">${name}</td>`;
                for(let i=1; i<=last; i++){
                    const tgl = `${y}-${m}-${String(i).padStart(2,'0')}`;
                    const d = (DATA.absensi[tgl] || {})[name];
                    const isSun = new Date(tgl).getDay() === 0;
                    let c="", txt=isSun?"M":"-";
                    if(d){
                        txt = d.s[0]; 
                        c = d.s==='Hadir'?'s-h':(d.s==='Izin'?'s-i':'s-a');
                    } else if(isSun) c="s-m";
                    row += `<td><div class="s-box ${c}">${txt}<div class="box-jam">${(d&&d.t)||''}</div></div></td>`;
                }
                tb += `<tr>${row}</tr>`;
            });
            document.getElementById('tbA').innerHTML = tb;
        }

        function renderStokTable(f, bArr){
            let h = "";
            bArr.forEach(([id, bn]) => {
                let ak=0, ab=0, mk=0, mb=0, re=0, ju=0, jm=0;
                Object.values(DATA.stok_log).forEach(s => {
                    if(s.brg !== bn) return;
                    if(s.tgl < f+"-01"){
                        if(s.aksi==='Masuk') (s.kon==='Bekas'?ak+=s.qty:ab+=s.qty);
                        if(s.aksi==='Rekondisi') {ak-=s.qty; ab+=s.qty;}
                        if(s.aksi.includes('Jual')) ab-=s.qty;
                    } else if(s.tgl.startsWith(f)){
                        if(s.aksi==='Masuk') (s.kon==='Bekas'?mk+=s.qty:mb+=s.qty);
                        if(s.aksi==='Rekondisi') re+=s.qty;
                        if(s.aksi==='Jual Umum') ju+=s.qty;
                        if(s.aksi==='Jual Mitra') jm+=s.qty;
                    }
                });
                const ready = ab + mb + re - ju - jm;
                h += `<tr><td class="n-fix">${bn}</td><td>${ak}</td><td>${ab}</td><td>${mk}</td><td>${mb}</td><td>${re}</td><td style="color:var(--s)">${ready}</td></tr>`;
            });
            document.getElementById('tbS').innerHTML = h;
        }
    </script>
</body>
</html>
