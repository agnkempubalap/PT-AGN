<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-AGN v92.0 - INTEGRATED SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--p:#2563eb;--s:#00C853;--d:#ef4444;--w:#FFD600;--bg:#0f172a;--c:#1e293b;--t:#f8fafc;--b:#334155;--iz:#f59e0b;--al:#37474F}
        body[data-theme="light"]{--bg:#f1f5f9;--c:#ffffff;--t:#1e293b;--b:#cbd5e1}
        body{font-family:'Plus Jakarta Sans',sans-serif;margin:0;background:var(--bg);color:var(--t);padding:10px; transition: 0.3s}
        .container{max-width:1600px;margin:0 auto}
        
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
        .logo-box{display:flex;align-items:center;gap:12px}
        .logo-box img{width:60px;height:60px;border-radius:50%;border:3px solid var(--p);object-fit:cover}

        .tabs{display:flex;gap:10px;margin-bottom:15px}
        .tab-btn{flex:1;padding:15px;border-radius:12px;background:var(--c);color:var(--t);border:1px solid var(--b);cursor:pointer;font-weight:800;font-size:12px}
        .tab-btn.active{background:var(--p);border-color:var(--p);color:#fff}
        .tab-content{display:none} .tab-content.active{display:block}

        .card{background:var(--c);padding:18px;border-radius:18px;margin-bottom:12px;border:1px solid var(--b)}
        h3{margin:0 0 15px;font-size:11px;color:var(--iz);text-transform:uppercase;font-weight:800}
        
        input,button,select{border-radius:12px;font-size:14px;height:48px;border:1px solid var(--b);background:var(--bg);color:var(--t);width:100%;box-sizing:border-box;outline:none;padding:0 12px}
        .btn{display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;border:none;color:#fff}
        
        .table-wrap{overflow-x:auto; border-radius:12px; border:1px solid var(--b); background:var(--c)}
        .table-web{width:100%;border-collapse:collapse;font-size:10px; color:var(--t)}
        .table-web th, .table-web td{border:1px solid var(--b);padding:10px 5px;text-align:center}
        
        .nama-fixed{position:sticky !important;left:0;background-color:var(--c) !important;z-index:10;min-width:110px !important;text-align:left !important;padding-left:10px !important;font-weight:700; border-right: 2px solid var(--p) !important}
        
        /* Absensi Styles */
        .s-cell{border-radius:6px;width:32px;height:32px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:9px;margin:0 auto;}
        .s-v{background:var(--s);color:#fff} .s-late{background:var(--w);color:#000} .s-i{background:var(--iz);color:#fff}
        .s-off{background:var(--d);color:#fff} .s-a{background:var(--al);color:#fff} .s-mng{background:#64748b;color:#fff}
        .jam-text{font-size:7px;font-weight:600;display:block;margin-top:2px}

        /* Stok Styles */
        .col-kotor{background:rgba(245,158,11,0.1)} .col-ready{background:rgba(0,200,83,0.1)}
        .res-kotor{color:var(--iz); font-weight:900; font-size:12px}
        .res-ready{color:var(--s); font-weight:900; font-size:12px}
        .btn-del{background:var(--d); color:#fff; border:none; padding:4px 8px; border-radius:6px; cursor:pointer}

        @media print { header, .no-print, .tabs { display: none !important; } .table-web{transform: scale(0.8); transform-origin: top left;}}
    </style>
</head>
