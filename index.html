<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi PT AGN</title>

<style>
body { font-family: Arial; margin:0; background:#eef3ff; }
.page { display:none; padding:15px; }
.active { display:block; }
h2 { color:blue; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

ul { padding-left:15px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ccc;
}

.nav button { flex:1; }
</style>
</head>

<body>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>
<div class="card">Aplikasi Absensi PT AGN</div>
</div>

<!-- ABSENSI -->
<div id="absensi" class="page">
<h2>Absensi Hari Ini</h2>

<div class="card">

<select id="nama">
<option>Agung</option>
<option>Hasan</option>
<option>Hata</option>
<option>Alda</option>
<option>Nur</option>
</select>

<button id="btnAbsen" onclick="absen()">Hadir</button>

<h3>Data Hari Ini</h3>
<ul id="listAbsen"></ul>

<h3>Rekap Bulanan</h3>
<ul id="rekapBulanan"></ul>

</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('absensi')">Absensi</button>
</div>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  query,
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAu67MAhW8xdmciPi3xOKwHdy-uP4u9tXI",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn",
  storageBucket: "pt-agn.firebasestorage.app",
  messagingSenderId: "810494462386",
  appId: "1:810494462386:web:432a3050c054bdd8437cab"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// 🔥 ABSEN SUPER ANTI DOUBLE
window.absen = async function(){

  const btn = document.getElementById("btnAbsen");
  btn.disabled = true;
  btn.innerText = "Loading...";

  let nama = document.getElementById("nama").value;

  let today = new Date();
  let tanggal = today.getFullYear() + "-" + 
                (today.getMonth()+1).toString().padStart(2,'0') + "-" + 
                today.getDate().toString().padStart(2,'0');

  let docId = nama + "_" + tanggal;

  try {

    const ref = doc(db, "absensi", docId);
    const snap = await getDoc(ref);

    if(snap.exists()){
      alert("❌ " + nama + " sudah absen hari ini!");
      btn.disabled = false;
      btn.innerText = "Hadir";
      return;
    }

    await setDoc(ref, {
      nama: nama,
      status: "Hadir",
      waktu: new Date(),
      tanggal: tanggal
    });

    alert("✅ Absen berhasil");

  } catch (e) {
    alert("Error: " + e.message);
  }

  btn.disabled = false;
  btn.innerText = "Hadir";
}



// 🔥 REALTIME HARI INI
function realtime(){

  const list = document.getElementById('listAbsen');

  let today = new Date();
  let tanggal = today.getFullYear() + "-" + 
                (today.getMonth()+1).toString().padStart(2,'0') + "-" + 
                today.getDate().toString().padStart(2,'0');

  const q = query(
    collection(db, "absensi"),
    where("tanggal", "==", tanggal),
    orderBy("waktu", "desc")
  );

  onSnapshot(q, (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();
      const li = document.createElement("li");

      li.innerText = d.nama + " - " + d.status;

      list.appendChild(li);
    });
  });
}



// 🔥 REKAP BULANAN
function rekapBulanan(){

  const list = document.getElementById("rekapBulanan");

  let now = new Date();
  let bulan = now.getMonth() + 1;
  let tahun = now.getFullYear();

  let prefix = tahun + "-" + bulan.toString().padStart(2,'0');

  const q = query(
    collection(db, "absensi"),
    orderBy("tanggal", "asc")
  );

  onSnapshot(q, (snapshot) => {

    let dataRekap = {};

    snapshot.forEach(doc => {
      const d = doc.data();

      if(d.tanggal && d.tanggal.startsWith(prefix)){

        if(!dataRekap[d.nama]){
          dataRekap[d.nama] = 0;
        }

        dataRekap[d.nama]++;
      }
    });

    list.innerHTML = "";

    for(let nama in dataRekap){
      const li = document.createElement("li");
      li.innerText = nama + " : " + dataRekap[nama] + " hari";
      list.appendChild(li);
    }

  });

}



// LOAD
window.onload = function(){
  realtime();
  rekapBulanan();
}

</script>

</body>
</html>
