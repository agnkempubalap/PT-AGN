<!DOCTYPE html>
<html>
<head>
  <title>Absensi Karyawan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #eef1f5;
      padding: 20px;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .masuk { background: green; color: white; }
    .pulang { background: orange; color: white; }
    .reset { background: red; color: white; }

    .item {
      background: #f0f0f0;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 5px;
    }

    .day {
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-size: 12px;
    }

    .hadir { background: #4caf50; color: white; }
    .telat { background: #ff9800; color: white; }
    .absen { background: #f44336; color: white; }
  </style>
</head>

<body>

<h2>📋 Absensi Karyawan</h2>

<div class="card">
  <select id="nama"></select>
  <button class="masuk" onclick="absenMasuk()">Absen Masuk</button>
  <button class="pulang" onclick="absenPulang()">Absen Pulang</button>
  <button class="reset" onclick="resetHari()">Reset Hari Ini</button>
</div>

<div class="card">
  <b>📅 Hari Ini</b>
  <div id="list"></div>
</div>

<div class="card">
  <b>📆 Kalender Bulan Ini</b>
  <div id="calendar" class="calendar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  addDoc, query, where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI PUNYAMU",
  authDomain: "pt-agn.firebaseapp.com",
  projectId: "pt-agn"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const jamMasuk = "09:00";
const jamPulang = "16:00";

function today() {
  return new Date().toISOString().slice(0,10);
}

function nowTime() {
  return new Date().toLocaleTimeString();
}

async function loadKaryawan() {
  const snap = await getDocs(collection(db, "karyawan"));
  let html = "";

  snap.forEach(doc => {
    const d = doc.data();
    if (d.aktif === true) {
      html += `<option value="${d.nama}">${d.nama}</option>`;
    }
  });

  document.getElementById("nama").innerHTML = html;
}

window.absenMasuk = async function() {
  const nama = document.getElementById("nama").value;

  const q = query(
    collection(db, "absensi"),
    where("nama","==",nama),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  if (!snap.empty) {
    alert("Sudah absen!");
    return;
  }

  const waktu = nowTime();
  const telat = waktu > jamMasuk;

  await addDoc(collection(db,"absensi"),{
    nama,
    tanggal: today(),
    masuk: waktu,
    pulang: "",
    status: telat ? "Telat" : "Hadir"
  });

  loadData();
};

window.absenPulang = async function() {
  const nama = document.getElementById("nama").value;

  const q = query(
    collection(db,"absensi"),
    where("nama","==",nama),
    where("tanggal","==",today())
  );

  const snap = await getDocs(q);

  if (snap.empty) return alert("Belum absen masuk");

  snap.forEach(async d => {
    await addDoc(collection(db,"absensi"),{
      ...d.data(),
      pulang: nowTime()
    });
  });

  loadData();
};

window.resetHari = async function() {
  alert("Reset manual di Firebase (hapus data hari ini)");
};

async function loadData() {
  const snap = await getDocs(collection(db,"absensi"));
  let html = "";

  snap.forEach(doc => {
    const d = doc.data();
    if (d.tanggal === today()) {
      html += `
        <div class="item">
          ${d.nama}<br>
          Masuk: ${d.masuk || "-"}<br>
          Pulang: ${d.pulang || "-"}<br>
          Status: ${d.status}
        </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html;

  renderCalendar(snap);
}

function renderCalendar(snap) {
  let html = "";

  for (let i=1;i<=31;i++) {
    html += `<div class="day">${i}</div>`;
  }

  document.getElementById("calendar").innerHTML = html;
}

loadKaryawan();
loadData();

</script>
</body>
</html>
