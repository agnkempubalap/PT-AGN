<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi PT-AGN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:sans-serif;background:linear-gradient(to bottom,#6fa8dc,#cfe2f3);margin:0;padding:15px}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:12px;border:none;border-radius:10px;margin:5px 0;color:#fff;font-weight:bold}
.green{background:#2ecc71}.orange{background:#f39c12}.red{background:#e74c3c}.blue{background:#3498db}
input,select{width:100%;padding:10px;border-radius:8px;margin:5px 0}
.flex{display:flex;gap:10px}
.box{flex:1;padding:10px;border-radius:10px;color:#fff;text-align:center}
.b1{background:#3498db}.b2{background:#2ecc71}.b3{background:#f1c40f}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s}
.show{opacity:1}
</style>
</head>

<body>

<div id="toast"></div>

<div class="card">
<h3>📋 Absensi PT-AGN</h3>

<select id="nama">
<option>Agung</option>
<option>Alda</option>
<option>Nur</option>
<option>Hasan</option>
<option>Hatta</option>
</select>

<button class="green" onclick="absenMasuk()">Absen Masuk</button>
<button class="orange" onclick="absenPulang()">Absen Pulang</button>
<button class="orange" onclick="izin()">Izin</button>
<button class="red" onclick="alpa()">Alpa</button>
<button class="red" onclick="resetHari()">Reset Hari Ini</button>
<button class="blue" onclick="exportExcel()">Export Excel</button>
<button class="blue" onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<h4>Filter</h4>
<select id="bulan"></select>
<input type="text" id="search" placeholder="Cari nama...">
</div>

<div class="card">
<h4>Dashboard</h4>
<div class="flex">
<div class="box b1" id="total">0</div>
<div class="box b2" id="hadir">0</div>
<div class="box b3" id="telat">0</div>
</div>
</div>

<div class="card">
<h4>Grafik Harian</h4>
<canvas id="chart"></canvas>
</div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("absensi")) || [];
const namaSelect = document.getElementById("nama");

const bulanSelect = document.getElementById("bulan");
for(let i=1;i<=12;i++){
  bulanSelect.innerHTML += `<option value="${i}">Bulan ${i}</option>`;
}
bulanSelect.value = new Date().getMonth()+1;

bulanSelect.onchange = render;
document.getElementById("search").oninput = render;

// ================= TOAST =================
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// ================= TIME =================
function now(){
  let d=new Date();

  let jam = String(d.getHours()).padStart(2,'0');
  let menit = String(d.getMinutes()).padStart(2,'0');
  let detik = String(d.getSeconds()).padStart(2,'0');

  return {
    tanggal:d.toISOString().split('T')[0],
    jam:`${jam}:${menit}:${detik}`
  }
}

function save(){
  localStorage.setItem("absensi", JSON.stringify(data));
  render();
}

// ================= AUTO ALPA =================
function autoAlpa(){
  let t = now();

  let [h,m,s] = t.jam.split(":").map(Number);
  let total = h*3600 + m*60 + s;

  if(total < 16*3600) return;

  let semua = ["Agung","Alda","Nur","Hasan","Hatta"];

  semua.forEach(n=>{
    let ada = data.find(x=>x.nama==n && x.tanggal==t.tanggal);
    if(!ada){
      data.push({
        nama:n,
        tanggal:t.tanggal,
        masuk:"-",
        pulang:"-",
        status:"Alpa",
        bulan:new Date().getMonth()+1
      });
    }
  });

  localStorage.setItem("absensi", JSON.stringify(data));
}

// ================= TELAT =================
function isTelat(jam){
  let [h,m,s] = jam.split(":").map(Number);
  let total = h*3600 + m*60 + s;
  return total > 9*3600;
}

// ================= ABSEN =================
function absenMasuk(){
  let n = namaSelect.value;
  let t = now();

  let cek = data.find(x=>x.nama==n && x.tanggal==t.tanggal);
  if(cek){toast("⚠️ Sudah absen masuk");return}

  let status = isTelat(t.jam) ? "Telat" : "Hadir";

  data.push({
    nama:n,
    tanggal:t.tanggal,
    masuk:t.jam,
    pulang:"-",
    status:status,
    bulan:new Date().getMonth()+1
  });

  toast("✅ Absen masuk berhasil");
  save();
}

function absenPulang(){
  let n = namaSelect.value;
  let t = now();

  let d = data.find(x=>x.nama==n && x.tanggal==t.tanggal);

  if(!d){toast("❌ Belum absen masuk");return}
  if(d.pulang!="-"){toast("⚠️ Sudah absen pulang");return}

  let [h,m,s] = t.jam.split(":").map(Number);
  let total = h*3600 + m*60 + s;

  if(total < 16*3600){
    toast("⚠️ Belum waktunya pulang");
    return;
  }

  d.pulang = t.jam;
  toast("🏁 Absen pulang berhasil");
  save();
}

function izin(){
  let n = namaSelect.value;
  let t = now();

  if(data.find(x=>x.nama==n && x.tanggal==t.tanggal)){
    toast("⚠️ Sudah ada data hari ini");return;
  }

  data.push({nama:n,tanggal:t.tanggal,masuk:"-",pulang:"-",status:"Izin",bulan:new Date().getMonth()+1});
  toast("📌 Izin dicatat");
  save();
}

function alpa(){
  let n = namaSelect.value;
  let t = now();

  if(data.find(x=>x.nama==n && x.tanggal==t.tanggal)){
    toast("⚠️ Sudah ada data hari ini");return;
  }

  data.push({nama:n,tanggal:t.tanggal,masuk:"-",pulang:"-",status:"Alpa",bulan:new Date().getMonth()+1});
  toast("🚫 Alpa dicatat");
  save();
}

function resetHari(){
  let today = now().tanggal;
  data = data.filter(x=>x.tanggal!=today);
  toast("🔄 Data hari ini direset");
  save();
}

// ================= RENDER =================
function render(){
  autoAlpa();

  let bulan = bulanSelect.value;
  let search = document.getElementById("search").value.toLowerCase();

  let filtered = data.filter(x=>x.bulan==bulan && x.nama.toLowerCase().includes(search));

  document.getElementById("list").innerHTML = filtered.map(x=>`
  <div class="card">
  <b>${x.nama}</b><br>
  ${x.tanggal}<br>
  Masuk: ${x.masuk}<br>
  Pulang: ${x.pulang=="-"?"Belum pulang":x.pulang}<br>
  <span style="
  background:${
    x.status=='Telat' ? '#e74c3c' :
    x.status=='Hadir' ? '#2ecc71' :
    x.status=='Izin' ? '#3498db' :
    '#7f8c8d'
  };
  color:#fff;
  padding:5px 10px;
  border-radius:8px;
  font-weight:bold;">
  ${x.status}
  </span>
  </div>`).join("");

  let hadir = filtered.filter(x=>x.status=="Hadir").length;
  let telat = filtered.filter(x=>x.status=="Telat").length;

  document.getElementById("total").innerText = filtered.length;
  document.getElementById("hadir").innerText = hadir;
  document.getElementById("telat").innerText = telat;

  let group = {};
  filtered.forEach(x=>{
    if(!group[x.tanggal]) group[x.tanggal]=0;
    group[x.tanggal]++;
  });

  chart.data.labels = Object.keys(group);
  chart.data.datasets[0].data = Object.values(group);
  chart.update();
}

// ================= CHART =================
const chart = new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{labels:[],datasets:[{label:'Absensi',data:[]}]}
});

// ================= EXPORT EXCEL PRO =================
function exportExcel(){
  let header=[["No","Nama","Tanggal","Masuk","Pulang","Status"]];

  let rows=data.map((d,i)=>[
    i+1,d.nama,d.tanggal,d.masuk,d.pulang=="-"?"Belum":d.pulang,d.status
  ]);

  let ws=XLSX.utils.aoa_to_sheet(header.concat(rows));
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Absensi");

  XLSX.writeFile(wb,"Absensi_PT-AGN.xlsx");
  toast("📊 Export Excel PRO berhasil");
}

// ================= EXPORT PDF PRO =================
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  doc.text("Laporan Absensi PT-AGN",10,10);

  let y=20;

  data.forEach((d,i)=>{
    doc.text(`${i+1}. ${d.nama}`,10,y);
    doc.text(`${d.tanggal} | ${d.status}`,10,y+5);
    y+=12;

    if(y>280){doc.addPage();y=20;}
  });

  doc.save("Absensi_PT-AGN.pdf");
  toast("📄 Export PDF PRO berhasil");
}

render();
</script>
</body>
</html>
